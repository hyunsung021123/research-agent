# AI Research Agent — 설정 (v2: 다중 문제)
# 이 파일을 config.yaml 로 복사한 뒤 수정하세요. 이 파일은 git 에 올라가도 안전합니다
# (API 키는 여기에 넣지 않습니다 — 환경변수 / GitHub Actions Secret 사용).

profile:
  name: "최현성"
  language: "ko"

# ── 연구 문제들 (각 문제마다 키워드·설명을 따로) ──────────────────
# 새 문제를 추가하려면 같은 형식으로 항목을 늘리면 됩니다.
problems:
  - id: "mcmullen"
    name: "McMullen's problem (d=5)"
    description: |
      McMullen's problem, Larman conjecture f(5)=11, convex position,
      general position 점 배치, oriented matroid 의 acyclic reorientation,
      Lawrence oriented matroid, tope graph, signed permutation.
      접근 도구: polyhedral matching fields, tropical geometry,
      triangulations of products of simplices, chirotope, realizability.
    keywords:
      - "mcmullen"
      - "convex position"
      - "general position"
      - "oriented matroid"
      - "acyclic reorientation"
      - "lawrence"
      - "tope"
      - "projective equivalences"
      - "permissible projective transformation"
      - "reorientations"
      - "larman"
      - "roudneff"
      - "matching field"
      - "tropical"
      - "triangulation"
      - "chirotope"
      - "realizab"
    exclude_keywords:
      - "machine learning"
      - "neural network"

# 공통 관심(Tverberg 등)을 별도 문제로 두고 싶으면 위에 항목을 더 추가하세요.

arxiv:
  categories: ["math.CO", "math.MG", "math.AT", "math.GT"]
  core_categories: ["math.CO", "math.MG"]   # 탐색을 이 카테고리로 제한(노이즈↓). 빈 []=제한없음
  lookback_days: 7
  max_fetch_per_category: 200
  explore_sample: 8         # 키워드 비매칭 논문 탐색 편수(0=끔)

llm:
  model: "claude-sonnet-4-6"
  explore_model: "claude-haiku-4-5-20251001"
  relevance_threshold: 5
  max_summarize: 40         # 1회 실행당 LLM 호출 상한(전 문제 합산)
  max_tokens: 1500

learn:                      # 키워드 자동 최적화
  auto_apply: false         # true 면 고신뢰 키워드를 자동 적용(사람 config 는 안 건드림)
  min_precision: 0.85       # 자동 적용 최소 판별력
  min_support: 3            # 자동 적용 최소 고관련 등장 수
  max_apply_per_run: 3      # 1회 실행당 문제별 자동 적용 상한

notify:                     # 푸시 알림(ntfy.sh)
  enabled: true
  ntfy_topic: "Research_agent_1123hs"            # 예: "ra-choihs-x7k2q" — 추측 어렵게. 폰 ntfy 앱에서 같은 토픽 구독
  ntfy_server: "https://ntfy.sh"
  min_relevance: 4          # 이 점수 이상만 알림

retention:                  # 누적 논문 수 통제(자동 정리). 즐겨찾기·좋아요는 보호됨
  keep_days: 90             # 이보다 오래된 논문은 정리 대상
  keep_top: 0               # >0 이면 비보호 논문 중 관련도 상위 N편만 유지(예: 60)
  min_relevance: 0          # 이 미만 관련도는 정리(0=끔)
  protect_favorites: true
  archive: true             # 정리분을 data/archive.jsonl 로 보관(학습 이력 유지)

paths:
  corpus: "data/corpus.jsonl"
  state: "data/state.json"
  learned: "data/learned_keywords.json"
  feedback: "data/feedback.json"
  archive: "data/archive.jsonl"
  digests: "digests"
  dashboard: "docs/index.html"   # GitHub Pages 가 docs/ 를 서빙
