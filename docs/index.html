 Klavžar and Kovše [Ars Combin. 93 (2009), 77--86] observed that the opposite semicubes of every harmonic-even partial cube are pairwise isomorphic, and asked whether the converse is true, that is, whether a partial cube is harmonic-even if and only if its opposite semicubes are pairwise isomorphic. In this paper, we answer this question in the negative by constructing an infinite family of partial cubes with pairwise isomorphic opposite semicubes that are not harmonic-even. This establishes that pairwise opposite-semicube isomorphism is strictly weaker than harmonic-evenness and naturally leads to the question of what additional condition restores the equivalence. To address this question, we introduce the opposite-semicube Helly property and prove that a finite partial cube satisfying this property is antipodal, or equivalently harmonic-even by Polat's theorem, if and only if it has pairwise isomorphic opposite semicubes.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-30T10:46:54+00:00", "updated": "2026-06-30T10:46:54+00:00", "abs_url": "http://arxiv.org/abs/2606.31468v1", "pdf_url": "https://arxiv.org/pdf/2606.31468v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Partial cubes와 hypercube 임베딩은 이산기하학의 고전 주제이지만, McMullen's problem(d=5에서의 convex position 점 배치 및 oriented matroid)과는 직접적인 관련이 없음.", "summary": "본 논문은 partial cube의 opposite semicube 동형성에 관한 Klavžar-Kovše 추측을 부정으로 해결한다. Harmonic-even partial cube가 아니면서도 opposite semicube가 쌍별 동형인 무한 partial cube 족을 구성하고, opposite-semicube Helly 성질을 도입하여 동형성과 harmonic-evenness의 동치 조건을 특성화한다.", "technique": "Partial cube의 구조적 성질(semicube, harmonic-evenness, Helly property)을 이용한 반례 구성 및 특성화", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.01010v1", "title": "Function-Counting Theory for Low-Dimensional Data Structures", "authors": ["Konstantin Häberle", "Helmut Bölcskei"], "abstract": "The success of deep learning models in classification and regression is widely attributed to the low-dimensional structure that real-world data tend to exhibit, despite their high-dimensional representation. This work attempts to provide a mathematical framework for binary classification on low-dimensional data, building on Cover's (1965) function-counting theory. With our framework, we aim to address the question of how the low-dimensional structure of the data affects the classification capabilities of learning models. Cover's theory relies on a general position assumption that blinds it to the underlying data structure. We refine this assumption to account for the low-dimensionality of the data and derive dichotomy counts that reflect the data structure. We further extend Cover's separation capacity and problem of generalization to the low-dimensional setting, enabling the impact of the underlying data structure on both to be analyzed.", "categories": ["stat.ML", "cs.IT", "cs.LG", "math.CA", "math.CO"], "primary_category": "stat.ML", "published": "2026-07-01T14:47:36+00:00", "updated": "2026-07-01T14:47:36+00:00", "abs_url": "http://arxiv.org/abs/2607.01010v1", "pdf_url": "https://arxiv.org/pdf/2607.01010v1", "journal_ref": "", "doi": "", "comment": "49 pages, 7 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 딥러닝 분류 문제를 위한 함수-카운팅 이론에 관한 것으로, McMullen 문제(볼록 위치·일반 위치 점 배치, oriented matroid 등)와 직접적인 관련이 없다.", "summary": "이 논문은 Cover(1965)의 함수-카운팅 이론을 저차원 구조를 가진 데이터로 확장하는 수학적 프레임워크를 제시한다. 데이터의 저차원성을 반영하도록 일반 위치(general position) 가정을 정교화하여 데이터 구조를 반영한 이분법(dichotomy) 수를 유도한다. 나아가 Cover의 분리 용량(separation capacity)과 일반화 문제(generalization problem)를 저차원 설정으로 확장하여 데이터 구조가 이 두 측면에 미치는 영향을 분석할 수 있게 한다.", "technique": "Cover의 함수-카운팅 이론의 일반 위치 가정을 저차원 데이터 구조에 맞게 정제하여 이분법 수(dichotomy count)를 유도하는 방법론.", "connections": "", "keyword_hits": ["general position"], "source": "filter"}, {"id": "2606.30950v1", "title": "Sharp Nordhaus-Gaddum bounds for throttling", "authors": ["Ryan Blair", "Gabriel Elvin", "Veronika Furst", "Leslie Hogben", "Tony W. H. Wong"], "abstract": "Throttling is a graph optimization problem, where the throttling number of a graph is the minimum sum or minimum product of the number of vertices in an initial set and the time required to complete a certain graph operation. A Nordhaus-Gaddum bound refers to an upper or lower bound of the sum or product of a graph parameter together with that of its complement. In this paper, we study the Nordhaus-Gaddum sum and product bounds of the various throttling numbers (sum throttling and product throttling with or without initial cost). Graph operations considered are standard zero forcing, positive semidefinite forcing, power domination, and Cops and Robbers.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-29T22:03:20+00:00", "updated": "2026-06-29T22:03:20+00:00", "abs_url": "http://arxiv.org/abs/2606.30950v1", "pdf_url": "https://arxiv.org/pdf/2606.30950v1", "journal_ref": "", "doi": "", "comment": "29 pages, 4 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Throttling은 그래프 최적화 문제이며 McMullen's problem은 볼록기하학의 점 배치 문제로 연구 주제가 직접 관련되지 않음.", "summary": "본 논문은 그래프 throttling 문제의 Nordhaus-Gaddum 경계(bound)를 연구한다. Throttling number는 초기 집합의 크기와 그래프 연산 완료 시간의 합 또는 곱의 최소값으로 정의되며, 표준 zero forcing, positive semidefinite forcing, power domination, Cops and Robbers 등 여러 그래프 연산에 대해 분석한다.", "technique": "그래프의 보그래프(complement graph)와의 관계를 이용하여 매개변수의 합과 곱에 대한 sharp bounds를 도출.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.29392v1", "title": "New bounds for equiangular lines and Balla's conjecture", "authors": ["Chuanyuan Ge", "Shiping Liu"], "abstract": "Let $N_α(d)$ denote the maximum number of equiangular lines in $\\mathbb{R}^d$ with common angle $\\arccos(α)$. Balla conjectured that, if the spectral radius order $κ_{\\frac{1-α}{2α}}$ of $\\frac{1-α}{2α}$ is finite, then   $$N_α(d)\\leq \\max\\left\\{\\frac{(1-α^2)(1-2α^2)}{2α^4},\\left\\lfloor\\frac{κ_{\\frac{1-α}{2α}}(d-1)}{κ_{\\frac{1-α}{2α}}-1}\\right\\rfloor\\right\\},$$   for any $d\\geq 1$. The conjecture has previously been verified only for $α\\in\\left\\{\\frac{1}{3},\\frac{1}{5},\\frac{1}{1+2\\sqrt{2}}\\right\\}$. In this paper, we prove that this conjecture holds for $α=\\frac{1}{1+2\\sqrt{3}}$ and $α=\\sqrt{5}-2$. On the other hand, we show that Balla's conjecture fails for infinitely many $α$.", "categories": ["math.CO", "math.MG"], "primary_category": "math.CO", "published": "2026-06-28T13:33:03+00:00", "updated": "2026-06-28T13:33:03+00:00", "abs_url": "http://arxiv.org/abs/2606.29392v1", "pdf_url": "https://arxiv.org/pdf/2606.29392v1", "journal_ref": "", "doi": "", "comment": "12 pages, 1 figure", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Equiangular lines는 기하학적 배치 문제이지만, McMullen's problem의 convex position, general position, oriented matroid 와는 직접적 연관이 없음.", "summary": "논문은 실수 공간 $\\mathbb{R}^d$에서 공통 각도를 갖는 등각선(equiangular lines)의 최대 개수 $N_α(d)$에 관한 상한을 연구한다. Balla의 추측을 $α=\\frac{1}{1+2\\sqrt{3}}$과 $α=\\sqrt{5}-2$인 경우에 증명하고, 동시에 이 추측이 무한히 많은 $α$ 값에 대해 거짓임을 보인다.", "technique": "스펙트럼 반경(spectral radius) 개념을 활용하여 등각선 배치의 상한을 도출", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.28651v1", "title": "The Thickness of Infinite Sidon Sets", "authors": ["Kevin O'Bryant"], "abstract": "Let $γ\\ge 1$. A set $A$ of nonnegative integers is a Sidon set if for each $d>0$ there is at most one pair $(a,b) \\in A \\times A$ with $d=a-b$. If there are at most $γ$ pairs, then $A$ is a $γ$-Golomb ruler. We prove that if $A$ is a $γ$-Golomb ruler, then \\[\\liminf_{n\\to\\infty} \\frac{|A\\cap[0,n)|}{\\sqrt{n/\\log n}} \\le \\frac{2}{\\sqrt{\\log 2}} \\sqrtγ.\\] There is a $γ$-Golomb ruler $G$ with \\[ \\limsup_{n\\to\\infty} \\frac{|G\\cap[0,n)|}{\\sqrt n} \\ge \\frac{1}{\\sqrt2} \\sqrtγ.\\]", "categories": ["math.CO", "math.NT"], "primary_category": "math.CO", "published": "2026-06-26T23:34:53+00:00", "updated": "2026-06-26T23:34:53+00:00", "abs_url": "http://arxiv.org/abs/2606.28651v1", "pdf_url": "https://arxiv.org/pdf/2606.28651v1", "journal_ref": "", "doi": "", "comment": "12 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Sidon set의 밀도 상한은 조합론 문제이지만, McMullen's problem(볼록 위치, 일반 위치 점 배치, oriented matroid, chirotope 등)과는 기하학적 또는 구조적 연관성이 없음.", "summary": "γ-Golomb ruler(각 양의 정수 거리 d에 대해 최대 γ개의 쌍 (a,b)를 가지는 음이 아닌 정수 집합)의 점근 밀도에 대한 상하한을 증명. 하한은 $\\liminf_{n\\to\\infty} \\frac{|A\\cap[0,n)|}{\\sqrt{n/\\log n}} \\le \\frac{2}{\\sqrt{\\log 2}}\\sqrt{\\gamma}$이고, 구성된 예시는 $\\limsup_{n\\to\\infty} \\frac{|G\\cap[0,n)|}{\\sqrt{n}} \\ge \\frac{1}{\\sqrt{2}}\\sqrt{\\gamma}$를 만족.", "technique": "점 쌍의 개수 제약 조건을 이용한 점근 밀도 분석 및 명시적 구성", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.30548v2", "title": "The threshold for the asymmetric vertex-Ramsey property in randomly perturbed graphs", "authors": ["Asier Calbet", "Victor Falgas-Ravry", "Joseph Hyde"], "abstract": "For $r \\geq 2$ and graphs $H_1, \\ldots, H_r, G$, we say that $G$ is $(H_1, \\ldots, H_r)$ vertex-Ramsey, or $(H_1, \\ldots, H_r)_v$-Ramsey, if whenever we colour the vertices of $G$ with colours from the set $[r]=\\{1,2, \\ldots, r\\}$ there exists $j \\in [r]$ such that some copy of $H_j$ in $G$ is monochromatic in colour $j$. Given any fixed collection of graphs $H_1, \\ldots, H_r$, Luczak, Ruciński and Voigt and Kreuter determined in the 1990s the threshold edge probability $p$ at which the binomial random graph $G(n,p)$ becomes $(H_1, \\ldots, H_r)_v$-Ramsey. More recently, Das, Morris and Treglown investigated the vertex-Ramsey property in the randomly perturbed setting. When $r=2$ they determined the number of random edges one must add to a dense graph to ensure that with probability $1-o(1)$ the resulting graph is $(H_1, H_2)_v$-Ramsey whenever one of $H_1$ or $H_2$ is a clique. They posed the problem of extending their results to all pairs of graphs $(H_1, H_2)$.   In this paper we resolve a more general form of their problem and determine for any $r\\geq 2$ and $r$-tuple of graphs $(H_1, \\ldots, H_r)$ the number of random edges one must add to a dense graph to ensure that with probability $1-o(1)$ the resulting graph is $(H_1, \\ldots, H_r)_v$-Ramsey.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-29T16:47:45+00:00", "updated": "2026-06-30T10:09:34+00:00", "abs_url": "http://arxiv.org/abs/2606.30548v2", "pdf_url": "https://arxiv.org/pdf/2606.30548v2", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Vertex-Ramsey 성질과 랜덤 그래프는 이산기하학이나 convex position 문제와 무관한 순수 그래프 Ramsey 이론.", "summary": "논문은 randomly perturbed 그래프(밀집 그래프에 랜덤 간선 추가)에서 비대칭 vertex-Ramsey 성질의 임계값을 결정한다. 고정된 그래프 집합 $(H_1, \\ldots, H_r)$에 대해 결과 그래프가 $(H_1, \\ldots, H_r)_v$-Ramsey가 될 확률이 $1-o(1)$이 되도록 필요한 랜덤 간선의 개수를 일반적으로 특성화한다.", "technique": "Ramsey 이론과 확률적 방법(probabilistic method)을 활용한 임계값 분석.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.31075v1", "title": "Random partition for Tokushige's $r$-wise intersecting conjecture", "authors": ["Yongjiang Wu", "Lihua Feng"], "abstract": "Let $r\\ge 3$ and let $1>p_1\\ge p_2\\ge\\cdots\\ge p_n>0$. Let $μ_{\\mathbf p}$ denote the product measure on $2^{[n]}$ where each coordinate $i$ is included independently with probability $p_i$. A family $\\mathcal A\\subseteq 2^{[n]}$ is $r$-wise intersecting if $A_1\\cap\\cdots\\cap A_r\\neq\\emptyset$ for all $A_1,\\ldots,A_r\\in\\mathcal A$. In 2022, Tokushige proved that if $p_2<\\frac{r-1}{r}$, then every $r$-wise intersecting family $\\mathcal{A}\\subseteq 2^{[n]}$ satisfies $μ_{\\mathbf p}(\\mathcal{A})\\le p_1$, with equality only for stars centred at coordinates of maximum probability. He conjectured that the hypothesis $p_2<\\frac{r-1}{r}$ can be replaced by $p_{r+1}<\\frac{r-1}{r}$. In this paper, we prove this conjecture in full. The key novelty is the introduction of a new random partition method, which reduces the problem to at most $r$ coordinates and solves it exactly, thereby fully covering all cases with multiple supercritical coordinates.", "categories": ["math.CO", "math.PR"], "primary_category": "math.CO", "published": "2026-06-30T03:04:41+00:00", "updated": "2026-06-30T03:04:41+00:00", "abs_url": "http://arxiv.org/abs/2606.31075v1", "pdf_url": "https://arxiv.org/pdf/2606.31075v1", "journal_ref": "", "doi": "", "comment": "10 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "McMullen's problem은 convex position과 oriented matroid 관련 조합론이며, 이 논문은 집합족의 교집합 성질과 확률 측도를 다루는 순수 조합론으로 직접 관련성이 없음.", "summary": "Tokushige의 $r$-wise intersecting family 추측을 증명했다. $r$-wise intersecting family $\\mathcal{A}$에 대해 product measure $μ_{\\mathbf p}(\\mathcal{A})\\le p_1$이 $p_{r+1}<\\frac{r-1}{r}$ 조건 하에서 성립함을 보였으며, 이는 기존 가설 $p_2<\\frac{r-1}{r}$를 약화시킨다.", "technique": "새로운 random partition method를 도입하여 문제를 최대 $r$개 좌표로 축소하고 정확히 해결.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.31908v1", "title": "Is There An Ideal Color Wheel?", "authors": ["Tejo Madhavarapu", "T. Kyle Petersen", "Peter Winkler"], "abstract": "The familiar color wheel is a disk divided into six sectors, colored red, orange, yellow, green, blue, and purple, in circular order. Three of the colors can be obtained by blending the colors in the two neighboring sectors.   One might wonder: is there a color wheel in which all six of the sections have this property, without all the sections being the same color? We show that the answer is no, not just for the 6-cycle but for any finite connected graph; indeed, for any finite, strongly connected, edge-weighted digraph. The result generalizes the ``harmonic lemma\" for graphs, replacing the well-behaved averaging function by paint blending, about which almost nothing is assumed. Our proof makes use of a Markov chain stopping rule.", "categories": ["math.CO", "math.PR"], "primary_category": "math.CO", "published": "2026-06-30T16:11:40+00:00", "updated": "2026-06-30T16:11:40+00:00", "abs_url": "http://arxiv.org/abs/2606.31908v1", "pdf_url": "https://arxiv.org/pdf/2606.31908v1", "journal_ref": "", "doi": "", "comment": "7 pages, 5 figures, comments welcome", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "색상 혼합 문제는 그래프 이론과 Markov chain 기법을 사용하지만, McMullen의 문제인 고차원 convex position 점 배치, oriented matroid, realizability와는 직접적 관련이 없음.", "summary": "색상환(color wheel)에서 모든 섹션이 인접한 두 섹션의 혼합으로 표현될 수 있는지를 묻는 문제를 다룬다. 유한 연결 그래프 및 강연결 가중 방향그래프에 대해 모든 섹션이 동일하지 않으면서 이 성질을 만족하는 경우는 존재하지 않음을 증명한다.", "technique": "Markov chain stopping rule을 이용한 조화 보조정리(harmonic lemma) 일반화.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27451v1", "title": "Totally Disjoint Diametral Paths", "authors": ["Tınaz Ekim", "Arthur Farley"], "abstract": "In this paper, we study totally disjoint diametral paths in simple connected graphs. A diametral path in a graph is a shortest path that connects two vertices whose mutual distance is equal to the diameter of the graph. Totally disjoint paths are paths that have no vertices in common, including their end vertices. We show that the problem of deciding whether a graph $G$ has $k$ totally disjoint diametral paths is NP-complete. We consider restricted classes of graphs for which the problem of determining the maximum size of a set of totally disjoint diametral paths is readily solved. We then give a linear-time algorithm for a subclass of maximal outerplanar graphs called 2-paths, define a polynomial-time algorithm for threshold graphs, and establish a structural bound for proper interval graphs. Finally, we define classes of extremal graphs with $k$ totally disjoint diametral paths of length $d$ having the fewest possible number of edges.", "categories": ["math.CO", "cs.DM"], "primary_category": "math.CO", "published": "2026-06-25T18:18:44+00:00", "updated": "2026-06-25T18:18:44+00:00", "abs_url": "http://arxiv.org/abs/2606.27451v1", "pdf_url": "https://arxiv.org/pdf/2606.27451v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "그래프의 diametral path 분해 문제는 조합론적이지만 McMullen's problem의 convex position, oriented matroid, 또는 polytope 구조와는 무관함.", "summary": "본 논문은 단순 연결 그래프에서 완전히 분리된 diametral path들의 존재성을 연구한다. k개의 totally disjoint diametral path 결정 문제가 NP-완전임을 보이고, 특정 그래프 클래스(2-paths, threshold graphs, proper interval graphs)에서 다항 시간 알고리즘 또는 구조적 상한을 제시한다.", "technique": "NP-완전성 증명, 제한된 그래프 클래스의 동적 프로그래밍/선형 시간 알고리즘, extremal graph 분석", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.28216v1", "title": "Fano Geometry and Slow Coupon Collecting", "authors": ["Dina Barak-Pelleg", "Daniel Berend"], "abstract": "We study the coupon collector's problem in a generalized setting where each draw reveals a fixed number of coupons and the sampling mechanism is required to be \\emph{fair}, meaning that every coupon appears with the same frequency among the admissible draws. Grunbaum and Yaakobi conjectured that, among all fair mechanisms with fixed parameters, the fully random model maximizes the expected time to complete coverage. We disprove this conjecture by exhibiting explicit counterexamples arising from finite geometry. In particular, we show that the line set of the Fano plane yields a fair mechanism whose expected coverage time exceeds that of the full model. Further exact and computational results are obtained for projective planes of higher order. In addition, we analyze a simple infinite family of fair mechanisms, the star mechanism, for which the expected coverage time admits a closed form. Depending on the scaling regime, this mechanism can be asymptotically slower or faster than the full model, showing that no universal extremality principle holds for fair mechanisms without additional structural assumptions.", "categories": ["math.CO", "math.PR"], "primary_category": "math.CO", "published": "2026-06-26T16:06:11+00:00", "updated": "2026-06-26T16:06:11+00:00", "abs_url": "http://arxiv.org/abs/2606.28216v1", "pdf_url": "https://arxiv.org/pdf/2606.28216v1", "journal_ref": "", "doi": "", "comment": "13 pages, 3 tables", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "유한 기하학(Fano plane, projective planes)을 활용하지만 조합 최적화 문제와 oriented matroid, convex position, general position 배치 문제와는 직접 관련이 없음.", "summary": "공정한 표본 추출 메커니즘 하에서 쿠폰 수집기 문제를 연구하며, Grunbaum-Yaakobi 추측을 유한 기하학(Fano plane, 고차 사영평면)의 구체적 반례로 반박함. 특정 무한 족(star mechanism)에 대해 폐쇄형 기댓값을 도출하고 스케일링 체제에 따른 점근 성능을 분석함.", "technique": "유한 기하학의 구조(Fano plane의 선 집합)를 공정한 표본 메커니즘으로 변환하여 쿠폰 커버 시간의 기댓값을 계산.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.02400v1", "title": "From Ham-Sandwich to Centerpoints: Semialgebraic Algorithms for Cutting Polytopal Measures", "authors": ["Marie-Charlotte Brandenburg", "Jesús A. De Loera", "Chiara Meroni"], "abstract": "We design exact algorithms for the ham-sandwich and centerpoint theorems for polytopal measures. Our key observation is that the cap-volume function of such a measure, i.e., the volume cut off by a halfspace, is piecewise rational on a natural decomposition of the space of oriented hyperplanes. This lets us recast prescribed-proportion cutting problems as semialgebraic feasibility problems. For fixed ambient dimension, this yields polynomial-time algorithms to decide the existence of cuts, describe the full solution set, and sample or enumerate solutions. We extend this framework to the center transversal theorem, showing that spaces of deep affine flats are semialgebraic, which holds for centerpoints. We further show that the set of centerpoints of a convex polytope coincides with its floating body at level $1/(d+1)$, a useful semialgebraic description.", "categories": ["cs.CG", "math.CO", "math.MG"], "primary_category": "cs.CG", "published": "2026-07-02T16:33:31+00:00", "updated": "2026-07-02T16:33:31+00:00", "abs_url": "http://arxiv.org/abs/2607.02400v1", "pdf_url": "https://arxiv.org/pdf/2607.02400v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 ham-sandwich 정리와 centerpoint 정리를 위한 준대수적(semialgebraic) 알고리즘을 다루며, McMullen 문제나 Larman 추측과 직접적인 관련이 없다.", "summary": "이 논문은 polytope 측도(polytopal measures)에 대한 ham-sandwich 정리와 centerpoint 정리의 정확한 알고리즘을 설계한다. 핵심 관찰은 그러한 측도의 cap-volume 함수가 oriented hyperplane 공간의 자연스러운 분해 위에서 조각별 유리함수(piecewise rational)라는 것이며, 이를 통해 prescribed-proportion cutting 문제를 준대수적 실현 가능성 문제(semialgebraic feasibility problem)로 변환한다. 또한 볼록 다면체(convex polytope)의 centerpoint 집합이 레벨 $1/(d+1)$에서의 floating body와 일치함을 보인다.", "technique": "oriented hyperplane 공간의 자연 분해 위에서 cap-volume 함수의 조각별 유리성을 이용해 cutting 문제를 준대수적 실현 가능성 문제로 환원하고, 고정 차원에서 다항 시간 알고리즘을 도출한다.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2607.01577v1", "title": "Total positivity of transformation matrices for uniform subdivisions", "authors": ["Yanxin Liu", "Jianxi Mao"], "abstract": "The transformation of the $h$-vector of a finite simplicial complex under an $\\mathcal{F}$-uniform subdivision is encoded by a transformation matrix. Mu and Welker conjectured that the transformation matrix of the barycentric subdivision is totally positive. In this paper, we give a new combinatorial proof of this conjecture. We also prove the total positivity of the transformation matrix of the interval subdivision. In addition, we establish a sufficient condition for the transformation matrix of a uniform subdivision to be totally positive of order $2$ (TP$_2$), thereby partially answering a question of Mu and Welker. As an application, we show that the transformation matrix of the $r$-colored barycentric subdivision is TP$_2$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-02T01:16:30+00:00", "updated": "2026-07-02T01:16:30+00:00", "abs_url": "http://arxiv.org/abs/2607.01577v1", "pdf_url": "https://arxiv.org/pdf/2607.01577v1", "journal_ref": "", "doi": "", "comment": "21 pages, 2 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "단순 복합체의 h-벡터 변환과 전양성(total positivity) 문제로, McMullen's problem의 convex position과 일반적 점 배치 문제와는 직접적 관련성이 없음.", "summary": "본 논문은 균일 세분화(uniform subdivision)에서 h-벡터의 변환 행렬이 전양성(totally positive)을 가지는 조건을 연구한다. Mu-Welker 추측인 중심 세분화(barycentric subdivision)의 변환 행렬 전양성을 조합론적으로 증명하고, 구간 세분화(interval subdivision)의 전양성 및 TP₂ 조건을 확립한다.", "technique": "단순 복합체의 조합론적 구조와 h-벡터 변환 행렬의 전양성 성질을 이용한 조합론적 증명", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.30010v1", "title": "$L^p$-form of the KNRS conjecture", "authors": ["Yuqi Zhao"], "abstract": "The Kohayakawa--Nagle--Rödl--Schacht conjecture predicts that locally dense graphs contain, asymptotically, at least as many homomorphic copies of any fixed graph as the random graph of the same edge density. We prove that every graph with at least one edge satisfies a natural $L^p$ relaxation of this conjecture in the graphon setting. More precisely, let $F$ be a graph with $m>0$ edges, and let $n$ be the number of non-isolated vertices of $F$. If $$   p\\ge \\binom {n}{2}/m, $$ then for every $ρ$-locally dense graphon $W$, $$   t(F,W^{\\circ p})\\ge ρ^{pm}. $$ Equivalently, if $$   W_F(\\mathbf x)=\\prod_{ij\\in E(F)}W(x_i,x_j), $$ then $$   \\|W_F\\|_{L^p}\\ge ρ^{e(F)}. $$ The proof is based on a Hölder uniformization over vertex relabellings, in the spirit of Conlon--Lee. We also prove a more general comparison principle with edge-transitive KNRS supergraphs, yielding sharper exponents whenever $F$ embeds into an edge-transitive KNRS graph. Finally, positive-semidefinite methods give theta-subdivision results: Sidorenko-good graphs are closed under arbitrary uniform theta-subdivisions; the non-uniform theta theorem of Im--Li--Liu admits a Sidorenko-good lift, under the same divisibility assumptions, after removing the parity restriction; and uniform theta-subdivisions of KNRS graphs are regular-KNRS.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-29T09:16:50+00:00", "updated": "2026-06-29T09:16:50+00:00", "abs_url": "http://arxiv.org/abs/2606.30010v1", "pdf_url": "https://arxiv.org/pdf/2606.30010v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이산기하학 및 oriented matroid, 점 배치 일반화 문제와 무관하며, 그래프 준동형사상과 graphon 이론의 확률적 조합론 문제에 집중.", "summary": "본 논문은 Kohayakawa–Nagle–Rödl–Schacht 추측의 $L^p$ 완화 형태를 graphon 설정에서 증명한다. 국소 밀집 그래프원에서 고정 그래프 $F$의 준동형사상 개수가 같은 간선 밀도의 무작위 그래프보다 많다는 주장을 $L^p$ 노름 부등식으로 일반화했다.", "technique": "Hölder 균일화(uniformization)를 정점 재라벨링에 대해 적용하고, 양정치 반정부호(positive-semidefinite) 방법을 활용한 theta-subdivision 결과.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.28723v1", "title": "Transition Matrices between Shifted $t$-Schur Bases and Cyclotomic Schur $Q$-Positivity", "authors": ["S. -J. Lee"], "abstract": "For a strict partition $λ$, let $\\mathcal Q_λ(X;t)=Q_λ[X-tX]$ be the shifted $t$-Schur function arising from the modified Greaves--Jing--Zhu operator on the odd power-sum ring. We study transition matrices between the shifted bases with parameters $t$ and $s$. The relative scaling operator is diagonal in the odd power-sum basis, leading to explicit spectral data, determinant and trace formulas, weighted symmetry, a spin-character formula, and a transition Cauchy identity.   For the cyclotomic specialization $C_{λμ}^{[M]}(t)=C_{λμ}(t^M,t)$, the relative operator becomes plethystic substitution by $1+t+\\cdots+t^{M-1}$. We prove Schur $Q$-positivity and reciprocity, derive factorization and root-of-unity rank formulas, and give an exact computation method. For $M=2$, all one-row transitions are computed explicitly, and the nonzero coefficients are unimodal.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-27T04:06:56+00:00", "updated": "2026-06-27T04:06:56+00:00", "abs_url": "http://arxiv.org/abs/2606.28723v1", "pdf_url": "https://arxiv.org/pdf/2606.28723v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Schur 함수의 기저 변환과 조합론적 양성(positivity)을 다루지만, McMullen's problem의 convex position, oriented matroid, 또는 polyhedral structure와는 직접 관련이 없음.", "summary": "shifted $t$-Schur 함수 $\\mathcal{Q}_λ(X;t)$에 대한 기저 변환 행렬을 연구하며, cyclotomic 특수화에서 Schur $Q$-positivity를 증명하고, plethystic 대체 구조를 통해 전이 행렬의 명시적 공식과 인수분해를 도출한다.", "technique": "odd power-sum basis에서의 스펙트럼 데이터 분석, plethystic substitution, Schur $Q$-positivity 증명", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.00561v1", "title": "For edge-color-critical graphs, non-$r$-partite spectral extremal graphs are edge extremal", "authors": ["Suil O", "Jiadong Wu"], "abstract": "A graph is non-$r$-partite if its chromatic number exceeds $r$. For an edge-color-critical graph $F$ with $χ(F)=r+1$, let $\\mathrm{ex}_{r+1,ρ}(n,F)$ be the maximum adjacency spectral radius among non-$r$-partite $F$-free graphs of order $n$, and let $\\mathrm{EX}_{r+1,ρ}(n,F)$ and $\\mathrm{EX}_{r+1}(n,F)$ be the families of such graphs attaining, respectively, this maximum spectral radius and the maximum number of edges $\\mathrm{ex}_{r+1}(n,F)$. Fang and Zhai conjectured that $\\mathrm{EX}_{r+1,ρ}(n,F)\\subseteq\\mathrm{EX}_{r+1}(n,F)$ for every such $F$ and all large $n$. In this paper, we prove this inclusion under the hypothesis $\\mathrm{ex}_{r+1}(n,F)=|E(T_{n,r})|-\\lfloor n/r\\rfloor+O(1)$, where $T_{n,r}$ is the Turán graph, together with a structural condition on the sub-decomposition family of $F$. As the main application, for $F=K_{1,1,t_3,\\ldots,t_{r+1}}$ with $t_3,\\ldots,t_{r+1}\\ge 2$ we show   \\[   \\mathrm{ex}_{r+1}(n,F)=|E(T_{n,r})|-\\Bigl\\lfloor\\frac nr\\Bigr\\rfloor+2(t_{\\min}-1),   \\qquad t_{\\min}:=\\min\\{t_3,\\ldots,t_{r+1}\\},   \\]   for all sufficiently large $n$, and deduce that $\\mathrm{EX}_{r+1,ρ}(n,F)\\subseteq\\mathrm{EX}_{r+1}(n,F)$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-01T07:50:55+00:00", "updated": "2026-07-01T07:50:55+00:00", "abs_url": "http://arxiv.org/abs/2607.00561v1", "pdf_url": "https://arxiv.org/pdf/2607.00561v1", "journal_ref": "", "doi": "", "comment": "25 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "논문은 극값 그래프 이론(extremal graph theory)의 색칠수(chromatic number) 제약 조건 하에서 스펙트럼 반경과 간선 수의 관계를 다루지만, McMullen's problem의 convex position, oriented matroid, realizability 등 기하학적·조합적 구조와는 직접적 관련이 없음.", "summary": "비$r$-분할 $F$-free 그래프 중 최대 인접 스펙트럼 반경을 갖는 그래프들이 최대 간선 수를 갖는 그래프들에 포함되는지를 조사한다. 특별히 완전 다중분할 그래프 $K_{1,1,t_3,\\ldots,t_{r+1}}$에 대해 Turán 그래프로부터의 편차를 정확히 계산하고 포함 관계를 증명한다.", "technique": "스펙트럼 반경(adjacency spectral radius) 분석과 Turán-type 간선 계산, 부분분해(sub-decomposition) 구조 조건을 활용한 극값 그래프 특성화.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.00372v1", "title": "Peres--Schlag's nonempty-interior problem and a shifted-product variant for product sets", "authors": ["Guo-Dong Hong", "Chong-Wei Liang", "Chun-Yen Shen"], "abstract": "We study finite-field analogues of the Peres--Schlag nonempty-interior problem for product sets. Given \\(A\\subseteq\\mathbb F_p\\), we ask when a suitable one-dimensional linear image of \\(A^n\\) is full; equivalently, when there exist coefficients \\(t_1,\\ldots,t_n\\in\\mathbb F_p\\) such that \\[   t_1A+\\cdots+t_nA=\\mathbb F_p. \\] For \\(n\\ge3\\), we prove that, for every \\(η>0\\), this holds whenever \\[   |A|\\gg_{n,η} p^{\\frac{3}{2n-1}+η}. \\] This improves the exponent predicted by the direct product-set analogue of the Peres--Schlag threshold, namely \\(|A|\\gg p^{2/n}\\). We also prove a two-dimensional near-half-density result.   Motivated by sum-product phenomena, we also introduce and study a product-type variant in which linear forms are replaced by shifted product maps. We prove finite-field covering results for shifted products \\[   (t_1 + A)(t_2 + A)\\cdots(t_n + A) \\] at the same density scale as in the linear case. Finally, we prove a Euclidean shifted-product analogue: if \\(A\\subseteq\\mathbb R\\) is Borel and \\(\\dim_H A>2/n\\), then some shifted product of \\(n\\) copies of \\(A\\) contains a nonempty open interval.", "categories": ["math.CO", "math.CA"], "primary_category": "math.CO", "published": "2026-07-01T03:13:57+00:00", "updated": "2026-07-01T03:13:57+00:00", "abs_url": "http://arxiv.org/abs/2607.00372v1", "pdf_url": "https://arxiv.org/pdf/2607.00372v1", "journal_ref": "", "doi": "", "comment": "Comments are welcome! 15 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "유한체 product set의 covering 문제를 다루지만, McMullen's problem의 핵심인 convex position, oriented matroid, realizability와는 직접 관련이 없음.", "summary": "유한체 $\\mathbb{F}_p$에서 집합 $A$의 linear image $t_1A+\\cdots+t_nA$가 전체 체를 덮을 조건을 연구하고, shifted product variant $(t_1+A)(t_2+A)\\cdots(t_n+A)$에 대한 covering 결과를 증명함. Hausdorff dimension 조건을 통해 Euclidean 버전도 제시함.", "technique": "유한체 및 실수 위에서의 product set covering과 sum-product 현상(sum-product phenomena) 활용.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.02159v1", "title": "3-Colouring Graphs Excluding a Fixed Minor", "authors": ["Vida Dujmović", "Hussein Houdrouge", "Pat Morin"], "abstract": "We show that, for every fixed graph $H$, every $n$-vertex graph $G$ that excludes $H$ as a minor is $3$-colourable with clustering $O_H(n^{4/9})$. That is, there exists a function $f$ such that for every graph $H$, every $n\\ge 1$, every $n$-vertex graph $G$ that excludes $H$ as a minor has a vertex colouring with $3$ colours in which each monochromatic component has size at most $f(H)\\cdot n^{4/9}$. This generalizes a recent result of Dujmović, Morin, Norin, and Wood (\\textit{arXiv}:2507.03163) from planar graphs to all proper minor-closed graph classes and is the first improvement on clustered $3$-colouring of proper minor-closed graph classes since the upper bound of $O_H(\\sqrt{n})$ due to Linial, Matoušek, Sheffet, and Tardos (\\textit{Comb. Prob. Comput.}, \\textbf{17}(4):577--589, 2008).", "categories": ["math.CO", "cs.DM"], "primary_category": "math.CO", "published": "2026-07-02T13:33:20+00:00", "updated": "2026-07-02T13:33:20+00:00", "abs_url": "http://arxiv.org/abs/2607.02159v1", "pdf_url": "https://arxiv.org/pdf/2607.02159v1", "journal_ref": "", "doi": "", "comment": "19 pages, 0 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "3-colouring of minor-closed graph classes는 이산기하학의 combinatorial structure를 다루지만, McMullen's problem(d=5 convex polytopes의 face vector characterization)과는 직접적인 관련성이 없음.", "summary": "본 논문은 H를 minor로 제외하는 모든 n-vertex 그래프가 clustering $O_H(n^{4/9})$를 가지는 3-colourability를 가짐을 보인다. 이는 평면그래프에 대한 최근 결과를 모든 proper minor-closed graph classes로 일반화하며, 2008년 이후 이 분야의 첫 번째 개선이다.", "technique": "clustered coloring의 clustering bound를 minor-excluded graphs에 대해 $O(\\sqrt{n})$에서 $O(n^{4/9})$로 개선하는 기법 (구체적 방법은 초록에 미제시)", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.00069v1", "title": "On the Spectrum of the Line Graph of a Family of Bipartite Graphs Arising from the Boolean Lattice", "authors": ["Ali Zafari", "Saeid Alikhani"], "abstract": "The Boolean lattice $BL_n$, $n\\geq 3$, is the graph whose vertex set is the collection of all subsets of $[n]=\\{1,2,\\ldots,n\\}$, where two subsets $U$ and $W$ are adjacent if and only if their symmetric difference has precisely one element. In the graph $BL_n$, the \\emph{layer} $L_k$ is the family of all $k$-element subsets of $[n]$. The subgraph $BL_n(k-1,k)$ is the induced subgraph of $BL_n$ on layers $L_{k-1}$ and $L_{k}$. This graph is bipartite and, when $n=2k-1$, is $k$-regular and isomorphic to the bipartite double cover $2{\\cdot}O_k$ of the odd graph $O_k$. In this paper, we determine the full adjacency spectrum -- eigenvalues together with their multiplicities -- of the line graph $L(BL_n(k-1,k))$ for all admissible values of $n$ and $k$. As a consequence, we show that $L(BL_n(k-1,k))$ is an integral graph whenever $n = 2k-1$, and we recover as a special case the spectrum of the line graph $L(n)$ of $BL_n(1,2)$ established by Mirafzal~\\cite{pap-sm-1}.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-30T17:33:24+00:00", "updated": "2026-06-30T17:33:24+00:00", "abs_url": "http://arxiv.org/abs/2607.00069v1", "pdf_url": "https://arxiv.org/pdf/2607.00069v1", "journal_ref": "", "doi": "", "comment": "13 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Boolean lattice의 spectral 분석은 조합론의 기초 구조를 다루지만, McMullen's problem(점의 convex position, oriented matroid, tope graph)과는 직접적 관련성 없음.", "summary": "Boolean lattice $BL_n$의 층(layer) $L_{k-1}$과 $L_k$로 유도된 이분 그래프 $BL_n(k-1,k)$의 line graph $L(BL_n(k-1,k))$의 전체 인접 스펙트럼(고유값과 중복도)을 결정했다. 특히 $n=2k-1$일 때 integral graph임을 보이고, 이전 결과를 일반화한다.", "technique": "인접 스펙트럼의 직접 계산 및 특성화(eigenvalues and multiplicities determination).", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.28611v1", "title": "Structure of Cayley Codes", "authors": ["Vishnuram Arumugam", "Cheryl E. Praeger", "Daniel Rademacher"], "abstract": "Cayley codes, introduced by Kaufman and Wigderson, are linear codes constructed from a Cayley graph and a smaller linear code. We explore general properties of the class of Cayley codes for finite groups. In particular we give a reduction to Cayley codes for connected Cayley graphs that maintains code properties such as rate, minimum distance and symmetry. Also, for a given Cayley code, we identify a family of symmetric Cayley codes, each associated with a normal edge-transitive Cayley graph, such that the given Cayley code embeds into the direct sum of the symmetric Cayley codes. We analyse several families of examples, in particular studying the behaviour of the Cayley code construction under forming direct products and cartesian products of Cayley graphs, and we pose a number of open questions.", "categories": ["math.CO", "math.GR"], "primary_category": "math.CO", "published": "2026-06-26T21:11:11+00:00", "updated": "2026-06-26T21:11:11+00:00", "abs_url": "http://arxiv.org/abs/2606.28611v1", "pdf_url": "https://arxiv.org/pdf/2606.28611v1", "journal_ref": "", "doi": "", "comment": "23 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Cayley codes는 coding theory와 group theory의 결합이며, McMullen's problem은 볼록기하학과 oriented matroid의 조합론적 구조에 관한 것으로 직접 관련성이 없음.", "summary": "이 논문은 Kaufman과 Wigderson이 도입한 Cayley codes를 연구하며, 유한군에 대한 Cayley graphs에서 구성된 선형 코드의 일반적 성질을 탐구한다. 연결된 Cayley graphs로의 축소, 대칭성 보존, 그리고 직곱과 직합 구조 하에서의 행동을 분석한다.", "technique": "Cayley graphs의 normal edge-transitive 부분구조를 통한 symmetric Cayley codes의 embedding 방법과 직곱/직합 구조의 코드 이론적 분석.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.30272v1", "title": "The signless Laplacian spectral radius of graphs without disjoint cliques", "authors": ["Xinghui Zhao", "Lihua You", "Jing Zeng"], "abstract": "A graph $G$ is $(t+1)K_{r+1}$-free if it contains no $t+1$ pairwise vertex-disjoint copies of $K_{r+1}$. Moon [Canad. J. Math. 20 (1968) 95-102] and Simonovits [Theory of Graphs (Proc. Colloq., Tihany, 1966)] independently determined that, for sufficiently large $n$, $K_{t}\\vee T_{r}(n-t)$ is the unique $n$-vertex $(t+1)K_{r+1}$-free graph with the maximum number of edges. In 2023, Ni, Wang and Kang [Electron. J. Combin. 30 (2023) \\#P1.20] showed that the graph $K_{t}\\vee T_{r}(n-t)$ is also the unique adjacency spectral extremal graph over all $n$-vertex $(t+1)K_{r+1}$-free graphs for sufficiently large $n$. In this paper, for $r\\geq 3$ and $t\\geq 0$, we prove that $K_{t}\\vee T_r(n-t)$ is the unique graph attaining the maximum signless Laplacian spectral radius among all $(t+1)K_{r+1}$-free graphs of sufficiently large order $n$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-29T13:19:08+00:00", "updated": "2026-06-29T13:19:08+00:00", "abs_url": "http://arxiv.org/abs/2606.30272v1", "pdf_url": "https://arxiv.org/pdf/2606.30272v1", "journal_ref": "", "doi": "", "comment": "12 pages, 0 figure", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "그래프 스펙트럼 극값 문제이나 McMullen's problem(convex polytope의 f-vector)과는 직접 관련이 없음.", "summary": "본 논문은 $(t+1)K_{r+1}$-free 그래프(서로소인 clique $t+1$개를 포함하지 않음) 중에서 signless Laplacian spectral radius를 최대화하는 그래프를 특성화한다. 충분히 큰 order $n$에 대해 $K_t \\vee T_r(n-t)$가 유일한 극값 그래프임을 증명하며, 이는 Moon-Simonovits의 edge 수 극값 결과와 2023년의 adjacency spectral 극값 결과를 signless Laplacian 스펙트럼으로 확장한 것이다.", "technique": "signless Laplacian spectral radius 분석 및 그래프 구조 극값화 기법.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.30418v1", "title": "Berge tight cycles of all lengths in hypergraphs", "authors": ["Yu Minghui", "Li Binlong", "Li Ruonan"], "abstract": "Given a set $R$ of positive integers, an $R$-graph $H = (V, E)$ is a hypergraph where the cardinality of each hyperedge belongs to $R$. If $R = \\{r\\}$, we sometimes refer to the hypergraph as an $r$-graph rather than an $R$-graph. For a set $S \\subseteq V$, let $d_H(S)$ denote the number of hyperedges of $H$ containing $S$. Given a nonnegative integer $s$, the minimum $s$-degree $δ_s(H)$ is the minimum of $d_H(S)$ over all $s$-vertex subsets $S$ of $V$. Let $r$ and $t$ be positive integers with $r < t$. We denote by $C_t^r$ the $t$-vertex $r$-uniform tight cycle, which is an $r$-graph with at least three hyperedges whose vertices admit a cyclic ordering such that every $r$ consecutive vertices form a hyperedge. In particular, $C_t^2$ is the classical cycle $C_t$ in $2$-graphs. For hypergraphs $F$ and $H$, we say that $H$ is a Berge-$F$ if there exist an injection $f \\colon V(F) \\to V(H)$ and a bijection $g \\colon E(F) \\to E(H)$ such that $\\{f(v): v \\in e\\} \\subseteq g(e)$ for all $e \\in E(F)$.   Lu and Wang [Discrete Math. 344 (2021), 112462] proved that every $[3]$-graph $H$ on $n \\geq 6$ vertices with $δ_2(H) \\geq 1$ contains a Berge-$C_t$ for all $3 \\leq t \\leq n$. In this paper, we prove that for any positive integer $r$ and any set $R \\subseteq [k]$ with $k \\geq 2$, there exists an integer $n_0 = n_0(k,r)$ such that every $R$-graph $H$ on $n \\geq n_0$ vertices with $δ_r(H) \\geq 1$ contains a Berge-$C_t^r$ for all $r+1 \\leq t \\leq n$. In particular, when $k = 4$ and $r = 3$, we show that every $[4]$-graph $H$ on $n \\geq 9$ vertices with $δ_3(H) \\geq 1$ contains a Berge-$C_t^3$ for all $4 \\leq t \\leq n$. We also characterize all the counterexamples when $4 \\leq n \\leq 8$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-29T15:05:14+00:00", "updated": "2026-06-29T15:05:14+00:00", "abs_url": "http://arxiv.org/abs/2606.30418v1", "pdf_url": "https://arxiv.org/pdf/2606.30418v1", "journal_ref": "", "doi": "", "comment": "17 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Berge cycles in hypergraphs는 조합론적 구조 이론이지만, McMullen's problem의 convex position·oriented matroid·chirotope 등 기하학적 도구와 직접 관련 없음.", "summary": "이 논문은 minimum s-degree 조건 하에서 $R$-그래프(혼합 크기 하이퍼엣지)와 균등 하이퍼그래프가 모든 길이의 Berge tight cycle을 포함함을 증명한다. Lu-Wang의 3-그래프 결과를 일반화하여, $R$-그래프에서 $δ_r(H) ≥ 1$ 조건 아래 $r+1 ≤ t ≤ n$인 모든 Berge-$C_t^r$의 존재성을 보인다.", "technique": "귀납법과 minimum degree 조건을 활용한 존재성 증명; 소수 정점 수에 대한 반례 특성화.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.00456v1", "title": "Multiplicity for partially ordered sets", "authors": ["Gyula O. H. Katona", "Yaping Mao"], "abstract": "Let $\\mathcal Q=\\{Q_a:a\\geq1\\}$ be a nested family of finite posets such that $Q_a\\subseteq Q_{a+1}$ and $|Q_a|<|Q_{a+1}|$. For a poset $Q$, let $\\mathcal C_t(Q)$ denote the set of all strict $t$-chains in $Q$. Given an $r$-coloring of $\\mathcal C_t(Q_a)$ and posets $P_1,\\ldots,P_r$, a weak copy of $P_i$ is called monochromatic of color $i$ if all $t$-chains in the copy have color $i$; the strong version is defined in the same way for induced copies. The corresponding weak and strong multiplicity parameters are the minimum possible total number of such monochromatic copies in the host poset.For the Boolean lattice $B_n$, define $E_n={(S,T,U)\\in B_n^3:S\\subsetneq T\\subsetneq U,\\ |S|+|T|=|U|}.$ For a two-coloring $χ:B_n\\to{0,1}$, a triple $(S,T,U)\\in E_n$ is monochromatic if $χ(S)=χ(T)=χ(U)$. Let $R^{\\mathrm{arith}}_2$ be the least integer $n$ such that every two-coloring of $B_n$ contains a monochromatic triple in $E_n$, and let $M^{\\mathrm{arith}}_2(B_n)$ be the minimum number of monochromatic triples in $E_n$ over all two-colorings of $B_n$. We prove that $R^{\\mathrm{arith}}_2=9.$ Moreover, $|E_n|=\\binom{2n}{n}-[x^n](1+x+x^2)^n-2^n+1=\\frac{4^n}{\\sqrt{πn}}\\bigl(1+o(1)\\bigr),$ and $2^{δn+o(n)}\\le M^{\\mathrm{arith}}_2(B_n)\\le 2^{γn+o(n)}, $ where $δ\\approx 1.356779$ and $γ\\approx 1.567837$ are explicit entropy constants. For general nested host families, we prove a double-counting lower bound for strong poset multiplicity. For an arbitrary finite host poset $R$, we also introduce a Fourier-Möbius method and give an exact Fourier expansion for strong multiplicity, a Parseval-type error bound, and a spectral lower bound.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-01T05:23:17+00:00", "updated": "2026-07-01T05:23:17+00:00", "abs_url": "http://arxiv.org/abs/2607.00456v1", "pdf_url": "https://arxiv.org/pdf/2607.00456v1", "journal_ref": "", "doi": "", "comment": "23 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "포집 문제(Ramsey-type results on posets)와 색칠 조합론을 다루지만, McMullen 문제(convex position의 점 배치와 oriented matroid의 구조)와는 직접적인 기하학적 또는 실현가능성(realizability) 연관성이 없음.", "summary": "부분순서집합(poset)의 중복도(multiplicity)를 연구하며, 특히 Boolean lattice $B_n$의 두 가지 색칠에서 산술적 조건을 만족하는 단색 삼중쌍(monochromatic triples)의 최소 개수를 분석한다. 저자들은 $R^{\\mathrm{arith}}_2=9$를 증명하고, $M^{\\mathrm{arith}}_2(B_n)$에 대한 엔트로피 상수 $\\delta\\approx 1.356779$와 $\\gamma\\approx 1.567837$를 이용한 상하한을 제시한다.", "technique": "Fourier-Möbius 변환을 이용한 spectral 하한과 double-counting 논법을 통한 강(strong) poset 중복도 분석.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.29965v1", "title": "A Delsarte Linear Programming Approach to the Erdős--Falconer Distance Problem over Finite Fields", "authors": ["Tao Zhang"], "abstract": "We introduce a Delsarte linear programming approach to the finite field Erdős--Falconer distance problem. Let \\(q\\) be an odd prime power, let \\(n\\) be even, and let \\(Q\\) be a non-degenerate quadratic form on \\(\\mathbb{F}_q^n\\). For \\(E\\subset \\mathbb{F}_q^n\\), define   \\[   Δ_Q(E)=\\{Q(x-y):\\ x,y\\in E\\}.   \\]   We prove that, for every fixed \\(0<α<\\frac{1}{2}\\), there exist constants \\(C_α>0\\) and \\(q_α\\) such that if \\(q\\ge q_α\\) and $|E|\\ge C_αq^{\\frac n2+\\frac13},$   then   \\[   |Δ_Q(E)|>1+α(q-1).   \\]   In particular, \\(Δ_Q(E)\\) contains a positive proportion of the elements of \\(\\mathbb{F}_q\\), and hence \\(|Δ_Q(E)|\\gg q\\).   Our result applies uniformly to all non-degenerate quadratic forms in even-dimensional finite field vector spaces. In the Euclidean case   \\[   Q(x)=x_1^2+\\cdots+x_n^2,   \\]   it improves, for every even \\(n\\ge 4\\) over arbitrary finite fields, the general exponent \\(\\frac{n+1}{2}\\) obtained by Iosevich and Rudnev to $\\frac n2+\\frac13.$   The proof is based on the association scheme arising from the level sets of \\(Q\\). By analyzing the corresponding eigenvalues through Gauss sums and Kloosterman sums, we construct a suitable feasible solution to the Delsarte linear program. This provides a new algebraic-combinatorial method for obtaining distance set estimates over finite fields.", "categories": ["math.CO", "math.CA"], "primary_category": "math.CO", "published": "2026-06-29T08:43:48+00:00", "updated": "2026-06-29T08:43:48+00:00", "abs_url": "http://arxiv.org/abs/2606.29965v1", "pdf_url": "https://arxiv.org/pdf/2606.29965v1", "journal_ref": "", "doi": "", "comment": "16 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "유한체 상의 거리 집합 문제로서 조합론적이지만, McMullen 문제(볼록 위치의 점 배치, oriented matroid, 실현가능성)와는 직접적 연관이 없음.", "summary": "유한체 $\\mathbb{F}_q^n$ 위에서 비퇴화 이차형식 $Q$에 대해 점 집합 $E$의 거리 집합 $Δ_Q(E)$의 크기를 연구한다. Delsarte 선형계획법을 사용하여, $|E| \\geq C_α q^{n/2+1/3}$일 때 $|Δ_Q(E)| > 1+α(q-1)$임을 증명하며, 유클리드 경우 기존 지수 $(n+1)/2$를 $n/2+1/3$으로 개선한다.", "technique": "association scheme의 level set과 Gauss sum, Kloosterman sum을 통한 고유값 분석으로 Delsarte 선형계획의 feasible solution 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.01130v1", "title": "A complete solution to the generalized honeymoon Oberwolfach problem with one round table", "authors": ["Masoomeh Akbari"], "abstract": "The generalized honeymoon Oberwolfach problem (HOP) asks whether it is possible to seat $2n$ participants consisting of $n$ newlywed couples at a conference with $s$ tables of size $2$ and $t$ \"round'' tables of sizes $2m_1, 2m_2, \\ldots, 2m_t$, where $n = s + \\sum_{i=1}^{t} m_i $ with all $m_i \\geq 2$, over several nights so that each participant sits next to their spouse every time and next to each other participant exactly once. We denote this problem by $HOP(2^{\\langle s \\rangle}, 2m_1, \\ldots, 2m_t)$. In this paper, we provide a complete solution to the generalized HOP with one round table, showing that the obvious necessary conditions for $HOP(2^{\\langle s \\rangle}, 2m)$ to have a solution are also sufficient.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-01T16:15:54+00:00", "updated": "2026-07-01T16:15:54+00:00", "abs_url": "http://arxiv.org/abs/2607.01130v1", "pdf_url": "https://arxiv.org/pdf/2607.01130v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "조합론의 설계 이론(design theory) 분야이나, McMullen's problem의 convex position, oriented matroid, polyhedral 구조와는 직접적 관련이 없음.", "summary": "본 논문은 generalized honeymoon Oberwolfach problem(HOP)의 완전한 해결을 제시한다. 특히 한 개의 둥근 탁자를 포함하는 경우 $HOP(2^{\\langle s \\rangle}, 2m)$에 대해 필요충분조건을 규명한다. 2n명의 참가자(n쌍의 신혼부부)가 여러 밤에 걸쳐 배치되는데, 각 참가자가 배우자와 항상 인접하고 다른 모든 참가자와 정확히 한 번씩 인접하도록 하는 조건을 분석한다.", "technique": "그래프 분해(graph decomposition) 및 설계 이론 기법을 통한 조합적 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.02483v1", "title": "Robustness and hyperstability for the Erdős-Gallai theorem", "authors": ["Micha Christoph", "Alp Müyesser", "Yuval Wigderson"], "abstract": "The Erdős-Gallai theorem states that every graph of average degree $d$ contains a cycle of length at least $d$. We prove the following robust extension of the Erdős-Gallai theorem: For every $c>0$ there exists $K$ such that for all $d\\geq K$, $p\\geq K/d$ and every graph $G$ with average degree $d$, the random graph $G_p$ obtained by independently percolating each edge of $G$ with probability $p$ contains a cycle of length $(1-c)d$ asymptotically almost surely as $|V(G)|\\to \\infty$. With related methods, we prove the following hyperstability version of the Erdős-Gallai theorem: any graph $G$ without a cycle of length at least $d$ is at most $c dn$ edge deletions away from a graph all of whose connected components have a vertex-cover of size $(1+c)d$.   At the core of our argument lies a very general structure theorem about graphs that originates from results of Pokrovskiy concerning the hyperstability of bounded-degree trees.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-02T17:50:56+00:00", "updated": "2026-07-02T17:50:56+00:00", "abs_url": "http://arxiv.org/abs/2607.02483v1", "pdf_url": "https://arxiv.org/pdf/2607.02483v1", "journal_ref": "", "doi": "", "comment": "21 pages, 7 pages appendix", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Erdős-Gallai 정리는 그래프 이론의 고전 결과이며, McMullen 문제는 볼록다면체와 점 배치의 조합론적 구조에 관한 것으로 직접 관련성이 없음.", "summary": "본 논문은 Erdős-Gallai 정리(평균 차수 d인 그래프는 길이 d 이상의 순환을 포함)의 견고한 확장을 증명한다. 랜덤 percolation 하에서 길이 약 (1-c)d의 순환을 점근적으로 확실히 포함함을 보이고, hyperstability 버전으로 d 이상의 순환이 없는 그래프는 cd n개 간선 삭제로 제한된 vertex-cover를 갖는 그래프에 가까움을 증명한다.", "technique": "Pokrovskiy의 유계 차수 트리 hyperstability 결과에서 비롯된 그래프 구조 정리를 통한 일반적 접근.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.01438v1", "title": "Annihilation, Independence, and Residue: Sharp Matching Bounds for the Annihilation Gap and a TxGraffiti Application", "authors": ["Ohr Kadrawi", "Vadim E. Levit"], "abstract": "Let $G$ be a finite simple graph. The annihilation number $a(G)$ is an efficiently computable upper bound on the independence number $α(G)$. We develop a sharp matching-number theory for the gap $a(G)-α(G)$. The strongest general theorem is the exact closed form \\[a(G)-α(G)\\leq 2μ(G)+1- \\lceil \\sqrt{6 μ(G)} \\rceil \\qquad(μ(G)\\geq 1), \\] and the bound is attained for every prescribed matching number. We also prove sharp matching-dependent bounds for forests, bipartite graphs, and König-Egerváry graphs, with equality constructions, equality certificates, and equality criteria. Finally, we treat a TxGraffiti output as a machine-conjecture case study. Using annihilating decompositions together with the classical Havel-Hakimi residue inequality $res(G)\\leq α(G)$, we give an independent proof of the TxGraffiti annihilation-residue inequality \\[ α(G)\\geq \\frac{a(G)+res(G)}{Δ(G)} \\] for every connected graph $G$ of order at least three, show that both hypotheses are necessary, and compare this proof with a recent Caro-Wei approach. We also refine the Caro-Wei annihilation estimate by an explicit nonnegative slack term, identify its equality cases in degree-sequence form, and combine the refinement with our exact matching-number bound to obtain a combined computable bracket for the independence number and a Gupta-residue bound for the annihilation gap.", "categories": ["math.CO", "cs.DM"], "primary_category": "math.CO", "published": "2026-07-01T20:01:14+00:00", "updated": "2026-07-01T20:01:14+00:00", "abs_url": "http://arxiv.org/abs/2607.01438v1", "pdf_url": "https://arxiv.org/pdf/2607.01438v1", "journal_ref": "", "doi": "", "comment": "46 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "그래프의 독립수(independence number) 상한에 관한 연구이나, McMullen's problem과 직접적인 관련성이 없음.", "summary": "본 논문은 소거수(annihilation number) $a(G)$와 독립수 $α(G)$의 차이에 대한 정확한 일치 이론을 개발한다. 매칭수에 의존하는 닫힌 형태의 상한 $a(G)-α(G)\\leq 2μ(G)+1-\\lceil\\sqrt{6μ(G)}\\rceil$를 제시하고, 이를 다양한 그래프 클래스에 대해 정밀화한다. 또한 Havel-Hakimi 유수 부등식과 결합하여 TxGraffiti 기계 추측을 증명한다.", "technique": "소거 분해(annihilating decompositions), Havel-Hakimi 유수 부등식, 그리고 매칭 수에 기반한 정확한 상한 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.31702v1", "title": "List-Coloring and Chromatic-Choosability -- A Dynamic Survey", "authors": ["Nandana K Vasudevan", "K Somasundaram", "N Narayanan"], "abstract": "List-coloring, introduced independently by Vizing and by Erdős, Rubin, and Taylor in the 1970s, generalizes ordinary vertex coloring by assigning to each vertex its own set of admissible colors. A graph is chromatic-choosable if its list chromatic number equals its chromatic number. The previous survey on list-coloring by D R Woodall (2001), emphasized defective choosability, the list-coloring conjectures, and different methods used for list-coloring. This survey reviews major developments on list-coloring and chromatic-choosability, with emphasis on graph classes for which equality is known, graph classes exhibiting a nontrivial gap, and the principal methods used to prove such results. The survey covers embedded graphs, perfect graphs, complete bipartite and multipartite graphs, claw-free graphs, line graphs, powers of graphs, graph products, and selected variants of list-coloring.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-30T14:10:19+00:00", "updated": "2026-06-30T14:10:19+00:00", "abs_url": "http://arxiv.org/abs/2606.31702v1", "pdf_url": "https://arxiv.org/pdf/2606.31702v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "List-coloring은 그래프 색칠 이론에 관한 것으로, McMullen's problem(볼록 위치의 점 배치, oriented matroid, 다면체 구조)과는 직접적인 관련이 없습니다.", "summary": "본 논문은 1970년대 Vizing, Erdős, Rubin, Taylor가 도입한 리스트 색칠(list-coloring)과 색수-선택성(chromatic-choosability)에 관한 종합 서베이입니다. 색수가 리스트 색수와 같은 그래프 클래스, 비자명한 갭을 보이는 클래스, 그리고 임베드된 그래프, 완전 이분/다중 부분 그래프, claw-free 그래프 등 다양한 그래프 클래스에 대한 주요 결과들을 다룹니다.", "technique": "결함 있는 선택성(defective choosability), 리스트 색칠 추측 증명 기법, 그래프 클래스별 부등식 분석.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.30208v1", "title": "On a two-color partition series and its companions", "authors": ["George E. Andrews", "Mohamed El Bachraoui"], "abstract": "We study the two-color distinct-part series \\(S_1(q)\\), equivalently Andrews' generating function \\(v_d(q)\\) for strictly concave compositions, and its odd and even companions \\(T_o(q)\\) and \\(T_e(q)\\). We determine the coefficients of \\(S_1(q)\\) modulo \\(4\\) and obtain a complete criterion for the resulting Ramanujan-type progressions. For the even companion, we give a direct overpartition interpretation of its coefficients and show that two natural partition families are each counted by half of those coefficients. For the eta-normalized odd companion \\(C(q)=(q;q)_\\infty T_o(q)\\), we prove a quintic self-similarity, derive exact vanishing relations and infinite sign changes for its coefficients, and show that \\(c(n)\\) can be nonzero only when \\(24n+28\\) is represented by \\(x^2+3y^2\\).", "categories": ["math.CO", "math.NT"], "primary_category": "math.CO", "published": "2026-06-29T12:24:14+00:00", "updated": "2026-06-29T12:24:14+00:00", "abs_url": "http://arxiv.org/abs/2606.30208v1", "pdf_url": "https://arxiv.org/pdf/2606.30208v1", "journal_ref": "", "doi": "", "comment": "19 pages. Accepted for publication", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "조합론 논문이지만 McMullen's problem (볼록 위치의 점 배치, oriented matroid 등)과는 무관하며, 분할 이론(partition theory)과 생성함수 연구에 집중.", "summary": "이 논문은 두 색상 구별되는 부분 수열(two-color distinct-part series) $S_1(q)$와 그 홀짝 동반 함수들을 연구한다. 저자들은 $S_1(q)$의 계수를 mod 4로 결정하고, 짝수 동반 함수에 대해 overpartition 해석을 제공하며, eta-정규화된 홀수 동반 함수의 5차 자기유사성과 영점 관계식을 증명한다.", "technique": "생성함수 기법, modular arithmetic (mod 4 분석), overpartition 조합 해석, 이차형식 $x^2+3y^2$ 표현론.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.01141v1", "title": "Normal ordering in the $(p,q)$-deformed generalized Weyl algebra. II: Interpretation in terms of rook placements", "authors": ["Toufik Mansour", "Lahcen Oussi", "Matthias Schork"], "abstract": "In this paper, we investigate the combinatorial structure arising from the $(p, q)$-deformed generalized Weyl algebra generated by variables $X, Y$, and $Z_p$, satisfying the $(p, q)$-commutation relations $XY-qYX=h Y^sZ_{p}, XZ_p=pZ_pX$, and $Z_pY=pYZ_p$, where $s\\in \\mathbb{N}_0$. Our primary objective is to use the normal ordering process defined by these relations to develop a novel model of $(p, q)$-deformed rook theory. Specifically, we introduce a new framework of $(p, q)$-deformed $s$-rook numbers derived from this normal ordering process. Utilizing these combinatorial models, we provide explicit combinatorial interpretations for the associated $(p, q)$-generalized Stirling numbers via rook placements on staircase boards. Our results extend several classical and recent formulations in the literature to the general $p\\neq 1$ setting.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-01T16:24:03+00:00", "updated": "2026-07-01T16:24:03+00:00", "abs_url": "http://arxiv.org/abs/2607.01141v1", "pdf_url": "https://arxiv.org/pdf/2607.01141v1", "journal_ref": "", "doi": "", "comment": "23 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "논문은 deformed Weyl algebra의 normal ordering과 rook placement의 조합론적 해석을 다루며, McMullen's problem의 convex position, general position, oriented matroid 등과 직접적 관련이 없음.", "summary": "본 논문은 $(p,q)$-deformed generalized Weyl algebra에서 normal ordering 과정을 통해 새로운 $(p,q)$-deformed $s$-rook numbers 모델을 개발한다. Rook placement를 이용하여 $(p,q)$-generalized Stirling numbers에 대한 명시적 조합론적 해석을 제공하며, 고전적 및 최근 결과들을 $p\\neq 1$ 설정으로 확장한다.", "technique": "Normal ordering in deformed algebras와 combinatorial rook theory를 결합한 대수적-조합론적 접근.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.02297v1", "title": "An extremal theorem for positive curvature of graphs", "authors": ["Kaizhe Chen", "Shiping Liu", "Zhe You"], "abstract": "We prove an extremal theorem for positive Ollivier/Lin--Lu--Yau curvature: every graph of order \\(n\\geq 8\\) with more than \\[   T(n)=\\frac{n^2-3n}{2}-\\left\\lceil\\frac{n}{2}\\right\\rceil+2 \\] edges has positive Ollivier/Lin--Lu--Yau curvature, and this threshold is optimal. Moreover, for even $n\\geq 12$, there exists a unique graph with $T(n)$ edges that has an edge with non-positive curvature. For $n=8,10$ and odd $n\\geq 9$, the extremal graphs are not unique. This suggests a new class of extremal graph-theoretic problems arising from discrete curvature notions.", "categories": ["math.CO", "math.DG"], "primary_category": "math.CO", "published": "2026-07-02T15:15:03+00:00", "updated": "2026-07-02T15:15:03+00:00", "abs_url": "http://arxiv.org/abs/2607.02297v1", "pdf_url": "https://arxiv.org/pdf/2607.02297v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "그래프의 곡률 기반 극값 문제이지만 McMullen's problem(convex polytope의 face lattice, oriented matroid, general position)과는 직접적 기술적 관련성이 없음.", "summary": "본 논문은 Ollivier/Lin-Lu-Yau 곡률이 양수인 그래프를 특성화하는 극값 정리를 증명합니다. 크기 n≥8인 모든 그래프에서 T(n)=⌊n²-3n⌋/2-⌈n/2⌉+2 이상의 간선을 가지면 양의 곡률을 갖는다는 것을 보이고, 이 임계값이 최적임을 보입니다.", "technique": "이산 곡률 개념(discrete curvature notion)에 근거한 그래프 극값 문제의 체계적 분석", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.01206v1", "title": "Decomposition of Greedy Tamari Intervals and Bipartite Planar Maps", "authors": ["Philippe Biane", "Wenjie Fang"], "abstract": "The greedy Tamari poset, inspired by the well-studied Tamari lattice, was recently defined by Dermenjian in the more general setting of greedy $ν$-Tamari posets. Bousquet-Mélou and Chapoton counted intervals of the greedy $m$-Tamari poset in 2024 by solving a functional equation, and found that they are equi-enumerous to planar $(m+1)$-constellations. In this work, we give a combinatorial proof of this fact for the case $m = 1$, which also gives the refined enumeration conjectured by Bousquet-Mélou and Chapoton. This is done by establishing a recursive decomposition of greedy Tamari intervals isomorphic to that of bipartite planar maps. We also propose a more general and refined conjecture for the case of general $m$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-01T17:46:24+00:00", "updated": "2026-07-01T17:46:24+00:00", "abs_url": "http://arxiv.org/abs/2607.01206v1", "pdf_url": "https://arxiv.org/pdf/2607.01206v1", "journal_ref": "", "doi": "", "comment": "22 pages, 14 figures, comments are welcome", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "greedy Tamari poset와 planar constellation의 열거적 동치성을 다루지만, McMullen's problem(convex position, oriented matroid, realizability)과는 직접 관련이 없음.", "summary": "본 논문은 greedy m-Tamari poset의 interval을 bipartite planar map의 재귀적 분해와 동형인 구조로 분석합니다. m=1의 경우 greedy Tamari interval이 planar constellation과 열거적으로 동치임을 조합론적으로 증명하고, 일반 m에 대한 정제 추측을 제안합니다.", "technique": "Greedy Tamari interval과 bipartite planar map 사이의 재귀적 분해 동형을 통한 조합론적 증명", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.00934v1", "title": "On the Extended 1-2-3 Conjecture of Pilz", "authors": ["Philippa Holdridge", "Péter Pál Pach"], "abstract": "We resolve (for all sufficiently large $n$) a conjecture of Pilz on the symmetric difference $AΔ(2A)Δ\\cdotsΔ(nA)$ for finite sets $A\\subseteq \\mathbb{N}$ of positive integers. We show that this set always has cardinality at least $n$ for large $n$.", "categories": ["math.CO", "math.NT"], "primary_category": "math.CO", "published": "2026-07-01T13:36:27+00:00", "updated": "2026-07-01T13:36:27+00:00", "abs_url": "http://arxiv.org/abs/2607.00934v1", "pdf_url": "https://arxiv.org/pdf/2607.00934v1", "journal_ref": "", "doi": "", "comment": "30 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "논문은 유한 집합의 대칭차(symmetric difference) 문제를 다루며, McMullen's problem(볼록 다면체 조합론)과는 직접적 관련이 없음.", "summary": "Pilz의 추측을 해결하여, 양의 정수 유한 집합 $A \\subseteq \\mathbb{N}$에 대해 대칭차 $A\\Delta(2A)\\Delta\\cdots\\Delta(nA)$의 크기가 충분히 큰 $n$에 대해 항상 $n$ 이상임을 보임.", "technique": "초록만으로는 증명 기법 불확실", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.01716v1", "title": "A global girth obstruction for Garg--Mineyev taiko product structures", "authors": ["Henry Shin"], "abstract": "Mineyev's taiko construction, in Garg--Mineyev's finite support-size formulation, gives a concrete route from finite support data to zero divisors and units in group rings of torsion-free CAT(0) groups over $\\mathbb{F}_2$. We prove that this triple-girth product-structure route is globally closed: no product structure, even or odd, with support sizes $m,n\\ge2$ admits a coherent orientation for which the no-fold and triple-girth conditions both hold. Consequently the Garg--Mineyev triple-girth product-structure assembly route produces neither zero-divisor nor unit counterexamples over $\\mathbb{F}_2$ for any such support-size pair.   The obstruction is structural, not a bounded-search artifact. High middle-link girth forces signed colors into a balanced near-disjoint rectangle decomposition of the board, with the single odd defect omitted. The product identity, pressure inequalities, Fisher inequalities, and a dual Fisher bound force the middle link to have girth $4$ or $6$; in the girth-six case, the minimum of the two horizontal-link girths is at most $5$. This dichotomy rules out every triple-girth branch. A weighted dual Fisher inequality and an exact finite certificate sharpen the frontier: if the middle link has girth $6$, the horizontal girth is at most $4$, and characteristic-two affine-plane constructions attain equality. Thus the Garg--Mineyev finite failures reflect a structural barrier in the taiko geometry itself. The finite certificate is used only for this sharper frontier, not for the no-$T_4$ obstruction.", "categories": ["math.CO", "math.GR"], "primary_category": "math.CO", "published": "2026-07-02T05:12:14+00:00", "updated": "2026-07-02T05:12:14+00:00", "abs_url": "http://arxiv.org/abs/2607.01716v1", "pdf_url": "https://arxiv.org/pdf/2607.01716v1", "journal_ref": "", "doi": "", "comment": "44 pages, 2 figures; includes an exact finite certificate", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 group ring의 zero divisor 문제와 CAT(0) 기하를 다루지만, McMullen's problem의 핵심인 convex position 점 배치, oriented matroid, realizability 등과는 직접 관련이 없습니다.", "summary": "Mineyev의 taiko 구성을 이용한 Garg--Mineyev의 유한 지지(finite support) 방법이 제시되었으나, 본 논문은 triple-girth 조건을 만족하는 product structure가 coherent orientation을 허용하지 않음을 증명합니다. Fisher 부등식과 girth 논증을 통해 이 장애가 구조적임을 보입니다.", "technique": "Fisher 부등식, dual Fisher 경계, girth 분석을 통한 signed color 제약 조건의 조합론적 논증.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.00263v1", "title": "Determining the Complexity of Chromatic Sum in Classes Defined by a Set of Forbidden Graphs", "authors": ["Clément Dallard", "Daniël Paulusma", "Erik Jan van Leeuwen"], "abstract": "The Chromatic Sum problem asks, given a graph $G$ and an integer $k$, whether $G$ admits a colouring $c$ with sum $\\sum_{v\\in V}c(v) \\leq k$. We study the complexity of Chromatic Sum on graph classes defined by some set of forbidden graphs. First, we show that three known frameworks fully classify the complexity of Chromatic Sum on $HH$-minor-free graphs and $HH$-topological-minor-free graphs for any set of graphs $HH$, and on $HH$-subgraph-free graphs for any finite set of graphs $HH$. To show this, we prove a new NP-completeness result for Chromatic Sum on certain subdivisions of planar subcubic graphs. Next, we consider other containment relations. We formalise a novel framework of problems that are NP-complete for planar graphs as well as for graphs of bounded independence number. For every problem in this framework, we obtain an almost complete complexity classification on $H$-induced-minor-free graphs, $H$-induced-topological-minor-free graphs, and $H$-free graphs for every graph $H$. We show that Chromatic Sum belongs to this framework, as do several other problems. We also define a more fine-grained framework for the induced subgraph relation. We apply this to obtain a complete complexity classification for Chromatic Sum on $H$-free graphs, as well as for several other problems. We justify the choice of this framework by proving that Chromatic Sum is NP-complete for graphs of clique-width at most $3$. This result complements a known polynomial-time result for graphs of clique-width at most $2$.", "categories": ["math.CO", "cs.CC", "cs.DM", "cs.DS"], "primary_category": "math.CO", "published": "2026-06-30T23:25:42+00:00", "updated": "2026-06-30T23:25:42+00:00", "abs_url": "http://arxiv.org/abs/2607.00263v1", "pdf_url": "https://arxiv.org/pdf/2607.00263v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "본 논문은 그래프 색칠(chromatic sum) 문제의 계산복잡도 분류에 관한 것으로, McMullen's problem(볼록기하 및 점 배치)과 직접 관련이 없습니다.", "summary": "이 논문은 금지된 그래프들로 정의된 그래프 클래스에서 Chromatic Sum 문제의 복잡도를 연구합니다. 마이너·토폴로지 마이너·부분그래프 관계에 대해 NP-완전성 분류 틀을 제시하고, induced-minor, induced-topological-minor, 유도 부분그래프 관계에서도 완전한 또는 거의 완전한 복잡도 분류를 얻습니다.", "technique": "금지된 그래프 포함 관계(minor/topological-minor/subgraph)와 플래나 부분 3정규 그래프 세분에 대한 NP-완전성 결과를 이용한 복잡도 분류 틀.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.02132v1", "title": "The universal zero-sum invariant and weighted zero-sum for infinite abelian groups II", "authors": ["Guoqing Wang"], "abstract": "Let $G$ be an abelian group, and let $\\mathcal F (G)$ be the free commutative monoid with basis $G$, and $\\mathcal A (G)$ the set consisting of all minimal zero-sum subsequences over $G$. For any subset $Ω\\subset \\mathcal F (G)$, we define the universal zero-sum invariant ${\\mathsf d}_Ω(G)$ as the minimal positive integer $\\ell$ such that every sequence $T$ over $G$ of length $\\ell$ contains a subsequence lying in $Ω$. The classical Davenport constant ${\\rm D}(G)$ for $G$ can also be written as ${\\mathsf d}_{\\mathcal A (G)}(G)$. We give a complete classification of all finite abelian groups for which $\\mathcal A(G)$ is a minimal set to represent the Davenport constant.   We also investigate the weighted Davenport constant over abelian groups (which may be infinite). Let $F$ and $G$ be abelian groups, and let $Ψ\\subseteq \\mathrm{Hom}(F,G)$ denote a weight set. We reinterpret the weighted Davenport constant $D_Ψ(G)$ in terms of coverings of Cartesian powers $F^n$ by kernels of induced homomorphisms arising from tuples in $Ψ^n$; these homomorphisms are naturally linked to coproducts in the category of abelian groups. This motivates the notion of kernel-cover compactness, a property characterizing when such kernel coverings admit finite subcovers. We establish a correspondence between weighted zero-sum invariants and kernel-cover structures, where the bound $D_Ψ(G)\\le n$ is equivalent to a canonical kernel-cover property on $F^n$. We further study finite reduction phenomena for infinite weight sets and provide sufficient conditions ensuring uniform kernel-cover compactness. The present work constitutes a follow-up to [G. Wang, Comm. Algebra, 2025].", "categories": ["math.CO", "math.NT"], "primary_category": "math.CO", "published": "2026-07-02T13:09:48+00:00", "updated": "2026-07-02T13:09:48+00:00", "abs_url": "http://arxiv.org/abs/2607.02132v1", "pdf_url": "https://arxiv.org/pdf/2607.02132v1", "journal_ref": "", "doi": "", "comment": "17 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 가환군의 Davenport 상수와 zero-sum 부분수열을 다루지만, McMullen's problem(convex position의 점 배치, oriented matroid, 조합기하학적 실현가능성)과는 직접적 관련성이 없습니다.", "summary": "본 논문은 가환군 위의 universal zero-sum invariant $\\mathsf{d}_Ω(G)$를 도입하고, 유한 가환군에서 $\\mathcal{A}(G)$가 Davenport 상수를 나타내는 최소 집합인 경우를 완전히 분류합니다. 또한 무한 가환군에서 가중 Davenport 상수를 핵심-덮개(kernel-cover) 구조로 재해석하고, 이를 아벨 군의 카테고리에서의 쌍대곱(coproducts)과 연결합니다.", "technique": "Davenport 상수의 일반화, Cartesian powers의 핵심-덮개 분해, 가환군의 준동형 집합에 의한 kernel covering 기법.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.02273v1", "title": "A Minkowski Theory for the Exterior Capacitary Volumes and A Resolution of the Pólya-Szegö Conjecture", "authors": ["Qiushuang Liu", "Jie Xiao", "Ning Zhang", "Rubin Zhang", "Baocheng Zhu"], "abstract": "This paper establishes a unified Minkowski theory for exterior p-capacitary volumes and resolves the classical Pólya-Szegö conjecture on the electrostatic capacity of convex bodies.", "categories": ["math.MG", "math.FA"], "primary_category": "math.MG", "published": "2026-07-02T14:56:31+00:00", "updated": "2026-07-02T14:56:31+00:00", "abs_url": "http://arxiv.org/abs/2607.02273v1", "pdf_url": "https://arxiv.org/pdf/2607.02273v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Minkowski 이론과 볼록체(convex bodies)를 다루지만, McMullen's problem의 중심인 일반위치 점 배치, oriented matroid, combinatorial realizability와는 직접 관련이 없음.", "summary": "이 논문은 외부 p-capacitary 부피(exterior p-capacitary volumes)에 대한 통합된 Minkowski 이론을 확립하고, 볼록체의 정전기 용량(electrostatic capacity)에 관한 고전적인 Pólya-Szegö 추측을 해결한다.", "technique": "Minkowski 이론 프레임워크를 exterior capacitary volume에 확장 적용.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.01632v1", "title": "Categorification of some Penrose polynomials", "authors": ["D. W. Collison", "D. Tubbenhauer"], "abstract": "We construct doubly- and triply-graded Penrose-type homologies for ribbon graphs. The construction is a TQFT-valued cube of resolutions built from two-dimensional cobordisms, which may be nonorientable. Their Euler characteristics recover specializations of some Penrose polynomials; in particular, the four color case comes with a refinement of the classical Penrose criterion.", "categories": ["math.CO", "math.GT"], "primary_category": "math.CO", "published": "2026-07-02T02:59:20+00:00", "updated": "2026-07-02T02:59:20+00:00", "abs_url": "http://arxiv.org/abs/2607.01632v1", "pdf_url": "https://arxiv.org/pdf/2607.01632v1", "journal_ref": "", "doi": "", "comment": "34 pages, many figures, comments welcome", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Ribbon graphs와 Penrose polynomials의 categorification은 이산기하학이나 McMullen's problem의 convex position, oriented matroid, chirotope와는 직접적 관련이 없음.", "summary": "Ribbon graphs에 대한 doubly- 및 triply-graded Penrose-type homologies를 구성했으며, 이는 nonorientable 2-dimensional cobordisms로부터의 TQFT-valued resolutions cube로 구축됨. Euler characteristic이 Penrose polynomials의 특수화를 회복하며, 특히 4색 경우에서 고전적 Penrose criterion의 정제를 제공함.", "technique": "TQFT-valued cube of resolutions constructed from two-dimensional cobordisms.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.01458v1", "title": "Sharp Lower Bounds for Sumsets in Hypercubes", "authors": ["Felipe Gonçalves", "Danylo Radchenko"], "abstract": "We prove a sharp lower bound for the cardinality of sumsets of subsets of $\\mathbb{Z}^d$ confined to a hypercube, resolving in strong form a conjecture that was made explicit by Becker, Ivanisvili, Krachun and Madrid and had circulated in the folklore of the field for some time. Specifically, for sets $A_j\\subseteq \\{0,1,2,\\dots,m\\}^d$ we show that   \\[|A_1+\\dots+A_n|\\;\\geq\\; (|A_1|\\cdots|A_n|)^{1/p},\\qquad p=\\frac{n\\log(m+1)}{\\log(nm+1)},\\] with the exponent best possible. The only previously known sharp cases were $A_j\\subseteq \\{0,1\\}^d$, for all $n\\ge1$, and $A_j\\subseteq \\{0,1,2\\}^d$ for $n=2$. We also prove a sharp inequality in the case when $A_j\\subseteq\\{0,1,\\dots,m_j\\}^d$ for different $m_j$. We obtain the above inequality as a corollary of a stronger result on sup-convolution of functions on $\\mathbb{Z}^d$, whose proof is based on a novel mixed volume representation of a lattice path norm, together with a sharp one-dimensional functional inequality.", "categories": ["math.CO", "math.CA", "math.MG"], "primary_category": "math.CO", "published": "2026-07-01T20:28:24+00:00", "updated": "2026-07-01T20:28:24+00:00", "abs_url": "http://arxiv.org/abs/2607.01458v1", "pdf_url": "https://arxiv.org/pdf/2607.01458v1", "journal_ref": "", "doi": "", "comment": "21 pages, 3 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Sumset bounds in hypercubes는 이산기하학의 부분 영역이지만, McMullen's problem(일반위치 점 배치, convex position, oriented matroid)과는 직접적 개념·방법론·응용의 연관성이 없음.", "summary": "하이퍼큐브 내 부분집합들의 합집합(sumset)의 크기에 대한 sharp lower bound를 증명했다. 특히 $A_j \\subseteq \\{0,1,\\ldots,m\\}^d$에 대해 $|A_1+\\cdots+A_n| \\geq (|A_1|\\cdots|A_n|)^{1/p}$ (단, $p=\\frac{n\\log(m+1)}{\\log(nm+1)}$)를 보였으며, 지수는 최적이다.", "technique": "Lattice path norm의 mixed volume 표현과 1차원 sharp functional inequality를 이용한 sup-convolution 함수 부등식 증명.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.02260v1", "title": "Tensor Amplification and Spectral Transfer for Sidorenko-Type Inequalities", "authors": ["Yuqi Zhao"], "abstract": "We develop a tensor-amplification framework for Sidorenko-type inequalities in graphon classes. The framework applies to any admissible class, meaning a class closed under tensor powers and normalized principal restrictions. These two closure properties isolate the structural input needed for the amplification arguments, while preserving natural positivity constraints such as the doubly nonnegative constraint.   For every admissible class $\\mathcal{C}$, we prove two transfer principles. First, equality cases regularize optimally: if a non-matching graph $H$ is $\\mathcal{C}$-Sidorenko, then every equality case $t(H,W)=p(W)^{e(H)}$ with $W\\in\\mathcal{C}$ is regular. Consequently, relative forcing is equivalent to relative regular-forcing for every non-matching $\\mathcal{C}$-Sidorenko graph. Second, in the range $v(H)\\le e(H)$, ordinary $\\mathcal{C}$-Sidorenko is equivalent, as a universal property over $\\mathcal{C}$, to the spectral inequality $t(H,W)\\ge ρ(W)^{2e(H)-v(H)}p(W)^{v(H)-e(H)}$ for every non-zero $W\\in\\mathcal{C}$. The spectral transfer is obtained from a Perron-biased tensor regularization theorem detecting the Perron spectral radius on the exponential scale.   We also prove quantitative near-equality variants and apply the framework to doubly nonnegative graphons and bounded doubly nonnegative kernels. This yields spectral equivalences for Sidorenko-good graphs in the range $v(F)\\le e(F)$, and identifies Sidorenko-good forcing with regular-KNRS forcing for non-matching Sidorenko-good graphs.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-02T14:48:09+00:00", "updated": "2026-07-02T14:48:09+00:00", "abs_url": "http://arxiv.org/abs/2607.02260v1", "pdf_url": "https://arxiv.org/pdf/2607.02260v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Sidorenko 부등식과 graphon 이론은 극값 조합론 분야이나, McMullen's problem(볼록 위치의 점 배치, oriented matroid, chirotope, realizability)과는 직접적인 관계가 없음.", "summary": "Tensor-amplification 프레임워크를 통해 admissible graphon 클래스에서 Sidorenko-type 부등식을 연구한다. 두 가지 전이 원리(transfer principle)를 증명하는데: (1) 등호 경우가 정규화(regular)되고, (2) spectral 부등식과의 동치성을 보인다. Doubly non
