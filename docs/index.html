<style>
  :root{
    --bg:#F6F7F9; --surface:#FFFFFF; --ink:#15161C; --muted:#71727F;
    --line:#E6E7EC; --accent:#4338CA; --accent-soft:#EEECFB;
    --explore:#0D9488; --explore-soft:#E3F4F1; --up:#15803D; --down:#B91C1C;
    --serif: ui-serif, "Iowan Old Style", Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  header{position:sticky;top:0;z-index:5;background:rgba(246,247,249,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .bar{max-width:880px;margin:0 auto;padding:16px 20px 12px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  h1{font-family:var(--serif);font-weight:600;font-size:25px;margin:2px 0;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
  .controls input[type=search]{flex:1 1 180px;min-width:150px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);font:inherit;color:inherit}
  .controls select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--surface);font:inherit;color:inherit}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:var(--surface);border:0;padding:8px 11px;cursor:pointer;border-left:1px solid var(--line);font:inherit}
  .seg button:first-child{border-left:0}
  .seg button[aria-pressed=true]{background:var(--accent);color:#fff}
  label.thr{font-size:13px;color:var(--muted);display:inline-flex;gap:7px;align-items:center}
  label.thr output{font-family:var(--mono);color:var(--ink);min-width:1.4em;text-align:right}
  .gear{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 10px;cursor:pointer;font:inherit}
  .panel{max-width:880px;margin:0 auto;padding:0 20px;overflow:hidden;max-height:0;transition:max-height .2s}
  .panel.open{max-height:320px;padding-bottom:12px}
  .panel .box{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px;font-size:13px}
  .panel input{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:7px;font:inherit;margin:4px 0 10px}
  .panel button{background:var(--accent);color:#fff;border:0;border-radius:7px;padding:8px 14px;cursor:pointer;font:inherit}
  .panel .hint{color:var(--muted);font-size:12px}
  main{max-width:880px;margin:0 auto;padding:14px 20px 64px}
  .count{font-size:13px;color:var(--muted);margin:2px 0 14px;font-family:var(--mono)}
  .card{position:relative;display:grid;grid-template-columns:60px 1fr;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 18px 16px 0;margin-bottom:12px;overflow:hidden}
  .ledger{display:flex;flex-direction:column;align-items:center;padding-top:2px;position:relative}
  .ledger::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--edge,var(--line))}
  .score{font-family:var(--mono);font-size:21px;font-weight:600;line-height:1;color:var(--edge,var(--muted))}
  .score small{display:block;font-size:9px;letter-spacing:.1em;color:var(--muted);margin-top:4px;font-weight:400}
  .body{min-width:0}
  .title{font-family:var(--serif);font-size:19px;font-weight:600;line-height:1.3;margin:0 0 6px;letter-spacing:-.01em}
  .tag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--explore);background:var(--explore-soft);padding:2px 7px;border-radius:5px;margin-left:8px}
  .meta{font-size:12.5px;color:var(--muted);margin-bottom:8px}
  .prob{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:1px 7px;border-radius:5px}
  .meta .dot{margin:0 6px;opacity:.5}
  .reason{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:10px}
  .summary{margin:0 0 10px}
  .field{font-size:14px;margin:6px 0}
  .field b{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-right:6px}
  .conn{background:var(--accent-soft);border-radius:8px;padding:9px 12px;font-size:14px}
  .chips{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 9px}
  .actions{margin-top:11px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .act{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:5px 10px;cursor:pointer;font:inherit;font-size:13px}
  .act.on-fav{border-color:#D97706;background:#FEF3C7}
  .act.on-up{border-color:var(--up);background:#DCFCE7}
  .act.on-down{border-color:var(--down);background:#FEE2E2}
  .links{margin-left:auto;font-family:var(--mono);font-size:12px;display:flex;gap:14px;align-items:center}
  .links .id{color:var(--muted)}
  .togg{background:none;border:0;color:var(--accent);font:inherit;font-size:12px;cursor:pointer;font-family:var(--mono);margin-top:8px}
  .abstract{margin-top:10px;font-size:13.5px;color:#3a3b47;border-top:1px dashed var(--line);padding-top:10px;display:none}
  .abstract.open{display:block}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .sync{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:8px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  @media (max-width:560px){.card{grid-template-columns:44px 1fr;gap:10px;padding-right:14px}.title{font-size:17px}h1{font-size:21px}.links{margin-left:0;width:100%}}
  @media (prefers-reduced-motion:reduce){*{transition:none}}
</style>
</head>

<script>
const DATA = [{"id": "2606.27273v1", "title": "Linear Spaces over Perfect Idylls", "authors": ["Jeffery Liu"], "abstract": "We construct a category of vector space-like objects called linear spaces over perfect idylls $k$ (an algebraic structure generalizing fields and hyperfields), which is a specialization of modules over $k$. Previous authors have noted that naive linear algebra in the product $k^n$ fails because linear independence does not satisfy matroid independence axioms. We give a sufficient axiom so that linear independence in $k$-linear spaces does satisfy matroid independence axioms. We also examine basic categorical properties of $k$-linear spaces. In particular, the category of $k$-linear spaces has no products, explaining the failure of naive linear algebra in $k^n$. Furthermore, we explore the categorical relationship between linear spaces over a perfect idyll, ordinary matroids, and matroids over a perfect idyll, connecting the existing theories of matroids and modules.", "categories": ["math.CO", "math.AG"], "primary_category": "math.CO", "published": "2026-06-25T16:51:45+00:00", "updated": "2026-06-25T16:51:45+00:00", "abs_url": "http://arxiv.org/abs/2606.27273v1", "pdf_url": "https://arxiv.org/pdf/2606.27273v1", "journal_ref": "", "doi": "", "comment": "33 pages", "relevance": 2, "problem_id": "matching-fields", "problem_name": "Polyhedral matching fields", "relevance_reason": "Perfect idylls와 hyperfields는 tropical geometry와 matroid theory의 일반화와 관련이 있지만, 초록에서 McMullen's problem이나 polyhedral matching fields의 구체적 문제 해결과의 직접 연결은 명시되지 않음.", "summary": "Perfect idyll 위의 선형공간이라는 새로운 범주를 구성하고, 이 범주에서 선형독립성이 matroid 독립공리를 만족하기 위한 충분조건을 제시한다. $k$-선형공간의 범주가 곱(product)을 갖지 않음을 보이고, 선형공간, 통상적 matroid, perfect idyll 위의 matroid 사이의 범주론적 관계를 탐구한다.", "technique": "Perfect idyll 위의 모듈 이론을 특수화하여 선형공간 범주 구성; matroid 독립공리 만족을 위한 축충조건 도출", "connections": "추측: hyperfield의 구조와 matroid 이론의 일반화는 tropical geometry에서의 oriented matroid 및 realizability 문제와 간접 관련 가능", "keyword_hits": [], "source": "explore"}, {"id": "2606.28147v1", "title": "Linear-size $\\ell_1$ sparsifiers", "authors": ["Victor Reis", "Thomas Rothvoss"], "abstract": "We prove that for any matrix $A \\in \\mathbb{R}^{m \\times n}$ and any $\\varepsilon \\in (0, 1/2]$ there is a diagonal matrix $D \\in \\mathbb{R}_{\\geq 0}^{m \\times m}$ with at most $O(\\frac{n}{\\varepsilon^2} \\log(\\frac{1}{\\varepsilon}))$ nonzero entries so that \\[(1-\\varepsilon) \\|Ax\\|_1 \\leq \\|DAx\\|_1 \\leq (1+\\varepsilon)\\|Ax\\|_1 \\quad \\forall x \\in \\mathbb{R}^n.\\]In particular, for any zonotope $Z \\subseteq \\mathbb{R}^{n}$ there exists a zonotope $Z' \\subseteq \\mathbb{R}^{n}$ generated by at most $O(\\frac{n}{\\varepsilon^2} \\log(\\frac{1}{\\varepsilon}))$ segments so that $(1-\\varepsilon) Z \\subseteq Z' \\subseteq (1+\\varepsilon) Z$. Previously, the best known bound was $O(\\frac{n}{\\varepsilon^2} \\log n)$ due to Talagrand (1990).", "categories": ["math.MG", "cs.DM"], "primary_category": "math.MG", "published": "2026-06-26T14:43:15+00:00", "updated": "2026-06-26T14:43:15+00:00", "abs_url": "http://arxiv.org/abs/2606.28147v1", "pdf_url": "https://arxiv.org/pdf/2606.28147v1", "journal_ref": "", "doi": "", "comment": "20 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 $\\ell_1$ sparsifier와 조노토프(zonotope) 근사에 관한 것으로, McMullen 문제(볼록 위치 점 배치, oriented matroid 등)와 직접적인 관련이 없다.", "summary": "임의의 행렬 $A \\in \\mathbb{R}^{m \\times n}$과 $\\varepsilon \\in (0, 1/2]$에 대해, 최대 $O(\\frac{n}{\\varepsilon^2}\\log(\\frac{1}{\\varepsilon}))$개의 비영(nonzero) 대각 원소를 가지는 대각행렬 $D$가 존재하여 모든 $x \\in \\mathbb{R}^n$에 대해 $(1-\\varepsilon)\\|Ax\\|_1 \\leq \\|DAx\\|_1 \\leq (1+\\varepsilon)\\|Ax\\|_1$를 만족함을 증명한다. 이는 조노토프(zonotope) 관점에서, $n$차원 조노토프 $Z$를 최대 $O(\\frac{n}{\\varepsilon^2}\\log(\\frac{1}{\\varepsilon}))$개의 선분으로 생성되는 조노토프 $Z'$로 $(1-\\varepsilon)Z \\subseteq Z' \\subseteq (1+\\varepsilon)Z$가 되도록 근사할 수 있음을 의미한다. 기존 최선의 경계는 Talagrand(1990)의 $O(\\frac{n}{\\varepsilon^2}\\log n)$이었으며, 이 논문은 $\\log n$을 $\\log(\\frac{1}{\\varepsilon})$로 개선하였다.", "technique": "초록만으로는 구체적 증명 기법이 불확실하나, 행렬 행(row)에 대한 희소화(sparsification) 가중치 선택을 통해 $\\ell_1$ 노름을 근사적으로 보존하는 구성을 사용한다.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.27503v1", "title": "Tropical Fermat--Weber Problems over Non-Finite Data and their Inverse Formulations", "authors": ["John Sabol", "Ruriko Yoshida"], "abstract": "The term tropical pseudonorm refers to a family of (not necessarily symmetric) gauge functions that arise in tropical or idempotent geometry. An important characteristic of these gauges is their invariance under translation by a constant vector, allowing them to descent naturally to tropical projective spaces. In this work, we explore the tropical one-infinity pseudonorm, a polyhedral hybrid gauge that allows for tunable asymmetry, in the context of a Fermat--Weber location problem. We extend previous formulations in considering non-finite data, and we investigate several variants of the inverse problem, providing linear programming formulations for their solution.", "categories": ["math.CO", "math.OC"], "primary_category": "math.CO", "published": "2026-06-25T19:37:48+00:00", "updated": "2026-06-25T19:37:48+00:00", "abs_url": "http://arxiv.org/abs/2606.27503v1", "pdf_url": "https://arxiv.org/pdf/2606.27503v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "matching-fields", "problem_name": "Polyhedral matching fields", "relevance_reason": "이 논문은 열대(tropical) 기하학의 pseudonorm과 Fermat–Weber 위치 문제를 다루며, polyhedral matching fields·tropical geometry의 교차점과는 거의 관련이 없다.", "summary": "이 논문은 열대 사영 공간(tropical projective space)에서 정의되는 tropical one-infinity pseudonorm(비대칭 조정 가능한 polyhedral gauge)을 이용하여 Fermat–Weber 위치 결정 문제를 비유한(non-finite) 데이터로 확장한다. 또한 역문제(inverse problem)의 여러 변형을 탐구하며, 이를 선형 프로그래밍(linear programming)으로 공식화하여 해를 구하는 방법을 제시한다.", "technique": "Tropical one-infinity pseudonorm을 활용한 선형 프로그래밍(linear programming) 공식화.", "connections": "", "keyword_hits": ["tropical"], "source": "filter"}, {"id": "2606.23876v1", "title": "A Littlewood-Richardson Rule for Forest Polynomials via the Schubert Bialgebra", "authors": ["Matthew J. Samuel"], "abstract": "The forest polynomials $\\mathfrak{P}_a$ of Nadeau-Tewari form a $\\mathbb{Z}$-basis of $\\mathbb{Z}[x_1, x_2, \\dots]$ whose role for the cohomology of the quasisymmetric flag variety parallels that of Schubert polynomials for the classical flag variety. Nonnegativity of the structure constants $β^c_{a,b}$ in $\\mathfrak{P}_a \\mathfrak{P}_b = \\sum_c β^c_{a,b} \\mathfrak{P}_c$ is known, but no Littlewood-Richardson-style enumerative rule has been available. We give such a rule: $β^c_{a,b}$ counts pairs of forest RC graphs of forest-codes $a$ and $b$ whose lift product lands on a forest RC graph of forest-code and weight both equal to $c$. The same rule descends to the cup product on $H^\\bullet(QFl_n)$. The proof introduces a Schubert bialgebra $\\mathcal{A}$ and lifts the multiplication on its graded dual $\\mathcal{D}$ to a product on a free abelian group $\\mathcal{B}RC$ of bounded RC graphs; the same machinery yields enumerative LR rules for the dual Schubert, dual key, dual forest, and dual slide bases of $\\mathcal{D}$.", "categories": ["math.CO", "math.AG", "math.RT"], "primary_category": "math.CO", "published": "2026-06-22T19:23:04+00:00", "updated": "2026-06-22T19:23:04+00:00", "abs_url": "http://arxiv.org/abs/2606.23876v1", "pdf_url": "https://arxiv.org/pdf/2606.23876v1", "journal_ref": "", "doi": "", "comment": "58 pages, 6 figures", "relevance": 1, "problem_id": "matching-fields", "problem_name": "Polyhedral matching fields", "relevance_reason": "Forest polynomials, quasisymmetric flag variety, Schubert bialgebra는 대수조합론·표현론 중심이며, McMullen's problem과 polyhedral matching fields의 이산기하학적 문제들과 직접 관련이 없음.", "summary": "Nadeau-Tewari의 forest polynomials에 대해 곱셈 구조상수 $β^c_{a,b}$를 세는 Littlewood-Richardson 규칙을 제시한다. Forest RC graphs의 lift product를 통해 enumerative rule을 구성하며, 이는 quasisymmetric flag variety $QFl_n$의 cohomology에서의 cup product로 내려온다.", "technique": "Schubert bialgebra $\\mathcal{A}$를 도입하고 그 graded dual의 곱셈을 bounded RC graphs의 free abelian group $\\mathcal{B}RC$로 들어올려(lift) enumerative rule을 유도.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.25988v1", "title": "Conflict-Free Coloring Planar Graphs with 4 Colors", "authors": ["Petr Hliněný", "Lukáš Málik"], "abstract": "We efficiently conflict-free color every planar graph with 4 colors. An (open-neighborhood) conflict-free coloring assigns colors to vertices in a way that every vertex v has a neighbor w such that the color of w is distinct from the colors of the other neighbors of v (i.e., the color of w is unique in the open neighborhood of v). A previous best upper bound on the conflict-free chromatic number of planar graphs was 5, and it is known that 4 colors are sometimes necessary. Deciding whether, e.g., a planar graph admits a conflict-free coloring with 3 colors is NP-complete. Our approach uses a refined variant of the classical Gallai-Edmonds decomposition and the Four Color Theorem. In fact, our result is equivalent to the Four Color Theorem.", "categories": ["math.CO", "cs.DM"], "primary_category": "math.CO", "published": "2026-06-24T15:58:12+00:00", "updated": "2026-06-24T15:58:12+00:00", "abs_url": "http://arxiv.org/abs/2606.25988v1", "pdf_url": "https://arxiv.org/pdf/2606.25988v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "평면그래프의 conflict-free coloring 문제로, McMullen's problem이나 polyhedral matching fields와 직접적 관련성 없음.", "summary": "본 논문은 모든 평면그래프를 4가지 색으로 conflict-free coloring할 수 있음을 보입니다. Conflict-free coloring은 각 정점 v가 이웃 중 고유한 색을 가진 정점을 가지도록 하는 색칠입니다. 이전 상한은 5였고, 결과는 Four Color Theorem과 동치입니다.", "technique": "Gallai-Edmonds 분해의 정제된 변형과 Four Color Theorem을 활용한 알고리즘적 접근.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27087v1", "title": "Inequalities among higher-order difference sets, or, remarks on a construction of Ruzsa", "authors": ["Noah Kravitz"], "abstract": "Extending a little-known construction of Ruzsa, we characterize the quadruples $(s,t,u,v)$ of nonnegative integers such that the inequality $|sA-tA| \\leq |uA-vA|$ holds for all finite sets $A \\subseteq \\mathbb{Z}$", "categories": ["math.CO", "math.NT"], "primary_category": "math.CO", "published": "2026-06-25T14:23:41+00:00", "updated": "2026-06-25T14:23:41+00:00", "abs_url": "http://arxiv.org/abs/2606.27087v1", "pdf_url": "https://arxiv.org/pdf/2606.27087v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이산기하학이나 점 배치 문제와 직접 관련이 없으며, Ruzsa의 덧셈 조합론 구성을 정수 집합의 차집합 부등식으로 확장하는 순수 조합론 연구입니다.", "summary": "논문은 Ruzsa의 미공개 구성을 확장하여 모든 유한 집합 $A \\subseteq \\mathbb{Z}$에 대해 $|sA-tA| \\leq |uA-vA|$ 부등식이 성립하는 음이 아닌 정수 사중쌍 $(s,t,u,v)$을 특성화합니다.", "technique": "Ruzsa의 구성을 일반화하여 더 높은 차수의 차집합(higher-order difference sets) 간 부등식을 분석.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.28305v1", "title": "Divisible Arm Lengths, Crystal Reflections, and Enumeration of Newly Found Decomposition Columns", "authors": ["David J. Hemmer", "Pavel Turek"], "abstract": "In recent work the authors determine complete columns of symmetric-group decomposition matrices in odd prime characteristic $p$ labeled by $p$-regular partitions for which every hook of length divisible by $p$ has even arm length. In the present paper we enumerate these partitions and prove that each block of $p$-weight $w$ contains precisely \\[ \\binom{w+\\frac{p-3}{2}}{w} \\] such partitions.   More generally, for any integers $d,e>1$, we study and enumerate $d$-balanced $e$-regular partitions -- partitions for which every hook of length divisible by $e$ has arm length divisible by $d$. Our first main result is that the crystal (affine) reflections preserve the $d$-balanced property for all $d,e > 1$. It follows that, for fixed $d$, $e$, and $w$, the number of $d$-balanced $e$-regular partitions in a block of $e$-weight $w$ is independent of the $e$-core. We then compute this number by working in RoCK blocks, obtaining an explicit binomial formula valid for every block.   We also investigate closely related odd sequences of partitions. Among others, we find the generating function of the number of odd sequences occurring in a block. Alongside their representation-theoretic relevance, we expect these results to be of independent combinatorial interest.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-26T17:49:30+00:00", "updated": "2026-06-26T17:49:30+00:00", "abs_url": "http://arxiv.org/abs/2606.28305v1", "pdf_url": "https://arxiv.org/pdf/2606.28305v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "대칭군 분해 행렬의 분할(partition) 열거 문제로, 제시된 research problem(McMullen's problem, matching fields)과 직접적 연결이 없음.", "summary": "논문은 홀수 소인수 $p$에서 $p$-정규 분할 중 $p$-divisible한 훅 길이가 짝수 arm length를 갖는 분할들을 열거한다. 결정 반사(crystal reflections)가 $d$-balanced 성질을 보존함을 증명하고, RoCK 블록을 통해 이항 공식 $\\binom{w+\\frac{p-3}{2}}{w}$을 도출한다.", "technique": "결정군 반사를 이용한 불변량 보존과 RoCK 블록에서의 직접 계산", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.28216v1", "title": "Fano Geometry and Slow Coupon Collecting", "authors": ["Dina Barak-Pelleg", "Daniel Berend"], "abstract": "We study the coupon collector's problem in a generalized setting where each draw reveals a fixed number of coupons and the sampling mechanism is required to be \\emph{fair}, meaning that every coupon appears with the same frequency among the admissible draws. Grunbaum and Yaakobi conjectured that, among all fair mechanisms with fixed parameters, the fully random model maximizes the expected time to complete coverage. We disprove this conjecture by exhibiting explicit counterexamples arising from finite geometry. In particular, we show that the line set of the Fano plane yields a fair mechanism whose expected coverage time exceeds that of the full model. Further exact and computational results are obtained for projective planes of higher order. In addition, we analyze a simple infinite family of fair mechanisms, the star mechanism, for which the expected coverage time admits a closed form. Depending on the scaling regime, this mechanism can be asymptotically slower or faster than the full model, showing that no universal extremality principle holds for fair mechanisms without additional structural assumptions.", "categories": ["math.CO", "math.PR"], "primary_category": "math.CO", "published": "2026-06-26T16:06:11+00:00", "updated": "2026-06-26T16:06:11+00:00", "abs_url": "http://arxiv.org/abs/2606.28216v1", "pdf_url": "https://arxiv.org/pdf/2606.28216v1", "journal_ref": "", "doi": "", "comment": "13 pages, 3 tables", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "논문은 확률론적 쿠폰 수집 문제와 유한기하학(Fano plane)을 다루지만, McMullen's problem과 matching fields 모두와 직접 관련이 없음.", "summary": "공정한(fair) 샘플링 메커니즘 하에서의 쿠폰 수집 문제를 연구함. Grunbaum-Yaakobi 추측을 반박하기 위해 유한기하학(특히 Fano plane의 선 집합)으로부터 유도된 명시적 반례를 제시하며, 완전 무작위 모델보다 높은 기댓값 커버리지 시간을 갖는 공정한 메커니즘이 존재함을 보임.", "technique": "유한사영평면(finite projective planes)과 그 기하학적 구조를 활용한 공정한 샘플링 메커니즘 구성 및 확률론적 분석.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27682v1", "title": "Linkage problem on optimal $1$-planar graphs", "authors": ["Shohei Koizumi", "Ryosuke Osaka", "Yusuke Suzuki"], "abstract": "Enami and Maezawa give a complete characterization of $(s_1, s_2, \\ldots, s_k)$-linked planar graphs for any $k$-tuple of positive integers. In this paper, we investigate linkage problems for optimal 1-planar graphs. In particular, we show that every optimal 1-planar graph with connectivity $6$ is $(5, 5)$-linked. Moreover, for an optimal $1$-planar graph $G$ that is not $(2,2,1)$-linked, we characterize disjoint vertex subsets $S_1, S_2, S_3$ in $G$ with $|S_1|=|S_2|=2$ and $|S_3|=1$ such that $G$ is not $\\{S_1,S_2,S_3\\}$-linked.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-26T03:28:47+00:00", "updated": "2026-06-26T03:28:47+00:00", "abs_url": "http://arxiv.org/abs/2606.27682v1", "pdf_url": "https://arxiv.org/pdf/2606.27682v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "1-평면 그래프의 linkage 문제는 이산기하학·조합론의 그래프 이론 분야이나, McMullen's problem과 polyhedral matching fields의 핵심 주제인 점 배치·볼록다면체·oriented matroid와는 직접적 연관이 없음.", "summary": "본 논문은 최적 1-평면 그래프(optimal 1-planar graphs)의 linkage 문제를 연구한다. 연결도가 6인 최적 1-평면 그래프는 (5,5)-linked임을 보이고, (2,2,1)-linked가 아닌 경우 특정 분리 정점 부분집합의 특성을 규명한다.", "technique": "Enami-Maezawa의 평면 그래프 linkage 특성화 결과를 최적 1-평면 그래프로 확장하는 구조적 분석.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.26509v1", "title": "Structural Properties and Applications of the Augmented Sombor Index", "authors": ["Chunlei Xu", "Kinkar Chandra Das", "Jayanta Bera"], "abstract": "Topological indices are key quantitative descriptors in mathematical chemistry, unchanged under symmetry operations and retaining graph connectivity; they capture molecular structural features to provide insights into molecular stability and chemical properties, becoming indispensable in cheminformatics and theoretical chemistry. Among degree-based indices, the \\textbf{Sombor index} is widely concerned for capturing structural information, and motivated by enhanced structural discrimination, the \\textbf{augmented Sombor index} ($ASO$) is defined for a connected graph $Ω$ with $|V(Ω)|\\geq 3$ as $$ASO(Ω) = \\sum_{v_iv_j\\in E(Ω)} \\sqrt{\\frac{d_i^2 + d_j^2}{d_i + d_j - 2}},$$ where $d_i$ and $d_j$ are the degrees of vertices $v_i$ and $v_j$, respectively. Within the scope of this study, we first establish several sharp bounds for the augmented Sombor index and characterize the extremal graphs attaining these bounds. In particular, we determine the minimum value of the $ASO$ index for unicyclic graphs with a prescribed girth and characterize all graphs achieving this minimum. We also identify the second maximum $ASO$ value among trees and characterize the corresponding extremal tree structures. Furthermore, the minimum and maximum values of the $ASO$ index for bipartite graphs and chemical graphs are obtained, together with a complete characterization of the associated extremal graphs. In addition, we characterize the chemical trees that maximize the $ASO$ index. The chemical applicability of the $ASO$ index is investigated through quantitative structure-property relationship (QSPR) analysis, supported by a comparative assessment of several variants of the Sombor index. Finally, we present concluding remarks and outline potential directions for future research on the augmented Sombor index of graphs.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T01:30:03+00:00", "updated": "2026-06-25T01:30:03+00:00", "abs_url": "http://arxiv.org/abs/2606.26509v1", "pdf_url": "https://arxiv.org/pdf/2606.26509v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "그래프의 위상지수(topological index) 연구로, 제시된 연구 문제들(McMullen's problem, polyhedral matching fields)과 직접적 관련 없음.", "summary": "본 논문은 분자 구조 설명을 위한 augmented Sombor index(ASO)를 정의하고, 다양한 그래프 클래스(unicyclic, tree, bipartite, chemical graph)에서 ASO의 극값을 특징화한다. 정량적 구조-성질 관계(QSPR) 분석을 통해 화학적 적용성을 검증한다.", "technique": "차수(degree) 기반 위상지수의 극값 특징화 및 QSPR을 통한 화학적 검증.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27987v1", "title": "Maniplexes as a Foundation for Cross-Linked Databases of Symmetric Objects", "authors": ["Katja Berčič", "Gabe Cunningham", "Andrés David Santamaría-Galvis", "Janoš Vidali"], "abstract": "Graphs, maps on surfaces, and abstract polytopes are related combinatorial structures that tend to be studied by different communities using their own tools and databases. Maniplexes provide a unifying framework that captures all of them. A single database built around maniplexes would help researchers recognize shared structures and translate results across fields. Here we present a compact, interoperable format for storing maniplexes as edge-labeled graphs, designed with such a database in mind. As a first step, we connect two existing datasets of regular 4-maniplexes to the House of Graphs and to Potočnik's tetravalent graph censuses, using canonical forms of their flag graphs, 1-skeleton graphs, and 1-coskeleton graphs.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-26T11:34:16+00:00", "updated": "2026-06-26T11:34:16+00:00", "abs_url": "http://arxiv.org/abs/2606.27987v1", "pdf_url": "https://arxiv.org/pdf/2606.27987v1", "journal_ref": "", "doi": "", "comment": "Submitted (pre-peer-review) version. Accepted at CICM 2026; the Version of Record will appear in Springer LNAI. We'll add the DOI once the proceedings are published", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 maniplexes를 기반으로 한 대칭 객체 데이터베이스 구축에 관한 것으로, McMullen의 문제나 oriented matroid, convex position 등과 직접적인 관련이 없다.", "summary": "이 논문은 그래프, 곡면 위의 맵, 추상 다면체(abstract polytope)를 통합하는 프레임워크인 maniplex를 중심으로 상호운용 가능한 데이터베이스 형식을 제안한다. Edge-labeled graph로 maniplex를 저장하는 컴팩트한 형식을 설계하고, 기존 regular 4-maniplex 데이터셋을 House of Graphs 및 Potočnik의 4가 그래프 목록과 연결한다. Flag graph, 1-skeleton graph, 1-coskeleton graph의 정준형(canonical form)을 활용하여 두 데이터셋 간의 공유 구조를 식별한다.", "technique": "Flag graph, 1-skeleton graph, 1-coskeleton graph의 정준형(canonical form)을 이용한 데이터셋 간 교차 연결.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.27357v1", "title": "Typical distances in high-genus triangulations", "authors": ["Tanguy Lions"], "abstract": "We study the distance between two uniformly chosen points on a uniform random triangulation whose genus g is proportional to the number of faces 2n. We show that the distance rescaled by log(n) converges in probability to a deterministic constant, which answers a conjecture of Budzinski, Chapuy and Louf. The proof relies on the precise study of the volume growth of the ball of radius r for r of order log(n). The main ingredients are the recent local convergence results for uniform triangulations with boundaries and the isoperimetric inequalities obtained by Budzinski and Louf.", "categories": ["math.PR", "math.CO"], "primary_category": "math.PR", "published": "2026-06-25T17:57:59+00:00", "updated": "2026-06-25T17:57:59+00:00", "abs_url": "http://arxiv.org/abs/2606.27357v1", "pdf_url": "https://arxiv.org/pdf/2606.27357v1", "journal_ref": "", "doi": "", "comment": "42 pages, 15 figures", "relevance": 0, "problem_id": "matching-fields", "problem_name": "Polyhedral matching fields", "relevance_reason": "이 논문은 고종수(high-genus) 삼각분할에서의 거리 분포를 다루는 확률론·조합론 논문으로, polyhedral matching fields, tropical geometry, oriented matroids 등 연구 문제와 전혀 관련이 없다.", "summary": "이 논문은 면의 수 $2n$에 비례하는 종수 $g$를 갖는 균등 랜덤 삼각분할(uniform random triangulation) 위의 두 균등 점 사이의 거리를 연구한다. $\\log(n)$으로 스케일링한 거리가 확률 수렴(convergence in probability)하여 결정론적 상수에 수렴함을 증명하며, 이는 Budzinski–Chapuy–Louf의 추측을 해결한다. 증명은 반지름 $r = O(\\log n)$인 볼의 부피 성장에 대한 정밀 분석, 경계 있는 균등 삼각분할의 국소 수렴(local convergence) 결과, 그리고 Budzinski–Louf의 등주부등식(isoperimetric inequalities)에 의존한다.", "technique": "반지름 $r = O(\\log n)$ 스케일에서의 볼 부피 성장 분석, 경계 있는 균등 삼각분할의 국소 수렴 결과, 및 등주부등식을 결합하여 거리의 확률 수렴을 증명.", "connections": "", "keyword_hits": ["triangulation"], "source": "filter"}, {"id": "2606.27004v1", "title": "Hidden critical and Morse equivalence behind duality: Theory and Applications", "authors": ["Dong Zhang"], "abstract": "The aim of this paper is to establish critical duality theory for ratios of nonnegative homogeneous convex functions (shorten for RC functions) and differences of convex functions (abbreviated as DC functions) on Banach spaces. Specifically, we establish a series of duality results on critical point theory and Morse theory for RC functions, including the homotopy type of sublevel sets, the Morse critical points and their Rothe critical groups, Lagrange critical points and their multiplicities, Lusternik-Schnirelman min-max critical values, Poincare polynomials, as well as the structure of handlebody decompositions, all of which are proved to be preserved under polarity dual. Moreover, we obtain the first critical duality theory of DC functions which does not depend on the DC decomposition. This answers a question left open from the work of Toland on DC functions and the work of Le-Pham on DC programming.   We apply these results to provide a reformulation of the graph Cheeger constant using zonotopes; we introduce the contact data which serves as a geometric characterization of Lagrange criticality; and we show that the eigenproblems for 1-Laplacian and $\\infty$-Laplacian on hypergraphs are equivalent to the contact problems of zonotopes, which indeed establishes a new characterization of zonotopes. We also prove a duality equivalence for certain nonlinear eigenvalue problems and bifurcation problems. Our study here reveals an intricate interaction of critical point theory with other fields such as convex analysis, combinatorial geometry, and nonlinear eigenproblems on graphs.", "categories": ["math.FA", "math.CO", "math.MG", "math.SP"], "primary_category": "math.FA", "published": "2026-06-25T13:20:14+00:00", "updated": "2026-06-25T13:20:14+00:00", "abs_url": "http://arxiv.org/abs/2606.27004v1", "pdf_url": "https://arxiv.org/pdf/2606.27004v1", "journal_ref": "", "doi": "", "comment": "Any comments are very welcome", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 RC/DC 함수의 임계점 이중성 이론 및 조조노토프·하이퍼그래프 고유값 문제를 다루며, McMullen 문제(d=5에서의 볼록 위치 점 배치, oriented matroid 등)와 직접적 관련이 없다.", "summary": "이 논문은 Banach 공간 위의 비음 동차 볼록 함수(RC 함수) 비율 및 볼록 함수의 차(DC 함수)에 대한 임계 이중성 이론을 수립한다. 호모토피 유형, Morse 임계점, Lusternik-Schnirelman 민맥스 값, Poincaré 다항식 등이 극성 쌍대(polarity dual) 하에 보존됨을 증명하며, DC 함수에 대한 분해에 독립적인 최초의 임계 이중성 이론도 제시한다. 응용으로 그래프 Cheeger 상수의 조노토프(zonotope) 재정식화, 하이퍼그래프 위의 1-Laplacian 및 $\\infty$-Laplacian 고유문제와 조노토프 접촉 문제의 동치성을 보인다.", "technique": "극성 쌍대(polarity dual)를 활용한 RC·DC 함수의 임계점 이론 및 Morse 이론의 이중성 정립, 조노토프와 비선형 고유값 문제의 연결.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.25644v1", "title": "Winding number and circular coloring", "authors": ["Reza Naserasr", "Cyril Pujol", "Lujia Wang"], "abstract": "In 1996, Youngs proved a surprising theorem that quadrangulations of the projective plane could never have chromatic number exactly 3. This sparked a lot of interest, and the result has been further developed in many directions over the past decades. For example, the result is strengthened by considering the circular chromatic number, which is a real-valued lower bound on the chromatic number. The circular chromatic number of a quadrangulation cannot be in the interval (2,4). This parameter allows a generalization to larger even faces, for which a similar gap exists.   In this work, we place these results into a framework based on the notion of winding number using extensions of colorings to continuous mappings. This yields unified and simplified proofs of gaps in the circular chromatic number for graphs with a distinguished set of directed even cycles. This generalizes the setting of graphs embedded on surfaces where every face is even.   We further establish an analogous gap phenomenon when all faces are of a given odd length, previously known only in the case of triangulations. For example, we conclude that if G is a graph embedded on the projective plane such that all faces are 5-cycles, then either its circular chromatic number is 5/2 or at least 3, the former being the case only if G is Eulerian and every noncontractible facial walk is of odd length...", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-24T09:52:56+00:00", "updated": "2026-06-24T09:52:56+00:00", "abs_url": "http://arxiv.org/abs/2606.25644v1", "pdf_url": "https://arxiv.org/pdf/2606.25644v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 0, "problem_id": "matching-fields", "problem_name": "Polyhedral matching fields", "relevance_reason": "이 논문은 circular chromatic number와 winding number를 이용한 그래프 채색 이론에 관한 것으로, polyhedral matching fields, tropical geometry, oriented matroids 등 연구 문제와 직접적인 관련이 없다.", "summary": "이 논문은 사영평면의 이분면(quadrangulation)에서 chromatic number가 정확히 3이 될 수 없다는 Youngs(1996)의 결과를 winding number 기반의 통합 프레임워크로 일반화한다. 연속 사상으로의 채색 확장을 통해 방향 있는 짝수 사이클을 가진 그래프에서의 circular chromatic number의 gap 현상을 통일적으로 증명하며, 기존에는 삼각분할에서만 알려졌던 홀수 길이 면에서의 유사한 gap 현상도 확립한다. 예를 들어, 모든 면이 5-사이클인 사영평면 위의 그래프 $G$의 circular chromatic number는 $5/2$ 이거나 $3$ 이상임을 결론짓는다.", "technique": "채색을 연속 사상으로 확장하고 winding number를 활용하여 circular chromatic number의 gap을 위상수학적으로 증명하는 기법.", "connections": "", "keyword_hits": ["triangulation"], "source": "filter"}, {"id": "2606.24482v1", "title": "Homotopy Coherent Nielsen Realization Problem for Dehn Twists on K3-Type 4-Manifolds", "authors": ["Yujie Lin", "Yi Sha"], "abstract": "We study the homotopy coherent version of the Nielsen realization problem for smooth $4$-manifolds. Given a finite subgroup $G\\subset π_0(\\mathrm{Diff}(M))$, this problem asks whether there is a map $H\\colon BG \\to B\\mathrm{Diff}(M)$ such that the induced map on fundamental groups coincides with the inclusion of $G$. Using family Seiberg-Witten theory, we prove that for $K3$-type $4$-manifolds, the Dehn twists along $(-2)$-spheres are not homotopy coherently Nielsen realizable. In particular, this gives an alternative proof of the failure of the classical Nielsen realization problem in this setting.", "categories": ["math.GT"], "primary_category": "math.GT", "published": "2026-06-23T12:18:10+00:00", "updated": "2026-06-23T12:18:10+00:00", "abs_url": "http://arxiv.org/abs/2606.24482v1", "pdf_url": "https://arxiv.org/pdf/2606.24482v1", "journal_ref": "", "doi": "", "comment": "19 pages. Comments welcome", "relevance": 0, "problem_id": "matching-fields", "problem_name": "Polyhedral matching fields", "relevance_reason": "이 논문은 4-다양체의 미분동형군과 Nielsen 실현 문제를 다루며, polyhedral matching fields, tropical geometry, oriented matroid 등과 전혀 관련이 없다.", "summary": "이 논문은 매끄러운 4-다양체에 대한 호모토피 정합적(homotopy coherent) Nielsen 실현 문제를 연구한다. $K3$-유형 4-다양체에서 $(-2)$-구면을 따른 Dehn twist가 호모토피 정합적으로 Nielsen 실현 불가능함을 증명하며, 이를 통해 고전적 Nielsen 실현 문제의 실패에 대한 대안적 증명도 제공한다.", "technique": "Family Seiberg-Witten theory를 핵심 도구로 활용하여 Dehn twist의 실현 불가능성을 증명한다.", "connections": "", "keyword_hits": ["realizab"], "source": "filter"}, {"id": "2606.24339v1", "title": "Toward a classification of tropical complete intersection number one", "authors": ["Linxuan Li"], "abstract": "By bridging two classification results -- the Esterov--Gusev classification of tuples of lattice polytopes of mixed volume one, and Fink's characterization of Bergman fans -- we formulate a classification conjecture describing when the stable intersection of a tropical fan F with the tropicalization Trop(X) of a subvariety of T^n is a reduced point. Our main results establish this conjecture in three fundamental cases -- unmixed sequences, hypersurface complete-intersection cycles, and tropical 2-cycles -- and develop several tools intended for the general case.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T09:25:12+00:00", "updated": "2026-06-23T09:25:12+00:00", "abs_url": "http://arxiv.org/abs/2606.24339v1", "pdf_url": "https://arxiv.org/pdf/2606.24339v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 열대 기하학(tropical geometry)에서 완전교차(complete intersection)의 분류를 다루며, McMullen 문제(볼록 위치 점 배치, oriented matroid 등)와 직접적인 관련이 없다.", "summary": "이 논문은 격자 다면체(lattice polytopes)의 혼합 부피(mixed volume) 1인 경우에 대한 Esterov–Gusev 분류와 Bergman fan에 대한 Fink의 특성화를 연결하여, 열대 팬(tropical fan) $F$와 부다양체의 열대화 $\\mathrm{Trop}(X)$의 안정 교차(stable intersection)가 축소 점(reduced point)이 되는 조건을 분류하는 추측을 제시한다. 주요 결과로는 비혼합 수열(unmixed sequences), 초곡면 완전교차 사이클, 열대 2-사이클의 세 기본 경우에서 이 추측을 증명하였다.", "technique": "격자 다면체의 혼합 부피 1 분류(Esterov–Gusev)와 Bergman fan의 Fink 특성화를 브리징하여 열대 완전교차 수 1 조건을 분석하는 조합론적·열대 기하학적 방법.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.24261v2", "title": "A combinatorial Approach to $α$-Ricci and Lin-Lu-Yau Ricci curvatures on Graphs", "authors": ["Jaewoo Jung", "Young Soo Kwon", "Seungjae Lee", "Jihye Park"], "abstract": "In this paper, we study the $α$-Ricci curvature and the Lin-Lu-Yau Ricci curvature on simple, connected, and locally finite graphs. For regular graphs, we introduce a combinatorial construction of optimal transport plans realizing the 1-Wasserstein distance and use it to derive exact formulas for the $α$-Ricci curvature and the Lin-Lu-Yau Ricci curvature. This yields a combinatorial proof of the known curvature formulas. Furthermore, for non-regular graphs, we characterize conditions on the size of common neighborhoods that guarantee either non-negative or vanishing Lin-Lu-Yau Ricci curvature.", "categories": ["math.DG", "math.CO"], "primary_category": "math.DG", "published": "2026-06-23T07:48:11+00:00", "updated": "2026-06-25T03:15:57+00:00", "abs_url": "http://arxiv.org/abs/2606.24261v2", "pdf_url": "https://arxiv.org/pdf/2606.24261v2", "journal_ref": "", "doi": "", "comment": "16 pages, Any comments are welcome", "relevance": 0, "problem_id": "matching-fields", "problem_name": "Polyhedral matching fields", "relevance_reason": "이 논문은 그래프 위의 Ricci 곡률(α-Ricci, Lin-Lu-Yau)을 조합론적으로 연구하며, polyhedral matching fields, tropical geometry, oriented matroids 등 연구 문제와 직접적인 관련이 없다.", "summary": "이 논문은 단순·연결·국소 유한 그래프에서 $\\alpha$-Ricci 곡률과 Lin-Lu-Yau Ricci 곡률을 연구한다. 정규 그래프(regular graph)에 대해 1-Wasserstein 거리를 실현하는 최적 수송 계획(optimal transport plan)의 조합론적 구성을 도입하고, 이를 이용해 두 곡률의 정확한 공식을 유도하는 조합론적 증명을 제시한다. 비정규 그래프(non-regular graph)에 대해서는 공통 이웃(common neighborhood)의 크기 조건으로 Lin-Lu-Yau Ricci 곡률의 비음성 또는 소멸을 특성화한다.", "technique": "1-Wasserstein 거리를 실현하는 최적 수송 계획의 조합론적 구성을 통해 곡률 공식을 직접 유도.", "connections": "", "keyword_hits": ["non-regular"], "source": "filter"}, {"id": "2606.23963v1", "title": "A Combinatorial Characterization of Sol 3-Manifolds", "authors": ["Daryl Cooper", "Leslie Mavrakis", "Priyam Patel"], "abstract": "We show that there is a universal compact branched 3-manifold $W$ such that a closed 3-manifold $M$ immerses into $W$ if and only if $M$ admits a Sol structure. Equivalently, a closed 3-manifold is Sol if and only if it has a certain type of triangulation. The construction of $W$ is based on a regular language that characterizes Sol manifolds.", "categories": ["math.GT"], "primary_category": "math.GT", "published": "2026-06-22T21:44:36+00:00", "updated": "2026-06-22T21:44:36+00:00", "abs_url": "http://arxiv.org/abs/2606.23963v1", "pdf_url": "https://arxiv.org/pdf/2606.23963v1", "journal_ref": "", "doi": "", "comment": "20 pages, 2 figures", "relevance": 0, "problem_id": "matching-fields", "problem_name": "Polyhedral matching fields", "relevance_reason": "이 논문은 Sol 3-다양체의 위상기하학적 특성화에 관한 것으로, polyhedral matching fields, tropical geometry, oriented matroids 등 연구 문제와 직접적 관련이 없다.", "summary": "이 논문은 보편적 컴팩트 분기 3-다양체(branched 3-manifold) $W$가 존재하여, 닫힌 3-다양체 $M$이 $W$에 몰입(immerse)될 필요충분조건이 $M$이 Sol 구조를 가지는 것임을 보인다. 동치 조건으로, 닫힌 3-다양체가 Sol인 것과 특정 유형의 삼각분할(triangulation)을 가지는 것이 동치임을 보인다. $W$의 구성은 Sol 다양체를 특성화하는 정규 언어(regular language)에 기반한다.", "technique": "Sol 다양체를 특성화하는 정규 언어를 이용하여 보편적 분기 3-다양체를 구성하고, 몰입 조건과 삼각분할 조건 사이의 동치를 확립하는 조합론적 방법.", "connections": "", "keyword_hits": ["triangulation"], "source": "filter"}];
const PROBLEMS = [{"id": "mcmullen", "name": "McMullen's problem (d=5)"}, {"id": "matching-fields", "name": "Polyhedral matching fields"}];
const FEEDBACK_REPO = {};   // 저장소에 커밋된 피드백(기기 간 기준선)
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const baseId = id => String(id).replace(/v\d+$/,"");
const state = {q:"",sort:"fav",thr:0,problem:"",fav:false,exp:false,hideDown:false};

// 피드백 상태: 저장소 기준선 + 로컬 미동기화 병합
let FB = Object.assign({}, FEEDBACK_REPO);
try{ const l = JSON.parse(localStorage.getItem("ra_feedback")||"{}"); Object.assign(FB,l); }catch(e){}
function saveLocal(){ localStorage.setItem("ra_feedback", JSON.stringify(FB)); }

// GitHub 동기화 설정
let GH = {repo:"", token:""};
try{ GH = Object.assign(GH, JSON.parse(localStorage.getItem("ra_gh")||"{}")); }catch(e){}
function autoRepo(){
  if(GH.repo) return GH.repo;
  const h=location.hostname, parts=location.pathname.split("/").filter(Boolean);
  if(h.endsWith("github.io")){ const owner=h.split(".")[0]; return owner+"/"+(parts[0]||h); }
  return "";
}
function setSync(msg){ document.getElementById("sync").textContent = msg; }

async function pushGitHub(){
  const repo = autoRepo(); if(!GH.token || !repo){ return; }
  setSync("동기화 중…");
  const url = `https://api.github.com/repos/${repo}/contents/data/feedback.json`;
  const hdr = {Authorization:`Bearer ${GH.token}`, Accept:"application/vnd.github+json"};
  try{
    let sha = undefined, remote = {};
    const g = await fetch(url, {headers:hdr});
    if(g.status===200){ const j = await g.json(); sha=j.sha;
      try{ remote = JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,""))))); }catch(e){} }
    const merged = Object.assign({}, remote, FB);   // 로컬 우선
    const body = { message:"update feedback", content: btoa(unescape(encodeURIComponent(JSON.stringify(merged,null,2)))) };
    if(sha) body.sha = sha;
    const p = await fetch(url, {method:"PUT", headers:hdr, body:JSON.stringify(body)});
    setSync(p.ok ? "동기화됨 ✓" : "동기화 실패("+p.status+")");
  }catch(e){ setSync("동기화 오류"); }
}
let pushTimer=null;
function schedulexPush(){ if(!GH.token) return; clearTimeout(pushTimer); pushTimer=setTimeout(pushGitHub, 1500); }

function setVote(id,v){ const b=baseId(id); const e=FB[b]||{}; e.vote=(e.vote===v?null:v); e.ts=new Date().toISOString(); FB[b]=e; saveLocal(); schedulexPush(); apply(); }
function setFav(id){ const b=baseId(id); const e=FB[b]||{}; e.fav=!e.fav; e.ts=new Date().toISOString(); FB[b]=e; saveLocal(); schedulexPush(); apply(); }

function edge(rel,source){ if(source==="explore")return "var(--explore)"; if(rel>=8)return "var(--accent)"; if(rel>=5)return "#8B82DE"; return "var(--muted)"; }
function fmtDate(iso){ return (iso||"").slice(0,10); }

function card(r){
  const b=baseId(r.id), fb=FB[b]||{};
  const ed=edge(r.relevance,r.source);
  const tag=r.source==="explore"?'<span class="tag">탐색 발견</span>':"";
  const authors=(r.authors||[]).slice(0,6).join(", ")+((r.authors||[]).length>6?" 외":"");
  const journal=r.journal_ref?`<span class="dot">·</span>${esc(r.journal_ref)}`:"";
  const probName=r.problem_name?`<span class="prob">${esc(r.problem_name)}</span><span class="dot">·</span>`:"";
  const tech=r.technique?`<div class="field"><b>기법</b>${esc(r.technique)}</div>`:"";
  const conn=r.connections?`<div class="field conn"><b>연결</b>${esc(r.connections)}</div>`:"";
  const chips=(r.keyword_hits||[]).map(k=>`<span class="chip">${esc(k)}</span>`).join("");
  const abs=r.abstract?`<button class="togg" data-abs="${esc(r.id)}">초록 보기 ▾</button><div class="abstract" id="abs-${esc(r.id)}">${esc(r.abstract)}</div>`:"";
  return `<article class="card" style="--edge:${ed}">
    <div class="ledger"><div class="score">${r.relevance}<small>/10</small></div></div>
    <div class="body">
      <h2 class="title"><a href="${esc(r.abs_url)}" target="_blank" rel="noopener">${esc(r.title)}</a>${tag}</h2>
      <div class="meta">${probName}${esc(authors)}<span class="dot">·</span>${esc((r.categories||[]).join(", "))}${journal}<span class="dot">·</span>${fmtDate(r.published)}</div>
      ${r.relevance_reason?`<div class="reason">${esc(r.relevance_reason)}</div>`:""}
      <div class="summary">${esc(r.summary)}</div>
      ${tech}${conn}${chips?`<div class="chips">${chips}</div>`:""}
      <div class="actions">
        <button class="act ${fb.fav?'on-fav':''}" data-fav="${esc(r.id)}">⭐ 즐겨찾기</button>
        <button class="act ${fb.vote==='up'?'on-up':''}" data-vote="up" data-id="${esc(r.id)}">👍</button>
        <button class="act ${fb.vote==='down'?'on-down':''}" data-vote="down" data-id="${esc(r.id)}">👎</button>
        <span class="links"><span class="id">${esc(r.id)}</span><a href="${esc(r.abs_url)}" target="_blank" rel="noopener">abs ↗</a><a href="${esc(r.pdf_url)}" target="_blank" rel="noopener">pdf ↗</a></span>
      </div>
      ${abs}
    </div></article>`;
}

function apply(){
  let rows=DATA.slice();
  if(state.problem) rows=rows.filter(r=>r.problem_id===state.problem);
  if(state.exp) rows=rows.filter(r=>r.source==="explore");
  if(state.fav) rows=rows.filter(r=>(FB[baseId(r.id)]||{}).fav);
  if(state.hideDown) rows=rows.filter(r=>(FB[baseId(r.id)]||{}).vote!=="down");
  rows=rows.filter(r=>(r.relevance||0)>=state.thr);
  if(state.q){ const q=state.q.toLowerCase(); rows=rows.filter(r=>(r.title+" "+r.summary+" "+(r.abstract||"")).toLowerCase().includes(q)); }
  const favRank=r=>(FB[baseId(r.id)]||{}).fav?1:0;
  rows.sort((a,b)=>{
    if(state.sort==="fav"){ const f=favRank(b)-favRank(a); if(f)return f; }
    if(state.sort==="date") return (b.published||"").localeCompare(a.published||"");
    return (b.relevance-a.relevance)||(b.published||"").localeCompare(a.published||"");
  });
  const list=document.getElementById("list");
  document.getElementById("count").textContent=`${rows.length}편 표시`;
  if(!rows.length){ list.innerHTML=`<div class="empty">조건에 맞는 논문이 없습니다.</div>`; return; }
  list.innerHTML=rows.map(card).join("");
  if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([list]);
}

// 컨트롤 연결
document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value;apply();});
document.getElementById("sort").addEventListener("change",e=>{state.sort=e.target.value;apply();});
const probSel=document.getElementById("prob");
PROBLEMS.forEach(p=>{const o=document.createElement("option");o.value=p.id;o.textContent=p.name;probSel.appendChild(o);});
probSel.addEventListener("change",e=>{state.problem=e.target.value;apply();});
const thr=document.getElementById("thr"),thrv=document.getElementById("thrv");
thr.addEventListener("input",e=>{state.thr=+e.target.value;thrv.textContent=e.target.value;apply();});
function seg(id,key){const el=document.getElementById(id);el.addEventListener("click",()=>{state[key]=!state[key];el.setAttribute("aria-pressed",String(state[key]));apply();});}
const fAll=document.getElementById("fAll"),fFav=document.getElementById("fFav"),fExp=document.getElementById("fExp");
fAll.addEventListener("click",()=>{state.fav=false;state.exp=false;fAll.setAttribute("aria-pressed","true");fFav.setAttribute("aria-pressed","false");fExp.setAttribute("aria-pressed","false");apply();});
fFav.addEventListener("click",()=>{state.fav=true;state.exp=false;fFav.setAttribute("aria-pressed","true");fAll.setAttribute("aria-pressed","false");fExp.setAttribute("aria-pressed","false");apply();});
fExp.addEventListener("click",()=>{state.exp=true;state.fav=false;fExp.setAttribute("aria-pressed","true");fAll.setAttribute("aria-pressed","false");fFav.setAttribute("aria-pressed","false");apply();});
seg("hideDown","hideDown");

document.getElementById("list").addEventListener("click",e=>{
  const t=e.target.closest("[data-abs],[data-fav],[data-vote]"); if(!t)return;
  if(t.dataset.abs!==undefined){const el=document.getElementById("abs-"+t.dataset.abs);const o=el.classList.toggle("open");t.textContent=o?"초록 숨기기 ▴":"초록 보기 ▾";return;}
  if(t.dataset.fav!==undefined){ setFav(t.dataset.fav); return; }
  if(t.dataset.vote!==undefined){ setVote(t.dataset.id, t.dataset.vote); return; }
});

// 설정 패널
const panel=document.getElementById("panel");
document.getElementById("gear").addEventListener("click",()=>panel.classList.toggle("open"));
document.getElementById("ghRepo").value=GH.repo||"";
document.getElementById("ghToken").value=GH.token||"";
document.getElementById("ghSave").addEventListener("click",async()=>{
  GH.repo=document.getElementById("ghRepo").value.trim();
  GH.token=document.getElementById("ghToken").value.trim();
  localStorage.setItem("ra_gh",JSON.stringify(GH));
  document.getElementById("ghStatus").textContent="저장됨. 동기화 시도…";
  await pushGitHub();
  document.getElementById("ghStatus").textContent=document.getElementById("sync").textContent;
});
setSync(GH.token?("동기화 "+(autoRepo()||"미설정")):"로컬 저장");
apply();
</script>
