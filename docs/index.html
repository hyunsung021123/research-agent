negative graphon과 bounded kernel에 응용한다.", "technique": "Perron-biased tensor regularization theorem과 spectral radius 검출을 통한 exponential scale에서의 spectral transfer.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.30538v1", "title": "Measure-valued valuations on star bodies", "authors": ["Jorge S. Ibáñez-Marcos", "Monika Ludwig", "Pedro Tradacete", "Ignacio Villanueva"], "abstract": "A complete classification of weak$^*$~continuous, measure-valued valuations is established on star bodies in $\\R^n$. Consequences are an integral representation of rotation equivariant, measure-valued valuations and a characterization of dual area measures.", "categories": ["math.MG"], "primary_category": "math.MG", "published": "2026-06-29T16:38:00+00:00", "updated": "2026-06-29T16:38:00+00:00", "abs_url": "http://arxiv.org/abs/2606.30538v1", "pdf_url": "https://arxiv.org/pdf/2606.30538v1", "journal_ref": "", "doi": "", "comment": "34 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "별체(star bodies)의 측도값 부가성(valuations) 분류는 McMullen의 문제(일반위치 점 배치, 볼록 조합론)와 직접 관련이 없음.", "summary": "Star bodies 상에서 약*연속 측도값 부가성(measure-valued valuations)의 완전한 분류를 제시한다. 회전 동변(rotation equivariant) 측도값 부가성의 적분 표현과 이중 넓이 측도(dual area measures)의 특성화를 도출한다.", "technique": "약*위상(weak* topology)에서의 부가성 분류 및 적분 표현 기법", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.03167v1", "title": "Euler Constraints and the Cubic Criticality of Complete Bipartite Preference Structures", "authors": ["Yoshiteru Ishida"], "abstract": "We introduce a polyhedral realizability problem for complete bipartite preference structures, the two-sided strict preference profiles that underlie the stable marriage problem. Given two parts M and W of size k, a strong polyhedral realization asks for a bipartite polyhedral graph with bipartition classes of size k in which every vertex is adjacent to all but one vertex on the opposite side. This condition attempts to represent complete opposite-side preference capacity by direct polyhedral adjacency, with one geometrically exceptional opposite-side vertex for each agent. We prove an Euler-type criticality theorem: such a strong polyhedral realization exists if and only if k=4, and in that case the underlying graph is the cube graph Q_3, equivalently K_{4,4} minus a perfect matching. The proof is the collision of the strong edge requirement E=k(k-1) with the bipartite planar bound E<=4k-4 and the minimum-degree constraint for polyhedral graphs. We then distinguish weak realizations. A family of (k-1)-gonal trapezohedra gives balanced bipartite polyhedral graphs with 2k vertices and 4k-4 edges for all k>=4, showing that weak maximal realizability persists beyond the cubic critical case. However, the Euler interval 3k<=E<=4k-4 is not fully realizable: we give a direct proof that no bipartite polyhedral graph exists with V=10 and E=15, equivalently that there is no even triangulation of the sphere on seven vertices. Finally, in the cube case, we show that cube-distance compatibility of a size-four preference profile is equivalent to the existence of a perfect matching of mutually last-ranked pairs. This gives a first preference-theoretic manifestation of the cubic criticality.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-03T10:09:35+00:00", "updated": "2026-07-03T10:09:35+00:00", "abs_url": "http://arxiv.org/abs/2607.03167v1", "pdf_url": "https://arxiv.org/pdf/2607.03167v1", "journal_ref": "", "doi": "", "comment": "8 pages; comments welcome", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 안정 결혼 문제(stable marriage problem)의 이분 선호 구조에 대한 다면체 실현 가능성을 다루며, McMullen 문제나 Larman 추측과는 직접적인 연관이 없다.", "summary": "완전 이분 선호 구조(complete bipartite preference structure)에 대한 다면체 실현 가능성 문제를 도입하고, 강한 다면체 실현(strong polyhedral realization)이 $k=4$일 때만 존재하며 이 경우 기저 그래프가 큐브 그래프 $Q_3$임을 증명한다. 증명은 강한 간선 조건 $E=k(k-1)$, 이분 평면 경계 $E\\leq 4k-4$, 다면체 그래프의 최소 차수 제약의 충돌에 기반한다. 또한 $V=10$, $E=15$인 이분 다면체 그래프가 존재하지 않음을 직접 증명하고, 큐브 경우에서 크기-4 선호 프로파일의 큐브-거리 호환성과 완전 매칭의 동치를 보인다.", "technique": "오일러 공식(Euler formula)과 이분 평면 그래프의 간선 경계를 이용한 조합론적 충돌 논증(combinatorial collision argument).", "connections": "", "keyword_hits": ["realizab", "triangulation"], "source": "filter"}, {"id": "2607.04859v1", "title": "Euclidean $\\vee$-systems and real PK arrangements", "authors": ["Martin de Borbon", "Dmitri Panov", "Alexander P. Veselov"], "abstract": "We establish a correspondence between two structures arising in the geometry of hyperplane arrangements: Euclidean $\\vee$-systems and real polyhedral Kähler (PK) arrangements. We prove that every irreducible Euclidean $\\vee$-system determines a real PK arrangement, and conversely that every real PK arrangement arises this way. As a result, we show that the moduli space of Euclidean $\\vee$-systems in a fixed projective class is homeomorphic to the relative interior of a polytope. We also give a direct proof that the hyperplane arrangement associated with a Euclidean $\\vee$-system is simplicial. Among the currently known simplicial line arrangements, we identify precisely those that arise from $\\vee$-systems. As a consequence, we prove that the Schreiber--Veselov catalog is complete for irreducible rank-three Euclidean $\\vee$-systems with at most $27$ vectors.", "categories": ["math.DG", "math-ph", "math.CO"], "primary_category": "math.DG", "published": "2026-07-06T09:32:44+00:00", "updated": "2026-07-06T09:32:44+00:00", "abs_url": "http://arxiv.org/abs/2607.04859v1", "pdf_url": "https://arxiv.org/pdf/2607.04859v1", "journal_ref": "", "doi": "", "comment": "28 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 유클리드 $\\vee$-시스템과 실수 폴리헤드럴 케일러 배열 사이의 대응을 다루며, McMullen 문제나 Larman 추측과 직접적인 관련이 없다.", "summary": "이 논문은 유클리드 $\\vee$-시스템과 실수 폴리헤드럴 케일러(PK) 배열이 일대일 대응함을 증명한다. 그 결과로 고정된 사영 류(projective class) 내 유클리드 $\\vee$-시스템의 모듈라이 공간이 어떤 폴리토프의 상대 내부(relative interior)와 위상동형임을 보이고, $\\vee$-시스템으로부터 유래하는 단순(simplicial) 선 배열을 정확히 분류한다. 이를 통해 최대 27개의 벡터를 갖는 기약 랭크-3 유클리드 $\\vee$-시스템에 대해 Schreiber--Veselov 목록이 완전함을 증명한다.", "technique": "초평면 배열의 단순성(simpliciality) 직접 증명 및 실수 PK 배열과 $\\vee$-시스템 사이의 대응 구성.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2607.04687v1", "title": "Hamilton paths and cycles in flip graphs of (almost-)perfect matchings", "authors": ["Sofia Brenner", "Justin Dallant", "Linda Kleist", "Robert Lauff", "Torsten Mütze"], "abstract": "We consider the set of matchings of a graph and a local change operation, called a flip, between them. In the combinatorial setting, the base graphs are either complete graphs or complete bipartite graphs, and in the geometric setting, the graphs are embedded on point sets in the plane, with the requirement that edges must be drawn as straight lines and must not cross. For base graphs with an even number of vertices, we consider perfect matchings, i.e., all vertices are matched, and for base graphs with an odd number of vertices, we consider almost-perfect matchings, i.e., all but one vertex of the graph are matched. A 2-flip between two perfect matchings exchanges two edges, and a 1-flip between two almost-perfect matchings exchanges one edge. The corresponding flip graph has the set of perfect or almost-perfect matchings as vertices, with pairs of them connected by an edge if they differ in a 2-flip or 1-flip, respectively. In this work, we provide a comprehensive picture of Hamiltonicity properties of these flip graphs. We prove that the flip graphs in the combinatorial setting are Hamilton-connected, i.e., they admit a Hamilton path between any two vertices, or, if the flip graphs are bipartite, we prove that they are Hamilton-laceable, i.e., they admit a Hamilton path between any two vertices from different partition classes. In the geometric setting, we prove that any path in them misses exponentially many vertices, in particular, they have no Hamilton paths or cycles. For points in convex position and almost-perfect matchings under 1-flips, we complement this by constructing a cycle in the flip graph that visits almost all vertices.", "categories": ["math.CO", "cs.DM"], "primary_category": "math.CO", "published": "2026-07-06T05:25:36+00:00", "updated": "2026-07-06T05:25:36+00:00", "abs_url": "http://arxiv.org/abs/2607.04687v1", "pdf_url": "https://arxiv.org/pdf/2607.04687v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 매칭의 플립 그래프에서 해밀턴 경로/순환 문제를 다루며, McMullen 문제(d=5)나 Larman 추측과 직접적인 관련이 없다.", "summary": "이 논문은 완전 그래프 또는 완전 이분 그래프(조합론적 설정)와 평면 점 집합 위의 직선 매칭(기하학적 설정)에서 완전 매칭 및 거의 완전 매칭의 플립 그래프에 대한 해밀턴성을 종합적으로 분석한다. 조합론적 설정에서는 플립 그래프가 Hamilton-connected 또는(이분 그래프인 경우) Hamilton-laceable임을 증명하고, 기하학적 설정에서는 어떤 경로도 지수적으로 많은 꼭짓점을 건너뜀을 증명하여 해밀턴 경로/순환이 존재하지 않음을 보인다. 볼록 위치 점 집합에서 1-플립 거의 완전 매칭의 경우에는 거의 모든 꼭짓점을 방문하는 순환을 구성하였다.", "technique": "조합론적 설정에서 Hamilton-connectivity/laceability를 귀납적으로 증명하고, 기하학적 설정에서 지수적 하한을 통해 해밀턴 경로의 부재를 보인다.", "connections": "", "keyword_hits": ["convex position"], "source": "filter"}, {"id": "2607.03618v1", "title": "A Combinatorial Proof for Partitions of Pythagorean Triples Into Three Parts", "authors": ["Ivan V. Morozov"], "abstract": "Any Pythagorean triple $\\{a,b,c\\}$ such that $a^{2}+b^{2}=c^{2}$ satisfies an elegant relation between its partitions into three parts, namely $p(a,3)+p(b,3)=p(c,3)$. While this property follows from elementary analytic methods, we give the first combinatorial proof of this relation.", "categories": ["math.CO", "math.NT"], "primary_category": "math.CO", "published": "2026-07-03T22:25:48+00:00", "updated": "2026-07-03T22:25:48+00:00", "abs_url": "http://arxiv.org/abs/2607.03618v1", "pdf_url": "https://arxiv.org/pdf/2607.03618v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "피타고라스 수의 분할 조합론은 McMullen 문제의 convex position, oriented matroid, 실현성(realizability) 등과 직접 관련이 없음.", "summary": "피타고라스 수 $\\{a,b,c\\}$ (단, $a^2+b^2=c^2$)에 대해 3-부분 분할 함수 $p(\\cdot,3)$ 사이의 관계식 $p(a,3)+p(b,3)=p(c,3)$를 처음으로 조합론적으로 증명한다. 이 성질은 기존에 해석적 방법으로만 알려졌다.", "technique": "정수 분할의 조합론적 쌍대(combinatorial bijection) 또는 생성함수 항등식의 조합론적 해석", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.01761v1", "title": "Spherical Designs with Infinite Harmonic Strength", "authors": ["Ryutaro Misawa", "Yusaku Nishimura"], "abstract": "In this paper, we study the existence problem for spherical \\(T\\)-designs on the \\(d\\)-dimensional sphere, where \\(T\\) is an infinite subset of \\(\\mathbb N\\). We show that, if \\(d\\ge 2\\), then a finite subset of \\(S^d\\) has infinite harmonic strength if and only if it is antipodal. For \\(d=1\\), we show that infinite strength spherical designs are exactly cyclotomic designs, and we characterize their existence in terms of certain \\(0\\)-\\(1\\) polynomials. We also prove that the harmonic strength of every infinite strength spherical design has the weak GCD property. Finally, for a given infinite subset \\(T\\subset \\mathbb N\\) with the weak GCD property, we give a finite procedure to decide whether there exists \\(X\\subset S^1\\) such that \\(\\operatorname{Hst}(X)=T\\), and apply this criterion to concrete existence and non-existence examples.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-02T06:23:51+00:00", "updated": "2026-07-02T06:23:51+00:00", "abs_url": "http://arxiv.org/abs/2607.01761v1", "pdf_url": "https://arxiv.org/pdf/2607.01761v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "구면 설계(spherical designs)는 조합기하학 주제이지만, McMullen's problem의 convex position, general position, oriented matroid 등 핵심 도구와 직접 연결되지 않음.", "summary": "본 논문은 $d$차원 구면 $S^d$의 구면 $T$-설계 존재 문제를 다룬다. $d\\ge 2$일 때, 유한 부분집합이 무한 조화 강도(infinite harmonic strength)를 가지려면 필요충분조건이 antipodal인 것을 보이고, $d=1$에서는 무한 강도 설계가 cyclotomic 설계와 정확히 일치함을 보인다. 또한 약한 GCD 성질(weak GCD property)을 만족하는 무한 부분집합 $T$에 대해 $\\operatorname{Hst}(X)=T$인 $X\\subset S^1$의 존재성을 판정하는 유한 절차를 제공한다.", "technique": "조화 해석과 원분 설계(cyclotomic designs)의 특성화, 다항식 $0$-$1$ 판정법.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.03243v1", "title": "On Ramsey-type problems for paths and cycles with few colour changes", "authors": ["Peter Allen", "Julia Böttcher", "Dennis Clemens", "Fabian Hamann", "Jozef Skokan", "Anusch Taraz"], "abstract": "In 1967, Gerencser and Gyárfás determined the exact values of the two-colour Ramsey numbers of paths. In a footnote, they made the following observation: Every $2$-edge-coloured complete graph contains a Hamilton path with at most one colour change. Later, this led to a challenging and still wide open conjecture about covering edge-coloured complete graphs with monochromatic paths. Inspired by the original statement, we study paths and cycles with few colour changes in $3$-edge-coloured complete graphs. For this, we introduce a new Ramsey-type parameter: For $q,k \\in \\mathbb{N}$ and a graph $G$, let $R_q^k(G)$ denote the smallest $N \\in \\mathbb{N}$ such that every $q$-edge-coloured complete graph on $N$ vertices contains a copy of $G$ with at most $k$ vertices that are incident to edges in $G$ of different colours. For paths, we show that $R_3^1(P_n) = \\frac{3n}{2} + O(1)$, and for even cycles, we show that $R_3^2(C_n) = \\frac{3n}{2} + o(n)$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-03T11:56:55+00:00", "updated": "2026-07-03T11:56:55+00:00", "abs_url": "http://arxiv.org/abs/2607.03243v1", "pdf_url": "https://arxiv.org/pdf/2607.03243v1", "journal_ref": "", "doi": "", "comment": "20 pages, 1 figure", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "This paper studies Ramsey-type problems for edge-coloured complete graphs, which is fundamentally a combinatorial extremal graph theory problem unrelated to McMullen's convex polytope problem or oriented matroid realizability.", "summary": "The paper studies paths and cycles with few colour changes in multi-edge-coloured complete graphs, introducing a Ramsey parameter $R_q^k(G)$ that measures the minimum $N$ such that every $q$-edge-coloured complete graph on $N$ vertices contains $G$ with at most $k$ vertices incident to edges of different colours. Main results establish $R_3^1(P_n) = \\frac{3n}{2} + O(1)$ for paths and $R_3^2(C_n) = \\frac{3n}{2} + o(n)$ for even cycles.", "technique": "초록만으로는 불확실", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.03479v1", "title": "The multilinear forms Cayley graph and the eigenvalue method for tensor codes", "authors": ["Eimear Byrne", "Lucien François"], "abstract": "The connections between graph theory, and more generally association schemes, and coding theory were established by Delsarte for the Hamming metric and rank-metric codes. The ambient metric space of Hamming-metric codes and rank-metric codes can be seen as Cayley graphs generated by words of weight one. The metrics considered then coincide with the geodesic distances of these distance-regular graphs. We focus on a generalisation of this framework to the space of tensors over a finite field, endowed with the tensor-rank as a metric. This space corresponds to the Cayley graph generated by rank-one tensors, which is not distance-regular for tensors of order at least 3. We show that the spectrum of this graph has a recursive expression and depends on the possible intersections between tensor subspaces of large enough dimension and the Segre variety. The spectrum of this graph for 3-order tensors can be expressed with the rank distribution of the rank-metric codes generated by these tensors. In particular, we obtain the complete spectrum of the graph for 2x3x3 tensors over any finite field. We apply this result to derive bounds on the dimension of tensor codes in the tensor-rank metric using the eigenvalue method, and in particular the ratio-type bound.", "categories": ["math.CO", "cs.IT"], "primary_category": "math.CO", "published": "2026-07-03T16:47:17+00:00", "updated": "2026-07-03T16:47:17+00:00", "abs_url": "http://arxiv.org/abs/2607.03479v1", "pdf_url": "https://arxiv.org/pdf/2607.03479v1", "journal_ref": "", "doi": "", "comment": "42 pages, 6 tables, preprint of article submitted to SIDMA SIAM", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "본 논문은 tensor codes와 Cayley graph의 spectral 분석에 초점을 두고 있으며, McMullen's problem의 핵심인 convex position, oriented matroid, 또는 고차 combinatorial geometry와 직접적인 관련이 없음.", "summary": "유한체 위의 tensor 공간에서 tensor-rank metric에 대한 Cayley graph 구조를 분석하고, 이 graph의 spectrum을 구한다. 특히 3-order tensor의 경우 spectrum이 rank-metric code의 rank distribution과 관련되며, 2×3×3 tensor에 대해 완전한 spectrum을 결정하고 eigenvalue method를 이용한 tensor code의 bound를 도출한다.", "technique": "Cayley graph의 spectral 분석, association scheme과 coding theory의 연결, Segre variety와 tensor subspace의 교집합 성질 활용", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.02973v1", "title": "Finite groups with quadratic splitting fields for all Cayley graphs", "authors": ["Majid Arezoomand", "Alireza Abdollahi", "Tao Feng", "Zeinab Akhlaghi"], "abstract": "For a graph $Γ$, the splitting field of $Γ$ is defined as the splitting field of the characteristic polynomial of $Γ$ over rationals. The algebraic degree of $Γ$ is defined by the extension degree of its splitting field over rationals. Let $k$ be a positive integer. We call a finite group $G$ \\textit{Cayley $k$-integral} if, for every inverse-closed subset $S$ of $G$, the algebraic degree of the Cayley graph $\\Cay(G,S)$ does not exceed $k$. We give a complete classification of all finite Cayley $2$-integral groups. It is shown that a finite abelian group is Cayley $2$-integral if and only if it is isomorphic to one of the following forms: $G \\cong \\mathbb{Z}_2^r \\times \\mathbb{Z}_5^s$, $\\mathbb{Z}_2^r \\times \\mathbb{Z}_4^s \\times \\mathbb{Z}_8^t$, or $\\mathbb{Z}_2^r \\times \\mathbb{Z}_3^s \\times \\mathbb{Z}_{12}^t$, where $r, s, t \\geq 0$. Furthermore, we prove that the set of finite non-abelian Cayley $2$-integral groups consists of the infinite family $Q_8 \\times \\mathbb{Z}_2^n$, with $n \\geq 0$, and $22$ specific groups.", "categories": ["math.CO", "math.GR"], "primary_category": "math.CO", "published": "2026-07-03T05:29:38+00:00", "updated": "2026-07-03T05:29:38+00:00", "abs_url": "http://arxiv.org/abs/2607.02973v1", "pdf_url": "https://arxiv.org/pdf/2607.02973v1", "journal_ref": "", "doi": "", "comment": "22 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Cayley 그래프의 대수적 성질을 다루지만, McMullen의 문제(convex polytope의 f-vector)와는 직접적 연관이 없음.", "summary": "유한군의 Cayley 그래프가 모두 quadratic splitting field를 갖는 경우를 완전히 분류한 논문. 아벨군의 경우는 $\\mathbb{Z}_2^r \\times \\mathbb{Z}_5^s$ 등 명시적 형태로, 비아벨군의 경우는 $Q_8 \\times \\mathbb{Z}_2^n$ 무한족과 22개의 특정 군으로 특성화됨.", "technique": "characteristic polynomial의 splitting field 분석 및 역원-폐집합(inverse-closed subset)에 대한 Cayley 그래프의 대수적 차수 제어.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.02589v1", "title": "Thresholds for the Frankl-Wang $3/7$ conjecture on maximum-degree ratios", "authors": ["Zejun Huang", "Zhiyi Liu", "Lu Lu", "Tingzeng Wu"], "abstract": "Let $\\mathcal{F}\\subset\\binom{[n]}{k}$ be an intersecting family, $Δ(\\mathcal{F})=\\max_{x\\in[n]}|\\{F\\in\\mathcal{F}:x\\in F\\}|$, and $\\varrho(\\mathcal{F})=Δ(\\mathcal{F})/|\\mathcal{F}|$. Frankl and Wang conjectured that if $n>100k$ and $|\\mathcal{F}|>\\binom{n-3}{k-3}$, then $\\varrho(\\mathcal{F})\\ge 3/7$; the constant $3/7$ is sharp because of the Fano-plane construction. In this note we obtain three results. First, we show that no linear threshold $n>Ck$ can be sufficient: using a truncated Fano-plane construction we exhibit, for every constant $C$ and all large $k$, an intersecting family with $n>Ck$, $|\\mathcal{F}|>\\binom{n-3}{k-3}$, yet $\\varrho(\\mathcal{F})<3/7$. In particular, the original condition $n>100k$ does not guarantee the conclusion. Second, for $k=3$ we prove that $\\varrho(\\mathcal{F})\\ge 3/7$ holds for every nonempty intersecting $3$-uniform family; the proof is nontrivial and does not rely on any assumption on $n$ or $|\\mathcal{F}|$. Third, using the classical pseudo-sunflower bound $|\\mathcal{F}|\\le t^k$ (for families containing no pseudo-sunflower of size $t+1$), we obtain a completely explicit polynomial threshold for all $k\\ge4$: if $n>(k-3)(7k^4+k)+3$ and $|\\mathcal{F}|>\\binom{n-3}{k-3}$, then $\\varrho(\\mathcal{F})\\ge 3/7$. In particular, the simplified bound $n>7k^5$ is sufficient for every $k\\ge4$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-01T06:55:18+00:00", "updated": "2026-07-01T06:55:18+00:00", "abs_url": "http://arxiv.org/abs/2607.02589v1", "pdf_url": "https://arxiv.org/pdf/2607.02589v1", "journal_ref": "", "doi": "", "comment": "10pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Intersecting families and extremal combinatorics on set systems, but no direct connection to McMullen's problem on convex position, oriented matroids, or point configurations in $d=5$ dimension.", "summary": "논문은 Frankl-Wang 추측에서 최대차수비율(maximum-degree ratio) $\\varrho(\\mathcal{F})\\ge 3/7$의 임계조건을 연구한다. 저자들은 선형 임계값 $n>Ck$가 충분하지 않음을 보이고, $k=3$일 때 조건 없이 항상 부등식이 성립함을 증명하며, $k\\ge 4$에 대해 명시적 다항식 임계값을 제시한다.", "technique": "Truncated Fano-plane 구성과 pseudo-sunflower 경계를 활용한 조합론적 임계값 분석.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.06228v1", "title": "Symmetric Powers of Matroids", "authors": ["Bill Jackson", "Shin-ichi Tanigawa"], "abstract": "The study of matroid products has become an active area of research, owing to their connections with tropical ideals and linear representability. In this paper, we study matroidal abstractions of the multilinearity of symmetric powers of vector spaces, using a duality between symmetric powers of matroids and abstract rigidity. These observations allow us to solve Mason's conjecture concerning the equivalence of two definitions of a symmetric power of a matroid. We show that Mason's conjecture holds for second symmetric powers of matroids whereas it fails for third symmetric powers.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-07T12:52:19+00:00", "updated": "2026-07-07T12:52:19+00:00", "abs_url": "http://arxiv.org/abs/2607.06228v1", "pdf_url": "https://arxiv.org/pdf/2607.06228v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 matroid의 대칭 거듭제곱(symmetric powers)과 Mason 추측에 관한 것으로, McMullen 문제나 oriented matroid의 acyclic reorientation과 직접적인 관련이 없다.", "summary": "이 논문은 벡터 공간의 대칭 거듭제곱의 다중선형성(multilinearity)을 matroid로 추상화하는 '대칭 거듭제곱 matroid'를 연구한다. matroid의 대칭 거듭제곱에 관한 두 정의의 동치성에 대한 Mason 추측을 다루며, 2차 대칭 거듭제곱에서는 Mason 추측이 성립하지만 3차에서는 반례가 존재함을 증명한다.", "technique": "matroid의 대칭 거듭제곱과 추상 강성(abstract rigidity) 사이의 쌍대성(duality)을 활용하여 Mason 추측을 해결한다.", "connections": "추측: matroid 곱(matroid products)과 열대 이상(tropical ideals)과의 연결은 oriented matroid의 실현가능성(realizability) 문제와 간접적으로 관련될 수 있으나 초록에서 직접적 연결은 확인되지 않는다.", "keyword_hits": ["tropical"], "source": "filter"}, {"id": "2607.05835v1", "title": "Tangent classes of matroids and wonderful compactifications", "authors": ["Ronnie Cheng", "Shurui Liu", "Guoxiong Gao"], "abstract": "For every loopless matroid $M$ and every Feichtner--Yuzvinsky building set $\\mathcal{G}$ containing the top flat, we construct an integral tangent class $T_{M,\\mathcal{G}}^{\\mathbb{Z}}\\in K_{\\mathbb{Z}}(M,\\mathcal{G})$; in the realizable case it specializes to the class of the tangent bundle of the corresponding wonderful compactification, it recovers the Hilbert series of the Chow ring through Hirzebruch--Riemann--Roch, and it satisfies the expected Chern-alpha lower bounds. This reproduces the tangent class and its key properties studied by the first author in arXiv:2606.22650. The main body of this paper was produced autonomously, without human mathematical guidance, by Danus, an AI mathematical reasoning agent. Danus solved the problem before arXiv:2606.22650 was publicly available, demonstrating the potential of AI agents in mathematical research. We reproduce its output faithfully, adding only editorial comments; the experiment is documented in Appendix B.", "categories": ["math.AG", "cs.AI", "math.CO"], "primary_category": "math.AG", "published": "2026-07-07T04:56:22+00:00", "updated": "2026-07-07T04:56:22+00:00", "abs_url": "http://arxiv.org/abs/2607.05835v1", "pdf_url": "https://arxiv.org/pdf/2607.05835v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 matroid의 tangent class와 wonderful compactification에 관한 대수기하학적 연구로, McMullen 문제(볼록 위치 점 배치, oriented matroid의 reorientation)와 직접적인 관련이 없다.", "summary": "루프 없는 matroid $M$과 Feichtner--Yuzvinsky building set $\\mathcal{G}$에 대해 정수 tangent class $T_{M,\\mathcal{G}}^{\\mathbb{Z}}\\in K_{\\mathbb{Z}}(M,\\mathcal{G})$를 구성하며, 실현 가능한 경우 대응하는 wonderful compactification의 접선 다발 클래스로 특수화된다. 이 클래스는 Hirzebruch--Riemann--Roch를 통해 Chow ring의 Hilbert series를 복원하고 Chern-alpha 하한을 만족한다. 이 논문의 본문은 AI 수학 추론 에이전트 Danus에 의해 자율적으로 생성되었으며, arXiv:2606.22650이 공개되기 전에 해당 결과를 도출했다고 주장한다.", "technique": "Feichtner--Yuzvinsky building set을 이용한 matroid의 $K$-이론적 tangent class 구성 및 Hirzebruch--Riemann--Roch 적용.", "connections": "", "keyword_hits": ["realizab"], "source": "filter"}, {"id": "2607.04023v1", "title": "Termination of Binary Trust-Gossip Dynamics: A Constructive No-Limit-Cycles Theorem", "authors": ["Nicholas Boichuk"], "abstract": "In the binary trust-gossip dynamics, $n$ agents each hold a directed binary opinion, trust or distrust, of every other agent, and a gossip step lets one agent copy another agent's opinion of a third whenever the copier trusts the source. We prove that under any fair schedule of such steps, every trajectory reaches an absorbing state in finitely many steps, one in which no gossip step changes any opinion; in particular, there are no limit cycles. The proof is constructive and rests on a single descent measure: the number of ordered pairs of distinct agents linked by a chain of trust. Trust-adding gossip leaves this count unchanged and trust-removing gossip can only lower it, so it never rises, and it is zero only at the all-distrust state. From any non-absorbing state we exhibit a finite run of steps that reaches an absorbing state or strictly lowers the count; since the count is a non-negative integer at most $n(n-1)$, the process halts at an absorbing state.", "categories": ["math.CO", "math.DS"], "primary_category": "math.CO", "published": "2026-07-04T20:39:21+00:00", "updated": "2026-07-04T20:39:21+00:00", "abs_url": "http://arxiv.org/abs/2607.04023v1", "pdf_url": "https://arxiv.org/pdf/2607.04023v1", "journal_ref": "", "doi": "", "comment": "8 figures, 18 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이산기하학이나 볼록다면체 조합론과 무관하며, 동역학계·그래프이론 기반의 에이전트 의견동역학 수렴성 문제임.", "summary": "n개 에이전트가 서로에 대한 이진 의견(신뢰/불신뢰)을 유지하고, gossip 단계에서 신뢰 관계를 따라 의견을 복사하는 시스템에서, 모든 공정한 스케줄 하에 유한 시간 내에 흡수상태(더 이상 변화 없음)에 도달하고 극한 순환이 없음을 증명했다. 증명은 신뢰 체인으로 연결된 순서쌍의 개수를 단하강 척도로 사용한 구성적 논증이다.", "technique": "단하강 포텐셜 함수(trust-linked ordered pairs count)를 이용한 수렴성 보장; 각 gossip 단계가 이 척도를 증가시키지 않거나 순감소시킴을 보임.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.01294v1", "title": "Constructive Winning Breaker Strategies in the Maker-Breaker $C_k$-Game", "authors": ["Matthias Sowa", "Anand Srivastav"], "abstract": "Maker-Breaker subgraph games are among the most famous combinatorial games. For $n,q\\in\\mathbb{N}$ and a fixed subgraph $C$ of the complete graph $K_n$, the two players, called Maker and Breaker, alternately claim edges of $K_n$. Maker claims one unclaimed edge per round and Breaker may claim up to $q$ edges per round. If Maker is able to claim all edges of a copy of $C$, he wins the game. Otherwise Breaker wins. Bednarska and Łuczak (2000) determined in a landmark work the asymptotics of the treshold bias as $Θ(n^{1/m(C)})$ where $m(C)$ is the 2-density of $C$, analysing random strategies. Since then it has been a major open problem to determine the treshhold bias, if it exists, with corresponding strategies, leading to sharp constants in the $Θ$-notion. A famous case is the triangle game ($C=C_3$), studied by Chvatal and Erd\"os (1978), who showed Maker wins if $q\\le \\sqrt{2n}$ and Breaker wins if $q\\ge2\\sqrt{n}$. Glazik and Srivastav (2022) improved this via a potential method, showing Breaker wins already for $q\\ge\\sqrt{8/3}\\sqrt{n}$. Spencer (2019) conjectured generalizability to arbitrary subgraphs $C$. We confirm this conjecture, presenting a general winning strategy for Breaker if the potential function fullfils conditions depending on $C$. With this result we give the first constructive (polynomial-time) strategies for Breaker in the $k$-cycle Maker-Breaker game for arbitrary, but fixed $k \\geq 4$: Breaker wins if $q>\\sqrt[k-1]{(k-1)\\big(\\frac{2(k-1)}{k}\\big)^{k-2}n^{k-2}}$. By Bednarska and Łuczak (2000) our bound is asymptotically optimal. However, our constants are better than those arising from their random strategies. More recently, Sowa and Srivastav (2025) gave the first constructive Maker strategy for $C_4$. Our work may motivate study of Maker strategies for $C_k, k \\ge 5$, narrowing the gap towards the Breaker bounds presented.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-01T13:22:03+00:00", "updated": "2026-07-01T13:22:03+00:00", "abs_url": "http://arxiv.org/abs/2607.01294v1", "pdf_url": "https://arxiv.org/pdf/2607.01294v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Maker-Breaker combinatorial games on edge sets of complete graphs, with asymptotic threshold analysis; no direct connection to McMullen's problem on convex position point configurations, oriented matroids, or realizability.", "summary": "논문은 Maker-Breaker $C_k$-game(고정된 부분그래프 $C$에 대한 완전그래프 간선 게임)에서 Breaker의 구성적(다항시간) 승리 전략을 제시한다. 위치함수(potential function) 방법을 통해 $k$-사이클 게임에서 Breaker의 최적 근처 bias 한계를 도출하며, Bednarska-Łuczak의 무작위 전략보다 나은 상수를 얻는다.", "technique": "potential function method를 이용한 구성적 Breaker 전략 설계 및 경계 분석.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.04494v1", "title": "The Alon--Tarsi Number of Squares of Subcubic Planar Graphs without Cycles of Lengths $4$ to $8$", "authors": ["Seog-Jin Kim", "Xiaopan Lian", "Rong Luo"], "abstract": "The Alon--Tarsi number $AT(G)$ of a graph $G$, defined via the graph polynomial, is a strengthening of the list chromatic number $χ_{\\ell}(G)$. We study the Alon--Tarsi number of squares of planar graphs. The square of a graph $G$ is the graph obtained by joining every pair of vertices whose distance in $G$ is at most $2$. Recently, Kim and Luo (2026) proved that $χ_{\\ell}(G^2)\\le 6$ for every subcubic planar graph containing no $k$-cycles for $4\\le k\\le 8$. We strengthen this result by proving that $AT(G^2)\\le 6$ for every such graph $G$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-05T20:40:48+00:00", "updated": "2026-07-05T20:40:48+00:00", "abs_url": "http://arxiv.org/abs/2607.04494v1", "pdf_url": "https://arxiv.org/pdf/2607.04494v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "그래프 색칠수 및 리스트 색칠수 문제로, McMullen's problem의 convex position과 일반 위치 점 배치 문제와 무관함.", "summary": "본 논문은 평면 그래프의 제곱(square)에 대한 Alon–Tarsi 수를 연구한다. 특히 3-정규 이하이고 4-8 길이의 사이클을 포함하지 않는 평면 그래프 $G$에 대해 $AT(G^2) \\le 6$임을 증명하여 기존의 리스트 색칠수 결과를 강화한다.", "technique": "그래프 다항식을 통한 Alon–Tarsi 수의 정의와 리스트 색칠수의 강화, 제약된 평면 그래프 구조에 대한 색칠 논증.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.04357v1", "title": "Counting even cycles and even paths with bounded circumference", "authors": ["Xiamiao Zhao", "Yuanpei Wang"], "abstract": "For an integer $L$, write $C_{\\ge L}$ for the family of cycles of length at least $L$. For $L=2a$ let $H(n,L)=K_a+\\overline K_{n-a}$, and for $L=2a+1$ let $H(n,L)$ be obtained from $K_a+\\overline K_{n-a}$ by adding one edge inside the independent part. We prove sharp results for two even target graphs, namely even cycles $C_{2s}$ and even paths $P_{2r+1}$. For even cycles, with $s\\ge3$ and $L\\ge2s$, we have \\[   \\mathrm{ex}(n,C_{2s},C_{\\ge L+1})=C_{2s}(H(n,L)) \\] for all sufficiently large $n$. Together with the known $C_4$ case of Zhu, Győri, He, Lv, Salia and Xiao~[Bull. Lond. Math. Soc. 55 (2023)], this verifies the even-cycle case of their conjecture on $\\mathrm{ex}(n,C_k,C_{\\ge L+1})$. For even paths, with $r\\ge2$ and $L\\ge2r$, we have \\[   \\mathrm{ex}(n,P_{2r+1},C_{\\ge L+1})=N(P_{2r+1},H(n,L)) \\] for all sufficiently large $n$. We also derive the corresponding exact results when the forbidden graph is a path $P_{p+1}$, sharpening the relevant even-cycle and even-path asymptotic results of Győri, Salia, Tompkins and Zamora~[Discrete Math. Theor. Comput. Sci. 21 no. 1 (2019)].", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-05T15:25:21+00:00", "updated": "2026-07-05T15:25:21+00:00", "abs_url": "http://arxiv.org/abs/2607.04357v1", "pdf_url": "https://arxiv.org/pdf/2607.04357v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "극값 그래프 이론(extremal graph theory)의 순환 구조 계산 문제로, McMullen's problem의 기하학적 위치 제약이나 oriented matroid 구조와는 직접 관련이 없음.", "summary": "본 논문은 짝수 순환과 짝수 경로를 금지 부분그래프로 하면서 둘레 하한을 갖는 그래프의 extremal number를 연구한다. 짝수 순환 $C_{2s}$의 경우 충분히 큰 $n$에 대해 sharp bound를 얻었고, 짝수 경로 $P_{2r+1}$의 경우도 유사한 정확한 결과를 도출했다.", "technique": "금지 부분그래프 구조를 이용한 extremal graph construction과 그 optimality 증명", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.06480v1", "title": "Minimum rank of complements of Kneser graphs", "authors": ["Tao Hu", "Quanyu Tang"], "abstract": "We determine the symmetric minimum rank of the complement of the Kneser graph $\\operatorname{KG}(n,k)$ over every infinite field. More precisely, if $I(n,k)$ is the graph on the $k$-subsets of $[n]$ in which two vertices are adjacent exactly when they intersect, then $$   \\operatorname{mr}^{\\mathbb F}(I(n,k))=n-2k+2 $$ for every infinite field $\\mathbb F$ and all integers $n,k$ with $2\\le k\\le n/2$. In particular, over the real numbers, this settles a question posed in the AIM workshop open questions report on spectra of families of matrices described by graphs.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-07T16:35:03+00:00", "updated": "2026-07-07T16:35:03+00:00", "abs_url": "http://arxiv.org/abs/2607.06480v1", "pdf_url": "https://arxiv.org/pdf/2607.06480v1", "journal_ref": "", "doi": "", "comment": "7 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Kneser 그래프의 최소 랭크 결정은 조합론적 행렬 이론이며, McMullen's problem의 점 배치·일반위치·조합기하학적 구조와 직접적 연결이 없음.", "summary": "본 논문은 Kneser 그래프 KG(n,k)의 여그래프(intersection graph I(n,k))의 대칭 최소 랭크(symmetric minimum rank)를 결정한다. 모든 무한체에 대해 mr^F(I(n,k)) = n - 2k + 2임을 증명하여 AIM 워크숍의 미해결 문제를 해결한다.", "technique": "", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.00770v3", "title": "Further Results on the Maximum Number of Stars in Graphs with Forbidden Properties", "authors": ["Yuxuan Liu", "Jia-Bao Yang", "Leilei Zhang"], "abstract": "A graph $G$ is called $k$-edge-hamiltonian if every linear forest (i.e., a disjoint union of paths) with at most $k$ edges is contained in a Hamilton cycle of $G$. In 2018, Füredi, Kostochka and Luo determined the maximum number of $t$-stars in nonhamiltonian graphs, thereby extending an earlier result of Erdős. Recently, Berikkyzy, Hogenson, Kirsch and McDonald extended this line of research by determining the maximum number of $t$-stars in graphs that are not $k$-edge-hamiltonian, as well as in graphs failing to satisfy related properties such as traceability, hamiltonian-connectedness and $k$-hamiltonicity. For sufficiently large $t$, they also characterized the extremal graphs, while for smaller values of $t$, they proposed a conjecture. In this paper, we investigate this conjecture. We show that the conjecture fails at the critical value and further establish a threshold-type result describing the behavior of the extremal graphs when $t$ is close to this critical value.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-01T10:53:33+00:00", "updated": "2026-07-05T12:48:59+00:00", "abs_url": "http://arxiv.org/abs/2607.00770v3", "pdf_url": "https://arxiv.org/pdf/2607.00770v3", "journal_ref": "", "doi": "", "comment": "9 pages, comments welcome!", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "극값 그래프 문제이지만 McMullen의 문제(convex position, oriented matroid, 기하학적 배치)와 직접 관련 없음.", "summary": "본 논문은 k-edge-hamiltonian이 아닌 그래프에서 t-별(t-stars)의 최대 개수를 연구한다. 최근 제시된 추측이 임계값에서 실패함을 보이고, t가 임계값 근처일 때 극값 그래프의 행동을 기술하는 threshold-type 결과를 확립한다.", "technique": "극값 그래프론(extremal graph theory) 및 금지 부분그래프 조건 하에서의 구조적 특성화.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.01995v1", "title": "Double-scaled SYK from boundary metrics of planar maps", "authors": ["Timothy Budd"], "abstract": "The enumeration of planar maps with control on the boundary metric, i.e. the pseudometric induced on the outer face of the map by its bulk graph distance metric, is a difficult problem in general. However, we show that for a family of bipartite planar map models with special q-deformed face weights that arise in the physics context of the double-scaled Sachdev-Ye-Kitaev model (DSSYK) the enumeration admits a very simple answer. Encoding the boundary metric of a bipartite planar map by its so-called geodesic chord diagram, we prove that the weighted enumeration depends only on the crossing number of the chord diagram. At fixed perimeter, the induced law of the geodesic chord diagram in these planar map models coincides exactly with the chord diagram representation of the DSSYK model.", "categories": ["math.CO", "hep-th", "math-ph", "math.PR"], "primary_category": "math.CO", "published": "2026-07-02T10:30:00+00:00", "updated": "2026-07-02T10:30:00+00:00", "abs_url": "http://arxiv.org/abs/2607.01995v1", "pdf_url": "https://arxiv.org/pdf/2607.01995v1", "journal_ref": "", "doi": "", "comment": "28 pages, 8 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이산기하학·조합론의 고전적 문제(McMullen's problem)와 직접적 관련성 없음; 논문은 평면 그래프 열거와 물리 모형(DSSYK)에 중점.", "summary": "q-변형 면 가중치를 가진 이분 평면 그래프 모델에서 경계 거리 정보를 인코딩한 이 논문은, 가중 열거가 측지 현 다이어그램(geodesic chord diagram)의 교차수에만 의존함을 증명합니다. 고정 둘레에서 이 측지 현 다이어그램의 분포가 DSSYK 모형의 현 다이어그램 표현과 정확히 일치함을 보입니다.", "technique": "측지 현 다이어그램 인코딩과 교차수 불변량을 이용한 평면 그래프 열거 단순화.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.05152v1", "title": "Localization and metric dimension for families of highly structured digraphs", "authors": ["Robert F. Bailey", "Brittany Pittman"], "abstract": "We investigate metric dimension and the localization game for several families of directed analogues of strongly regular graphs and their generalizations, adapting a probabilistic method of Babai (1980) for bounding the size of resolving sets in undirected strongly regular graphs. We derive upper bounds on the localization number and metric dimension depending on the order of the graph and the maximum number of common out-neighbours for a pair of vertices. We consider normally regular digraphs, so-called \"ordinary graphs\", classes of Deza digraphs, divisible design digraphs, nearly doubly regular tournaments, and certain doubly regular team tournaments. In particular, for asymmetric normally regular digraphs on $n$ vertices, we show that these invariants are bounded above by $O(\\sqrt{n} \\log n)$, and improve this to $O(\\log n)$ for a class of doubly regular team tournaments.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-06T14:35:08+00:00", "updated": "2026-07-06T14:35:08+00:00", "abs_url": "http://arxiv.org/abs/2607.05152v1", "pdf_url": "https://arxiv.org/pdf/2607.05152v1", "journal_ref": "", "doi": "", "comment": "13 pages, 4 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Metric dimension과 localization game은 조합론의 분석 대상이지만, McMullen's problem(convex polytope의 f-vector)과 직접적 관련이 없음.", "summary": "본 논문은 strongly regular graph의 유향 유사체(directed analogues)들에 대해 metric dimension과 localization number를 연구한다. Babai의 확률적 방법을 적용하여 normally regular digraph, Deza digraph, divisible design digraph 등 여러 구조화된 방향그래프 족에 대한 상한을 도출하고, 특히 asymmetric normally regular digraph에서 $O(\\sqrt{n}\\log n)$, doubly regular team tournament에서 $O(\\log n)$ 상한을 증명한다.", "technique": "Babai의 확률적 방법(probabilistic method)을 directed graph 설정으로 적응하여 resolving set의 크기 상한을 유도.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27987v1", "title": "Maniplexes as a Foundation for Cross-Linked Databases of Symmetric Objects", "authors": ["Katja Berčič", "Gabe Cunningham", "Andrés David Santamaría-Galvis", "Janoš Vidali"], "abstract": "Graphs, maps on surfaces, and abstract polytopes are related combinatorial structures that tend to be studied by different communities using their own tools and databases. Maniplexes provide a unifying framework that captures all of them. A single database built around maniplexes would help researchers recognize shared structures and translate results across fields. Here we present a compact, interoperable format for storing maniplexes as edge-labeled graphs, designed with such a database in mind. As a first step, we connect two existing datasets of regular 4-maniplexes to the House of Graphs and to Potočnik's tetravalent graph censuses, using canonical forms of their flag graphs, 1-skeleton graphs, and 1-coskeleton graphs.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-26T11:34:16+00:00", "updated": "2026-06-26T11:34:16+00:00", "abs_url": "http://arxiv.org/abs/2606.27987v1", "pdf_url": "https://arxiv.org/pdf/2606.27987v1", "journal_ref": "", "doi": "", "comment": "Submitted (pre-peer-review) version. Accepted at CICM 2026; the Version of Record will appear in Springer LNAI. We'll add the DOI once the proceedings are published", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 maniplexes를 이용한 대칭 조합 구조의 데이터베이스 통합에 관한 것으로, McMullen 문제나 oriented matroid와 전혀 관련이 없다.", "summary": "이 논문은 그래프, 곡면 위의 지도(maps), 추상 다면체(abstract polytopes)를 통합하는 프레임워크로서 maniplexes를 활용하여 상호운용 가능한 데이터베이스 형식을 제안한다. 간선-레이블 그래프(edge-labeled graph) 형태로 maniplexes를 저장하는 컴팩트한 포맷을 설계하였으며, 기존 regular 4-maniplexes 데이터셋을 House of Graphs 및 Potočnik의 4가 그래프 목록과 연결하는 작업을 수행하였다.", "technique": "flag graph, 1-skeleton graph, 1-coskeleton graph의 정준형(canonical form)을 이용한 데이터셋 간 교차 연결.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.27357v1", "title": "Typical distances in high-genus triangulations", "authors": ["Tanguy Lions"], "abstract": "We study the distance between two uniformly chosen points on a uniform random triangulation whose genus g is proportional to the number of faces 2n. We show that the distance rescaled by log(n) converges in probability to a deterministic constant, which answers a conjecture of Budzinski, Chapuy and Louf. The proof relies on the precise study of the volume growth of the ball of radius r for r of order log(n). The main ingredients are the recent local convergence results for uniform triangulations with boundaries and the isoperimetric inequalities obtained by Budzinski and Louf.", "categories": ["math.PR", "math.CO"], "primary_category": "math.PR", "published": "2026-06-25T17:57:59+00:00", "updated": "2026-06-25T17:57:59+00:00", "abs_url": "http://arxiv.org/abs/2606.27357v1", "pdf_url": "https://arxiv.org/pdf/2606.27357v1", "journal_ref": "", "doi": "", "comment": "42 pages, 15 figures", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 고속(high-genus) 삼각분할에서의 전형적 거리에 관한 확률론·조합론 연구로, McMullen 문제나 Larman 추측과 직접적인 관련이 없다.", "summary": "이 논문은 면의 수 $2n$에 비례하는 genus $g$를 가진 균일 랜덤 삼각분할 위의 두 균일 랜덤 점 사이의 거리를 연구한다. $\\log(n)$으로 스케일한 거리가 확률 수렴하여 결정론적 상수에 수렴함을 증명하며, 이는 Budzinski, Chapuy, Louf의 추측에 답한다. 증명의 핵심은 반지름 $r = O(\\log n)$인 볼의 부피 성장에 대한 정밀 분석이다.", "technique": "경계가 있는 균일 삼각분할의 국소 수렴(local convergence) 결과와 Budzinski–Louf의 등주 부등식(isoperimetric inequalities)을 결합하여 볼 부피 성장을 정밀하게 추정한다.", "connections": "", "keyword_hits": ["triangulation"], "source": "filter"}, {"id": "2606.27004v1", "title": "Hidden critical and Morse equivalence behind duality: Theory and Applications", "authors": ["Dong Zhang"], "abstract": "The aim of this paper is to establish critical duality theory for ratios of nonnegative homogeneous convex functions (shorten for RC functions) and differences of convex functions (abbreviated as DC functions) on Banach spaces. Specifically, we establish a series of duality results on critical point theory and Morse theory for RC functions, including the homotopy type of sublevel sets, the Morse critical points and their Rothe critical groups, Lagrange critical points and their multiplicities, Lusternik-Schnirelman min-max critical values, Poincare polynomials, as well as the structure of handlebody decompositions, all of which are proved to be preserved under polarity dual. Moreover, we obtain the first critical duality theory of DC functions which does not depend on the DC decomposition. This answers a question left open from the work of Toland on DC functions and the work of Le-Pham on DC programming.   We apply these results to provide a reformulation of the graph Cheeger constant using zonotopes; we introduce the contact data which serves as a geometric characterization of Lagrange criticality; and we show that the eigenproblems for 1-Laplacian and $\\infty$-Laplacian on hypergraphs are equivalent to the contact problems of zonotopes, which indeed establishes a new characterization of zonotopes. We also prove a duality equivalence for certain nonlinear eigenvalue problems and bifurcation problems. Our study here reveals an intricate interaction of critical point theory with other fields such as convex analysis, combinatorial geometry, and nonlinear eigenproblems on graphs.", "categories": ["math.FA", "math.CO", "math.MG", "math.SP"], "primary_category": "math.FA", "published": "2026-06-25T13:20:14+00:00", "updated": "2026-06-25T13:20:14+00:00", "abs_url": "http://arxiv.org/abs/2606.27004v1", "pdf_url": "https://arxiv.org/pdf/2606.27004v1", "journal_ref": "", "doi": "", "comment": "Any comments are very welcome", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 Banach 공간에서의 RC/DC 함수에 대한 임계점 이론과 Morse 이론의 쌍대성을 다루며, McMullen 문제(d=5에서의 일반 위치 점 배치, oriented matroid, chirotope 등)와 직접적 연관이 없다.", "summary": "이 논문은 비음 동차 볼록 함수의 비(RC 함수)와 볼록 함수의 차(DC 함수)에 대한 임계 쌍대 이론(critical duality theory)을 Banach 공간에서 수립한다. Morse 이론의 각종 불변량(호모토피 형, Rothe 임계군, Lusternik-Schnirelman 최솟값 등)이 극성 쌍대(polarity dual) 하에서 보존됨을 증명하며, DC 분해에 독립적인 최초의 DC 함수 임계 쌍대 이론을 제시한다. 응용으로서 그래프 Cheeger 상수의 조노토프(zonotope)를 이용한 재정식화, 하이퍼그래프의 1-Laplacian 및 $\\infty$-Laplacian 고유 문제와 조노토프의 접촉 문제 간의 동치를 보인다.", "technique": "비음 동차 볼록 함수(RC)와 DC 함수에 대해 극성 쌍대(polarity duality) 및 볼록 해석학을 활용한 임계점·Morse 이론의 쌍대 불변성 확립.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.25644v1", "title": "Winding number and circular coloring", "authors": ["Reza Naserasr", "Cyril Pujol", "Lujia Wang"], "abstract": "In 1996, Youngs proved a surprising theorem that quadrangulations of the projective plane could never have chromatic number exactly 3. This sparked a lot of interest, and the result has been further developed in many directions over the past decades. For example, the result is strengthened by considering the circular chromatic number, which is a real-valued lower bound on the chromatic number. The circular chromatic number of a quadrangulation cannot be in the interval (2,4). This parameter allows a generalization to larger even faces, for which a similar gap exists.   In this work, we place these results into a framework based on the notion of winding number using extensions of colorings to continuous mappings. This yields unified and simplified proofs of gaps in the circular chromatic number for graphs with a distinguished set of directed even cycles. This generalizes the setting of graphs embedded on surfaces where every face is even.   We further establish an analogous gap phenomenon when all faces are of a given odd length, previously known only in the case of triangulations. For example, we conclude that if G is a graph embedded on the projective plane such that all faces are 5-cycles, then either its circular chromatic number is 5/2 or at least 3, the former being the case only if G is Eulerian and every noncontractible facial walk is of odd length...", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-24T09:52:56+00:00", "updated": "2026-06-24T09:52:56+00:00", "abs_url": "http://arxiv.org/abs/2606.25644v1", "pdf_url": "https://arxiv.org/pdf/2606.25644v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 사영평면 위 그래프의 원형 색수(circular chromatic number)와 winding number에 관한 연구로, McMullen 문제나 oriented matroid와 직접적인 관련이 없다.", "summary": "이 논문은 Youngs(1996)의 사영평면 사각분할(quadrangulation) 정리—크로매틱 수가 정확히 3이 될 수 없다는 결과—를 winding number와 연속 매핑으로의 채색 확장 개념을 통해 통합·일반화한다. 방향 있는 짝수 사이클을 가진 그래프에서 원형 색수의 gap 현상에 대한 통일된 증명을 제시하며, 홀수 길이 면을 가진 경우(예: 5-사이클 면)에도 유사한 gap 현상을 새롭게 확립한다.", "technique": "winding number를 이용한 채색의 연속 매핑으로의 확장을 핵심 도구로 사용하여 원형 색수의 gap 현상을 통합 증명한다.", "connections": "", "keyword_hits": ["triangulation"], "source": "filter"}, {"id": "2606.24482v1", "title": "Homotopy Coherent Nielsen Realization Problem for Dehn Twists on K3-Type 4-Manifolds", "authors": ["Yujie Lin", "Yi Sha"], "abstract": "We study the homotopy coherent version of the Nielsen realization problem for smooth $4$-manifolds. Given a finite subgroup $G\\subset π_0(\\mathrm{Diff}(M))$, this problem asks whether there is a map $H\\colon BG \\to B\\mathrm{Diff}(M)$ such that the induced map on fundamental groups coincides with the inclusion of $G$. Using family Seiberg-Witten theory, we prove that for $K3$-type $4$-manifolds, the Dehn twists along $(-2)$-spheres are not homotopy coherently Nielsen realizable. In particular, this gives an alternative proof of the failure of the classical Nielsen realization problem in this setting.", "categories": ["math.GT"], "primary_category": "math.GT", "published": "2026-06-23T12:18:10+00:00", "updated": "2026-06-23T12:18:10+00:00", "abs_url": "http://arxiv.org/abs/2606.24482v1", "pdf_url": "https://arxiv.org/pdf/2606.24482v1", "journal_ref": "", "doi": "", "comment": "19 pages. Comments welcome", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 4-다양체(K3형)의 Dehn twist에 대한 Nielsen 실현 문제를 다루며, McMullen 문제나 oriented matroid, 볼록 위치 점 배치와 전혀 무관하다.", "summary": "이 논문은 매끄러운 4-다양체에 대한 호모토피 일관(homotopy coherent) Nielsen 실현 문제를 연구한다. Family Seiberg-Witten 이론을 사용하여, K3형 4-다양체에서 $(-2)$-구면을 따른 Dehn twist들이 호모토피 일관 방식으로 Nielsen 실현 불가능함을 증명한다. 이는 고전적인 Nielsen 실현 문제의 실패에 대한 대안적 증명도 제공한다.", "technique": "Family Seiberg-Witten 이론을 활용하여 $BG \to B\\mathrm{Diff}(M)$의 존재성을 반박한다.", "connections": "", "keyword_hits": ["realizab"], "source": "filter"}, {"id": "2606.23963v1", "title": "A Combinatorial Characterization of Sol 3-Manifolds", "authors": ["Daryl Cooper", "Leslie Mavrakis", "Priyam Patel"], "abstract": "We show that there is a universal compact branched 3-manifold $W$ such that a closed 3-manifold $M$ immerses into $W$ if and only if $M$ admits a Sol structure. Equivalently, a closed 3-manifold is Sol if and only if it has a certain type of triangulation. The construction of $W$ is based on a regular language that characterizes Sol manifolds.", "categories": ["math.GT"], "primary_category": "math.GT", "published": "2026-06-22T21:44:36+00:00", "updated": "2026-06-22T21:44:36+00:00", "abs_url": "http://arxiv.org/abs/2606.23963v1", "pdf_url": "https://arxiv.org/pdf/2606.23963v1", "journal_ref": "", "doi": "", "comment": "20 pages, 2 figures", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 Sol 3-다양체의 조합론적 특성화에 관한 것으로, McMullen 문제(볼록 위치 점 배치, oriented matroid 등)와 직접적 관련이 없다.", "summary": "이 논문은 닫힌 3-다양체 $M$이 Sol 구조를 가질 필요충분조건이 보편적 컴팩트 분기 3-다양체 $W$에 몰입(immerse)되는 것임을 보인다. 동치적으로, 닫힌 3-다양체가 Sol인 것은 특정 유형의 삼각분할을 가지는 것과 동치이다. $W$의 구성은 Sol 다양체를 특성화하는 정규 언어(regular language)에 기반한다.", "technique": "Sol 다양체를 특성화하는 정규 언어를 이용하여 보편적 컴팩트 분기 3-다양체를 구성하는 기법.", "connections": "", "keyword_hits": ["triangulation"], "source": "filter"}, {"id": "2606.25698v1", "title": "On $k$-color mex-related partition functions", "authors": ["Nargish Punia"], "abstract": "In this paper, we investigate a set of $k$-color partitions and examine how its subsets relates to the theory of the minimal excludant function introduced by Andrews and Newman. Furthermore, we provide generalization of the partition functions introduced by Andrews and Bachraoui and also define several new partition functions within this framework.", "categories": ["math.CO", "math.NT"], "primary_category": "math.CO", "published": "2026-06-24T11:12:39+00:00", "updated": "2026-06-24T11:12:39+00:00", "abs_url": "http://arxiv.org/abs/2606.25698v1", "pdf_url": "https://arxiv.org/pdf/2606.25698v1", "journal_ref": "", "doi": "", "comment": "Submitted for publication", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "본 논문은 분할함수(partition functions)와 mex 함수를 다루며, McMullen's problem은 볼록기하학의 조합론적 구조에 관한 것으로 직접적인 관련성이 없음.", "summary": "이 논문은 k-색 분할(k-color partitions)과 Andrews-Newman의 최소배제함수(minimal excludant function) 이론의 관계를 조사합니다. Andrews-Bachraoui가 도입한 분할함수를 일반화하고 이 체계 내에서 새로운 분할함수들을 정의합니다.", "technique": "최소배제함수 이론과 k-색 분할의 조합론적 관계 분석을 통한 분할함수의 일반화.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27169v1", "title": "Theorem of Wantzel", "authors": ["J. Mainik"], "abstract": "In 1796, Gauss succeeded in solving the problem of constructing the regular 17-gon with compass and straightedge. Later he proved that, using a compass and straightedge, it is possible to construct the regular polygons with $n=2^m n_1\\cdots n_l$ sides if $n_1,\\cdots, n_l$ are different prime numbers of the form $n_k=2^{2^{ν_k}}+1$. Gauss also knew that only these regular polygons can be constructed but did not prove it.\\linebreak P. Wantzel completed the result of Gauss and proved it in 1837. The present paper provides a new proof for Wantzel's theorem.", "categories": ["math.MG"], "primary_category": "math.MG", "published": "2026-06-25T15:37:59+00:00", "updated": "2026-06-25T15:37:59+00:00", "abs_url": "http://arxiv.org/abs/2606.27169v1", "pdf_url": "https://arxiv.org/pdf/2606.27169v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "고전 기하 작도 가능성(Wantzel 정리)은 이산기하학·조합론의 현대 연구 문제(특히 McMullen's problem)와 직접 관련이 없습니다.", "summary": "본 논문은 Wantzel 정리(나침반과 직선자로 작도 가능한 정다각형의 특성)에 대한 새로운 증명을 제시합니다. Gauss의 1796년 결과를 Wantzel이 1837년에 완성한 정리의 현대적 증명입니다.", "technique": "", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.29743v1", "title": "3-packings in Triangulations: Algorithms, bounds, and Complexity", "authors": ["Prosenjit Bose", "Anil Maheshwari", "Bobby Miraftab", "Yota Otachi"], "abstract": "We study $H$-packings in plane triangulations for the three-vertex graphs $H\\in\\{P_3,K_3,P_2\\cup P_1\\}$. For a graph $H$, let $λ_H(G)$ denote the maximum size of an $H$-packing in $G$, with the convention that for $H=P_2\\cup P_1$ the copies are required to be induced. For $P_3$-packings, we prove that every triangulation $G$ on $n$ vertices satisfies $λ_{P_3}(G)\\ge \\left\\lfloor \\frac n5\\right\\rfloor$, and show that this lower bound is asymptotically tight. We also study triangle packings in triangulations and provide lower bounds for $λ_{K_3}(G)$ in terms of the maximum degree and the degree sequence. We give a face-path characterization of triangle factors in $4$-connected plane triangulations using a hamiltonian cycle and the weak duals of the two associated maximal outerplanar graphs. Finally, for induced packings by $P_2\\cup P_1$, we prove that every plane triangulation $T$ on $n$ vertices satisfies $λ_{P_2\\cup P_1}(T)\\ge \\left\\lfloor \\frac n3\\right\\rfloor-2$, and show that such a packing can be found in polynomial time.", "categories": ["cs.DM", "math.CO"], "primary_category": "cs.DM", "published": "2026-06-29T03:37:28+00:00", "updated": "2026-06-29T03:37:28+00:00", "abs_url": "http://arxiv.org/abs/2606.29743v1", "pdf_url": "https://arxiv.org/pdf/2606.29743v1", "journal_ref": "", "doi": "", "comment": "Comments are welcome", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 평면 삼각분할(plane triangulation)에서의 그래프 패킹 문제를 다루며, McMullen 문제(볼록/일반 위치 점 배치, oriented matroid)와 직접적 관련이 없다.", "summary": "이 논문은 평면 삼각분할 $G$에서 세 꼭짓점 그래프 $H\\in\\{P_3, K_3, P_2\\cup P_1\\}$의 $H$-패킹 최대 크기 $\\lambda_H(G)$를 연구한다. $P_3$-패킹에 대해 $n$개 꼭짓점 삼각분할에서 $\\lambda_{P_3}(G)\\ge\\lfloor n/5\\rfloor$임을 증명하고 이 하한이 점근적으로 최적임을 보인다. 또한 유도 $P_2\\cup P_1$-패킹에 대해 $\\lambda_{P_2\\cup P_1}(T)\\ge\\lfloor n/3\\rfloor-2$를 증명하고 다항 시간 알고리즘을 제시한다.", "technique": "해밀턴 순환(Hamiltonian cycle)을 이용한 face-path 특성화 및 최대 외부평면 그래프(maximal outerplanar graph)의 weak dual 분석.", "connections": "", "keyword_hits": ["triangulation"], "source": "filter"}, {"id": "2606.29373v1", "title": "An Oriented Street--Roberts Conjecture", "authors": ["David Gepner", "Hadrian Heine"], "abstract": "We formulate a notion of oriented polytope, including Street's oriented simplices and Gray's oriented cubes, and use this to prove an oriented version of the Street--Roberts conjecture, presenting $(\\infty,\\infty)$-categories as sheaves on suitable families of oriented polytopes, generalizing work of Campion. This allows us to understand $(\\infty, \\infty)$-categories from a geometric perspective, as directed analogues of homotopy types. These familes of oriented polytopes induce basic operations in higher category theory: for instance, the join, Gray tensor, and bicone arise from the geometry of the orientals, cubes, and orthoplexes, respectively. We study the interaction of these operations and derive some geometric formulae, generalizing work of Ara--Maltsiniotis, Verity, and others.", "categories": ["math.AT", "math.CT"], "primary_category": "math.AT", "published": "2026-06-28T12:38:54+00:00", "updated": "2026-06-28T12:38:54+00:00", "abs_url": "http://arxiv.org/abs/2606.29373v1", "pdf_url": "https://arxiv.org/pdf/2606.29373v1", "journal_ref": "", "doi": "", "comment": "This paper is the first part of arXiv:2510.10504, which has been split into two separate articles", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 고차 범주론(∞,∞-categories)과 위상수학적 sheaf 이론에 관한 것으로, McMullen 문제나 볼록 위치 점 배치와 전혀 무관하다.", "summary": "이 논문은 Street의 oriented simplices와 Gray의 oriented cubes를 포함하는 oriented polytope의 개념을 정식화하고, 이를 이용해 Street–Roberts 추측의 oriented 버전을 증명한다. 구체적으로 $(\\infty,\\infty)$-범주를 적절한 oriented polytope 족 위의 sheaf로 표현함으로써, 이를 homotopy type의 방향성 유사체로 기하학적으로 이해할 수 있음을 보인다. 또한 이 oriented polytope 족이 join, Gray tensor, bicone 등 고차 범주론의 기본 연산을 어떻게 유도하는지 분석하고 관련 기하학적 공식들을 도출한다.", "technique": "Oriented polytope(orientals, cubes, orthoplexes) 족을 이용한 sheaf-theoretic 표현과 기하학적 공식 도출.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.28954v1", "title": "Filling surfaces with very few systoles", "authors": ["Olivier Mathieu"], "abstract": "In the paper we describe hyperbolic surfaces filled by their systoles, where the total number of systoles is in $O(\\frac{g}{\\ln \\,g})$, that is equivalent to the lower bound of Anderson, Parlier and Pittet \\cite{APP}. Various papers \\cite{SS}\\cite{FB20}\\cite{Sanki}\\cite{ IM}\\cite{ Mathieu} have investigated the same question, and the best previously known upper bounds where in $o(\\frac{g}{\\sqrt{\\ln \\,g}})$.   Surprizingly the present approach is, in our opinion, much simpler than the methods of earlier papers.", "categories": ["math.MG", "math.DG"], "primary_category": "math.MG", "published": "2026-06-27T14:51:43+00:00", "updated": "2026-06-27T14:51:43+00:00", "abs_url": "http://arxiv.org/abs/2606.28954v1", "pdf_url": "https://arxiv.org/pdf/2606.28954v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "쌍곡 곡면의 systole 채우기 문제로, 이산기하학·조합론의 McMullen 문제(convex position, oriented matroid, 점 배치)와 직접 관련성 없음.", "summary": "본 논문은 systole로 채워지는 쌍곡 곡면을 연구하며, systole의 총 개수가 $O(\\frac{g}{\\ln g})$인 경우를 구성함. 이는 Anderson-Parlier-Pittet의 하한과 일치하며, 기존 상한 $o(\\frac{g}{\\sqrt{\\ln g}})$보다 개선됨.", "technique": "더 단순한 기하학적 방법을 사용하여 쌍곡 곡면을 systole로 채우는 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.31774v1", "title": "Thurston norm, polytopes and splitting complexity", "authors": ["Andrei Jaikin-Zapirain", "Monika Kudlinska", "Pablo Sánchez-Peralta"], "abstract": "We show that if $G$ is a finitely generated torsion-free group satisfying the Strong Atiyah Conjecture with vanishing first $L^{2}$-Betti number, then the map that assigns to each surjective integral character the first $L^2$-Betti number of the kernel extends to a seminorm on the first cohomology group of $G$ with real coefficients. We call this seminorm the Thurston norm. Moreover, we show that this norm is induced by a polytope in the first homology group with real coefficients. We also generalize this result to higher $L^{2}$-Betti numbers of the kernels, thereby confirming a conjecture of Friedl, Lück and Tillmann.   In the case where $G$ is either a free-by-cyclic group or the fundamental group of an admissible $3$-manifold, we show that the Thurston norm of $G$ admits a combinatorial interpretation that relates it to the splitting complexity of the character. This confirms a conjecture of Gardam and Kielak. As an application, we show that there exists an algorithm to compute the Bieri--Neumann--Strebel invariant of free-by-cyclic groups, and discuss connections to the isomorphism problem in free-by-cyclic groups.", "categories": ["math.GR", "math.GT"], "primary_category": "math.GR", "published": "2026-06-30T14:57:29+00:00", "updated": "2026-06-30T14:57:29+00:00", "abs_url": "http://arxiv.org/abs/2606.31774v1", "pdf_url": "https://arxiv.org/pdf/2606.31774v1", "journal_ref": "", "doi": "", "comment": "36 pages", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 Thurston norm, $L^2$-Betti 수, free-by-cyclic 군에 관한 것으로 McMullen's problem(볼록 위치 점 배치, oriented matroid 등)과 직접적 관련이 없다.", "summary": "유한생성 비틀림없는 군 $G$가 Strong Atiyah Conjecture를 만족하고 첫 번째 $L^2$-Betti 수가 0이면, 핵(kernel)의 첫 번째 $L^2$-Betti 수가 제1 코호몰로지군 위의 세미노름(Thurston norm)으로 확장됨을 증명하고, 이 노름이 제1 호몰로지군의 다면체(polytope)에 의해 유도됨을 보인다. 이를 고차 $L^2$-Betti 수로 일반화하여 Friedl–Lück–Tillmann 추측을 확인하고, free-by-cyclic 군과 허용가능한 3-다양체의 기본군에서 Thurston norm이 splitting complexity와 동치임을 보여 Gardam–Kielak 추측도 해결한다. 응용으로 free-by-cyclic 군의 Bieri–Neumann–Strebel 불변량 계산 알고리즘의 존재성을 제시한다.", "technique": "Strong Atiyah Conjecture 틀 안에서 $L^2$-Betti 수의 세미노름 구조 및 다면체 유도를 분석하고, 조합론적 splitting complexity 해석을 활용한다.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2607.00922v1", "title": "Order polytopes of generalized snake posets are $h^*$-real-rooted", "authors": ["Benjamin Braun", "Aryaman Jal"], "abstract": "Order polytopes for generalized snake posets were recently studied by von Bell et al. (2022), and are known to be unimodularly equivalent to strength-one flow polytopes for acyclic directed graphs strongly dual to generalized snake posets. Lee, Vindas-Meléndez, and Wang (2026) conjectured that the Ehrhart $h^*$-polynomials of these order polytopes are real-rooted. We prove this conjecture using a connection between these $h^*$-polynomials and non-nesting rook polynomials, which were recently introduced by Alexandersson and Jal (2024+) in connection with $P$-Eulerian polynomials for width two posets.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-01T13:24:51+00:00", "updated": "2026-07-01T13:24:51+00:00", "abs_url": "http://arxiv.org/abs/2607.00922v1", "pdf_url": "https://arxiv.org/pdf/2607.00922v1", "journal_ref": "", "doi": "", "comment": "11 pages, 1 figure. Comments welcome", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 일반화 snake poset의 order polytope의 $h^*$-다항식 실근성에 관한 것으로, McMullen 문제(d=5 convex position, oriented matroid 등)와 직접적인 관련이 없다.", "summary": "von Bell et al.(2022)이 연구한 일반화 snake poset의 order polytope에 대해, Lee–Vindas-Meléndez–Wang(2026)이 제기한 Ehrhart $h^*$-다항식의 실근성(real-rootedness) 추측을 증명한다. 증명의 핵심은 해당 $h^*$-다항식과 Alexandersson–Jal(2024+)이 도입한 non-nesting rook polynomial 사이의 연결 관계를 활용하는 것이다.", "technique": "$h^*$-다항식과 non-nesting rook polynomial 사이의 연결을 이용하여 실근성을 증명.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2607.00701v1", "title": "Quandle homology and relative group homology", "authors": ["Ayumu Inoue"], "abstract": "We introduce a chain map from quandle homology to relative group homology, and construct several quandle cocycles through the chain map. We also relate this chain map to triangulations of Seifert (hyper)surfaces of 1- and 2-dimensional links.", "categories": ["math.GT", "math.GR"], "primary_category": "math.GT", "published": "2026-07-01T09:50:27+00:00", "updated": "2026-07-01T09:50:27+00:00", "abs_url": "http://arxiv.org/abs/2607.00701v1", "pdf_url": "https://arxiv.org/pdf/2607.00701v1", "journal_ref": "", "doi": "", "comment": "16 pages", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 quandle homology와 상대 군 호몰로지(relative group homology)의 관계 및 링크의 Seifert 초곡면을 다루며, McMullen 문제(볼록 위치 점 배치, oriented matroid 등)와 전혀 무관하다.", "summary": "이 논문은 quandle homology에서 상대 군 호몰로지로의 chain map을 도입하고, 이를 통해 여러 quandle cocycle을 구성한다. 또한 이 chain map을 1차원 및 2차원 링크의 Seifert (초)곡면의 삼각분할(triangulation)과 연결한다.", "technique": "quandle homology에서 relative group homology로의 chain map 구성 및 Seifert 초곡면의 삼각분할 활용.", "connections": "", "keyword_hits": ["triangulation"], "source": "filter"}, {"id": "2607.00646v1", "title": "Type B c-Birkhoff polytopes are order polytopes", "authors": ["Esther Banaian", "Sunita Chepuri", "Emily Gunawan", "Jianping Pan"], "abstract": "In a previous work, we defined (type A) c-Birkhoff polytopes and showed that they were unimodularly equivalent to order polytopes of heap posets. In this note we answer the question: What about type B?", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-01T08:59:59+00:00", "updated": "2026-07-01T08:59:59+00:00", "abs_url": "http://arxiv.org/abs/2607.00646v1", "pdf_url": "https://arxiv.org/pdf/2607.00646v1", "journal_ref": "", "doi": "", "comment": "15 pages, 2 figures. Comments are welcome!", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 type B c-Birkhoff polytope와 order polytope의 동치 관계를 다루며, McMullen 문제(d=5 일반 위치 점 배치, oriented matroid 등)와 직접적 관련이 없다.", "summary": "이 논문은 이전 연구에서 정의된 type A c-Birkhoff polytope를 type B로 확장하여, type B c-Birkhoff polytope가 heap poset의 order polytope와 단모듈 동치(unimodularly equivalent)임을 보인다. 즉 type B 설정에서도 동일한 order polytope 구조가 성립함을 확인하는 짧은 노트이다.", "technique": "Heap poset의 order polytope와의 단모듈 동치(unimodular equivalence) 증명.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2607.02424v1", "title": "Symmetric edge polytopes are not gamma-positive", "authors": ["Luis Ferroni"], "abstract": "A conjecture posed by Ohsugi and Tsuchiya (2019) postulates that the Ehrhart $h^*$-polynomials of symmetric edge polytopes are $γ$-positive. We disprove this conjecture by exhibiting an infinite family of counterexamples. The smallest example provided by our construction is a $36$-dimensional symmetric edge polytope.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-02T16:52:48+00:00", "updated": "2026-07-02T16:52:48+00:00", "abs_url": "http://arxiv.org/abs/2607.02424v1", "pdf_url": "https://arxiv.org/pdf/2607.02424v1", "journal_ref": "", "doi": "", "comment": "6 pages, 1 Figure. Comments welcome!", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 symmetric edge polytope의 Ehrhart $h^*$-다항식의 $\\gamma$-양수성(gamma-positivity)에 관한 것으로, McMullen 문제나 관련 도구(oriented matroid, chirotope 등)와 직접적인 연관이 없다.", "summary": "Ohsugi와 Tsuchiya(2019)가 제기한 'symmetric edge polytope의 Ehrhart $h^*$-다항식은 $\\gamma$-양수($\\gamma$-positive)이다'라는 추측을 반례의 무한 족(infinite family)을 구성함으로써 반증한다. 이 구성에서 제시되는 가장 작은 반례는 36차원 symmetric edge polytope이다.", "technique": "반례의 무한 족을 명시적으로 구성하여 $\\gamma$-양수성 추측을 반증.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2607.01349v1", "title": "Alexander's conjecture for infinite simplicial complexes", "authors": ["Martina Iannella", "Vadim Weinstein"], "abstract": "Alexander's conjecture states that for every two finite triangulations of the same topological space, if they have a common subdivision, then they have a common stellar subdivision. We generalize the recent result of Adiprasito and Pak, who resolved Alexander's conjecture for finite simplicial complexes, to infinite simplicial complexes.", "categories": ["math.GT", "math.CO"], "primary_category": "math.GT", "published": "2026-07-01T18:07:27+00:00", "updated": "2026-07-01T18:07:27+00:00", "abs_url": "http://arxiv.org/abs/2607.01349v1", "pdf_url": "https://arxiv.org/pdf/2607.01349v1", "journal_ref": "", "doi": "", "comment": "10 pages, 5 figures", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 위상공간의 삼각분할과 stellar subdivision에 관한 Alexander 추측을 무한 단체 복합체로 일반화한 것으로, McMullen 문제나 관련 oriented matroid 이론과 직접적 연관이 없다.", "summary": "Alexander 추측은 동일한 위상공간의 두 유한 삼각분할이 공통 세분(subdivision)을 가지면 공통 stellar subdivision도 가진다는 주장이다. Adiprasito와 Pak이 유한 단체 복합체에 대해 이 추측을 해결한 최근 결과를 이 논문은 무한 단체 복합체로 일반화한다.", "technique": "", "connections": "", "keyword_hits": ["triangulation"], "source": "filter"}, {"id": "2606.28830v1", "title": "On the Marstrand projection theorem for the Assouad spectrum", "authors": ["Kenneth J. Falconer", "Jonathan M. Fraser", "Antti Käenmäki"], "abstract": "Marstrand's projection theorem states that the Hausdorff dimension of the orthogonal projection of a Borel set in the plane onto lines is constant almost surely. This property extends to other notions of dimension, such as box and packing dimensions, but does not hold for the Assouad dimension. In this paper, we show that Marstrand's projection theorem also fails for the quasi-Assouad dimension and the Assouad spectrum, which interpolates between the upper box and quasi-Assouad dimensions. Additionally, we establish an almost sure lower bound for the Assouad spectrum of the projections using capacity-theoretic dimension profiles, and an almost sure upper bound for projections of bounded planar sets via an incidence geometry-inspired tube-counting argument. As an application, for a parametrised family of homogeneous self-similar sets, we obtain an almost sure upper bound for the Assouad spectrum which beats the trivial upper bound coming from the upper box dimension.", "categories": ["math.MG", "math.CA"], "primary_category": "math.MG", "published": "2026-06-27T09:36:35+00:00", "updated": "2026-06-27T09:36:35+00:00", "abs_url": "http://arxiv.org/abs/2606.28830v1", "pdf_url": "https://arxiv.org/pdf/2606.28830v1", "journal_ref": "", "doi": "", "comment": "36 pages", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 fractal geometry와 dimension theory에 관한 것으로, McMullen's problem(convex position 점 배치, oriented matroid, chirotope 등)과 주제적 관련성이 없습니다.", "summary": "본 논문은 Marstrand 정사영 정리가 Assouad spectrum과 quasi-Assouad dimension에서 실패함을 보이고, 용량-이론적 차원 프로파일과 입사기하 기반 튜브-계산 논증을 이용하여 정사영의 Assouad spectrum에 대한 거의 확실한 상·하 경계를 확립합니다. 자기유사 집합의 매개변수 족에 적용하여 상자 차원의 자명한 경계를 개선한 상한을 도출합니다.", "technique": "Capacity-theoretic dimension profiles와 incidence geometry 기반 tube-counting argument를 활용한 거의 확실한(almost sure) 경계 증명.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.31967v1", "title": "On clique-to-clique densities", "authors": ["Jie Ma", "Tianhen Wang", "Tianming Zhu"], "abstract": "Let $k_r(G)$ denote the number of $r$-cliques in a graph $G$ and let $F_r(\\cdot)$ be the Lovász--Simonovits $r$-clique density function. For any integers $2\\le s<t$, we determine the asymptotically sharp lower bound on $k_t(G)$ in an $n$-vertex graph $G$ with a prescribed number $k_s(G)$, by showing that \\[ \\frac{k_t(G)}{n^t}\\ge F_t\\!\\left(F_s^{-1}\\!\\left(\\frac{k_s(G)}{n^s}\\right)\\right), \\] where $F_s^{-1}$ denotes the generalized inverse. This strengthens Bollobás's piecewise-linear interpolation bound and, in the case $s=2$, recovers Reiher's clique density theorem via a new inductive proof.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-30T17:10:55+00:00", "updated": "2026-06-30T17:10:55+00:00", "abs_url": "http://arxiv.org/abs/2606.31967v1", "pdf_url": "https://arxiv.org/pdf/2606.31967v1", "journal_ref": "", "doi": "", "comment": "14 pages, 1 figure", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "본 논문은 클리크 밀도(clique density) 함수와 그래프 이론의 극값 문제를 다루며, McMullen's problem(convex position, oriented matroid, tope graph 등)과 직접적인 관련성이 없음.", "summary": "본 논문은 s-clique 개수가 고정되었을 때 t-clique 개수의 점근적 하한을 결정한다. 주요 결과는 $k_t(G)/n^t \\ge F_t(F_s^{-1}(k_s(G)/n^s))$로, Bollobás의 구간별 선형 보간 부등식을 강화하고 $s=2$ 경우 Reiher의 clique density theorem을 새로운 귀납적 증명으로 복원한다.", "technique": "Lovász–Simonovits clique density 함수와 그 역함수를 이용한 density 보간; 귀납적 증명 방법.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.00940v1", "title": "The Schur positivity of $\\nabla m_μ$", "authors": ["Dun Qiu", "Minhao Zhang"], "abstract": "Bergeron, Garsia, Haiman and Tesler conjectured in 1999 that, for all partitions $μ,λ\\vdash n$, the polynomial $(-1)^{|μ|-\\ell(μ)}\\langle \\nabla m_μ, s_λ\\rangle$ has nonnegative integer coefficients, where $\\nabla$ is the Bergeron--Garsia nabla operator, which acts diagonally on the modified Macdonald basis, and $m_μ$ is the monomial symmetric function. In this article, we prove this conjecture, and more generally that $(-1)^{|μ|-\\ell(μ)}\\langle\\nabla^r m_μ,s_λ\\rangle\\in\\mathbb{N}[q,t]$ for all $r\\geq 1$. We establish a recursion showing that $(-1)^{|μ|-\\ell(μ)}m_μ$ has an expansion with coefficients in $\\mathbb{Q}_{\\geq 0}[q]$ in the symmetric functions $C_α(1)$, where $C_a$ denotes the operator introduced by Haglund, Morse and Zabrocki. Combining this expansion with the compositional shuffle theorems of Carlsson--Mellit and Mellit, and with the Schur positivity of LLT polynomials, completes the proof. The same method, using the $e$-positivity of column LLT polynomials after the substitution $q\\mapsto q+1$, also gives an $e$-positive analogue.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-01T13:41:04+00:00", "updated": "2026-07-01T13:41:04+00:00", "abs_url": "http://arxiv.org/abs/2607.00940v1", "pdf_url": "https://arxiv.org/pdf/2607.00940v1", "journal_ref": "", "doi": "", "comment": "22 pages", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "This paper concerns symmetric function theory, Macdonald polynomials, and Schur positivity—topics orthogonal to McMullen's problem on convex position and oriented matroid realizability in discrete geometry.", "summary": "Bergeron, Garsia, Haiman, Tesler의 1999년 추측을 증명: 모든 분할 μ,λ에 대해 다항식 $(-1)^{|μ|-\\ell(μ)}\\langle \\nabla m_μ, s_λ\\rangle$이 음이 아닌 정수 계수를 가지며, 더 일반적으로 $\\nabla^r m_μ$의 경우도 성립함을 보였다. Shuffle 정리와 LLT 다항식의 Schur 양성성을 조합하여 증명을 완성하고, $e$-양성 유사 결과도 도출했다.", "technique": "Modified Macdonald 기저에서의 재귀 전개, Carlsson–Mellit와 Mellit의 compositional shuffle 정리, LLT 다항식의 Schur 양성성 활용.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.05170v1", "title": "Symplectically aspherical Kähler manifolds, scalar curvature, and the fundamental group", "authors": ["Luca F. Di Cerbo", "Alexander Dranishnikov", "Ekansh Jauhari"], "abstract": "We present a detailed study of closed smooth manifolds having Kähler forms that pullback to exact forms on the universal cover. We show that these manifolds, which we call symplectically aspherical Kähler manifolds, exist in abundance, even outside the aspherical setting, and have interesting topological and geometric features, such as large fundamental group á la Kollár and the absence of Kähler metrics of positive scalar curvature. Motivated by the latter, we address an extension of the Gromov-Lawson Conjecture in the symplectic setting for Riemannian metrics. We also study Kähler cones on symplectically aspherical Kähler manifolds and the realizability problem of their fundamental group, and explore their other complex geometric properties.", "categories": ["math.GT", "math.AG", "math.DG"], "primary_category": "math.GT", "published": "2026-07-06T14:53:45+00:00", "updated": "2026-07-06T14:53:45+00:00", "abs_url": "http://arxiv.org/abs/2607.05170v1", "pdf_url": "https://arxiv.org/pdf/2607.05170v1", "journal_ref": "", "doi": "", "comment": "25 pages, 1 figure. Comments welcome!", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 Kähler 다양체의 심플렉틱 비구면성, 스칼라 곡률, 기본군에 관한 것으로, McMullen 문제(d=5 점 배치, oriented matroid, 볼록 위치)와 전혀 관련이 없다.", "summary": "이 논문은 보편 덮개(universal cover)에서 정확한 형식(exact form)으로 당겨지는 Kähler 형식을 갖는 닫힌 매끄러운 다양체—'심플렉틱 비구면 Kähler 다양체'—를 체계적으로 연구한다. 이러한 다양체들이 비구면(aspherical) 경우 밖에서도 풍부하게 존재하며, Kollár 방식의 큰 기본군과 양의 스칼라 곡률 Kähl
