_reason": "Jacobi triple product의 계수 양성(positivity) 문제는 조합론적 구조를 다루지만, McMullen's problem(볼록 점 배치, oriented matroid, tope graph)과는 직접 관련이 없음.", "summary": "정규화된 Jacobi 삼중곱 꼬리(normalized Jacobi triple product tails) $J_k(z,q)$의 계수 양성을 조합론적으로 증명함. Sign-reversing involution과 generalized minimal-excludant를 이용하여 Merca의 추측을 완전히 증명하고, 색칠된 분할(two-colored partitions)에 대한 무한 선형 부등식족을 도출함.", "technique": "Sign-reversing involution을 이용한 Jacobi triple product의 축약, Frobenius arms 위의 invertible lift operator와 크기·길이 보존 bijection의 합성을 통한 주입(injection) 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.26509v1", "title": "Structural Properties and Applications of the Augmented Sombor Index", "authors": ["Chunlei Xu", "Kinkar Chandra Das", "Jayanta Bera"], "abstract": "Topological indices are key quantitative descriptors in mathematical chemistry, unchanged under symmetry operations and retaining graph connectivity; they capture molecular structural features to provide insights into molecular stability and chemical properties, becoming indispensable in cheminformatics and theoretical chemistry. Among degree-based indices, the \\textbf{Sombor index} is widely concerned for capturing structural information, and motivated by enhanced structural discrimination, the \\textbf{augmented Sombor index} ($ASO$) is defined for a connected graph $Ω$ with $|V(Ω)|\\geq 3$ as $$ASO(Ω) = \\sum_{v_iv_j\\in E(Ω)} \\sqrt{\\frac{d_i^2 + d_j^2}{d_i + d_j - 2}},$$ where $d_i$ and $d_j$ are the degrees of vertices $v_i$ and $v_j$, respectively. Within the scope of this study, we first establish several sharp bounds for the augmented Sombor index and characterize the extremal graphs attaining these bounds. In particular, we determine the minimum value of the $ASO$ index for unicyclic graphs with a prescribed girth and characterize all graphs achieving this minimum. We also identify the second maximum $ASO$ value among trees and characterize the corresponding extremal tree structures. Furthermore, the minimum and maximum values of the $ASO$ index for bipartite graphs and chemical graphs are obtained, together with a complete characterization of the associated extremal graphs. In addition, we characterize the chemical trees that maximize the $ASO$ index. The chemical applicability of the $ASO$ index is investigated through quantitative structure-property relationship (QSPR) analysis, supported by a comparative assessment of several variants of the Sombor index. Finally, we present concluding remarks and outline potential directions for future research on the augmented Sombor index of graphs.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T01:30:03+00:00", "updated": "2026-06-25T01:30:03+00:00", "abs_url": "http://arxiv.org/abs/2606.26509v1", "pdf_url": "https://arxiv.org/pdf/2606.26509v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "논문은 그래프의 위상 지표(topological indices) 최적화 문제를 다루지만, McMullen's problem의 핵심인 convex position 점 배치, oriented matroid, 실현가능성(realizability) 등과는 무관.", "summary": "본 논문은 화학그래프와 조합구조에 대한 augmented Sombor index(ASO)를 정의하고, 다양한 그래프 클래스(유니사이클 그래프, 트리, 이분 그래프, 화학그래프)에서의 최솟값과 최댓값을 특성화한다. QSPR 분석을 통해 화학적 응용 가능성을 검증한다.", "technique": "차수(degree) 기반 위상지표의 극값 특성화(extremal graph characterization).", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27352v1", "title": "Congruent copies of finite patterns in planar point sets", "authors": ["Shubhrajit Bhattacharya", "Ritesh Goenka"], "abstract": "Given a finite nonempty planar point set $S$, what is the maximum number of congruent copies of $S$ contained in a set of $n$ points in the Euclidean plane? Building on OpenAI's recent breakthrough on the unit distance problem, we construct planar sets consisting of $n$ points that contain $Ω_S(n^{1+δ_S})$ congruent copies of $S$, for some positive constant $δ_S$ depending only on $S$. This answers a question of Brass and Pach in a strong form, and makes progress on questions posed by Erdős and Purdy, and Ábrego and Fernández-Merchant. Our proof uses the number field construction from Sawin's quantitative refinement of OpenAI's result and consequently yields an explicit choice for $δ_S$ for each fixed $S$.", "categories": ["math.CO", "math.MG"], "primary_category": "math.CO", "published": "2026-06-25T17:56:01+00:00", "updated": "2026-06-25T17:56:01+00:00", "abs_url": "http://arxiv.org/abs/2606.27352v1", "pdf_url": "https://arxiv.org/pdf/2606.27352v1", "journal_ref": "", "doi": "", "comment": "Comments welcome!", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "유한 점 집합의 합동 복사본 개수 세기는 점 배치 문제이지만, McMullen 문제의 convex position, general position, oriented matroid 구조와는 직접적 관련이 없음.", "summary": "유클리드 평면의 n개 점으로 이루어진 집합에서 주어진 유한 점집합 S의 합동 복사본의 최대 개수를 구하는 문제를 다룬다. 저자들은 단위거리 문제에 대한 최근 결과를 활용하여 Ω_S(n^{1+δ_S}) 개의 합동 복사본을 포함하는 점집합을 구성하며, 이는 Brass-Pach의 문제에 답하고 Erdős-Purdy의 질문에 진전을 이룬다.", "technique": "Sawin의 정량적 정제(quantitative refinement)를 통한 수체(number field) 구성 및 단위거리 문제의 결과 활용.", "connections": "추측: 조합 기하의 거리 및 합동 구조 문제이지만, 초록상 oriented matroid, realizability, tope graph 등 이산기하 구조론과의 명시적 연결은 없음.", "keyword_hits": [], "source": "explore"}, {"id": "2606.24882v1", "title": "A Resolution of Erdős Problems 593 and 1177: Obligatory Triple Systems and Exact Spectra", "authors": ["Eric Li"], "abstract": "We resolve Erdős Problems #593 and #1177. Problem #593 asks which finite triple systems occur in every uncountably chromatic triple system; the answer is exactly the class generated from private-vertex expansions of finite bipartite graphs by finite disjoint unions and one-point amalgamations. Equivalently, after isolated vertices are removed, a finite triple system is obligatory precisely when it is linear, every hyperedge-node of its Levi graph has an incident bridge, and every Berge cycle is even.   The proof uses an exact bridge-trace theorem for complete-rank one-apex sequence lifts. We also prove that, for every uncountable cardinal kappa, there is a linear triple system of chromatic number exactly kappa, with at most 2^{2^mu} vertices when kappa=mu^+. These two ingredients give a class-valued exact avoidance-spectrum dichotomy for every finite forbidden triple system. As a consequence, Erdős Problem #1177 has truth values yes, no, and yes.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T17:57:39+00:00", "updated": "2026-06-23T17:57:39+00:00", "abs_url": "http://arxiv.org/abs/2606.24882v1", "pdf_url": "https://arxiv.org/pdf/2606.24882v1", "journal_ref": "", "doi": "", "comment": "23 pages, 1 figure", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "조합론의 하이퍼그래프·색칠수 문제이나 McMullen's problem(볼록위치, 배향매트로이드, 다면체 구조)과는 직접 관련 없음.", "summary": "Erdős 문제 #593과 #1177을 해결하며, 비계수 삼중계(triple system)에서 필수적으로 나타나는 유한 삼중계를 특성화한다. 이는 이분 그래프의 특정 확장으로부터 생성되는 체계(선형성, Levi 그래프의 다리 조건, 짝수 Berge 순환 조건)로 정확히 규명된다.", "technique": "complete-rank one-apex sequence lifts에 대한 정확한 bridge-trace 정리와 무한 기수에 대한 정확한 색칠수 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.25505v1", "title": "The Angular Seed Power Map: A Constructive Approach to Recursive Scaling Spirals", "authors": ["Arjen Toni Dijksman"], "abstract": "We present the ''Power Spiral Map'', a continuous angular evolution of the linear coordinate grid established in our previous work. While that previous Power Map utilized a seed value translating along a horizontal axis, this work builds upon a seed angle ($θ$) projected onto a unit diameter circle. This operation controls two coupled geometric behaviors: an internal area-preserving partition of unity within a reference square (cos 2 $θ$ + sin 2 $θ$ = 1) and an external recursive scaling mechanism (sec $θ$ and cos $θ$) that dictates the expansion or contraction of successive generations of squares unfolding as a spiral in the 2D plane. We demonstrate that continuous variation of this angular parameter generates discrete geometric alignments that yield polynomial identities, with examples of the Golden Ratio ($Φ$) and the Plastic Ratio ($ψ$) defined through purely planar intersections.", "categories": ["math.MG", "math-ph"], "primary_category": "math.MG", "published": "2026-06-24T07:39:42+00:00", "updated": "2026-06-24T07:39:42+00:00", "abs_url": "http://arxiv.org/abs/2606.25505v1", "pdf_url": "https://arxiv.org/pdf/2606.25505v1", "journal_ref": "", "doi": "", "comment": "This is a new submission (v1) intended for cross-listing/transfer to arXiv under the mathematics/geometry category", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "원형 기반 나선 구조와 기하학적 분할을 다루지만 McMullen의 문제(convex position 점 배치, oriented matroid, realizability)와는 직접 관련 없음.", "summary": "각도 매개변수 θ를 기반으로 단위원 위의 seed angle을 투영하여 Power Spiral Map을 구성함. 이를 통해 참조 정사각형 내 면적 보존 분할(partition of unity)과 외부 재귀적 스케일링 메커니즘(sec θ, cos θ)을 제어하여 2D 평면에 나선을 생성함. 연속적인 각도 변화가 이산 기하학적 정렬을 산출하며 황금비와 플라스틱 비를 포함한 다항식 항등식을 도출함.", "technique": "각도 매개변수화된 나선 구성과 면적 보존 분할을 통한 재귀적 스케일링 메커니즘.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.28041v1", "title": "The Erdos n^2/25 max-cut conjecture for small multiples of five, via a per-root-MaxCut envelope and blow-up integrality", "authors": ["Alper Ferudun"], "abstract": "Erdős conjectured that every triangle-free graph on $N$ vertices can be made bipartite by deleting at most $N^2/25$ edges; the bound would be sharp, attained by the balanced blow-up $C_5[N/5]$. Writing $β(G)$ for the minimum number of edges whose deletion makes $G$ bipartite and $a(N) = \\max\\{β(G):G$ triangle-free on $N$ vertices$\\}$, the conjecture is $a(N)\\le N^2/25$, and for $N=5n$ it reads $a(5n)\\le n^2$. Balogh, Clemen and Lidícký proved it for large $N$ in the two density tails (edge density at most $0.2486$ or at least $0.3197$) and proved the global bound $a(N)\\le N^2/23.5$; the medium-density band remains open. We prove \\[ a(5n) = n^2 \\qquad \\text{for every } 1 \\le n \\le 40, \\quad \\text{i.e. } N \\in \\{5,10,\\dots,200\\}. \\] The proof is computer-assisted and combines three ingredients. (i) A \\emph{per-root-MaxCut envelope}: for the $107$ triangle-free $7$-root types, the mean over types of the best per-type cut is an upper bound $d_{\\rm mono}(W)\\le U_7(W)$ that is \\emph{tight} at the $C_5$-blow-up. (ii) An order-$10$ flag-algebra certificate -- the per-root-MaxCut rows at $7$ and $8$ roots together with rooted-Horn cuts and a manifestly-PSD moment block -- bounds the envelope on the medium band, $U_7(W)\\le \\tfrac{2}{25}+δ$ with an explicit rational $δ\\approx 4.8558\\times10^{-5}$, for every triangle-free graphon $W$ of edge density in $[0.2486,0.3197]$. (iii) The blow-up identity $β(G[t])=t^2β(G)$ plus integrality of $β$ turns this into $β(G)\\le n^2+\\tfrac{25}{2}n^2δ$ for any $5n$-vertex band-density $G$, and $\\tfrac{25}{2}n^2δ<1$ for $n\\le 40$; the two density tails are handled by the Balogh-Clemen-Lidícký bounds, transferred to finite $N$ by the same blow-up. The envelope bound $d_{\\rm mono} \\le U_7$ is a genuine graphon upper bound (each per-root rule is one global $2$-colouring), the certificate is verified in exact rational arithmetic, the moment positivity is Razborov's flag-algebra theorem exhibited as an exact Gram factorization, and the bound is cross-checked against brute-force max-cut on all triangle-free graphs of order at most $12$. The same envelope at orders $9$ and $10$ provably does not reach the constant needed for larger $n$; we explain why, and locate the all-$n$ conjecture at a single self-tight obstruction.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-26T12:44:10+00:00", "updated": "2026-06-26T12:44:10+00:00", "abs_url": "http://arxiv.org/abs/2606.28041v1", "pdf_url": "https://arxiv.org/pdf/2606.28041v1", "journal_ref": "", "doi": "", "comment": "9 pages. Computer-assisted. Ancillary files: order-10 per-root-MaxCut + rooted-Horn flag-algebra certificate with an independent exact-arithmetic verifier, a self-contained brute-force max-cut ground-truth checker, and the manifestly-PSD moment Gram certificate", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Erdős max-cut conjecture는 그래프 이론의 극값 문제이며, McMullen's problem(convex polytope의 combinatorial structure)과는 주제와 기법이 근본적으로 다릅니다.", "summary": "본 논문은 삼각형 없는 그래프에서 이분 그래프로 만들기 위해 삭제해야 할 최대 간선 수에 관한 Erdős 추측을 다룹니다. Flag algebra와 blow-up 항등식을 결합한 컴퓨터 보조 증명으로 $N \\in \\{5,10,\\ldots,200\\}$에 대해 $a(5n)=n^2$을 증명합니다.", "technique": "Per-root-MaxCut envelope(107개 삼각형 없는 7-근 타입에 대한 평균 상한)과 10차 flag-algebra certificate를 조합하여 graphon의 중간 밀도 대역에서 경계를 확립하고, blow-up 항등식 $\\beta(G[t])=t^2\\beta(G)$의 정확성을 이용합니다.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24349v1", "title": "Sharp bounds for minimal dependencies of linear-form powers", "authors": ["Heng Li", "Xizhi Liu"], "abstract": "Motivated by the dimension-bound part of a problem of Bukh, we study Veronese circuits: how large can the span of $t$ linear forms be if their $m$-th powers are minimally linearly dependent? We prove the sharp finite dimension bound \\[   \\dim L\\leq \\frac{t+m-2}{m}. \\] Here $\\ell_1,\\ldots,\\ell_t$ are nonzero homogeneous linear forms over a field of characteristic zero, the powers $\\ell_1^m,\\ldots,\\ell_t^m$ form a circuit, and $L=\\Span\\{\\ell_1,\\ldots,\\ell_t\\}$. Rational-normal-curve configurations attain equality for infinitely many pairs $(t,\\dim L)$; in particular, the affine bound itself is sharp and the optimal leading constant in Bukh's question is $1/m$.   The proof uses a coding-theoretic translation: the coefficient row space of the powers is the $m$-th Schur power of the coefficient code, and the minimality hypothesis makes this Schur power a full-support hyperplane to which the Schur-product Kneser theorem of Mirandola and Zémor applies. The same method yields flat-concentration and interpolation criteria, a Cayley--Bacharach lower bound, Segre--Veronese and positive-characteristic variants, and Hilbert-function constraints for equality and near-equality in Veronese circuits.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T09:40:15+00:00", "updated": "2026-06-23T09:40:15+00:00", "abs_url": "http://arxiv.org/abs/2606.24349v1", "pdf_url": "https://arxiv.org/pdf/2606.24349v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "선형형식의 거듭제곱에 대한 최소 선형종속성을 다루지만, McMullen's problem의 convex position 점 배치, oriented matroid, 또는 다면체 구조와는 직접 관련이 없음.", "summary": "특성 0 체 위에서 $t$개 선형형식의 $m$제곱이 최소선형종속(circuit)을 이룰 때, 그 span의 차원에 대한 sharp bound $\\dim L \\leq \\frac{t+m-2}{m}$을 증명함. Rational-normal-curve 구성이 무한히 많은 경우에 등호를 달성하며, Schur power와 coding theory를 활용한 증명 방법을 제시함.", "technique": "코딩이론적 번역(Schur power)과 Schur-product Kneser theorem의 적용.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24325v1", "title": "Exact Enumeration of Phylogenetic Networks: The Tree-Child, Reticulation-Visible and Orchard Hierarchy", "authors": ["Josep Batle"], "abstract": "We develop a unified framework for the exact enumeration and asymptotic analysis of the three most studied classes of phylogenetic networks: tree-child (TC), reticulation-visible (RV) and orchard networks, whose cardinalities satisfy the strict ordering $|\\mathrm{TC}_{\\ell,k}|<|\\mathrm{RV}_{\\ell,k}|<|\\mathrm{Orch}_{\\ell,k}|$ for reticulation number $k\\geq2$ (with $\\mathrm{TC}\\subsetneq\\mathrm{RV}$ and $\\mathrm{TC}\\subsetneq\\mathrm{Orch}$, while $\\mathrm{RV}$ and $\\mathrm{Orch}$ are incomparable as sets). Using the Chang--Fuchs structural theorem, we derive a two-level master functional equation for the RV bivariate generating function and obtain exact closed-form identities for the differences $Δ_k(\\ell):=|RV_{\\ell,k}|-|TC_{\\ell,k}|$ for $k=2,3$, with the asymptotic universality $Δ_k(\\ell)/|TC_{\\ell,k}|\\sim k!/\\ell$. For orchard networks, we prove a \\emph{universal hypergeometric law} that resolves the exact enumeration problem for all $\\ell$: the column generating function $F_\\ell(v)$ is rational with denominator $D_\\ell(v)=\\prod_{j=2}^\\ell X_j(v)$, where \\[   X_\\ell(v) = \\sum_{k=0}^{\\lfloor\\ell/2\\rfloor}(-1)^k\\,   \\frac{\\ell!}{(\\ell-2k)!\\,k!}\\,v^k \\] is the matching polynomial of the complete graph $K_\\ell$ and a rescaled Jacobi polynomial. This immediately resolves the intractable $\\ell=9$ case: $D_9$ has degree 20, dominant growth rate $\\approx40.73$, and all spectral roots are positive real. A complete enumeration table is provided extending the published data of Cardona, Ribas and Pons.", "categories": ["math.CO", "q-bio.PE"], "primary_category": "math.CO", "published": "2026-06-23T09:02:23+00:00", "updated": "2026-06-23T09:02:23+00:00", "abs_url": "http://arxiv.org/abs/2606.24325v1", "pdf_url": "https://arxiv.org/pdf/2606.24325v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "계산적 조합론과 생성함수 사용하나, McMullen's problem(볼록다각형의 면 수)과는 수학적 주제가 무관.", "summary": "트리-차일드(TC), 망상-가시(RV), 과수원(Orchard) 계통망의 세 클래스에 대한 통일된 열거 프레임워크를 개발. Chang-Fuchs 구조 정리를 이용해 RV의 생성함수 함수방정식을 도출하고, 과수원망에 대해 보편 초기하 법칙을 증명하여 모든 $\\ell$에 대한 정확한 열거 문제를 해결.", "technique": "생성함수 방법, Chang-Fuchs 구조 정리, 완전그래프 $K_\\ell$의 매칭 다항식(matching polynomial)과 재스케일된 야코비 다항식(Jacobi polynomial) 활용.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24243v1", "title": "Minimal excludant integer and bilateral truncated Jacobi triple product identity", "authors": ["Y. H. Chen", "W. D. Deng", "Thomas Y. He", "H. X. Huang"], "abstract": "In 2012, Andrews and Merca proved a truncated theorem on Euler's pentagonal number theorem. Since then, a number of results on truncated theta series have been proved, including truncated Jacobi triple product identity. In this paper, we provide partition-theoretic interpretations for the bilateral truncated Jacobi triple product identity in terms of the minimal excludant integer.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T07:30:15+00:00", "updated": "2026-06-23T07:30:15+00:00", "abs_url": "http://arxiv.org/abs/2606.24243v1", "pdf_url": "https://arxiv.org/pdf/2606.24243v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "논문의 핵심은 분할론(partition theory)과 truncated theta series에 관한 것으로, McMullen's problem이 다루는 convex position, oriented matroid, realizability 등과 직접적 연관이 없음.", "summary": "본 논문은 2012년 Andrews와 Merca의 Euler 오각수 정리에 관한 truncated theorem을 바탕으로, bilateral truncated Jacobi triple product identity에 대한 분할론적 해석을 제공한다. minimal excludant integer를 이용하여 이 항등식의 조합론적 의미를 밝힌다.", "technique": "minimal excludant integer를 활용한 partition-theoretic interpretation과 truncated theta series 항등식의 조합론적 증명.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.25406v1", "title": "Linear relations for Tutte polynomials of semimatroids", "authors": ["Houshan Fu"], "abstract": "We establish a family of linear relations for the coefficients of the Tutte polynomial of a semimatroid. We also introduce ranked central sets, a mild generalization of semimatroids, and prove that the same identities hold in this broader setting. The proof relies on the specialization $x=\\frac{z}{z-1}$, $y=z$ along the hyperbola $(x-1)(y-1)=1$; under this specialization, the edge subgraph expansion over central sets reduces to the $f$-polynomial of the central set complex. As applications, we obtain explicit formulas for Tutte polynomials of affine hyperplane arrangements and for balanced Tutte polynomials of biased graphs, whose central sets are central subarrangements and balanced edge sets, respectively. Our results recover the generalized Brylawski's identities for Tutte polynomials of ranked sets, matroids and graphs.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-24T05:05:10+00:00", "updated": "2026-06-24T05:05:10+00:00", "abs_url": "http://arxiv.org/abs/2606.25406v1", "pdf_url": "https://arxiv.org/pdf/2606.25406v1", "journal_ref": "", "doi": "", "comment": "16 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Tutte polynomial identities와 semimatroid는 조합론적 기하학의 일반적 구조를 다루지만, McMullen's problem (convex position, oriented matroid, realizability)과는 직접적 연관이 없음.", "summary": "논문은 세미매트로이드(semimatroid)의 Tutte 다항식 계수에 대한 선형 관계식족을 확립하고, 이를 순위가 있는 중심 집합(ranked central sets)으로 일반화한다. 특수화 $x=\\frac{z}{z-1}$, $y=z$를 사용하여 중심 집합 복합체의 $f$-다항식과 연결시킨다. 초록 다항식 배열(affine hyperplane arrangement)과 편향 그래프(biased graph)의 균형 Tutte 다항식에 명시 공식을 제공한다.", "technique": "중심 집합 복합체의 $f$-다항식으로의 축약을 통한 하이퍼볼라 특수화 $(x-1)(y-1)=1$ 기법.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.26735v1", "title": "Strong counterexamples to Mubayi's supersaturation conjecture in every uniformity", "authors": ["Heng Li", "Hong Liu", "Xizhi Liu", "Jing Wang"], "abstract": "The classical supersaturation problem, originating in classical results of Rademacher and Erdős on complete graphs, asks for the minimum number of copies of an $r$-graph $\\mathcal{F}$ in an $n$-vertex $r$-graph with $\\ex(n,\\mathcal{F})+q$ edges. Mubayi conjectured that, for every stable non-$r$-partite $r$-graph $\\mathcal{F}$, this minimum is at least $q c(n,\\mathcal{F})$, where $c(n,\\mathcal{F})$ is the minimum number of copies created by adding one edge to the $n$-vertex extremal $\\mathcal{F}$-free $r$-graph. Ma and Yuan recently constructed infinitely many graph counterexamples, with arbitrary chromatic number at least four.   We construct, for every $r\\ge 2$ and every $K>1$, a stable non-$r$-partite $r$-graph $\\mathcal{F}$ with the following property: for all sufficiently large $n$ and every integer $q$ with $1\\le q\\le δn$, there is an $n$-vertex $r$-graph with $\\ex(n,\\mathcal{F})+q$ edges and at most $K^{-1}q c(n,\\mathcal{F})$ copies of $\\mathcal{F}$. Thus Mubayi's conjectured lower bound can already fail at $q=1$, and the failure can be by an arbitrarily large constant factor in every uniformi", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T08:16:56+00:00", "updated": "2026-06-25T08:16:56+00:00", "abs_url": "http://arxiv.org/abs/2606.26735v1", "pdf_url": "https://arxiv.org/pdf/2606.26735v1", "journal_ref": "", "doi": "", "comment": "30 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "극값 조합론(extremal combinatorics)의 초포화 문제로, McMullen's problem의 볼록위치·oriented matroid 실현가능성과 직접적 연결 없음.", "summary": "본 논문은 Mubayi의 초포화 추측(supersaturation conjecture)이 모든 uniformity에서 거짓임을 보인다. 모든 $r \\geq 2$와 $K > 1$에 대해, 충분히 큰 $n$과 $1 \\le q \\le \\delta n$인 정수 $q$에서 $\\ex(n,\\mathcal{F}) + q$ 간선을 가지면서 $\\mathcal{F}$의 복사본이 최소 $K^{-1}q c(n,\\mathcal{F})$개 이하인 $n$-정점 $r$-그래프를 구성한다.", "technique": "명시적 구성(explicit construction)을 통한 반례 제시; 초록에서 구체적 기법은 명시되지 않음.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27765v1", "title": "Cylinder-like Pappus's hexagon theorem in Nil geometry", "authors": ["Jenő Szirmai"], "abstract": "In this paper we deal with Nil geometry, in whose projective model the geodesic curves are helix-like and fit onto geodesic Nil cylinders of revolution with fibrum axes. In this paper we investigate relations for geodesic cylinders and thus also geodesic curves, which lead to an analogous result to Pappus's hexagon theorem and provide important information about the structure of the considered space.", "categories": ["math.MG"], "primary_category": "math.MG", "published": "2026-06-26T06:49:06+00:00", "updated": "2026-06-26T06:49:06+00:00", "abs_url": "http://arxiv.org/abs/2606.27765v1", "pdf_url": "https://arxiv.org/pdf/2606.27765v1", "journal_ref": "", "doi": "", "comment": "16 pages, 3 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Nil 기하의 Pappus 정리 유사 결과는 McMullen's problem(고차원 볼록점 배치, oriented matroid, 실현성)과 직접 관련성이 없음.", "summary": "Nil 기하의 사영 모형에서 측지선이 나선 형태이며 회전 측지 원기둥 위에 적합하는 성질을 연구함. 측지 원기둥에 대한 관계식을 통해 Pappus의 육각형 정리와 유사한 결과를 도출하고 해당 공간의 구조적 정보를 제공함.", "technique": "Nil 기하의 사영 모형과 측지 원기둥 위의 나선형 곡선의 기하학적 관계식 분석", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24763v1", "title": "Asymmetric induced saturation", "authors": ["Xinyue Fan", "Sahab Hajebi", "Sepehr Hajebi", "Sophie Spirkl"], "abstract": "For which graphs $H$ does there exist a graph $G$ with at least one edge and no induced subgraph isomorphic to $H$, such that deleting any edge of $G$ creates an induced copy of $H$? We call such a graph \"$H$-deletion-saturated\". This version of the well-studied notion of \"$H$-induced-saturated\" graphs -- where both adding and deleting any edge creates an induced copy of $H$ -- appears more tractable. For example, while it remains wide open whether $H$-induced-saturated graphs exist for every even cycle $H$, we proved recently that deletion-saturated graphs exist for all even cycles. In fact, apart from complete graphs, no graph $H$ is known for which $H$-deletion-saturated graphs do not exist. We conjecture that $H$-deletion-saturated graphs exist for every non-complete graph $H$, and prove this conjecture for several types of graphs, including: complete bipartite graphs with parts of unequal size, triangle-free graphs with one cycle, graphs with two leaves at distance at most three, and line graphs of trees. In fact, in all cases, we prove the conjecture for substantially more general families. We also verify our conjecture for every graph $H$ on at most six vertices.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T16:20:18+00:00", "updated": "2026-06-23T16:20:18+00:00", "abs_url": "http://arxiv.org/abs/2606.24763v1", "pdf_url": "https://arxiv.org/pdf/2606.24763v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "극단 그래프 존재성 문제이지만 McMullen's problem(d=5, convex position, oriented matroid, polyhedral structure)과는 기하학적·조합적 구조가 근본적으로 무관.", "summary": "그래프 $H$에 대해 $H$-deletion-saturated 그래프의 존재성을 연구한다. 이는 $H$-induced-saturated 개념의 비대칭 버전으로, 임의의 간선 삭제가 유도된 $H$ 복사본을 생성하는 그래프를 찾는 문제이다. 완전 그래프를 제외한 모든 그래프에 대해 해당 그래프가 존재한다는 추측을 제시하고 여러 그래프 클래스에서 증명한다.", "technique": "", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24695v1", "title": "Forcing monochromatic induced subgraphs", "authors": ["Sepehr Hajebi", "Sophie Spirkl"], "abstract": "We prove that for all $c\\in\\mathbb N$ and nonnull graphs $H_1,\\ldots,H_t$, there exists $n\\in\\mathbb N$ such that if $G$ is a $c$-edge-colored complete graph with no monochromatic induced copy of the complete join of $H_1,\\ldots,H_t$, then $V(G)$ is the union of $n$ sets $V_1,\\ldots,V_n$ such that within each set $V_j$ with $|V_j|\\neq 1$, the edges of some color form a graph that excludes at least one of $H_1,\\ldots,H_t$ as an induced subgraph. In fact, the same holds even if the colors overlap, and with a different list of graphs $H_1,\\ldots,H_t$ assigned to each color. When $H_1,\\ldots,H_t$ each have a single vertex, this is Ramsey's theorem, and when $c=2$, this is the \"excluding pairs of graphs\" theorem of Chudnovsky, Scott, and Seymour.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T15:23:37+00:00", "updated": "2026-06-23T15:23:37+00:00", "abs_url": "http://arxiv.org/abs/2606.24695v1", "pdf_url": "https://arxiv.org/pdf/2606.24695v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이산기하학의 McMullen 문제와 달리, 본 논문은 그래프 색칠 및 Ramsey 이론 문제로 조합론의 다른 분야에 속함.", "summary": "본 논문은 c-간선 색칠 완전그래프에서 특정 그래프들의 단색 유도 부분그래프를 피할 때, 꼭짓점 집합을 n개의 부분으로 분할할 수 있음을 증명한다. Ramsey 정리와 Chudnovsky-Scott-Seymour의 두 그래프 제외 정리를 일반화한다.", "technique": "", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.25931v1", "title": "A Simple Counting Argument for Dense Linear Hypergraphs", "authors": ["Lior Gishboliner", "József Solymosi"], "abstract": "In connection to the Brown-Erdős-Sós conjecture, we give a short local averaging proof of a density theorem for linear uniform hypergraphs. Let $r \\ge 3$, $k \\ge 3$, and suppose that $n \\ge (r-2)(k-2)+1$. If $H$ is a linear $r$-uniform hypergraph on $n$ vertices and \\[|E(H)| \\geq \\frac{k-2}{r^2((r-2)(k-2)+1)}n^2 + \\frac{n}{r},\\] then $H$ contains $k$ edges spanning at most $(r-2)k+3$ vertices. In the standard linear-density normalization, this gives the asymptotic density threshold $c \\geq \\frac{r-1}{r} \\cdot \\frac{k-2}{(r-2)(k-2)+1} + o(1)$. In particular, this yields a simple proof of the large-uniformity form of the Brown-Erdős-Sós theorem, due to Keevash and Long. In the case of triple systems, our bound becomes $c \\geq \\frac{2(k-2)}{3(k-1)} + o(1)$, improving upon a bound of $\\frac{4}{5}$ due to Santos and Tyomkyn.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-24T15:07:33+00:00", "updated": "2026-06-24T15:07:33+00:00", "abs_url": "http://arxiv.org/abs/2606.25931v1", "pdf_url": "https://arxiv.org/pdf/2606.25931v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "극단 조합론의 밀도 문제로, McMullen's problem의 중심인 점 배치와 구조적 정리와는 직접적 연관성 없음.", "summary": "본 논문은 Brown-Erdős-Sós 추측 관련 선형 균일 초그래프의 밀도 정리를 국소 평균화 논증으로 증명한다. 주어진 간선 수 조건 하에서 $k$개 간선이 최대 $(r-2)k+3$개 정점을 생성함을 보이며, 특히 삼중계 경우 $c \\geq \\frac{2(k-2)}{3(k-1)} + o(1)$의 개선된 밀도 임계값을 도출한다.", "technique": "국소 평균화 논증(local averaging argument)을 통한 밀도 임계값 증명", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.30617v1", "title": "Peelings and Wrappings of Families of Convex Sets with Applications to Strongly Convex Sets Generated by Random Samples", "authors": ["Alexander Marynych", "Mykyta Sadok"], "abstract": "We introduce and study peeling and wrapping operations for families of compact convex sets. The two peeling procedures considered in the paper are the $m$-point peeling, obtained by intersecting the convex hulls remaining after all possible deletions of $m$ members of the family, and the recursive convex hull peeling, obtained by repeatedly removing the contributing sets, that is, those members whose deletion strictly changes the convex hull. Using polarity, we also introduce the dual wrapping operations for intersections of convex sets.   The deterministic part of the paper develops the geometric framework needed for these constructions. In particular, we study contributing sets under general position assumptions, explain the role of compactness of convex hulls of subfamilies, and prove continuity results for both peeling procedures with respect to a suitable vague convergence of locally finite point measures on the space of compact convex sets.   The probabilistic part applies this framework to $K$-hulls generated by random samples from a convex body $K$. Assuming that $K$ is strictly convex and regular, we prove that the m-point and recursive peelings of the polar bodies associated with the random $K$-hulls converge in distribution to the corresponding peelings of the limiting Poisson object. By polarity, this also yields distributional convergence of the associated wrapping operations for the rescaled random sets themselves.", "categories": ["math.MG", "math.PR"], "primary_category": "math.MG", "published": "2026-06-29T17:51:04+00:00", "updated": "2026-06-29T17:51:04+00:00", "abs_url": "http://arxiv.org/abs/2606.30617v1", "pdf_url": "https://arxiv.org/pdf/2606.30617v1", "journal_ref": "", "doi": "", "comment": "28 pages;", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 볼록 집합족의 peeling/wrapping 연산과 확률론적 수렴을 다루며, McMullen 문제(d=5에서의 점 배치, oriented matroid 등)와 직접적인 관련이 없다.", "summary": "이 논문은 컴팩트 볼록 집합족에 대한 $m$-point peeling과 재귀적 convex hull peeling, 그리고 쌍대(polarity)를 통한 wrapping 연산을 도입하고 연구한다. 결정론적 파트에서는 일반 위치 가정 하에 contributing sets를 분석하고 적절한 vague convergence에 대한 연속성 결과를 증명한다. 확률론적 파트에서는 strictly convex이고 regular한 볼록체 $K$에서의 랜덤 샘플로 생성된 $K$-hulls에 대해, 극체(polar bodies)의 $m$-point 및 재귀 peeling이 분포 수렴함을 증명한다.", "technique": "볼록 집합족의 polarity(쌍대성)를 활용하여 peeling과 wrapping을 연결하고, 국소 유한 점 측도의 vague convergence 하에서의 연속성을 통해 Poisson 극한 객체로의 분포 수렴을 확립한다.", "connections": "", "keyword_hits": ["general position"], "source": "filter"}, {"id": "2606.30184v1", "title": "Stable complete coordinates for multisets of points via basic $r$-symmetric tropical polynomials", "authors": ["Susumu Kubo"], "abstract": "A multiset of $n$ unordered points in $\\mathbb{R}^r$ -- a point cloud, or, for $r=2$, a persistence barcode of birth-death pairs -- is a point of the orbit space $\\mathbb{R}^{nr}/S_n$ for the symmetric group $S_n$ permuting the rows of an $n \\times r$ matrix; a separating family of invariants on this space is exactly a complete set of permutation-independent coordinates. We provide one that is explicit, small, and stable, in the max-plus (tropical) setting: for all $n \\geq 1$ and $r \\geq 1$, the $\\binom{n+r}{r}$ basic $r$-symmetric tropical polynomials, of degree at most $n$, separate the orbits of $S_n$ on $\\mathbb{R}^{nr}$. This settles in full a problem left open in [Kubo, J. Pure Appl. Algebra 223 (2019) 72-85], where separation was known only for $r=2$ and special cases of $r \\geq 3$, and yields a family far smaller and of lower degree than the general separating sets from Derksen's recent theory of tropical invariants for permutation actions ($nr + (nr)!/n!$ invariants of degree $O(n^2 r^2)$). The proof is elementary and constructive: the basic values are identified with a transportation problem, and the multiset is recovered from the dual by an explicit algorithm. We further show the coordinate map is a bi-Lipschitz embedding for all $n$ and $r$, being an injective max filter bank (via the bi-Lipschitz theory of max filtering), with an explicit Lipschitz constant for the forward bound and a fully explicit, dimension-free distortion when $r=1$. Finally we determine when the pairwise values suffice (exactly $n \\leq 3$) and show that invariants on at least three columns and of degree less than $n$ are necessary in general, the obstruction being a standard non-uniqueness configuration from discrete tomography.", "categories": ["cs.DM", "math.AG", "math.CO", "math.MG"], "primary_category": "cs.DM", "published": "2026-06-29T11:58:08+00:00", "updated": "2026-06-29T11:58:08+00:00", "abs_url": "http://arxiv.org/abs/2606.30184v1", "pdf_url": "https://arxiv.org/pdf/2606.30184v1", "journal_ref": "", "doi": "", "comment": "12 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 열대(tropical)/max-plus 설정에서 점들의 다중집합(multiset)의 완전 좌표계를 다루며, McMullen 문제나 Larman 추측과 직접적인 관련이 없다.", "summary": "이 논문은 $\\mathbb{R}^r$의 $n$개 비순서 점들의 다중집합(point cloud)을 분리하는 완전한 순열-불변 좌표계로서, $\\binom{n+r}{r}$개의 기본 $r$-대칭 열대 다항식(basic $r$-symmetric tropical polynomial)이 $S_n$의 궤도를 완전히 분리함을 증명한다. 이는 수송 문제(transportation problem)와의 동일시를 통해 초등적·구성적으로 증명되며, 이 좌표 사상이 bi-Lipschitz 임베딩임도 보인다. 아울러 이산 단층촬영(discrete tomography)의 비유일성 구성으로부터 degree $< n$인 불변량만으로는 충분하지 않음을 증명한다.", "technique": "수송 문제(transportation problem)와의 동일시 및 쌍대(dual)에서의 명시적 복원 알고리즘, max 필터 뱅크(max filter bank)의 bi-Lipschitz 이론을 활용한 열대 다항식 기반 분리.", "connections": "", "keyword_hits": ["tropical"], "source": "filter"}, {"id": "2606.29753v1", "title": "A Complete Classification of Discrete $d$-Pseudomanifolds with at Most $2d+7$ Vertices", "authors": ["Biplab Basak", "Debolina Ghosh", "Raju Kumar Gupta"], "abstract": "A simple undirected graph $M$ is called a discrete $d$-pseudomanifold if, for every vertex $v$, the induced subgraph $N_M(v)$ on the neighbors of $v$ is a discrete $(d-1)$-pseudomanifold, where a discrete $1$-pseudomanifold is defined to be an $n$-cycle with $n\\geq 4$.   These objects arise naturally as graph-theoretic analogues of simplicial pseudomanifolds and provide a purely combinatorial framework for studying manifold-like structures through local neighborhood conditions. Understanding discrete pseudomanifolds with a small number of vertices is therefore a fundamental problem in combinatorial topology and extremal graph theory.   In this article, we first prove that every discrete $d$-pseudomanifold has at least $2(d+1)$ vertices. We then provide a complete classification of discrete $d$-pseudomanifolds with at most $2d+6$ vertices by determining all possible combinatorial types of such pseudomanifolds. Further, we establish an equivalence between discrete $d$-pseudomanifolds and edge graphs of flag normal $d$-pseudomanifolds. As a consequence, we derive a purely combinatorial characterization of flag normal $d$-pseudomanifolds with at most $2d+6$ vertices and prove that each such complex is a simplicial $d$-sphere.   Finally, we show that this sphere characterization is optimal within the class of flag normal $d$-pseudomanifolds by constructing examples on $2d+7$ vertices that are not spheres. Specifically, we prove that, for $d\\geq 3$, every flag normal $d$-pseudomanifold with at most $2d+7$ vertices is either a simplicial $d$-sphere or a flag triangulation of the $(d-2)$-fold suspension of $\\mathbb{RP}^{2}$.", "categories": ["math.CO", "math.GT"], "primary_category": "math.CO", "published": "2026-06-29T03:51:57+00:00", "updated": "2026-06-29T03:51:57+00:00", "abs_url": "http://arxiv.org/abs/2606.29753v1", "pdf_url": "https://arxiv.org/pdf/2606.29753v1", "journal_ref": "", "doi": "", "comment": "24 pages, 3 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 이산 유사다양체(discrete pseudomanifold)의 조합론적 분류를 다루며, McMullen 문제(oriented matroid의 acyclic reorientation, 점 배치 등)와 직접적인 관련이 없다.", "summary": "이 논문은 이산 $d$-유사다양체(discrete $d$-pseudomanifold)를 그래프-이론적으로 정의하고, 모든 이산 $d$-유사다양체가 최소 $2(d+1)$개의 꼭짓점을 가짐을 증명한다. 꼭짓점 수가 최대 $2d+6$인 경우의 완전한 분류를 수행하고, flag normal $d$-유사다양체와의 동치 관계를 확립하여 해당 복합체가 단체 $d$-구(simplicial $d$-sphere)임을 보인다. 나아가 $2d+7$개의 꼭짓점을 가진 flag normal $d$-유사다양체($d \\geq 3$)는 단체 $d$-구 또는 $\\mathbb{RP}^2$의 $(d-2)$중 현수(suspension)의 flag 삼각분할임을 증명한다.", "technique": "귀납적 국소 이웃 조건 분석과 flag normal 유사다양체의 변 그래프(edge graph) 동치 관계를 활용한 조합론적 분류.", "connections": "", "keyword_hits": ["triangulation"], "source": "filter"}, {"id": "2606.29477v1", "title": "Chamber geometry and specification numbers of Boolean threshold functions", "authors": ["Martin Anthony"], "abstract": "The specification number $σ_n(f)$ of a Boolean threshold function $f$ on $n$ variables is the least number of points whose $f$-values determine $f$ uniquely among all threshold functions. Its essential points form the unique minimum such set. We develop Zuev's geometric interpretation: the threshold functions are the chambers of a central hyperplane arrangement in the $(n+1)$-dimensional space of weights and thresholds, and the essential points of a function correspond exactly to the facets of its chamber, so the specification number is the chamber's facet number.   The lower bound $σ_n(f)\\ge n+1$ becomes the fact that a pointed full-dimensional cone has at least $n+1$ facets, with equality for simplicial chambers. The average specification number $\\overlineσ_n$ becomes an average facet count. We evaluate this average exactly via the resonance arrangement and bound it through a theorem of Fukuda, Tamura, and Tokuyama, obtaining $\\overlineσ_n\\le 2n$; hence $\\overlineσ_n=Θ(n)$. This settles a question of Gutekunst, Mészáros, and Petersen. The method also extends to polynomial threshold functions.   The same geometry links threshold functions with a threshold zonotope, whose vertices are modified Chow vectors. Its one-skeleton is the one-inclusion graph, and a vertex's degree is the specification number of that function.   Finally, we treat the operations of Lozin et al. on functions of minimum specification number. Adding a variable and extending on a variable both take the product of a chamber closure with a half-line, preserving simpliciality. For the symmetric-variables extension we give an exact thresholdness criterion and show that minimum specification number is preserved whenever the extension is a threshold function. We also resolve a question they pose concerning a fourth operation.", "categories": ["cs.DM", "cs.LG", "math.CO"], "primary_category": "cs.DM", "published": "2026-06-28T16:12:31+00:00", "updated": "2026-06-28T16:12:31+00:00", "abs_url": "http://arxiv.org/abs/2606.29477v1", "pdf_url": "https://arxiv.org/pdf/2606.29477v1", "journal_ref": "", "doi": "", "comment": "61 pages, 2 figures, 2 tables", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 Boolean threshold function의 사양 수(specification number)와 초평면 배열의 챔버 기하학을 다루며, McMullen 문제나 Larman 추측과는 직접적인 관련이 없다.", "summary": "이 논문은 Boolean threshold function의 사양 수 $\\sigma_n(f)$를 $(n+1)$차원 가중치-임계값 공간에서의 중심 초평면 배열(central hyperplane arrangement)의 챔버 기하학으로 해석하여, 사양 수가 해당 챔버의 면(facet) 수와 동일함을 보인다. 공명 배열(resonance arrangement)과 Fukuda–Tamura–Tokuyama 정리를 활용해 평균 사양 수의 상계 $\\overline{\\sigma}_n \\le 2n$, 즉 $\\overline{\\sigma}_n = \\Theta(n)$을 증명하여 Gutekunst–Mészáros–Petersen의 미해결 문제를 해결한다. 또한 threshold zonotope, one-inclusion graph, 그리고 최소 사양 수를 보존하는 변수 추가 연산들도 이 기하학적 틀 안에서 분석된다.", "technique": "중심 초평면 배열의 챔버-면 대응, 공명 배열(resonance arrangement)을 통한 평균 면 수 계산, Fukuda–Tamura–Tokuyama 정리 적용.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.28718v1", "title": "2-adic Valuations of Coefficients of the Fifth and Ninth Powers of the Thue--Morse Generating Function", "authors": ["Zhao Shen", "Xinping Wang"], "abstract": "Let $T(x)=\\prod_{k=0}^{\\infty}(1-x^{2^k})$ be the generating function of the Thue--Morse sequence, and write $T(x)^m=\\sum_{n\\geq 0}t_m(n)x^n$. We prove exact formulas for the $2$-adic valuations of the coefficients $t_5(n)$ and $t_9(n)$: \\[ ν_2\\bigl(t_5(4n+j)\\bigr)   =4\\Bigl\\lceil\\tfrac{ν_2(n+1)}{2}\\Bigr\\rceil-\\bigl(ν_2(n+1)\\bmod 2\\bigr), \\quad j\\in\\{0,1,2,3\\}, \\] \\[ ν_2\\bigl(t_9(8n+j)\\bigr)   =5\\Bigl\\lceil\\tfrac{ν_2(n+1)}{2}\\Bigr\\rceil-2\\bigl(ν_2(n+1)\\bmod 2\\bigr), \\quad j\\in\\{0,1,\\ldots,7\\}. \\] These formulas confirm Conjecture~5.2 of Gawron--Miska--Ulas~\\cite{ga} for $m=5$ and $m=9$, and imply that $t_5(n)\\neq 0$ and $t_9(n)\\neq 0$ for every $n\\geq 0$. A key structural ingredient is a closed-form formula for the determinant of a family of matrices with binomial-coefficient entries.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-27T03:52:52+00:00", "updated": "2026-06-27T03:52:52+00:00", "abs_url": "http://arxiv.org/abs/2606.28718v1", "pdf_url": "https://arxiv.org/pdf/2606.28718v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Thue-Morse 수열의 생성함수 계수에 대한 2진 부가(2-adic valuation) 공식은 조합론이지만, McMullen's problem의 볼록위치 점 배치, oriented matroid, chirotype 등 이산기하학 문제와 직접적 관련이 없음.", "summary": "Thue-Morse 수열의 생성함수 $T(x)=\\prod_{k=0}^{\\infty}(1-x^{2^k})$의 5제곱과 9제곱 계수 $t_m(n)$에 대한 2진 부가의 정확한 공식을 증명. 이 결과는 Gawron-Miska-Ulas의 추측을 $m=5,9$에 대해 확인하고 모든 $n\\geq 0$에 대해 $t_5(n), t_9(n) \\neq 0$임을 보임.", "technique": "이항계수 항목을 가진 행렬 족의 행렬식에 대한 닫힌 형태 공식 유도.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27763v1", "title": "Unimodular matrices and lattice paths enumeration via Pascal's triangle", "authors": ["Sudip Bera"], "abstract": "This article investigates a remarkable combinatorial identity involving a distinguished family of matrices whose entries are defined via binomial coefficients. Specifically, we consider a class of \\( n \\times n \\) matrices parameterized by a positive integer \\( m \\), where each entry reflects a structured pattern derived from Pascal's triangle, particularly the diagonals corresponding to figurate numbers such as triangular, tetrahedral, and higher-dimensional simplex numbers. We establish, by means of a bijective argument, that the determinant of any such matrix is identically equal to \\( 1 \\), independent of the specific values of \\( m \\) and \\( n \\), provided that \\( 2 \\leq m \\leq n \\). This result unveils a profound connection between classical binomial identities and the enumeration of lattice paths in grid graphs.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-26T06:43:36+00:00", "updated": "2026-06-26T06:43:36+00:00", "abs_url": "http://arxiv.org/abs/2606.27763v1", "pdf_url": "https://arxiv.org/pdf/2606.27763v1", "journal_ref": "Communications in Combinatorics and Optimization, 2026", "doi": "10.22049/cco.2026.31448.2856", "comment": "10 pages, 4 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Pascal's triangle과 조합 항등식 연구이지만 McMullen's problem의 convex position, oriented matroid, realizability 등 핵심 주제와는 직접 관련이 없음.", "summary": "본 논문은 이항계수로 정의된 행렬 항등식을 연구하며, 특히 Pascal's triangle의 대각선(삼각수, 사면체수 등)으로 매개변수화된 n×n 행렬의 행렬식이 항상 1임을 이중 계산(bijective argument)으로 증명한다. 이는 고전적 이항 항등식과 격자 경로 열거 사이의 연결을 제시한다.", "technique": "bijective argument를 통한 행렬식 계산 및 격자 경로와의 대응.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.26318v1", "title": "Lower bounds on non-central sections of isotropic convex bodies", "authors": ["Jacek Jakimiuk", "Daniel Murawski", "Piotr Nayar"], "abstract": "For fixed $t_0 \\in [0,\\sqrt{3}]$ we give asymptotically sharp lower bounds on the quantity $L_K \\text{vol}_{d-1}(K \\cap H)$, where $H$ is a hyperplane at distance $t_0 L_K$ from the origin, $K$ is any symmetric isotropic convex body in $\\mathbb{R}^d$, and $L_K$ stands for the isotropic constant of $K$.", "categories": ["math.MG", "math.FA", "math.PR"], "primary_category": "math.MG", "published": "2026-06-24T19:02:40+00:00", "updated": "2026-06-24T19:02:40+00:00", "abs_url": "http://arxiv.org/abs/2606.26318v1", "pdf_url": "https://arxiv.org/pdf/2606.26318v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "고차원 볼록체의 단면(section) 기하학을 다루지만, McMullen's problem의 핵심인 convex position 점 배치, oriented matroid, 조합 구조와는 직접 관련이 없음.", "summary": "대칭 등방(isotropic) 볼록체 $K$에 대해, 원점으로부터 거리 $t_0 L_K$에 있는 초평면과의 교집합의 부피에 대한 점근적으로 정확한 하한을 제시한다. 등방 상수(isotropic constant) $L_K$를 활용한 고차원 볼록기하 분석이다.", "technique": "이등방 볼록체의 측도론적 성질과 단면 부피 추정을 이용한 하한 도출.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27682v1", "title": "Linkage problem on optimal $1$-planar graphs", "authors": ["Shohei Koizumi", "Ryosuke Osaka", "Yusuke Suzuki"], "abstract": "Enami and Maezawa give a complete characterization of $(s_1, s_2, \\ldots, s_k)$-linked planar graphs for any $k$-tuple of positive integers. In this paper, we investigate linkage problems for optimal 1-planar graphs. In particular, we show that every optimal 1-planar graph with connectivity $6$ is $(5, 5)$-linked. Moreover, for an optimal $1$-planar graph $G$ that is not $(2,2,1)$-linked, we characterize disjoint vertex subsets $S_1, S_2, S_3$ in $G$ with $|S_1|=|S_2|=2$ and $|S_3|=1$ such that $G$ is not $\\{S_1,S_2,S_3\\}$-linked.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-26T03:28:47+00:00", "updated": "2026-06-26T03:28:47+00:00", "abs_url": "http://arxiv.org/abs/2606.27682v1", "pdf_url": "https://arxiv.org/pdf/2606.27682v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "1-planar graph의 linkage 문제는 McMullen's problem (점 배치, convex position, general position)과 직접 관련이 없음.", "summary": "본 논문은 1-평면 그래프(1-planar graph)의 연결성(linkage) 문제를 연구한다. 최적 1-평면 그래프(optimal 1-planar graph)에서 connectivity 6인 경우 (5,5)-linked임을 보이고, (2,2,1)-linked가 아닌 그래프들의 특성을 규명한다.", "technique": "평면 그래프의 구조적 특성과 연결성 분석을 통한 linkage 문제의 직접적 증명.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27131v1", "title": "Exploring the world of edge-chromatic 3-critical graphs", "authors": ["Le Chen", "Songling Shan"], "abstract": "A graph $G$ with maximum degree $Δ$ is $Δ$-critical if it is connected, satisfies $χ'(G)=Δ+1$, and the deletion of any edge reduces its chromatic index to $Δ$. A $Δ$-critical graph $G$ is called nontrivial if it contains no $Δ$-overfull subgraph; that is, no $H \\subseteq G$ such that $|E(H)| > Δ\\lfloor |V(H)| /2 \\rfloor$. There are no $1$-critical graphs, and the $2$-critical graphs are exactly the odd cycles. By work of Chetwynd and Yap from 1983, there is a unique nontrivial $3$-critical graph of order $9$, and exactly two nontrivial $3$-critical graphs of order $11$. In 2005, Bokal, Brinkmann, and Grünewald showed that there are exactly fourteen nontrivial $3$-critical graphs of order $13$. For even orders, Brinkmann and Steffen proved in 1997 that no $3$-critical graphs of even order exist below order $22$, there is exactly one 3-critical graph of order $22$, and that there are exactly nine $3$-critical graphs of order $24$.   To the best of our knowledge, there has been no further progress on the existence of nontrivial $3$-critical graphs of odd orders beyond the cases established two decades ago. In this paper, using computer-assisted search techniques, we determine the exact numbers of nontrivial $3$-critical graphs of odd orders from $15$ to $21$. The same data pipeline also reproduces the known order-$22$ count of Brinkmann and Steffen, with one nontrivial $3$-critical graph. Beyond enumeration, we prove a characterization theorem for all nontrivial 3-critical graphs, with one case based on snarks. We also provide an analysis of our search algorithm.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T15:08:48+00:00", "updated": "2026-06-25T15:08:48+00:00", "abs_url": "http://arxiv.org/abs/2606.27131v1", "pdf_url": "https://arxiv.org/pdf/2606.27131v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Edge-chromatic criticality는 그래프 색칠 문제로, McMullen's problem의 점 배치·convex position과 직접적 관련성이 없음.", "summary": "본 논문은 최대 차수 Δ=3인 임계 그래프(3-critical graphs)의 존재성과 개수를 연구합니다. 컴퓨터 보조 탐색을 통해 홀수 차수 15~21에서 nontrivial 3-critical 그래프의 정확한 개수를 결정하고, 모든 nontrivial 3-critical 그래프에 대한 특성화 정리를 증명합니다.", "technique": "Computer-assisted exhaustive search와 그래프 특성화(characterization)를 결합한 체계적 열거 기법.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27075v1", "title": "Discrete Space-Time Wave Kernels and Trace Identities on Regular Graphs", "authors": ["Amar Bašić", "Lejla Smajlović", "Zenan Šabanac"], "abstract": "We study the discrete space-time wave equation on a $(q+1)$-regular graph $X$ associated with the affine Laplace-type operator. For the forward time-difference scheme we derive explicit formulas for the two fundamental solutions (wave kernels) in terms of discrete modified Bessel functions and the non-backtracking walk counts on $X$ thus providing a direct and explicit link between wave propagation and combinatorial graph data. Utilizing uniqueness property of the wave kernel, we prove a new trace-type formula associated to the affine Laplace-type operator on $X$ and apply it to deduce many combinatorial identities. For example, we derive a closed-form expression for evaluation of some trigonometric sums twisted by an additive character as well as evaluations of finite sums of Chebyshev polynomials twisted by binomial coefficients.", "categories": ["math.CO", "math.CA", "math.SP"], "primary_category": "math.CO", "published": "2026-06-25T14:17:01+00:00", "updated": "2026-06-25T14:17:01+00:00", "abs_url": "http://arxiv.org/abs/2606.27075v1", "pdf_url": "https://arxiv.org/pdf/2606.27075v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "정규 그래프의 파동 방정식과 추적 공식을 다루며, McMullen's problem의 핵심인 점 배치·oriented matroid·조합 기하학과는 직접 관련이 없음.", "summary": "본 논문은 $(q+1)$-정규 그래프 위의 이산 시공간 파동 방정식을 affine Laplace형 연산자와 함께 연구한다. 명시적 파동 커널 공식을 discrete modified Bessel 함수와 non-backtracking walk 개수로 도출하고, 추적 공식(trace formula)을 증명하여 삼각함수 합과 Chebyshev 다항식의 조합 항등식을 얻는다.", "technique": "Affine Laplace형 연산자의 고유함수 분해 및 파동 커널의 유일성을 이용한 추적 공식 증명.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.29740v1", "title": "Two-pile and three-pile games of a new variant of Nim known as Halve Nim", "authors": ["Stephen C. Locke", "Stephen J. Curran", "Richard M. Low"], "abstract": "We investigate a variant of Nim called Halve Nim, which in addition to the standard moves of Nim, we allow replacing each pile of coins with half its amount. We determine the P-positions of all two-pile games of Halve Nim. Also, we determine the P-positions of all three-pile games of Halve Nim in which one pile has at most ten coins.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-29T03:33:48+00:00", "updated": "2026-06-29T03:33:48+00:00", "abs_url": "http://arxiv.org/abs/2606.29740v1", "pdf_url": "https://arxiv.org/pdf/2606.29740v1", "journal_ref": "", "doi": "", "comment": "12 tables", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "조합 게임론(combinatorial game theory)의 P-위치 분석이지만, McMullen's problem의 convex position, oriented matroid, 기하학적 배치 문제와는 무관함.", "summary": "Halve Nim이라는 Nim의 변형을 연구하며, 표준 Nim 규칙에 더해 각 더미를 절반으로 줄이는 이동을 허용함. 2-더미 게임의 모든 P-위치를 결정하고, 한 더미가 10개 이하 동전인 3-더미 게임의 P-위치를 부분적으로 결정함.", "technique": "게임이론의 역진 귀납법(backward induction)을 통한 P-위치(지는 위치) 특성화", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.29873v1", "title": "On a problem of Sivaraman and a problem of Gyárfás", "authors": ["Kaiyang Lan", "Wenlong Zhong"], "abstract": "The \\textit{girth} of a graph $G$, denoted $\\mathrm{g}(G)$, is the length of a shortest cycle in $G$.   If $G$ contains no cycle, we define $\\mathrm{g}(G)=\\infty$.   Sivaraman (2020) asked for the optimal $χ$-bounding function for the class of graphs whose complements have girth at least $6$.   Let \\(F(s) = \\max\\{χ(G): ω(G)\\le s,\\ \\mathrm{g}(\\overline{G})\\ge 6\\}\\).   We prove that there exists a constant \\(c>0\\) such that   \\[   c\\left(\\frac{s}{\\log s}\\right)^{4/3}   \\le   F(s)   \\le   (1+o(1))\\frac{s^{3/2}}{\\log s}.   \\]   For small values, we establish the exact results   \\[   F(1)=1,\\; F(2)=2,\\; F(3)=4,\\; F(4)=5,\\; F(5)=6,\\; F(6)=8,   \\]   and each bound is sharp.   A graph $G$ is \\emph{almost perfect} if every induced subgraph $H$ of $G$ satisfies   \\(α(H)ω(H)+1\\ge |V(H)|\\).   Gyárfás (2023) asked whether almost perfect graphs are $χ$-bounded by the function $g(x)=x+1$.   We answer this question in the negative by showing that there is no constant $c$ such that every almost perfect   graph $G$ satisfies $χ(G)\\le ω(G)+c$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-29T07:13:57+00:00", "updated": "2026-06-29T07:13:57+00:00", "abs_url": "http://arxiv.org/abs/2606.29873v1", "pdf_url": "https://arxiv.org/pdf/2606.29873v1", "journal_ref": "", "doi": "", "comment": "16 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "그래프 색칠수(chromatic number) 문제로, 이산기하학의 McMullen 문제와는 직접 관련이 없음.", "summary": "본 논문은 여집합의 girth가 6 이상인 그래프 클래스에 대한 χ-bounding 함수의 최적 경계를 연구한다. Sivaraman의 문제에 대해 $c(s/\\log s)^{4/3} \\le F(s) \\le (1+o(1))s^{3/2}/\\log s$의 상한과 하한을 증명하고, 작은 값들에 대한 정확한 결과를 제시한다. 또한 Gyárfás의 almost perfect 그래프에 관한 문제를 부정적으로 해결한다.", "technique": "그래프 색칠수 이론, χ-bounding 함수, girth 제약 조건.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.26570v1", "title": "Classification of regular Cayley maps of skew-type three on semidihedral groups", "authors": ["Kan Hu", "Tao Qiu"], "abstract": "It is well known that every regular Cayley map $M = \\CM(G,X,p)$ on a finite group $G$ with respect to an inverse-closed generating set $X$ of $G$ and a specified cyclic permutation $p$ on $X$ corresponds to a skew morphism $\\varphi$ on $G$ such that the restriction of $\\varphi$ to $X$ is $p$. The skew-type of the map $M$ is defined as the index $[G:\\Ker \\varphi]$, which equals the number of distinct values in $\\mathbb{Z}_{|\\varphi|}$ taken by the associated power function $π$ of the skew morphism $\\varphi$. In this paper, we develop a covering theory of skew morphisms and as an application we provide a classification of regular Cayley maps of skew-type three on the semidihedral groups.", "categories": ["math.CO", "math.GR"], "primary_category": "math.CO", "published": "2026-06-25T03:44:07+00:00", "updated": "2026-06-25T03:44:07+00:00", "abs_url": "http://arxiv.org/abs/2606.26570v1", "pdf_url": "https://arxiv.org/pdf/2606.26570v1", "journal_ref": "", "doi": "", "comment": "24pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "정규 Cayley 맵과 skew morphism의 분류는 대수적 조합론이지만, McMullen's problem(볼록 위치 점 배치, oriented matroid, 다면체 기하)과는 직접적 연관이 없음.", "summary": "이 논문은 유한군 위의 정규 Cayley 맵을 skew morphism을 통해 분류하는 문제를 다룬다. Skew morphism의 covering theory를 개발하고, 이를 응용하여 semidihedral 군 위의 skew-type 3인 정규 Cayley 맵을 완전히 분류한다.", "technique": "Skew morphism의 covering theory와 관련 power function의 값의 분포 분석.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.28539v1", "title": "Extremal ranks of unlabeled multifurcating rooted trees in a bijective encoding by the positive integers", "authors": ["Michael R. Doboli", "Alessandra R. P. Maranca", "Noah A. Rosenberg"], "abstract": "Maranca and Rosenberg (2024) devised a ranking scheme for unlabeled multifurcating rooted trees, in which the trees are bijectively associated with the positive integers. Here, generalizing earlier results for bifurcating trees, we determine, for trees with a fixed number of leaves, which multifurcating trees obtain the maximal and minimal ranks. We identify these maximizing and minimizing trees for each of two sets of unlabeled multifurcating rooted trees: strictly $k$-furcating trees, in which each internal node possesses exactly $k$ descendants, and at-most-$k$-furcating trees, in which internal nodes possess at least 2 and at most $k$ descendants. In both scenarios, we find that a tree that can be regarded as maximally balanced attains the minimal rank, and a minimally balanced tree attains the maximal rank. We deduce recurrences for the maximal and minimal rank for trees with fixed numbers of leaves in both the strictly $k$-furcating and at-most-$k$-furcating cases. The maximal rank on $(n-1)(k-1)+1$ leaves grows with $(k!)^{\\frac{1}{k-1}} β_k^{(k^n)}$ in the strictly $k$-furcating case, and the maximal rank on $n$ leaves grows with $(k!)^{\\frac{1}{k-1}} γ_k^{(k^n)}$ in the at-most-$k$-furcating case, where $β_k > 1$ and $γ_k > 1$ are constants that depend on the value of $k$. We show that $β_k$ decreases as the value of $k$ increases, and that $γ_k > β_k$ for $k \\geq 3$. The results contribute to the use of tree encodings for empirical characterization of phylogenies and measurement of tree balance.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-26T18:44:50+00:00", "updated": "2026-06-26T18:44:50+00:00", "abs_url": "http://arxiv.org/abs/2606.28539v1", "pdf_url": "https://arxiv.org/pdf/2606.28539v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "트리 인코딩과 조합론적 순서는 다루지만, McMullen's problem의 핵심인 convex position 점 배치, oriented matroid, tope graph와는 무관한 phylogenetic tree 균형성 연구.", "summary": "unlabeled multifurcating rooted tree를 양의 정수와 bijection으로 인코딩하는 ranking scheme에서, 고정된 leaf 개수를 갖는 트리들 중 maximal/minimal rank를 갖는 트리를 특성화한다. strictly k-furcating과 at-most-k-furcating 두 경우 모두에서 최대 균형 트리가 최소 rank를, 최소 균형 트리가 최대 rank를 달성함을 보인다.", "technique": "recurrence relation과 asymptotic growth analysis를 통한 extremal tree 특성화; tree balance 개념의 활용.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.25822v1", "title": "Extremal Deletion-Ball Intersections under Run-Count and Lower-Order Deletion-Ball Intersection Constraints", "authors": ["Yubo Sun", "Gennian Ge"], "abstract": "Motivated by sequence reconstruction and reconstruction codes, we study extremal intersections of deletion balls over a fixed $q$-ary alphabet. Let $Σ_q^n$ be the set of sequences of length $n$ over $Σ_q$, and let $D_t(x)$ denote the set of all sequences obtained from $x\\inΣ_q^n$ by deleting exactly $t$ symbols.   Our first result gives a finite upper bound under a lower-order deletion-correction constraint. We prove that if $x,y\\inΣ_q^n$ satisfy $D_{s-1}(x)\\cap D_{s-1}(y)=\\varnothing$, then \\[ |D_t(x)\\cap D_t(y)| \\le \\binom{2s}{s}\\binom{n-s}{t-s}. \\] For binary alphabets, this strengthens a recent asymptotic upper bound of Pham, Goyal, and Kiah (2025, JCTA). We then investigate deletion-ball intersections under simultaneous constraints on run counts and lower-order deletion-ball intersections. For fixed $0<γ\\le1$, integers $1\\le s\\le t$, and $m\\ge1$, we show that if $x,y\\inΣ_q^n$ have at most $γn$ runs and satisfy $|D_s(x)\\cap D_s(y)|\\le m$, then \\[ |D_t(x)\\cap D_t(y)|\\le \\frac{mγ^{t-s}}{(t-s)!}n^{t-s}+O_{s,t,m}(n^{t-s-1}). \\] Moreover, the leading term can be attainable whenever $m$ is realized by a fixed finite-length seed pair. As a consequence, we obtain a direct lifting theorem for deletion reconstruction codes, transferring reconstruction properties from radius $s$ to larger radii $t$. Finally, we establish a parallel insertion theory and derive corresponding results for insertion-ball intersections and insertion reconstruction codes.", "categories": ["math.CO", "cs.IT"], "primary_category": "math.CO", "published": "2026-06-24T13:37:55+00:00", "updated": "2026-06-24T13:37:55+00:00", "abs_url": "http://arxiv.org/abs/2606.25822v1", "pdf_url": "https://arxiv.org/pdf/2606.25822v1", "journal_ref": "", "doi": "", "comment": "15 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 deletion ball 교집합의 극값 문제와 수열 재구성을 다루며, McMullen's problem이 요구하는 convex position, oriented matroid, 또는 polyhedral 구조와는 직접적인 관련이 없습니다.", "summary": "이 논문은 q진 알파벳 위의 deletion ball 교집합의 극값을 연구하며, 낮은 차수 deletion-correction 제약 조건 하에서 상한을 증명합니다. run count와 낮은 차수 deletion-ball 교집합 제약을 동시에 고려할 때 deletion ball의 크기에 대한 다항식 상한을 도출하고, 이를 통해 deletion reconstruction code의 lifting 정리를 얻습니다.", "technique": "조합론적 계수와 다항식 상한; run count 제약과 낮은 차수 정보로부터 고차 deletion ball의 크기를 제어하는 기법", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.30612v1", "title": "Nearly-uniform degree distributions in spanning subgraphs", "authors": ["Richard Montgomery", "Alexey Pokrovskiy", "Benny Sudakov"], "abstract": "We show that, when $d=o(n)$, every $d$-regular $n$-vertex graph contains a spanning subgraph whose degree distribution is nearly uniform, i.e., for each $0\\leq i\\leq d$, there are $(1+o(1))n/(d+1)$ vertices with degree $i$. This proves a conjecture of Alon and Wei on irregular subgraphs and strengthens a previous result of Fox, Luo and Pham.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-29T17:47:05+00:00", "updated": "2026-06-29T17:47:05+00:00", "abs_url": "http://arxiv.org/abs/2606.30612v1", "pdf_url": "https://arxiv.org/pdf/2606.30612v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 그래프 이론의 정규성(regularity)과 차수 분포(degree distribution) 문제로, McMullen's problem의 기하학적·조합론적 구조(convex position, oriented matroid, realizability)와 직접 관련이 없습니다.", "summary": "d-정규 n-정점 그래프가 거의 균등한 차수 분포를 가진 생성 부분그래프를 포함함을 보입니다. 각 차수 $0\\leq i\\leq d$에 대해 $(1+o(1))n/(d+1)$개의 정점이 그 차수를 가집니다. Alon-Wei 추측을 증명하고 Fox-Luo-Pham의 결과를 강화합니다.", "technique": "", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.25493v1", "title": "On the Periodicity of k-distance Graphs", "authors": ["Gregory Demo", "David Lund", "Oleksiy Al-saadi"], "abstract": "The $k$-distance graph $G^k$ of a graph $G$ has the same vertex set as $G$ and two vertices are adjacent if and only if their distance is $k$ in $G$. These graphs have been extensively studied for their connection properties. In this paper, we study various properties of these graphs, including clique number and periodicity. For all $k$, we show that there exists a $k$-distance graph that is weakly periodic for any size period. Our main result is a proof that if $k > 2$ then there exists a $k$-distance graph of any size (strong) period. Finally, we provide evidence that there exists an upper bound on the periodicity of a connected $2$-distance graph as a function of $|V|$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-24T07:20:12+00:00", "updated": "2026-06-24T07:20:12+00:00", "abs_url": "http://arxiv.org/abs/2606.25493v1", "pdf_url": "https://arxiv.org/pdf/2606.25493v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "k-distance graph의 주기성과 clique number는 점의 배치, convex position, 조합적 구조와 무관한 순수 그래프 이론 문제로, McMullen's problem의 oriented matroid, realizability, 기하학적 배치와 직접 관련이 없음.", "summary": "k-distance graph $G^k$는 원래 그래프 $G$에서 거리가 정확히 $k$인 정점들을 연결한 그래프이다. 본 논문은 모든 $k$에 대해 약한 주기성(weak periodicity)을 가진 $G^k$가 임의 크기로 존재하고, $k > 2$일 때 강한 주기성을 가진 임의 크기의 $k$-distance graph가 존재함을 증명한다. 또한 연결된 2-distance graph의 주기성에 대한 상한을 제시한다.", "technique": "초록만으로는 불확실", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27816v1", "title": "On ideals in the semilattice of coarse equivalence classes of metrics", "authors": ["Vladimir Manuilov"], "abstract": "For a Hausdorff topology on the set of ideals of the semilattice $M(X)$ of coarse equivalence classes of metrics on a set $X$, the space $I(M(X))$ of ideals is the closure of the set of principal ideals, thus allowing to view non-principal ideals as generalizations of coarse equivalence classes of metrics. Some ideals arise from coarse structures on $X$. We define a map $Φ$ from $I(M(X))$ to the set $CS(X)$ of coarse structures on $X$, and a map $Ψ$ backwards, and show that $Ψ\\circΦ$ is the identity map, thus allowing to identify coarse structures with some ideals of $M(X)$. We show that there are ideals that do not come from $CS(X)$. For any ideal $F$ we define the generalized uniform Roe algebra as the direct limit $C^*$-algebra of the uniform Roe algebras for the equivalence classes of metrics in the ideal, and show that it coincides with the uniform Roe algebra of $Φ(F)$.", "categories": ["math.MG"], "primary_category": "math.MG", "published": "2026-06-26T07:58:41+00:00", "updated": "2026-06-26T07:58:41+00:00", "abs_url": "http://arxiv.org/abs/2606.27816v1", "pdf_url": "https://arxiv.org/pdf/2606.27816v1", "journal_ref": "", "doi": "", "comment": "7 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 metric의 coarse equivalence class와 ideal의 semilattice 구조를 다루며, McMullen's problem과 관련된 조합·이산기하학적 문제와는 직접 관련이 없다.", "summary": "논문은 metric의 coarse equivalence class로 이루어진 semilattice $M(X)$의 ideal들의 공간 $I(M(X))$에 대한 Hausdorff 위상을 연구한다. Coarse structure와 ideal 사이의 대응관계를 정의하여 일부 ideal을 coarse structure로 식별할 수 있음을 보이고, 이를 통해 generalized uniform Roe algebra를 정의한다.", "technique": "ideal의 semilattice 구조, Hausdorff 위상, 직극한(direct limit) $C^*$-대수의 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.30856v1", "title": "Small lattice polytopes have few vertices", "authors": ["Travis Dillon"], "abstract": "This is a geometric retelling of Konyagin and Sevast'yanov's proof of Andrew's theorem, which is a tight upper bound on the number of vertices of a d-dimensional lattice polytope in terms of its volume.", "categories": ["math.MG", "math.CO"], "primary_category": "math.MG", "published": "2026-06-29T19:38:50+00:00", "updated": "2026-06-29T19:38:50+00:00", "abs_url": "http://arxiv.org/abs/2606.30856v1", "pdf_url": "https://arxiv.org/pdf/2606.30856v1", "journal_ref": "", "doi": "", "comment": "6 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "격자 폴리토프의 꼭짓점 수 상한에 관한 논문으로, McMullen 문제(볼록 위치·일반 위치 점 배치, oriented matroid)와 직접적인 연관성이 없다.", "summary": "이 논문은 Konyagin과 Sevast'yanov의 Andrews 정리 증명을 기하학적으로 재서술한다. Andrews 정리는 $d$차원 격자 폴리토프의 꼭짓점 수에 대한 부피 기반의 tight한 상한을 제공한다.", "technique": "Konyagin–Sevast'yanov 증명의 기하학적 재해석을 핵심 기법으로 사용.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.31064v1", "title": "Spectral extremal problems for fractional $ID$-$[a,b]$-factor-critical graphs", "authors": ["Zengzhao Xu", "Ligong Wang", "Weige Xi"], "abstract": "A factor of a graph is essentially a specific type spanning subgraph. In recent years, the spectral extremal problem of characterizing the existence of graph factors via eigenvalues has been widely studied. This paper focuses on fractional $ID$-$[a, b]$-factor-critical graphs, which are a natural generalization of fractional $[a,b]$-factors. Let $r \\ge 1$ be an integer. A graph $G$ is fractional $ID$-$[a, b]$-factor-critical if for every independent set $I$ of $G$ with $|I| = r$, $G - I$ has a fractional $[a, b]$-factor. In 2026, Jia, Fan and Liu posed the spectral version conjecture for a graph to be fractional $ID$-$[a, b]$-factor-critical [Linear Algebra Appl. 732 (2026) 1-17]. In this paper,   we first prove the conjecture holds for connected graphs when $b\\ge 2r+2$. Furthermore, for minimum degree $δ(G)\\ge a+r$, we present spectral radius and size conditions that ensure a graph is fractional $ID$-$[a, b]$-factor-critical, which improve the results of Jia, Fan and Liu.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-30T02:51:45+00:00", "updated": "2026-06-30T02:51:45+00:00", "abs_url": "http://arxiv.org/abs/2606.31064v1", "pdf_url": "https://arxiv.org/pdf/2606.31064v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "그래프 인수(factor) 및 스펙트럼 극값 문제는 조합론이지만, McMullen's problem(볼록위치의 점 배치, oriented matroid, chiroptope)과는 직접적 주제 연관성이 없음.", "summary": "본 논문은 fractional $ID$-$[a,b]$-factor-critical 그래프의 스펙트럼 특성을 연구하며, 독립집합 제거 후 fractional factor 존재를 보장하는 고유값 조건을 제시한다. Jia, Fan and Liu(2026)의 추측을 $b \\ge 2r+2$인 연결 그래프에서 증명하고, 최소차수 조건 하에서 개선된 스펙트럼 반지름 및 크기 조건을 제공한다.", "technique": "스펙트럼 극값 이론(spectral extremal theory)을 이용한 그래프 인수의 존재성 특성화.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.28213v1", "title": "Wasserstein Barycenter Convexity Detects Hilbertian Geometry", "authors": ["Bang-Xian Han", "Deng-Yu Liu"], "abstract": "We prove that convexity of the Boltzmann entropy at Wasserstein barycenters is strong enough to distinguish Hilbert spaces from general Banach spaces. Thus Wasserstein barycenters provide an intrinsic optimal-transport test for Hilbertian geometry. More precisely, we show that if a finite-dimensional normed vector space, equipped with Lebesgue measure, satisfies the Wasserstein Jensen's inequality for the entropy at barycenters of arbitrary finite families of probability measures, then its norm must be induced by an inner product.   This contrasts sharply with a well-known result: every finite-dimensional normed vector space satisfies the nonnegative Ricci curvature condition in the sense of Lott--Sturm--Villani, whereas barycenter convexity excludes all non-Hilbertian norms. As a consequence, smooth reversible Finsler manifolds satisfying the corresponding barycentric curvature-dimension condition have Riemannian tangent norms.   The proof does not assume strict convexity of the norm. Its two main ingredients are a rank-one polarization argument, which yields the dual parallelogram identity in the strictly convex case, and a maximal-face trapping argument, which rules out flat faces of the unit ball.", "categories": ["math.MG", "math.FA"], "primary_category": "math.MG", "published": "2026-06-26T16:05:37+00:00", "updated": "2026-06-26T16:05:37+00:00", "abs_url": "http://arxiv.org/abs/2606.28213v1", "pdf_url": "https://arxiv.org/pdf/2606.28213v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "본 논문은 Wasserstein barycenter와 Hilbert 공간의 특성화에 관한 함수해석학·최적수송 이론이며, McMullen's problem의 convex position 점 배치, oriented matroid, 다면체 기하와 직접적 연관성이 없음.", "summary": "유한차원 노름 벡터공간에서 Boltzmann 엔트로피의 Wasserstein Jensen 부등식이 성립하면 그 노름이 내적으로부터 유도됨을 증명한다. 이는 일반 Banach 공간과 Hilbert 공간을 최적수송을 통해 구별하는 intrinsic 특성을 제공하며, Finsler 다양체에 대한 곡률-차원 조건으로 확장된다.", "technique": "Rank-one polarization 논증과 unit ball의 평면 면(flat face)을 배제하는 maximal-face trapping 논증을 결합.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.29768v1", "title": "Strong Embeddings of Regular Graphs with Prescribed Automorphism Groups", "authors": ["Reymond Akpanya", "Tom Goertzen", "Meike Weiß"], "abstract": "A classical theorem of Frucht states that every finite group occurs as the automorphism group of a finite graph. We prove an embedded analogue for regular graphs of arbitrary degree. In particular, we show that for every $d\\geq 3$ and every finite group $G$, there exists a $d$-regular graph $Γ$ with a strong embedding $β$ such that $\\mathrm{Aut}(Γ) \\cong \\mathrm{Aut}(β(Γ)) \\cong G.$ Further, we prove that for every such $d$ and $G$ there exists a sequence of $d$-regular graphs with corresponding strong embeddings whose genera form an unbounded sequence and whose automorphism groups are isomorphic to $G$. Along the way, we identify an   oversight in Sabidussi's classical construction of regular graphs with prescribed automorphism group. We give an alternative construction that corrects this issue and strengthens Sabidussi's result by producing an automorphism group-invariant proper $d$-edge-colouring.", "categories": ["math.CO", "math.GR", "math.GT"], "primary_category": "math.CO", "published": "2026-06-29T04:21:10+00:00", "updated": "2026-06-29T04:21:10+00:00", "abs_url": "http://arxiv.org/abs/2606.29768v1", "pdf_url": "https://arxiv.org/pdf/2606.29768v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "본 논문은 정규 그래프의 자기동형 그룹 실현과 강 임베딩에 관한 것으로, McMullen 문제(convex position의 점 배치와 oriented matroid의 성질)와는 직접적인 연관이 없음.", "summary": "Frucht의 정리를 일반화하여, 모든 유한군 G와 차수 d≥3에 대해 자기동형군이 G인 강 임베딩을 갖는 d-정규 그래프가 존재함을 보인다. 또한 같은 자기동형군을 갖지만 속(genus)이 unbounded인 정규 그래프 수열의 존재를 증명하고, Sabidussi의 고전적 구성에서의 오류를 지적하고 수정한다.", "technique": "강 임베딩(strong embedding)을 이용한 정규 그래프의 구성, Frucht-Sabidussi 구성의 개선", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.31565v1", "title": "Tournament Ranking: Duality and Efficiency", "authors": ["Ge Song", "Mengxi Yang", "Wenan Zang"], "abstract": "The feedback arc set problem on tournaments arises in a rich variety of applications, and has been studied extensively in several research fields over the past six decades. It is well known that this problem is $NP$-hard and admits a polynomial-time approximation scheme (PTAS) in general. A tournament $T=(V, A)$ is called cycle Mengerian (CM) if, for every nonnegative integral weight function defined on $A$, the minimum total weight of a feedback arc set is equal to the maximum size of a cycle packing. In 2020 Chen et al. obtained a structural characterization of all CM tournaments; however, their proof is not algorithmic in nature. In this paper we present combinatorial polynomial-time algorithms for finding both minimum feedback arc sets and maximum cycle packings in arc-weighted CM tournaments.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-30T12:23:11+00:00", "updated": "2026-06-30T12:23:11+00:00", "abs_url": "http://arxiv.org/abs/2606.31565v1", "pdf_url": "https://arxiv.org/pdf/2606.31565v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Tournament feedback arc set 문제는 acyclic orientation과 관련되지만, McMullen's problem(5차원 convex position 점 배치)과는 직접적 수학적 관련이 없음.", "summary": "이 논문은 cycle Mengerian (CM) tournaments에서 feedback arc set 문제와 cycle packing 문제 사이의 duality를 다룬다. CM tournaments의 구조적 특성화를 바탕으로 두 문제를 다항시간에 해결하는 조합 알고리즘을 제시한다.", "technique": "Cycle Mengerian tournaments의 구조적 특성화를 활용한 조합 다항시간 알고리즘.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27066v1", "title": "On Meyniel's Conjecture in Random Hypergraphs", "authors": ["Gabriel Dias"], "abstract": "The game of \\emph{Cops and Robbers} is a two player pursuit game on graphs where a team of cops attempts to catch a robber. The cop number $c(G)$ of a graph $G$ is the minimum number of cops needed to guarantee a winning strategy in $G$. A famous conjecture of Meyniel says that if $G$ is connected, then $c(G)=O(\\sqrt{n})$. Erde, Kang, Lehner, Mohar and Schmid considered its generalization to $k$-uniform hypergraphs and conjectured that the cop number of such hypergraphs is $O(\\sqrt{n/k})$. This may be understood as a hypergraph version of Meyniel's conjecture. In this paper we prove this conjecture for a class of \\textit{expanding} hypergraphs and show that with high probability the conjecture holds for random hypergraphs $H^k(n,p))$ provided $k\\geq \\log^3n$ and the typical degree, $p\\binom{n-1}{k-1}$, is $ω(\\log^3n)$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T14:12:27+00:00", "updated": "2026-06-25T14:12:27+00:00", "abs_url": "http://arxiv.org/abs/2606.27066v1", "pdf_url": "https://arxiv.org/pdf/2606.27066v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Cops and Robbers 게임의 경찰 수에 관한 추측으로, McMullen's problem의 점 배치·조합론적 구조와 직접적 관련성이 없음.", "summary": "본 논문은 k-uniform 하이퍼그래프에서의 Meyniel 추측 일반화를 다룬다. 경시자(cops)와 도둑(robber)의 추적 게임에서 필요한 최소 경찰 수가 $O(\\sqrt{n/k})$임을 확장 하이퍼그래프와 무작위 하이퍼그래프 $H^k(n,p)$에서 증명한다.", "technique": "확장성(expansion) 조건과 무작위 하이퍼그래프의 확률론적 방법을 활용한 고확률 분석", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.31468v1", "title": "Resolving the Klavžar-Kovše conjecture on opposite semicube isomorphisms in partial cubes and its extension", "authors": ["Zhaoman Huang", "Yan-Ting Xie", "Shou-Jun Xu"], "abstract": "Partial cubes are a fundamental class of graphs that admit isometric embeddings into hypercubes.
