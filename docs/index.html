<style>
  :root{
    --bg:#F6F7F9; --surface:#FFFFFF; --ink:#15161C; --muted:#71727F;
    --line:#E6E7EC; --accent:#4338CA; --accent-soft:#EEECFB;
    --explore:#0D9488; --explore-soft:#E3F4F1; --up:#15803D; --down:#B91C1C;
    --serif: ui-serif, "Iowan Old Style", Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  header{position:sticky;top:0;z-index:5;background:rgba(246,247,249,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .bar{max-width:880px;margin:0 auto;padding:16px 20px 12px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  h1{font-family:var(--serif);font-weight:600;font-size:25px;margin:2px 0;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
  .controls input[type=search]{flex:1 1 180px;min-width:150px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);font:inherit;color:inherit}
  .controls select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--surface);font:inherit;color:inherit}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:var(--surface);border:0;padding:8px 11px;cursor:pointer;border-left:1px solid var(--line);font:inherit}
  .seg button:first-child{border-left:0}
  .seg button[aria-pressed=true]{background:var(--accent);color:#fff}
  label.thr{font-size:13px;color:var(--muted);display:inline-flex;gap:7px;align-items:center}
  label.thr output{font-family:var(--mono);color:var(--ink);min-width:1.4em;text-align:right}
  .gear{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 10px;cursor:pointer;font:inherit}
  .panel{max-width:880px;margin:0 auto;padding:0 20px;overflow:hidden;max-height:0;transition:max-height .2s}
  .panel.open{max-height:420px;padding-bottom:12px}
  .panel .box{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px;font-size:13px}
  .panel input{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:7px;font:inherit;margin:4px 0 10px}
  .panel button{background:var(--accent);color:#fff;border:0;border-radius:7px;padding:8px 14px;cursor:pointer;font:inherit}
  .panel .hint{color:var(--muted);font-size:12px;margin-bottom:8px}
  .refresh-btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:0;border-radius:9px;padding:9px 16px;cursor:pointer;font:inherit;font-size:14px;font-weight:500}
  .refresh-btn:disabled{opacity:.5;cursor:not-allowed}
  .refresh-btn .spin{display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  .refresh-btn.loading .spin{display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  main{max-width:880px;margin:0 auto;padding:14px 20px 64px}
  .count{font-size:13px;color:var(--muted);margin:2px 0 14px;font-family:var(--mono)}
  .card{position:relative;display:grid;grid-template-columns:60px 1fr;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 18px 16px 0;margin-bottom:12px;overflow:hidden}
  .ledger{display:flex;flex-direction:column;align-items:center;padding-top:2px;position:relative}
  .ledger::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--edge,var(--line))}
  .score{font-family:var(--mono);font-size:21px;font-weight:600;line-height:1;color:var(--edge,var(--muted))}
  .score small{display:block;font-size:9px;letter-spacing:.1em;color:var(--muted);margin-top:4px;font-weight:400}
  .body{min-width:0}
  .title{font-family:var(--serif);font-size:19px;font-weight:600;line-height:1.3;margin:0 0 6px;letter-spacing:-.01em}
  .tag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--explore);background:var(--explore-soft);padding:2px 7px;border-radius:5px;margin-left:8px}
  .meta{font-size:12.5px;color:var(--muted);margin-bottom:8px}
  .prob{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:1px 7px;border-radius:5px}
  .meta .dot{margin:0 6px;opacity:.5}
  .reason{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:10px}
  .summary{margin:0 0 10px}
  .field{font-size:14px;margin:6px 0}
  .field b{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-right:6px}
  .conn{background:var(--accent-soft);border-radius:8px;padding:9px 12px;font-size:14px}
  .chips{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 9px}
  .actions{margin-top:11px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .act{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:5px 10px;cursor:pointer;font:inherit;font-size:13px}
  .act.on-fav{border-color:#D97706;background:#FEF3C7}
  .act.on-up{border-color:var(--up);background:#DCFCE7}
  .act.on-down{border-color:var(--down);background:#FEE2E2}
  .links{margin-left:auto;font-family:var(--mono);font-size:12px;display:flex;gap:14px;align-items:center}
  .links .id{color:var(--muted)}
  .togg{background:none;border:0;color:var(--accent);font:inherit;font-size:12px;cursor:pointer;font-family:var(--mono);margin-top:8px}
  .abstract{margin-top:10px;font-size:13.5px;color:#3a3b47;border-top:1px dashed var(--line);padding-top:10px;display:none}
  .abstract.open{display:block}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .sync{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:8px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  @media (max-width:560px){.card{grid-template-columns:44px 1fr;gap:10px;padding-right:14px}.title{font-size:17px}h1{font-size:21px}.links{margin-left:0;width:100%}}
  @media (prefers-reduced-motion:reduce){*{transition:none}}
</style>
</head>

  <div class="bar">
    <div class="eyebrow">arXiv · 리서치 다이제스트</div>
    <h1>관련 논문</h1>

      <button class="refresh-btn" id="refreshBtn">

      <select id="sort" aria-label="정렬">

        <button id="fAll" aria-pressed="true">전체</button>
        <button id="fFav" aria-pressed="false">⭐만</button>
        <button id="fExp" aria-pressed="false">탐색만</button>
      </span>
      <span class="seg" role="group"><button id="hideDown" aria-pressed="false">👎 숨기기</button></span>
      <button class="gear" id="gear" title="동기화 설정">⚙</button>
    </div>
  </div>
  <div class="panel" id="panel"><div style="max-width:880px;margin:0 auto"><div class="box">
    <b>GitHub 연동 설정</b>

      fine-grained Personal Access Token 권장. 토큰은 이 기기 브라우저에만 저장됩니다.
    </div>
    <input id="ghRepo" placeholder="owner/repo (예: choihs/research-agent) — 비우면 URL 에서 자동 감지">
    <input id="ghToken" type="password" placeholder="github_pat_... (이 기기에만 저장)">
    <button id="ghSave">저장</button> <span class="sync" id="ghStatus"></span>
  </div></div></div>
</header>

<script>
const DATA = [{"id": "2606.19573v1", "title": "Embracing exchange sequences and oriented matroid polyhedron diameter", "authors": ["Kolja Knauer", "Luis Pedro Montejano"], "abstract": "We reduce the embracing exchange distance of bases of oriented matroids to the metric of oriented matroid polyhedra. This allows us to disprove recent conjectures of Caoduro, Khodamoradi, Paat, and Shepherd and of Bérczi and Nádor. On the other hand, we show that any two embracing bases of an oriented matroid of rank $r$ can be transformed into each other in at most $2r^{\\log_2(r)+3}$ steps and in at most $r$ steps in a Lawrence oriented matroid, thus confirming the conjecture in this case.", "categories": ["math.CO", "cs.DM"], "primary_category": "math.CO", "published": "2026-06-17T20:18:48+00:00", "updated": "2026-06-17T20:18:48+00:00", "abs_url": "http://arxiv.org/abs/2606.19573v1", "pdf_url": "https://arxiv.org/pdf/2606.19573v1", "journal_ref": "", "doi": "", "comment": "10 pages, 1 figure", "relevance": 5, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Lawrence oriented matroid와 oriented matroid의 기저 변환 문제를 다루며, McMullen 문제와 관련된 Lawrence oriented matroid 구조를 직접 언급하고 있어 부분적 관련성이 있다.", "summary": "이 논문은 oriented matroid의 기저들의 embracing exchange distance를 oriented matroid polyhedra의 metric으로 환원하여, Caoduro 등과 Bérczi-Nádor의 최근 추측들을 반례로 논박한다. 한편, rank $r$의 oriented matroid에서 임의의 두 embracing base는 최대 $2r^{\\log_2(r)+3}$ 단계로 변환 가능함을 보이고, Lawrence oriented matroid의 경우 최대 $r$ 단계로 변환 가능함을 증명하여 해당 경우의 추측을 확인한다.", "technique": "Embracing exchange distance를 oriented matroid polyhedra의 직경(diameter) 문제로 환원하는 것이 핵심 기법이다.", "connections": "Lawrence oriented matroid에서의 $r$ 단계 변환 결과는 McMullen 문제와 관련된 Lawrence oriented matroid 구조에 직접 적용 가능하다.", "keyword_hits": [], "source": "seed"}, {"id": "2607.02958v1", "title": "Toward Satisfiability Modulo Realizability", "authors": ["Andrew Krapivin", "Benjamin Przybocki", "Marijn J. H. Heule"], "abstract": "Problems complete for the existential theory of the reals ($\\exists \\mathbb{R}$) arise throughout discrete geometry. We introduce satisfiability modulo realizability, a SAT-based approach for solving satisfiable instances of $\\exists \\mathbb{R}$ whose solutions correspond to realizable geometric configurations. Our method encodes an underapproximation of a geometric problem as a SAT instance over abstract order types. Since almost all abstract order types are unrealizable, naive search is infeasible. We guide the search toward realizable order types using diversity-driven sampling, partial realizability feedback, and a novel flippability heuristic that passes only limited information between components. We apply our method to discrete geometry problems and resolve an open problem by showing that the largest set of points avoiding empty convex hexagons and convex heptagons is of size 23.", "categories": ["cs.CG", "math.CO"], "primary_category": "cs.CG", "published": "2026-07-03T05:05:02+00:00", "updated": "2026-07-03T05:05:02+00:00", "abs_url": "http://arxiv.org/abs/2607.02958v1", "pdf_url": "https://arxiv.org/pdf/2607.02958v1", "journal_ref": "", "doi": "", "comment": "To appear in CICM 2026", "relevance": 4, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 abstract order type(oriented matroid의 chirotope와 밀접)의 realizability를 SAT 기반으로 탐색하는 방법을 제안하며, McMullen's problem도 $\\exists\\mathbb{R}$ 완전 문제와 관련된 oriented matroid realizability에 해당하지만, 논문의 직접적 응용 대상은 empty convex polygon 회피 문제이지 McMullen's problem(f(5)=11)이 아니다.", "summary": "이 논문은 실수의 존재론적 이론($\\exists\\mathbb{R}$)에 완전한 이산기하 문제들을 풀기 위해 'satisfiability modulo realizability'라는 SAT 기반 접근법을 도입한다. abstract order type에 대한 SAT 인스턴스로 기하 문제를 인코딩하되, 거의 모든 abstract order type이 unrealizable이므로 diversity-driven sampling, partial realizability feedback, flippability heuristic을 통해 realizable order type으로 탐색을 유도한다. 이 방법을 적용하여 empty convex hexagon과 heptagon을 모두 피하는 점 집합의 최대 크기가 23임을 증명함으로써 미해결 문제를 해결하였다.", "technique": "abstract order type 위의 SAT 인코딩에 diversity-driven sampling, partial realizability feedback, flippability heuristic을 결합하여 realizable 기하 배치를 탐색하는 SAT 기반 프레임워크.", "connections": "추측: abstract order type의 realizability 판별은 oriented matroid의 chirotope realizability 문제와 동일하므로, McMullen's problem에서 필요한 oriented matroid realizability 탐색에 이 방법론이 응용될 가능성이 있다.", "keyword_hits": ["realizab"], "source": "filter"}, {"id": "2607.05967v1", "title": "Symmetric lexicographic symmetric-subset reverse search for the enumeration of circuits, cocircuits, and triangulations up to symmetry", "authors": ["Jörg Rambau"], "abstract": "This paper introduces, analyzes, and applies variants of the enumeration framework symmetric lexicographic symmetric-subset reverse search for the enumeration of symmetric feasible subsets of a finite set up to symmetry. The framework is implemented in detail for three applications: cocircuits, circuits, and triangulations of int configurations. There are two new methods presented and analyzed to check the lexicographic minimality of a subset in its orbit: the critical-element method and the modified switch-table method. Moreover, new application-dependent methods to reduce the number of necessary enumeration nodes are introduced: rank-pruning for cocircuits and lex-pruning for triangulations. With a C++-implementation of the ideas in the software package TOPCOM, in all three applications known benchmarks can be computed faster by a large margin. The following new numbers could be computed for the first time (among others): the number of cocircuits of the 9-cube, the number of circuits of the 8-cube, and the number of all triangulations of the product of a 5- and a 3-simplex, as well as the number of all triangulations of a point configuration in dimension six with 17~points with disconnected flip-graph (constructed by Santos). Moreover, for Santos's triangulation it has computationally been checked that its flip-graph component is indeed purely non-regular. Furthermore, in another instance in dimension five with 26 points (also constructed by Santos), a flaw has been detected: Santos's triangulation can be heuristically flipped to a regular triangulation in the original point configuration. In a mildly modified version of the point configuration, the heuristics cannot flip Santos's triangulation to a regular triangulation anymore.", "categories": ["math.CO", "cs.DM"], "primary_category": "math.CO", "published": "2026-07-07T08:03:50+00:00", "updated": "2026-07-07T08:03:50+00:00", "abs_url": "http://arxiv.org/abs/2607.05967v1", "pdf_url": "https://arxiv.org/pdf/2607.05967v1", "journal_ref": "", "doi": "", "comment": "101 pages, submitted", "relevance": 3, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "triangulations of products of simplices(5-simplex × 3-simplex의 삼각분할 수 계산 등)를 다루고 있어 McMullen 문제의 접근 도구 중 하나인 'triangulations of products of simplices'와 직접 연결되나, 논문의 핵심은 열거 알고리즘 자체이며 McMullen 문제나 oriented matroid realizability를 직접 다루지는 않는다.", "summary": "이 논문은 유한 집합의 대칭 실현 가능 부분집합을 대칭 기준으로 열거하는 프레임워크 'symmetric lexicographic symmetric-subset reverse search'를 도입·분석·적용한다. cocircuit, circuit, 점 배치의 삼각분할 세 가지 응용에 구현되었으며, C++ 구현(TOPCOM)을 통해 9-cube의 cocircuit 수, 8-cube의 circuit 수, 5-simplex × 3-simplex의 삼각분할 수 등 이전에 계산되지 않은 새 수치들을 최초로 산출하였다. 또한 Santos가 구성한 차원 6의 점 배치에서 flip-graph 연결 성분이 순수 비정칙(purely non-regular)임을 계산으로 확인하고, 차원 5의 다른 인스턴스에서 Santos 삼각분할의 오류를 발견하였다.", "technique": "critical-element method 및 modified switch-table method를 이용한 lexicographic minimality 체크, 그리고 rank-pruning(cocircuit용)·lex-pruning(삼각분할용)을 통한 열거 노드 수 감소.", "connections": "추측: triangulations of products of simplices의 완전 열거 결과는 McMullen 문제 접근에서 chirotope 및 oriented matroid 분류의 기초 자료로 활용될 가능성이 있다.", "keyword_hits": ["triangulation"], "source": "filter"}, {"id": "2606.24339v1", "title": "Toward a classification of tropical complete intersection number one", "authors": ["Linxuan Li"], "abstract": "By bridging two classification results -- the Esterov--Gusev classification of tuples of lattice polytopes of mixed volume one, and Fink's characterization of Bergman fans -- we formulate a classification conjecture describing when the stable intersection of a tropical fan F with the tropicalization Trop(X) of a subvariety of T^n is a reduced point. Our main results establish this conjecture in three fundamental cases -- unmixed sequences, hypersurface complete-intersection cycles, and tropical 2-cycles -- and develop several tools intended for the general case.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T09:25:12+00:00", "updated": "2026-06-23T09:25:12+00:00", "abs_url": "http://arxiv.org/abs/2606.24339v1", "pdf_url": "https://arxiv.org/pdf/2606.24339v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "열대기하학(tropical geometry)을 도구로 활용한다는 점에서 McMullen 문제의 접근 도구 중 하나인 tropical geometry와 표면적으로 연관되나, 본 논문의 핵심 주제는 열대 완전 교차(tropical complete intersection)의 분류로 McMullen 문제 또는 Larman 추측과 직접적 관련이 없다.", "summary": "본 논문은 격자 다면체(lattice polytope) 튜플의 mixed volume 1에 대한 Esterov–Gusev 분류와 Bergman fan에 대한 Fink의 특성화를 연결하여, 열대 팬(tropical fan) $F$와 대수적 부분다양체의 열대화 $\\mathrm{Trop}(X)$의 안정 교차(stable intersection)가 축약점(reduced point)이 되는 조건을 기술하는 분류 추측을 제시한다. 주요 결과로 unmixed sequence, 초곡면 완전 교차 사이클(hypersurface complete-intersection cycle), 열대 2-사이클(tropical 2-cycle)의 세 가지 기본 경우에서 이 추측을 증명한다.", "technique": "Esterov–Gusev의 mixed volume 1 분류와 Fink의 Bergman fan 특성화를 연결하여 열대 완전 교차 수(tropical complete intersection number)가 1인 경우를 분류하는 방법론을 개발한다.", "connections": "", "keyword_hits": ["tope", "tropical"], "source": "filter"}, {"id": "2606.27273v1", "title": "Linear Spaces over Perfect Idylls", "authors": ["Jeffery Liu"], "abstract": "We construct a category of vector space-like objects called linear spaces over perfect idylls $k$ (an algebraic structure generalizing fields and hyperfields), which is a specialization of modules over $k$. Previous authors have noted that naive linear algebra in the product $k^n$ fails because linear independence does not satisfy matroid independence axioms. We give a sufficient axiom so that linear independence in $k$-linear spaces does satisfy matroid independence axioms. We also examine basic categorical properties of $k$-linear spaces. In particular, the category of $k$-linear spaces has no products, explaining the failure of naive linear algebra in $k^n$. Furthermore, we explore the categorical relationship between linear spaces over a perfect idyll, ordinary matroids, and matroids over a perfect idyll, connecting the existing theories of matroids and modules.", "categories": ["math.CO", "math.AG"], "primary_category": "math.CO", "published": "2026-06-25T16:51:45+00:00", "updated": "2026-06-25T16:51:45+00:00", "abs_url": "http://arxiv.org/abs/2606.27273v1", "pdf_url": "https://arxiv.org/pdf/2606.27273v1", "journal_ref": "", "doi": "", "comment": "33 pages", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Perfect idyll 위의 선형공간과 matroid 독립성 공리의 연결이 제시되지만, McMullen's problem(d=5)의 convex position, 점 배치, oriented matroid의 실현가능성과는 직접적 기술적 관련이 없음.", "summary": "Perfect idyll(체와 하이퍼필드를 일반화한 대수구조) 위의 선형공간(matroid-like 객체)을 구성하고, 이들이 matroid 독립성 공리를 만족하기 위한 충분조건을 제시한다. k^n에서의 천진한 선형대수가 실패하는 이유를 범주론적으로 설명하고, 선형공간·ordinary matroid·perfect idyll 위의 matroid 이론을 범주론적으로 연결한다.", "technique": "Perfect idyll의 모듈 이론을 기초로 하여 matroid 독립성 공리를 만족하는 선형공간의 범주론적 특성화.", "connections": "추측: oriented matroid와 chirotope의 일반화된 대수적 기초로서 perfect idyll 위의 구조가 기여할 가능성이 있지만, 초록에는 oriented matroid, tope graph, 또는 convex geometry와의 명시적 연결이 없음.", "keyword_hits": [], "source": "explore"}, {"id": "2606.28680v1", "title": "Persistent Subdivisions of Coxeter Permutahedra", "authors": ["Timothy Blanton", "Jesús A. De Loera", "Melissa Sherman-Bennett"], "abstract": "We investigate the realizations of Coxeter permutahedra which are also Coxeter matroid polytopes; these are polytopes of the form $\\mathrm{conv}(W \\cdot \\mathbf{a})$ where $W$ is a finite Coxeter group acting on $\\mathbb{R}^n$ and $\\mathbf{a}$ is generic. Our main focus is how the geometric properties of $\\mathrm{conv}(W \\cdot \\mathbf{a})$ change as $\\mathbf{a}$ changes, with particular attention to persistent simplices, triangulations, and subdivisions.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-27T01:41:35+00:00", "updated": "2026-06-27T01:41:35+00:00", "abs_url": "http://arxiv.org/abs/2606.28680v1", "pdf_url": "https://arxiv.org/pdf/2606.28680v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "삼각분할(triangulations)과 oriented matroid 관련 개념이 부분적으로 겹치나, 본 논문은 Coxeter permutahedra의 기하학적 성질 변화를 다루며 McMullen 문제와 직접적인 관련은 없다.", "summary": "이 논문은 유한 Coxeter 군 $W$가 $\\mathbb{R}^n$에 작용할 때 $\\mathrm{conv}(W \\cdot \\mathbf{a})$ 형태의 Coxeter permutahedra를 연구하며, 이들이 동시에 Coxeter matroid polytope가 되는 실현(realization)을 탐구한다. 주된 관심사는 점 $\\mathbf{a}$가 변함에 따라 $\\mathrm{conv}(W \\cdot \\mathbf{a})$의 기하학적 성질이 어떻게 변하는지이며, 특히 persistent simplex, 삼각분할(triangulation), 세분(subdivision)에 초점을 맞춘다.", "technique": "유한 Coxeter 군의 작용을 이용한 polytope 족의 삼각분할 및 세분 분석", "connections": "추측: triangulations of polytopes 관련 도구가 McMullen 문제의 접근 수단 중 하나(triangulations of products of simplices)와 방법론적으로 유사할 수 있으나, 직접적 연결 근거는 초록에 없음.", "keyword_hits": ["tope", "triangulation"], "source": "filter"}, {"id": "2606.24877v1", "title": "Turán results for posets and their alternating cycles", "authors": ["Geir Agnarsson", "John B. Kent"], "abstract": "For a partially ordered set ${\\mathbb{P}} = (X,\\leq)$ there exist hypergraphs where the vertices are the set of ordered tuples of either all incomparable elements of ${\\mathbb{P}}$ or all the critical pairs of ${\\mathbb{P}}$, and the edges are formed by the duals of either all the alternating cycles of ${\\mathbb{P}}$ or all the strict alternating cycles of ${\\mathbb{P}}$. The weak chromatic numbers of these hypergraphs are all equal to the order dimension of ${\\mathbb{P}}$. Here are established upper bounds on the number of strict alternating cycles a poset ${\\mathbb{P}}=(X,\\leq)$ can have in terms of $n = |X|$, the cardinality of the groundset of ${\\mathbb{P}}$, and the width $w$ of ${\\mathbb{P}}$. These bounds also apply to the number of hyperedges of the associated hypergraph ${\\mathcal{H}}^s(\\mathbb{P})$, with incomparable pairs as vertices and strict alternating cycles dual to its hyperedges.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T17:54:28+00:00", "updated": "2026-06-23T17:54:28+00:00", "abs_url": "http://arxiv.org/abs/2606.24877v1", "pdf_url": "https://arxiv.org/pdf/2606.24877v1", "journal_ref": "", "doi": "", "comment": "26 pages, 5 figures, one table", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Order dimension과 poset structure는 combinatorial geometry와 관련이 있지만, McMullen's problem의 convex position, oriented matroid, realizability 등과는 직접적 연관이 없음.", "summary": "Poset의 alternating cycle과 strict alternating cycle의 개수에 대한 Turán 유형의 상한을 확립한다. Poset의 incomparable element들과 critical pair들로 정의된 hypergraph의 weak chromatic number가 poset의 order dimension과 같음을 보인다.", "technique": "Hypergraph 색칠수(weak chromatic number)와 poset의 width를 이용한 조합론적 상한 도출", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.31640v1", "title": "A Counterexample to Ziegler's Cross-Polytope Conjecture for Simplicial 0/1-Polytopes", "authors": ["Volker Kaibel", "Sebastian Pokutta"], "abstract": "Ziegler proved that every simplicial $d$-dimensional $0/1$-polytope has at most $2d$ vertices, and asked whether equality forces the polytope to be centrally symmetric and hence, equivalently, a $0/1$-realization of the $d$-dimensional cross polytope. In this note, we give a negative answer, exhibiting an explicit set of $14$ vertices in $\\{0,1\\}^7$ whose convex hull is a simplicial $7$-polytope and is not centrally symmetric. Moreover, via exhaustive enumeration we show that up to the symmetries of the cube, there are precisely five such polytopes in dimension $7$ (of two combinatorial types) that are not centrally symmetric.", "categories": ["math.CO", "math.OC"], "primary_category": "math.CO", "published": "2026-06-30T13:21:48+00:00", "updated": "2026-06-30T13:21:48+00:00", "abs_url": "http://arxiv.org/abs/2606.31640v1", "pdf_url": "https://arxiv.org/pdf/2606.31640v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "0/1-폴리토프와 조합론적 구조를 다루지만, McMullen 문제(f(5)=11, convex/general position 배치, oriented matroid 등)와 직접적인 관련은 없다.", "summary": "Ziegler는 단순(simplicial) $d$차원 $0/1$-폴리토프가 최대 $2d$개의 꼭짓점을 가짐을 증명하고, 등호 조건이 중심대칭성을 강제하는지 물었다. 이 논문은 $\\{0,1\\}^7$ 안의 명시적인 14개 꼭짓점으로 이루어진 볼록껍질이 단순 7-폴리토프이면서 중심대칭이 아님을 보여 반례를 제시한다. 또한 완전탐색(exhaustive enumeration)을 통해 7차원에서 중심대칭이 아닌 그러한 폴리토프가 큐브의 대칭을 고려할 때 정확히 두 가지 조합적 유형의 다섯 개임을 밝힌다.", "technique": "명시적 꼭짓점 구성과 컴퓨터 기반 완전탐색(exhaustive enumeration)을 이용해 반례를 발견하고 분류.", "connections": "추측: 볼록 위치(convex position) 점 배치의 조합적 유형 분류 문제와 간접적으로 관련될 수 있으나, McMullen 문제의 핵심 도구(oriented matroid, chirotope 등)와의 직접 연결은 초록에서 확인되지 않는다.", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.27328v1", "title": "On the homology groups of clique complexes of strongly regular graphs", "authors": ["Sebastian M. Cioabă", "Mutasim Mim"], "abstract": "In this paper, we study the first homology groups of clique complexes of strongly regular graphs over arbitrary fields and prove that most of these graphs have trivial first clique homology groups. Using Neumaier's classification of strongly regular graphs with smallest integral eigenvalue, we show that a non-vanishing first homology group may occur only in a short collection of cases: the Petersen graph, the Shrikhande graph, the complete bipartite graphs, the conference graphs on at most $255$ vertices, the lattice graphs, and the exceptional families $E_m$ in Neumaier's classification of strongly regular graphs with smallest adjacency eigenvalue $-m$, for some integer $m \\geq 3$. Let $\\text{Cl}(G)$ denote the clique complex of a graph $G$, $H_i(\\text{Cl}(G),\\mathbb{F})$ be the $i$-th homology group of $\\text{Cl}(G)$ over the field $\\mathbb{F}$, for some $i\\geq 1$, and $λ_{min}(G)$ denote the smallest eigenvalue of the adjacency matrix of $G$. We prove that if $(G_n)_{n\\geq 1}$ is an infinite family of pairwise distinct strongly regular graphs and $(\\mathbb{F}_n)_{n\\geq 1}$ is a sequence of fields such that $H_1(\\text{Cl}(G_n), \\mathbb{F}_n)\\not=0$ for every $n$, then either $G_n$ is a lattice graph for infinitely many $n$, or $\\lim_{n\\rightarrow +\\infty} λ_{\\min}(G_n)=-\\infty$.   For Latin square graphs, we determine the clique homologies over arbitrary fields and show that if $G$ is the strongly regular graph associated with a Latin square $M$ of order $n \\geq 5$ and $\\mathbb{F}$ is any field, then $H_i(\\text{Cl}(G),\\mathbb{F})=0$ for $i=1$ or $i \\geq 3$, and $\\dim H_2(\\text{Cl}(G),\\mathbb{F})=(n-1)^3-I(M),$ where $I(M)$ is the number of $2 \\times 2$ Latin subsquares or intercalates in $M$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T17:41:10+00:00", "updated": "2026-06-25T17:41:10+00:00", "abs_url": "http://arxiv.org/abs/2606.27328v1", "pdf_url": "https://arxiv.org/pdf/2606.27328v1", "journal_ref": "", "doi": "", "comment": "39 pages, 4 figures", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Strongly regular graph의 clique complex 위상 성질을 연구하나, McMullen's problem의 convex position, oriented matroid, realizability와는 직접 관련이 없음.", "summary": "본 논문은 강정규그래프(strongly regular graphs)의 클리크 복합체(clique complex)의 1차 호몰로지군을 연구하며, Neumaier의 분류를 이용해 비자명 호몰로지가 나타나는 경우를 Peterson 그래프, Shrikhande 그래프, 완전이분그래프 등 극히 제한된 경우로 특징지었다. Latin square graphs에 대해서는 클리크 호몰로지를 완전히 결정하고 2차 호몰로지의 차원을 Latin subsquares 개수로 명시적으로 표현했다.", "technique": "Neumaier의 strongly regular graph 분류, 인접 행렬의 고유값 분석, homological algebra over arbitrary fields", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.29391v1", "title": "Minimal Isometric Embeddings of Graphs into Abelian Groups: Theory, Algorithms, and Applications to Signal Processing over Networks", "authors": ["Fokam Souop Rigobert", "Bitjoka Laurent"], "abstract": "This dissertation develops a framework for embedding arbitrary connected graphs isometrically into Cayley graphs of abelian groups, with applications to harmonic analysis on networks. It addresses representing irregular graph-structured data within highly symmetric algebraic hosts, on which classical Fourier theory applies verbatim rather than by analogy.   The theoretical core is twofold. First, we introduce edge relations phi, Phi, and Psi that detect metric parallelism, a strict generalization of the Djokovic-Winkler relation beyond bipartite and partial-cube structures, with a transitive prune operation converting them into candidate same-generator edge partitions. Second, we prove the Cocycle/Quotient Labeling Theorem: any edge partition induces a most-generic consistent vertex labeling as a GF(2) quotient of dimension k = t - rank(A), where A is the cycle-class parity matrix; the labeling can fail only by shortcuts, never by stretching. With a shortcut-repair loop terminating in the isometric spanning-tree embedding, this gives a universal algorithm: every connected graph G embeds isometrically into a Cayley graph of (Z_2)^k with k <= n-1, verified exhaustively on all 995 connected graphs of at most seven vertices.   A bounds theory follows: k >= max(diam(G), ceil(log2 n)); stars satisfy k_min(K_{1,q}) = ceil(log2 q) + 1, exponentially below the naive dimension; odd cycles require k = n-1. We then generalize the quotient machinery from GF(2) to Z via the Smith Normal Form, giving embeddings into products of cyclic groups. The primary application is harmonic analysis: these embeddings ground Fourier analysis, convolution, and wavelet transforms on graph signals, preserving translation-modulation duality, convolution theorems, and Plancherel identities that matrix-based graph signal processing lacks. We name this framework Group-Embedding-based Graph Signal Processing (GE-GSP).", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-28T13:29:10+00:00", "updated": "2026-06-28T13:29:10+00:00", "abs_url": "http://arxiv.org/abs/2606.29391v1", "pdf_url": "https://arxiv.org/pdf/2606.29391v1", "journal_ref": "", "doi": "", "comment": "Draft PhD thesis awaiting defense", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "그래프의 기하학적 임베딩을 다루지만, McMullen's problem의 convex position, oriented matroid, realizability 등과는 직접 관련이 없음.", "summary": "이 논문은 임의의 연결 그래프를 아벨군의 Cayley 그래프에 등거리 임베딩하는 이론적 틀을 개발한다. Djokovic-Winkler 관계의 일반화인 edge relation들과 Cocycle/Quotient Labeling Theorem을 통해 GF(2)^k 또는 순환군의 곱으로의 보편적 임베딩 알고리즘을 제시하며, 이를 네트워크 상의 그래프 신호 처리에 적용한다.", "technique": "Cocycle/Quotient Labeling Theorem과 Smith Normal Form을 이용한 GF(2) 및 Z 위의 quotient 기계론.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.02419v1", "title": "Characterisations of strong $Δ$-matroids", "authors": ["Kieran Calvert", "Aram Dermenjian", "Alex Fink", "Ben Smith"], "abstract": "We study characterisations of strong $Δ$-matroids, compiling a list of five equivalent descriptions. We show a variant of Wenzel's exchange property and the hyperplane exchange property of Borovik-Gelfand-White are equivalent. We also introduce two novel characterisations in terms of 'peerless' and 'isolated' antipodes within the system of feasible sets, banning certain configurations of antipodes either globally or locally. As a corollary, we obtain new 'local' exchange axioms for matroids and $Δ$-matroids. We give algebraic motivation for these new characterisations by introducing the peerless antipode equations, tropical equations that govern whether a $Δ$-matroid has no peerless antipodes. We show that these arise as the tropicalisation of a specific basis of quadratics cutting out the orthogonal Grassmannian.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-02T16:49:03+00:00", "updated": "2026-07-02T16:49:03+00:00", "abs_url": "http://arxiv.org/abs/2607.02419v1", "pdf_url": "https://arxiv.org/pdf/2607.02419v1", "journal_ref": "", "doi": "", "comment": "16 pages. Comments welcome!", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Tropical geometry와 oriented matroid 관련 도구를 다루지만, 본 논문은 strong Δ-matroid의 공리적 특성화에 집중하며 McMullen 문제(d=5, 점 배치, acyclic reorientation 등)와 직접적 관련은 없다.", "summary": "본 논문은 strong Δ-matroid의 다섯 가지 동치 특성화를 제시하며, Wenzel의 교환 성질과 Borovik-Gelfand-White의 초평면 교환 성질의 동치를 증명한다. 'peerless' 및 'isolated' antipode 개념을 도입하여 실현 가능 집합 계의 특정 antipode 구성을 전역·국소적으로 금지하는 새로운 특성화를 제안하고, 이로부터 matroid와 Δ-matroid에 대한 새로운 '국소' 교환 공리를 도출한다. 대수적 동기로서 peerless antipode 방정식을 소개하며, 이것이 직교 Grassmannian을 절단하는 이차식의 특정 기저의 열대화(tropicalisation)로 나타남을 보인다.", "technique": "Peerless/isolated antipode 개념 도입, Wenzel·Borovik-Gelfand-White 교환 성질의 동치 증명, 직교 Grassmannian의 이차식 기저의 열대화를 통한 대수적 해석.", "connections": "추측: tropical geometry 도구가 McMullen 문제의 realizability 접근에서 사용되는 chirotope·oriented matroid 실현 가능성 연구와 간접적으로 연결될 수 있으나, 초록만으로는 불확실.", "keyword_hits": ["tropical"], "source": "filter"}, {"id": "2607.04014v1", "title": "Ample sets in Cartesian products", "authors": ["Victor Chepoi", "Matthew Maat"], "abstract": "Ample sets of hypercubes, introduced by A. Dress in 1995, constitute a combinatorial structure with rich properties and important examples. Ample sets can be characterized in a multitude of combinatorial, graph-theoretical, recursive, and geometrical ways, and they are equivalent to lopsided sets introduced by J. Lawrence in 1983.   In this paper, we define and investigate ample sets of Cartesian products $U=U_1\\times\\cdots\\times U_m$. This is done using minor-subproducts of $U$, which correspond to products of partitions of factors: each minor-subproduct is obtained by partitioning each $U_i$ into blocks and contracting blocks into singletons. For a minor-subproduct $M$ and a set $S$, we define the notions of shattering of $M$ by $S$, of copy of $M$ in $S$, of projection $S_M$ of $S$ on $M$, and of strong-projection $S^M$ of $S$ on $M$. We call a set $S$ \\emph{ample} if for any minor-subproduct $M$ that is shattered by $S$, there exists a copy of $M$ included in $S$.   We prove that several characterizations of ample sets can be extended to ample sets of Cartesian products. In particular, we show that ampleness of $S$ is equivalent to the ampleness of the complement $S^*$, to superisometricity (isometricity of $S^M$ for any minor-subproduct $M$), and commutativity $(S^M)_{M'}=(S_{M'})^M$ for all minor-subproducts $M,M'$ with disjoint supports. We also provide more efficient characterizations of ampleness, in particular, by showing that $S$ is ample iff S is isometric and both $S_e$ and $S^e$ are ample for some elementary minor-subproduct, iff the intersection of S with any interval [u,v] with u,v in S is ample in the classical sense. We characterize ampleness by push downs and provide a decomposition theorem, allowing us to prove that their prism complexes are contractible. We provide new examples of ample sets arising from payoff games, prism-like polyhedra, and quasi-median graphs.", "categories": ["math.CO", "cs.DM", "math.MG"], "primary_category": "math.CO", "published": "2026-07-04T20:21:18+00:00", "updated": "2026-07-04T20:21:18+00:00", "abs_url": "http://arxiv.org/abs/2607.04014v1", "pdf_url": "https://arxiv.org/pdf/2607.04014v1", "journal_ref": "", "doi": "", "comment": "56 pages, 9 figures", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Lawrence의 lopsided sets(ample sets와 동치)가 oriented matroid와 관련되나, 본 논문은 데카르트 곱으로의 일반화에 초점을 맞추며 McMullen 문제나 f(5)=11 등과 직접적 연관은 없다.", "summary": "이 논문은 Dress(1995)가 도입한 초입방체(hypercube)의 ample sets를 데카르트 곱 $U=U_1\\times\\cdots\\times U_m$으로 일반화한다. minor-subproduct를 통해 shattering, copy, projection, strong-projection 등의 개념을 정의하고, 고전적 ample sets의 다양한 특성(complement와의 동치, superisometricity, commutativity 등)이 이 일반화된 설정에서도 성립함을 증명한다. 또한 분해 정리(decomposition theorem)를 제공하여 prism complex가 contractible임을 보이고, payoff games·prism-like polyhedra·quasi-median graphs에서 새로운 예시를 제시한다.", "technique": "minor-subproduct를 이용한 shattering·projection·strong-projection 개념의 정의와 isometricity·push down 분해를 통한 ampleness 특성화.", "connections": "추측: Lawrence의 lopsided sets가 oriented matroid의 tope 구조와 연결되므로, 본 논문의 일반화된 ample sets 이론이 oriented matroid의 reorientation 문제와 간접적으로 관련될 수 있으나 초록에서 직접 언급되지 않음.", "keyword_hits": ["lawrence"], "source": "filter"}, {"id": "2607.02701v1", "title": "Permutahedra, Lusztig varieties, degenerations, and subdivisions", "authors": ["Allen Knutson", "Mario Sanchez", "Melissa Sherman-Bennett"], "abstract": "We present an embedded (in $G/B$) degeneration of Lusztig varieties (which generalize type $A$ Hessenberg varieties) to certain unions of Richardson varieties, giving a simultaneous reproof (and extension) of results of Anderson--Tymoczko, Harada--Horiguchi--Masuda--Park, and Kim. Although torus-equivariant, the degeneration is not Gröbner. In the case that the Lusztig variety is the permutahedral toric variety, this degeneration provides a subdivision of the permutahedron into Bruhat interval polytopes, and we prove a more general result showing equivariant degenerations of projective toric varieties produce subdivisions of the moment polytope (as was shown in the Gröbner case by Sturmfels). A Gröbner degeneration would result in a {\\em regular} subdivision, and despite our degeneration not being Gröbner we show in types $A,B,C$ that our subdivisions of the permutahedron are indeed regular.", "categories": ["math.AG", "math.CO"], "primary_category": "math.AG", "published": "2026-07-02T18:43:57+00:00", "updated": "2026-07-02T18:43:57+00:00", "abs_url": "http://arxiv.org/abs/2607.02701v1", "pdf_url": "https://arxiv.org/pdf/2607.02701v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "퍼뮤타헤드론(permutahedron)의 세분(subdivision)과 oriented matroid의 chirotope/삼각분할 개념이 부분적으로 겹치나, 논문의 핵심 주제는 Lusztig varieties의 퇴화(degeneration)와 Richardson varieties로 McMullen 문제와 직접적인 관련은 없다.", "summary": "이 논문은 $G/B$ 안에서 Lusztig varieties(type $A$ Hessenberg varieties의 일반화)를 Richardson varieties의 합집합으로 퇴화시키는 embedded degeneration을 제시하며, Anderson–Tymoczko, Harada–Horiguchi–Masuda–Park, Kim의 결과를 동시에 재증명·확장한다. 퍼뮤타헤드론 토릭 다양체의 경우 이 퇴화는 퍼뮤타헤드론을 Bruhat interval polytope들로 세분하며, 더 일반적으로 사영 토릭 다양체의 등변 퇴화가 moment polytope의 세분을 산출함을 증명한다. 퇴화가 Gröbner가 아님에도 불구하고 type $A, B, C$에서 해당 퍼뮤타헤드론 세분이 정규(regular) 세분임을 보인다.", "technique": "토러스 등변(equivariant) 비-Gröbner 퇴화(non-Gröbner degeneration)를 이용한 Lusztig varieties → Richardson varieties의 평탄 퇴화(flat degeneration), 및 모멘트 폴리토프의 세분 도출.", "connections": "추측: 단체 곱의 삼각분할(triangulations of products of simplices)과 Bruhat interval polytope 세분 간 구조적 유사성이 oriented matroid 실현가능성 문제와 간접적으로 연결될 수 있으나, 초록에는 근거 없음.", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2607.02208v1", "title": "Counterexamples to two conjectures about matroids", "authors": ["Matt Larson"], "abstract": "We give counterexamples to two well-known conjectures about matroids: White's conjecture on the generation of the toric ideal by symmetric exchange binomials, and a conjecture of Mason on the log-concavity of the counts of flats of a given rank.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-02T14:18:11+00:00", "updated": "2026-07-02T14:18:11+00:00", "abs_url": "http://arxiv.org/abs/2607.02208v1", "pdf_url": "https://arxiv.org/pdf/2607.02208v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Matroid 이론과 toric ideal의 구조적 성질을 다루지만, McMullen's problem의 핵심인 convex position 점 배치, oriented matroid의 acyclic reorientation, tope graph와는 직접 관련이 없음.", "summary": "본 논문은 matroid 이론의 두 가지 주요 추측에 반례를 제시한다: White's conjecture (symmetric exchange binomials에 의한 toric ideal 생성)과 Mason's conjecture (주어진 rank의 flat 개수의 log-concavity).", "technique": "", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.03029v1", "title": "Recursive constructions for block-transitive, poset-imprimitive two-designs", "authors": ["Carmen Amarra", "Alice Devillers", "Cheryl E. Praeger"], "abstract": "We give two general constructions for $2$-designs, that can be used recursively, and interchangeably, to produce new infinite families of $2$-designs admitting block-transitive groups of automorphisms which preserve arbitrarily large posets of partitions of the point-set. The only arbitrarily large posets for which constructions were previously known are chains of arbitrary length. Using the constructions we exhibit new infinite families of poset-imprimitive block-transitive $2$-designs corresponding to several different arbitrarily large posets, as well as constructions for most posets with four nodes.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-07-03T07:18:47+00:00", "updated": "2026-07-03T07:18:47+00:00", "abs_url": "http://arxiv.org/abs/2607.03029v1", "pdf_url": "https://arxiv.org/pdf/2607.03029v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "2-designs와 combinatorial structures를 다루지만 McMullen's problem의 핵심인 convex position, oriented matroid, realizability와 직접 관련 없음.", "summary": "두 개의 일반 재귀적 구성을 통해 point-set의 partition들로 이루어진 임의로 큰 poset을 보존하는 block-transitive automorphism group을 갖는 2-designs의 무한족들을 생성한다. 이전에는 chain만 알려져 있었으나, 본 논문은 여러 다른 arbitrarily large posets와 4-node poset 대부분에 대한 구성을 제시한다.", "technique": "재귀적 2-design 구성과 block-transitive automorphism group의 poset 불변성 보존", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2607.06172v1", "title": "Cone and constrained colorful Carathéodory Theorems", "authors": ["Pavle V. M. Blagojević", "Roman N. Karasev", "Bálint Zsigri"], "abstract": "Holmsen proved in 2016 a generalization of the classical colorful Caratheodory theorem in which a matroid imposes additional constraints on the desired colorful transversal. His approach also works in the more general setting of oriented matroids, rather than relying directly on convex hulls.   In this paper, we extend these ideas in several directions. First, we study which colorful Caratheodory-type results remain valid when convex cones replace convex hulls, as well as analogous modifications in the oriented matroid setting. Second, we consider variants in which the additional constraint on the transversal is not encoded by a matroid. This leads to new extensions of the classical Tverberg theorem.   Our approach is topological, following the methods of Holmsen, and Kalai and Meshulam, on which it builds. The key idea is to analyze homology groups of simplicial complexes that encode colorful Caratheodory-type phenomena, such as the support complex of an oriented matroid. In particular, one shows that these complexes are (near-)d-Leray. We extend this analysis by carrying out more detailed homology computations for these complexes, with the aim of enabling further and more refined applications of the method.", "categories": ["math.CO", "math.AT", "math.MG"], "primary_category": "math.CO", "published": "2026-07-07T11:52:33+00:00", "updated": "2026-07-07T11:52:33+00:00", "abs_url": "http://arxiv.org/abs/2607.06172v1", "pdf_url": "https://arxiv.org/pdf/2607.06172v1", "journal_ref": "", "doi": "", "comment": "38 p", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "oriented matroid의 support complex 분석이 공통 도구이나, 본 논문은 colorful Carathéodory 및 Tverberg 정리 확장에 집중하며 McMullen 문제(f(5)=11, acyclic reorientation 등)와 직접적 연관은 없다.", "summary": "이 논문은 Holmsen의 2016년 결과를 확장하여, 볼록 원뿔(convex cone)이 볼록 껍질(convex hull)을 대체하는 상황과 oriented matroid 설정에서의 colorful Carathéodory형 정리를 연구한다. 추가 제약이 matroid로 인코딩되지 않는 변형도 다루며, 이를 통해 고전적 Tverberg 정리의 새로운 확장을 얻는다. 핵심 방법은 위상수학적 접근으로, colorful Carathéodory 현상을 인코딩하는 단순복합체(simplicial complex)의 호몰로지 군을 분석하여 해당 복합체가 (near-)$d$-Leray임을 보인다.", "technique": "oriented matroid의 support complex 등 단순복합체의 세밀한 호몰로지 계산을 통해 (near-)$d$-Leray 성질을 확립하는 위상수학적 방법(Holmsen 및 Kalai–Meshulam의 방법론 기반).", "connections": "추측: oriented matroid의 support complex 분석 기법이 McMullen 문제에서의 oriented matroid realizability 연구에 간접적으로 활용될 가능성이 있으나, 초록에는 직접적 연결 근거 없음.", "keyword_hits": ["oriented matroid"], "source": "filter"}, {"id": "2606.28147v1", "title": "Linear-size $\\ell_1$ sparsifiers", "authors": ["Victor Reis", "Thomas Rothvoss"], "abstract": "We prove that for any matrix $A \\in \\mathbb{R}^{m \\times n}$ and any $\\varepsilon \\in (0, 1/2]$ there is a diagonal matrix $D \\in \\mathbb{R}_{\\geq 0}^{m \\times m}$ with at most $O(\\frac{n}{\\varepsilon^2} \\log(\\frac{1}{\\varepsilon}))$ nonzero entries so that \\[(1-\\varepsilon) \\|Ax\\|_1 \\leq \\|DAx\\|_1 \\leq (1+\\varepsilon)\\|Ax\\|_1 \\quad \\forall x \\in \\mathbb{R}^n.\\]In particular, for any zonotope $Z \\subseteq \\mathbb{R}^{n}$ there exists a zonotope $Z' \\subseteq \\mathbb{R}^{n}$ generated by at most $O(\\frac{n}{\\varepsilon^2} \\log(\\frac{1}{\\varepsilon}))$ segments so that $(1-\\varepsilon) Z \\subseteq Z' \\subseteq (1+\\varepsilon) Z$. Previously, the best known bound was $O(\\frac{n}{\\varepsilon^2} \\log n)$ due to Talagrand (1990).", "categories": ["math.MG", "cs.DM"], "primary_category": "math.MG", "published": "2026-06-26T14:43:15+00:00", "updated": "2026-06-26T14:43:15+00:00", "abs_url": "http://arxiv.org/abs/2606.28147v1", "pdf_url": "https://arxiv.org/pdf/2606.28147v1", "journal_ref": "", "doi": "", "comment": "20 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 $\\ell_1$ 스파시파이어(sparsifier)와 조노토프(zonotope) 근사에 관한 것으로, McMullen 문제(볼록 위치·일반 위치 점 배치, oriented matroid)와 직접적인 관련이 없다.", "summary": "임의의 행렬 $A \\in \\mathbb{R}^{m \\times n}$에 대해 최대 $O\\!\\left(\\frac{n}{\\varepsilon^2}\\log\\frac{1}{\\varepsilon}\\right)$개의 비영(nonzero) 대각 원소를 갖는 대각 행렬 $D$가 존재하여 모든 $x$에 대해 $(1-\\varepsilon)\\|Ax\\|_1 \\leq \\|DAx\\|_1 \\leq (1+\\varepsilon)\\|Ax\\|_1$를 만족함을 증명한다. 이는 조노토프(zonotope) 언어로 번역하면, $n$차원 조노토프 $Z$를 $O\\!\\left(\\frac{n}{\\varepsilon^2}\\log\\frac{1}{\\varepsilon}\\right)$개의 선분으로 생성되는 $(1\\pm\\varepsilon)$-근사 조노토프 $Z'$로 대체할 수 있음을 의미한다. 이전 최선 결과는 Talagrand(1990)의 $O\\!\\left(\\frac{n}{\\varepsilon^2}\\log n\\right)$이었으며, 본 논문은 $\\log n$ 인수를 $\\log\\frac{1}{\\varepsilon}$으로 개선한다.", "technique": "초록만으로는 구체적 증명 기법이 명시되지 않아 불확실.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.27503v1", "title": "Tropical Fermat--Weber Problems over Non-Finite Data and their Inverse Formulations", "authors": ["John Sabol", "Ruriko Yoshida"], "abstract": "The term tropical pseudonorm refers to a family of (not necessarily symmetric) gauge functions that arise in tropical or idempotent geometry. An important characteristic of these gauges is their invariance under translation by a constant vector, allowing them to descent naturally to tropical projective spaces. In this work, we explore the tropical one-infinity pseudonorm, a polyhedral hybrid gauge that allows for tunable asymmetry, in the context of a Fermat--Weber location problem. We extend previous formulations in considering non-finite data, and we investigate several variants of the inverse problem, providing linear programming formulations for their solution.", "categories": ["math.CO", "math.OC"], "primary_category": "math.CO", "published": "2026-06-25T19:37:48+00:00", "updated": "2026-06-25T19:37:48+00:00", "abs_url": "http://arxiv.org/abs/2606.27503v1", "pdf_url": "https://arxiv.org/pdf/2606.27503v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 tropical geometry를 사용하지만 Fermat–Weber 위치 문제와 역문제에 관한 것으로, McMullen 문제나 oriented matroid의 acyclic reorientation과는 직접적인 관련이 없다.", "summary": "이 논문은 tropical(idempotent) 기하학에서 등장하는 tropical one-infinity pseudonorm을 이용하여 Fermat–Weber 위치 문제를 비유한(non-finite) 데이터로 확장한다. 또한 해당 문제의 여러 역문제(inverse problem) 변형을 고려하고, 이를 선형 프로그래밍(linear programming)으로 정식화하여 풀이 방법을 제시한다.", "technique": "Tropical one-infinity pseudonorm을 gauge function으로 활용하고, 역문제 변형들에 대해 선형 프로그래밍 정식화를 사용한다.", "connections": "", "keyword_hits": ["tropical"], "source": "filter"}, {"id": "2606.24426v1", "title": "Odd cycles in symmetric Cayley graphs on prime cyclic groups", "authors": ["Wei Li", "Kai Yang"], "abstract": "Let $p$ be an odd prime and let $S\\subseteq \\Z_p$ be symmetric with $0\\notin S$. Let $\\Cay(\\Z_p,S)$ be the undirected Cayley graph on $\\Z_p$ in which $x$ and $y$ are adjacent if and only if $x-y\\in S$. For $1\\le \\ell\\le (p-1)/2$, define \\[ \\ex_{\\Cay}(C_{2\\ell+1},\\Z_p)=\\max\\{|S|: S=-S,\\ 0\\notin S,\\ \\Cay(\\Z_p,S)\\text{ contains no }C_{2\\ell+1}\\}. \\] Confirming a conjecture of Cashman and Kelley, we prove that if $p=2\\ell+1$, then $\\ex_{\\Cay}(C_{2\\ell+1},\\Z_p)=0$, while if $p>2\\ell+1$, then \\[ \\ex_{\\Cay}(C_{2\\ell+1},\\Z_p)=2\\floor{\\frac{p+2\\ell+1}{2(2\\ell+1)}}. \\] The proof combines a sharp additive zero-sum odd-girth argument with weak odd pancyclicity to transfer the result from odd-girth exclusion to fixed odd-cycle exclusion. We also give a canonical extremal family, an exact extremality criterion in terms of odd zero-sum avoidance, and an example showing that extremizers need not be dilates of the canonical construction.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T11:04:15+00:00", "updated": "2026-06-23T11:04:15+00:00", "abs_url": "http://arxiv.org/abs/2606.24426v1", "pdf_url": "https://arxiv.org/pdf/2606.24426v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "대칭 Cayley 그래프의 홀수 사이클 제외 문제로, McMullen's problem(볼록 위치의 점 배치와 oriented matroid)과는 직접적 관련이 없음.", "summary": "본 논문은 소수 $p$에 대해 $\\mathbb{Z}_p$ 위의 대칭 Cayley 그래프에서 홀수 사이클 $C_{2\\ell+1}$을 포함하지 않는 최대 대칭 생성원소 집합의 크기를 결정한다. Cashman-Kelley 추측을 확인하여 $p=2\\ell+1$일 때는 0, $p>2\\ell+1$일 때는 $2\\lfloor\\frac{p+2\\ell+1}{2(2\\ell+1)}\\rfloor$임을 증명한다.", "technique": "덧셈적 영영합(additive zero-sum) 홀수-girth 논증과 약한 홀수 pancyclicity를 결합하여 홀수-girth 제외 결과를 고정 홀수-사이클 제외로 전이.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24878v1", "title": "An Improved Lower Bound for the Erdős-Lovász Cover Number Problem", "authors": ["Varun Sivashankar"], "abstract": "Let $g(r)$ be the minimum number of edges in an $r$-uniform intersecting hypergraph with cover number $r$. Erdős and Lovász proved the lower bound $g(r)\\ge 8r/3-3$. We first give a completely elementary proof that $g(r)\\ge 3r-4$. We then build on the same approach and apply Kahn's small-codegree hypergraph edge-colouring theorem to improve this to $g(r)\\ge (61/20-o(1))r$. To the best of our knowledge, this is the first improvement over the Erdős-Lovász lower bound in about fifty years.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T17:55:10+00:00", "updated": "2026-06-23T17:55:10+00:00", "abs_url": "http://arxiv.org/abs/2606.24878v1", "pdf_url": "https://arxiv.org/pdf/2606.24878v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Erdős-Lovász cover number 문제는 hypergraph covering과 extremal combinatorics의 고전 문제이며, McMullen's problem(convex position, general position 배치)과는 직접적 주제 연관성이 없음.", "summary": "본 논문은 $r$-uniform intersecting hypergraph에서 cover number가 $r$일 때 최소 간선 수 $g(r)$에 대한 Erdős-Lovász 하한을 약 50년 만에 처음 개선한다. 초등적 증명으로 $g(r) \\ge 3r-4$를 얻고, Kahn의 small-codegree hypergraph edge-colouring 정리를 적용하여 $g(r) \\ge (61/20-o(1))r$로 개선한다.", "technique": "Kahn의 small-codegree hypergraph edge-colouring theorem을 extremal lower bound 개선에 적용.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24400v1", "title": "Improved asymptotic upper bound on the $n$-queens completion threshold", "authors": ["Hugo Møller Nielsen"], "abstract": "The $n$-queens completion threshold $qc(n)$ is the largest integer $k < n$ such that any placement of $k$ mutually non-attacking queens on an $n \\times n$ chessboard can be completed to an $n$-queens configuration by adding $n - k$ queens. For all sufficiently large $n$, we improve the previously best-known upper bound on $qc(n)$ from $qc(n) \\leq 0.241n$ to $qc(n) \\leq 0.216n$, by constructing a non-completable partial configuration of fewer than $0.216n$ queens.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T10:36:34+00:00", "updated": "2026-06-23T10:36:34+00:00", "abs_url": "http://arxiv.org/abs/2606.24400v1", "pdf_url": "https://arxiv.org/pdf/2606.24400v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "n-queens 문제는 조합론의 고전 문제이지만 McMullen's problem(볼록 위치의 점 배치, oriented matroid, 다면체 기하)과는 직접적 연관성이 없음.", "summary": "n×n 체스판의 n-queens 완성 임계값 qc(n)에 대한 점근 상한을 0.241n에서 0.216n으로 개선. 0.216n보다 작은 queens의 비완성 부분 배치를 구성하여 이를 달성.", "technique": "완성 불가능한 부분 배치의 구체적 구성(construction of non-completable partial configuration)", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.25055v1", "title": "Pseudoshattering Pairs", "authors": ["Noga Alon", "Varun Sivashankar"], "abstract": "For two vectors $x,y\\in [b]^k$, consider the bipartite graph with two copies of $[b]$ in which $i$ on the left is joined to $j$ on the right if $(x_t,y_t)=(i,j)$ for some coordinate $t$. We study the largest size of a family $C\\subseteq [b]^k$ such that, for every two distinct $x,y\\in C$, this bipartite graph contains a cycle.   We give a natural construction for such families and conjecture that it is optimal whenever $k$ is large relative to $b$. We prove an LYM-type upper bound that is asymptotically tight with respect to this construction, and is exact when $k$ is large and divisible by $b$. We then refine the argument using a circular ordering, obtaining the sharp full-support bound when $k\\equiv -1\\pmod b$. In the case $b=3$, we prove the exact general result when $k\\equiv -1\\pmod 3$ and $k$ is sufficiently large. The problem is motivated by the Daniely--Shalev-Shwartz dimension and the pseudocube formulation of a higher-alphabet Sauer-Shelah-Perles lemma.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T18:11:17+00:00", "updated": "2026-06-23T18:11:17+00:00", "abs_url": "http://arxiv.org/abs/2606.25055v1", "pdf_url": "https://arxiv.org/pdf/2606.25055v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 조합론의 VC 차원 및 Sauer-Shelah-Perles 보조정리 확장에 관한 것으로, McMullen's problem(볼록위치 점 배치, oriented matroid, realizability)과는 직접적 연관성이 없습니다.", "summary": "논문은 두 벡터 $x,y \\in [b]^k$에 대해 정의된 이분 그래프가 사이클을 포함하는 족 $C \\subseteq [b]^k$의 최대 크기를 연구합니다. LYM형 상한을 증명하고 $k \\equiv -1 \\pmod{b}$일 때 sharp full-support 경계를 얻으며, $b=3$일 때 특정 조건 하의 정확한 결과를 제시합니다.", "technique": "LYM형 상한(LYM-type upper bound)과 원형 순서(circular ordering)를 이용한 정제 논증", "connections": "Sauer-Shelah-Perles 보조정리의 고알파벳 확장 및 Daniely-Shalev-Shwartz VC 차원과 관련", "keyword_hits": [], "source": "explore"}, {"id": "2606.24573v1", "title": "The unique self-dual binary code of length 26 with minimum weight 6", "authors": ["Gerald Höhn"], "abstract": "The binary Type~I self-dual [26,13,6] code is classical. We give what appears to be the first direct non-computational proof of its uniqueness. We first determine the weight enumerators of the code and its shadow. Degree-one harmonic MacWilliams identities supply the required 1-designs. Elementary intersection counts then show that the two minimal half-shadows each contain 13 words; these words label the 26 coordinates as 13 points and 13 lines, and the two shadow classes become the point-stars and line-stars. From this structure we give two uniqueness proofs: one reconstructs the projective plane of order 3 and the plane code, including the full automorphism group PGL(3,3):2; the other deletes an intrinsic flag, obtains the odd Golay code together with a deep hole coset, and reconstructs the length 26 code and the size of the automorphism group from this coset datum. Thus the natural length-24 object behind the code is the odd Golay code together with its unique orbit of deep hole cosets.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T13:38:29+00:00", "updated": "2026-06-23T13:38:29+00:00", "abs_url": "http://arxiv.org/abs/2606.24573v1", "pdf_url": "https://arxiv.org/pdf/2606.24573v1", "journal_ref": "", "doi": "", "comment": "12 pages, LaTex", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이진 부호의 유일성 증명은 조합론이지만 McMullen's problem (볼록 위치의 점 배치, oriented matroid, 실현성)과는 직접 관련이 없음.", "summary": "본 논문은 길이 26, 최소 무게 6인 자기쌍대 이진 부호 [26,13,6]의 유일성에 대한 첫 직접 비계산 증명을 제시한다. MacWilliams 항등식, weight enumerator 분석, 반-그림자(half-shadow) 구조를 이용하여 사영평면 PG(2,3)과의 연결을 통해 유일성을 재구성한다.", "technique": "Harmonic MacWilliams identities, weight enumerator 분석, intersection counts를 통한 shadow 구조 결정, 및 odd Golay code와의 관계를 통한 재구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24840v1", "title": "The inverse reduction map in the quantum Littlewood-Richardson bijection", "authors": ["Olga Azenhas"], "abstract": "In arXiv:2603.16698v5 we have explicitly computed the inverse of the reduction map in the quantum Littlewood-Richardson bijection for certain patterns of symplectic columns. It turns out that some of those patterns are cell pieces to compute the inverse of the reduction map on any symplectic column. For large symplectic columns, the tools provided here can be combined with the composition of the inverses of the several maps in which the reduction map decomposes, given by Watanabe, namely, among them, combinatorial $R$-matrices and reduction maps of shorter symplectic columns.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T17:19:20+00:00", "updated": "2026-06-23T17:19:20+00:00", "abs_url": "http://arxiv.org/abs/2606.24840v1", "pdf_url": "https://arxiv.org/pdf/2606.24840v1", "journal_ref": "", "doi": "", "comment": "17 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "양자 Littlewood-Richardson 대합과 symplectic column의 reduction map은 McMullen's problem의 convex position, oriented matroid, 조합적 구조와 직접적 관련이 없음.", "summary": "본 논문은 양자 Littlewood-Richardson 대합(quantum Littlewood-Richardson bijection)에서 reduction map의 역함수를 symplectic column의 특정 패턴에 대해 명시적으로 계산한다. 이러한 패턴들은 일반 symplectic column의 reduction map 역함수 계산을 위한 cell piece로 작용하며, Watanabe의 combinatorial $R$-matrices와 조합되어 큰 symplectic column에 적용될 수 있다.", "technique": "Symplectic column의 세포 구조(cell pieces) 분해와 combinatorial $R$-matrices를 이용한 reduction map의 역함수 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27175v1", "title": "Signed Total Roman Domination and Domatic Numbers: Degree Three and Complete Multipartite Graphs", "authors": ["Arie M. C. A. Koster", "Lutz Volkmann", "Moritz Wehrmann"], "abstract": "Signed total Roman domination is a variant of the classic Roman domination-problem in graphs. A signed total Roman dominating function (STRD function) on a graph $G=(V,E)$ is a function $f: V \\to \\{-1,1,2\\}$ such that (i) $\\sum_{u \\in N(v)} f(u) \\geq 1$ for all $v \\in V$, where $N(v)$ denotes the neighborhood of $v$, and (ii) every vertex $v$ with $f(v) = -1$ is adjacent to a vertex $u$ with $f(u) = 2$. The weight of $f$ is $\\sum_{v \\in V} f(v)$. The signed total Roman domination number of $G$ is the minimum weight among all its STRD functions. A signed total Roman dominating family (STRD family) on $G$ is a family $\\{f_1, \\ldots, f_d\\}$ of pairwise distinct STRD functions such that $\\sum_{i=1}^{d} f_i(v) \\leq 1$ for all $v \\in V$. The signed total Roman domatic number of $G$ is the maximum size among all its STRD families.   In this paper, we relate the signed total Roman domination number of a cubic graph to its open packing number, 2-tuple total domination number, and signed total domination number, allowing us to derive sharp bounds on the first invariant and to establish new $\\mathcal{NP}$-completeness results for all four invariants. We demonstrate that having a degree-3 vertex determines a graph's signed total Roman domatic number. Combined with known results this implies that the associated decision problem is easy for graphs with maximum degree at most three and $\\mathcal{NP}$-complete otherwise. To contrast these general hardness results, we determine signed total Roman domination and domatic numbers in complete multipartite graphs. Despite their simple structure, this is a non-trivial task.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T15:41:54+00:00", "updated": "2026-06-25T15:41:54+00:00", "abs_url": "http://arxiv.org/abs/2606.27175v1", "pdf_url": "https://arxiv.org/pdf/2606.27175v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Signed total Roman domination은 그래프 지배(domination) 문제이며, McMullen's problem은 볼록 위치의 점 배치와 oriented matroid의 성질에 관한 기하학적 문제로, 두 분야 간 실질적 연관이 없음.", "summary": "이 논문은 부호 전체 로마 지배(signed total Roman domination)라는 그래프 지배 문제의 변형을 연구한다. 정의된 STRD 함수의 최소 무게를 계산하고, STRD family의 최대 크기(domatic number)를 구한다. 3차 정규 그래프와 완전 다분 그래프에서 이 불변량들의 명시적 값과 경계를 도출한다.", "technique": "각 불변량을 open packing number, 2-tuple total domination number 등 다른 그래프 불변량과 연결하여 분석; 완전 다분 그래프에서의 경우 분석(case analysis).", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24822v1", "title": "Graded Betti numbers of generalized split--join graphs and applications", "authors": ["Bilal Ahmad Rather"], "abstract": "We determine the full graded Betti tables of graph families that subsume several classes studied recently in the literature, namely the generalized multiple complete split-like graphs and the generalized clique-star graphs with arbitrary clique block sizes. The method combines Hochster's formula with a precise decomposition of the associated independence complexes into disjoint unions of simplices and iterated joins of discrete complexes. This reduces every graded Betti number to an explicit coefficient extraction formula and yields closed expressions for the linear strand, higher strands, Hilbert series, regularity, projective dimension, and extremal Betti numbers. In particular, we prove a sharp criterion for $2$-linear resolution and identify the regularity corner in terms of the number of nontrivial clique blocks. As applications, we recover and extend earlier results on equal-block split-like graphs, obtain complete formulas for pineapple graphs, and derive consequences for power graphs of cyclic groups, elementary abelian groups, and prime-power dihedral groups.", "categories": ["math.CO", "cs.DM", "math.AC"], "primary_category": "math.CO", "published": "2026-06-23T17:06:20+00:00", "updated": "2026-06-23T17:06:20+00:00", "abs_url": "http://arxiv.org/abs/2606.24822v1", "pdf_url": "https://arxiv.org/pdf/2606.24822v1", "journal_ref": "", "doi": "", "comment": "27 pages, 4 Figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 그래프의 graded Betti 수와 commutative algebra 불변량을 연구하며, McMullen's problem의 핵심인 convex position 점 배치, oriented matroid, 조합 기하학적 구조와는 직접적인 연관이 없습니다.", "summary": "본 논문은 generalized split-join 그래프 족의 완전한 graded Betti 표를 결정합니다. Hochster 공식과 independence complex의 단순체와 iterated join으로의 정확한 분해를 결합하여, 선형 strand, Hilbert series, regularity, projective dimension 등에 대한 명시적 공식을 유도합니다.", "technique": "Hochster 공식과 independence complex의 단순체 분해를 이용한 graded Betti 수 계산.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24685v1", "title": "Reconfiguration of Nowhere-zero Flows", "authors": ["Daniel W. Cranston", "Jiaao Li", "Bo Su", "Zhouningxin Wang", "Ningyan Xu"], "abstract": "Fix an abelian group $A$, a graph $G$, and nowhere-zero $A$-flows $f'$ and $f''$ on $G$. Now $f'$ and $f''$ are \\emph{$A$-flow-adjacent} if there exists a cycle $C$ in $G$ such that $f'(e)-f''(e)=0$ for all edges $e\\notin E(C)$. And $f'$ and $f''$ are \\emph{$A$-flow-equivalent} if there exists a sequence $f_0,\\ldots,f_s$ of $A$-flows such that $f_0=f'$, $f_s=f''$, and $f_i$ and $f_{i-1}$ are $A$-flow-adjacent for all $i\\in[s]$. Given a group $A$, we seek conditions on a graph $G$ such that all $A$-flows on $G$ are pairwise $A$-flow-equivalent; in this case, we say that $G$ is \\emph{$A$-flow-connected}. Analogously, we define $k$-flow-connectedness for nowhere-zero (integer) $k$-flows. The notions of $A$-flow-connectedness and $k$-flow-connectedness were first investigated by Esperet et al., who showed, among other results, that every $2$-edge-connected graph is $A$-flow-connected whenever $A=\\mathbb{Z}_2^8$ or $|A| \\ge 1.15\\times 10^{694}$.   In this paper, we first characterize the graphs that are $\\mathbb{Z}_3$-flow-connected and that are $3$-flow-connected. We show that every 2-edge-connected graph is $A$-flow-connected if and only if this is true for every 2-edge-connected cubic graphs. We show that all cubic bipartite graphs are $\\mathbb{Z}_4$-flow-connected, and construct other cubic graphs that are and are not $\\mathbb{Z}_4$-flow-connected. We conjecture that every Eulerian graph is $k$-flow-connected and $A$-flow-connected whenever $k$ or $|A|$ is even; and provide evidence for this conjecture. Finally, we consider $4$-edge-connected graphs $G$. Here, we show that $G$ is $A$-flow-connected whenever $|A|\\ge 5.3\\times 10^6$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T15:13:41+00:00", "updated": "2026-06-23T15:13:41+00:00", "abs_url": "http://arxiv.org/abs/2606.24685v1", "pdf_url": "https://arxiv.org/pdf/2606.24685v1", "journal_ref": "", "doi": "", "comment": "34 pages, 6 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "nowhere-zero flow의 재구성(reconfiguration) 문제는 그래프 조합론의 한 분야이지만, McMullen's problem(고차원 볼록 위치의 점 배치, oriented matroid, chirotope)과는 직접적 이론적 관련성이 없음.", "summary": "본 논문은 그래프 $G$에서 두 nowhere-zero $A$-흐름(flow)이 순환 재배치(cycle-by-cycle reconfiguration)를 통해 연결될 수 있는 조건을 연구한다. $\\mathbb{Z}_3$-흐름과 3-흐름에 대한 특성화, 3-정규 이분 그래프의 $\\mathbb{Z}_4$-흐름-연결성, 4-간선-연결 그래프에 대한 상한을 제시한다.", "technique": "재구성 경로(reconfiguration paths)를 통한 흐름 동치류 분석; 3-정규 그래프에 대한 축약적 특성화(reduction to cubic graphs).", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24776v1", "title": "A disproof of the uniform witness conjecture", "authors": ["Zixiang Xu"], "abstract": "The study of $(d+1)$-uniform set systems with VC-dimension at most $d$ links the Erdős--Ko--Rado theorem with VC-dimension. But already in 1997, Ahlswede and Khachatrian showed that this is not the right extension of the Erdős--Ko--Rado theorem. In 2025, Chao, Xu, Yip and Zhang proposed the uniform witness conjecture as a possible right extension: for $0\\le s\\le d$, if every set of a $(d+1)$-uniform family has a missing trace of the same fixed size $s$, then the family should have size at most $\\binom{n-1}{d}$. They proved the conjecture when $s=d$, and when $s=1$ and $n$ is large. Very recently, Chao, Xu and Zakharov proved the conjecture when $s\\le \\frac{d}{2}$ and $n$ is large.   We fill in the missing half of the picture, although the picture is not the one suggested by the conjecture. More precisely, for $d\\ge 4$ and $\\left\\lceil \\frac{d+2}{2}\\right\\rceil\\le s\\le d-1$, we construct such a family $\\mathcal{F}\\subseteq\\binom{[n]}{d+1}$ with $|\\mathcal{F}|=\\binom{n-1}{d}+\\binom{n-2(d+1-s)-2}{2s-d-2}$ for every $n\\ge2(d+1)$, thereby disproving the uniform witness conjecture.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T16:35:12+00:00", "updated": "2026-06-23T16:35:12+00:00", "abs_url": "http://arxiv.org/abs/2606.24776v1", "pdf_url": "https://arxiv.org/pdf/2606.24776v1", "journal_ref": "", "doi": "", "comment": "5 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "VC-dimension과 uniform set systems를 다루지만 McMullen's problem(convex position의 combinatorial geometry)과는 직접적 관련 없음.", "summary": "본 논문은 2025년 제안된 uniform witness conjecture를 반박한다. 이 추측은 $(d+1)$-uniform family가 고정 크기 $s$의 missing trace를 모두 가질 때 크기가 $\\binom{n-1}{d}$를 넘지 않는다고 주장했으나, 저자는 $d\\ge 4$와 $\\lceil \\frac{d+2}{2}\\rceil\\le s\\le d-1$ 범위에서 명시적 반례를 구성하여 추측을 거짓임을 보인다.", "technique": "명시적 구성(explicit construction)을 통한 counterexample 제시, 특히 $|\\mathcal{F}|=\\binom{n-1}{d}+\\binom{n-2(d+1-s)-2}{2s-d-2}$ 형태의 가족 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.26950v1", "title": "Proof of Cigler's conjecture on $q$-Hoggatt numbers", "authors": ["Shane Chern", "Wenle Shi"], "abstract": "We prove the nonnegativity and palindromicity of a family of polynomials arising from $q$-Hoggatt numbers. The nonnegativity is derived from Stanley's $(P,ω)$-partition theory through a standard Young tableau formula, while the palindromicity is proved by an involution on rectangular standard Young tableaux. Our result confirms a conjecture of Cigler.", "categories": ["math.CO", "math.NT"], "primary_category": "math.CO", "published": "2026-06-25T12:23:57+00:00", "updated": "2026-06-25T12:23:57+00:00", "abs_url": "http://arxiv.org/abs/2606.26950v1", "pdf_url": "https://arxiv.org/pdf/2606.26950v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "q-Hoggatt 수와 관련된 다항식의 조합론적 성질 증명이지만, McMullen 문제의 convex position, oriented matroid, tope graph 등과는 직접적 연관이 없음.", "summary": "q-Hoggatt 수에서 비롯된 다항식 족의 비음성(nonnegativity)과 회문성(palindromicity)을 증명하여 Cigler의 추측을 확인했다. Stanley의 (P,ω)-분할 이론과 표준 Young 타블로를 이용한 공식, 그리고 직사각형 표준 Young 타블로 위의 involution을 활용하였다.", "technique": "Stanley의 (P,ω)-분할 이론과 표준 Young 타블로 공식을 통한 비음성 증명 및 직사각형 표준 Young 타블로의 involution을 이용한 대칭성 증명.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24440v1", "title": "Perfect State Transfer on Quotient Graphs in Shunt Decomposition-Based Quantum Walks", "authors": ["Banita Katuwal", "Srinath M S", "Y Lakshmi Naidu", "Supriyo Dutta"], "abstract": "This paper investigates perfect state transfer (PST) in discrete-time quantum walks constructed via the shunt decomposition method. The walks are defined on a graph $G$ and its associated quotient graph $G/π$, induced by an equitable partition $π$. Through the shunt decomposition of $G$, we derive an explicit relation between the shift operator of the parent graph $G$ and that of its quotient graph $G/π$. We construct a reflection operator based on the characteristic matrix, which establishes a connection between the transition operator of the parent graph and that of its lower-dimensional quotient graph. We then prove that PST occurs on $G$ if and only if it occurs on $G/π$. Furthermore, we express the unitary evolution operator of the quotient graph in terms of Chebyshev polynomials of the first kind, from which we derive explicit criteria for PST. As an application, we establish PST on the cycle graph $C_{n}$ at time $k = n/2$, and lift the result to the parent graph $C_{2n}$ via the equitable partition $π$. We further show that if an equitable partition $π$ of $G$ induces a quotient isomorphic to $K_n^{\\circlearrowleft}$, the complete digraph on $n$ vertices with a loop at every vertex, then PST occurs at step $k = n$, and the walk is periodic at $k = 2n$. This framework is applied to two families of graphs, which are the complete bipartite digraph $K_{n,n}^{\\rightleftharpoons}$ and the circulant graph $\\operatorname{Circ}(2n, S)$, where $S$ consists of all odd residues modulo $2n$ and $n = 2^s$ for some $s \\geq 1$, establishing PST in their respective line digraphs. Collectively, these results also answer the question posed by Godsil and Zhan concerning which shunt decompositions or embeddings of a graph admit PST.", "categories": ["math.CO", "quant-ph"], "primary_category": "math.CO", "published": "2026-06-23T11:18:49+00:00", "updated": "2026-06-23T11:18:49+00:00", "abs_url": "http://arxiv.org/abs/2606.24440v1", "pdf_url": "https://arxiv.org/pdf/2606.24440v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "양자 보행과 완벽 상태 전송은 이산기하학·조합론의 고전적 구조 문제와 직접 관련이 없음.", "summary": "본 논문은 shunt decomposition을 통해 구성된 이산 시간 양자 보행에서 완벽 상태 전송(PST)을 연구한다. 모 그래프 G와 동등분할로 유도된 몫 그래프 G/π 간의 PST 발생 필요충분조건을 증명하고, Chebyshev 다항식을 이용한 명시적 PST 판정법을 제시한다. 순환 그래프, 완전 이분 그래프 등에서 PST 구현을 보인다.", "technique": "Shunt decomposition, 특성행렬 기반 반사 연산자, Chebyshev 다항식을 통한 unitary 진화 연산자 표현.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27497v1", "title": "Enumerating matrices with prescribed entries in an adjoint orbit", "authors": ["Samrith Ram"], "abstract": "We study intersections of conjugacy classes of square matrices over a finite field with affine coordinate subspaces, or equivalently matrices in a fixed adjoint orbit with prescribed entries. Our main result treats the case of prescribed columns: for a partially defined linear map we give a Hall scalar product formula for the number of extensions to an endomorphism with prescribed similarity invariants. This formula is expressed in terms of skew modified Hall--Littlewood functions and $q$-Whittaker functions. As applications, we count monic matrix polynomials over $\\mathbb{F}_q$ with prescribed Smith normal form and with prescribed determinant, and recover the Gerstenhaber--Reiner formula for the number of square matrices with a fixed characteristic polynomial. We also note that known point-count formulas for Hessenberg varieties imply related formulas for Hessenberg supports involving chromatic quasisymmetric functions, motivating polynomiality questions for more general supports and prescribed affine slices.", "categories": ["math.CO", "math.AG", "math.RT"], "primary_category": "math.CO", "published": "2026-06-25T19:24:10+00:00", "updated": "2026-06-25T19:24:10+00:00", "abs_url": "http://arxiv.org/abs/2606.27497v1", "pdf_url": "https://arxiv.org/pdf/2606.27497v1", "journal_ref": "", "doi": "", "comment": "29 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "유한체 위의 행렬 궤도와 affine 부분공간의 교집합을 다루지만 McMullen's problem의 convex position, oriented matroid, 또는 점 배치 기하학과는 직접 관련성이 없음.", "summary": "유한체 위의 정사각 행렬의 켤레 궤도(adjoint orbit)와 affine 좌표 부분공간의 교집합을 연구한다. 주요 결과는 고정된 열(prescribed columns)을 가진 부분 정의된 선형사상의 확장 개수를 skew modified Hall-Littlewood 함수와 q-Whittaker 함수로 표현하는 Hall 스칼라곱 공식이다.", "technique": "Skew modified Hall-Littlewood functions, q-Whittaker functions, similarity invariants, Hessenberg varieties.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.26761v1", "title": "Maximum Forest Number of General Bipartite Graphs: Structural and Complexity Results", "authors": ["Daniel Iľkovič"], "abstract": "Recent results established the maximum forest number $f(B)$ for balanced bipartite graphs under Ore-type degree sum conditions. In this paper, we extend these results by determining the exact value of the maximum forest number as a closed-form formula for general bipartite graphs under Ore-type conditions, answering an open question posed by Yu. We prove that the maximum forest number is bounded by a discrete optimization over at most six critical structural coordinate points dictated by hyperbolic density constraints. Furthermore, we establish that deciding whether a specific balanced bipartite graph on $2n$ vertices has a forest number of at least $n+2$ is NP-complete. This implies that while the maximum possible forest number can be exactly bounded, computing the exact forest number for a given graph remains computationally intractable, and a simple structural characterization via finite forbidden induced subgraphs cannot exist unless P = NP.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T08:47:12+00:00", "updated": "2026-06-25T08:47:12+00:00", "abs_url": "http://arxiv.org/abs/2606.26761v1", "pdf_url": "https://arxiv.org/pdf/2606.26761v1", "journal_ref": "", "doi": "", "comment": "8 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이분 그래프의 forest number 문제는 McMullen's problem의 convex position, general position, oriented matroid 등과 직접적 관련성이 없음.", "summary": "본 논문은 Ore-type 차수 합 조건 하에서 일반 이분 그래프의 최대 forest number $f(B)$를 폐형식(closed-form formula)으로 결정하고, 이를 쌍곡선 밀도 제약이 정하는 최대 6개의 임계 구조점에 대한 이산 최적화로 한정함. 균형잡힌 이분 그래프에서 forest number이 $n+2$ 이상인지 판정하는 문제가 NP-완전임을 증명하여 그래프 불변량의 계산 불가능성과 유한 금지된 유도 부분그래프를 통한 특성화 불가능성을 보임.", "technique": "쌍곡선 밀도 제약(hyperbolic density constraints)을 이용한 이산 최적화, NP-완전성 증명", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27507v1", "title": "A combinatorial proof for the positivity of the normalized Jacobi triple product tails", "authors": ["Xiangyu Ding", "Lisa Hui Sun"], "abstract": "For $k\\geq 1$, we prove that \\[ [q^n z^s]J_k(z,q)\\geq 0, \\qquad (n\\geq 0,\\ s\\in\\mathbb Z) \\] for the normalized Jacobi triple product tails \\[ J_k(z,q) = \\frac{ \\sum_{j=k}^{\\infty}(-1)^{j-k} q^{\\binom{j+1}{2}}(z^{-j}+\\cdots+z^j)} {(zq,q/z;q)_\\infty}. \\] This result not only implies Merca's stronger nonnegativity conjecture on truncated Jacobi triple product series in full generality, but also yields infinite families of linear inequalities for two-colored partitions and partitions with parts in the residue classes $\\pm S \\pmod{R}$. We present a combinatorial proof wherein a sign-reversing involution reduces the normalized Jacobi triple product tails to the invariant subsets according to the generalized minimal-excludant of partitions. Furthermore, by combing an invertible lift operator on Frobenius arms with Konan's size- and length-preserving bijection, an injection is constructed between the consecutive invariant subsets, which implies the coefficientwise positivity of the normalized Jacobi triple product tails.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T19:39:19+00:00", "updated": "2026-06-25T19:39:19+00:00", "abs_url": "http://arxiv.org/abs/2606.27507v1", "pdf_url": "https://arxiv.org/pdf/2606.27507v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance
