<style>
  :root{
    --bg:#F6F7F9; --surface:#FFFFFF; --ink:#15161C; --muted:#71727F;
    --line:#E6E7EC; --accent:#4338CA; --accent-soft:#EEECFB;
    --explore:#0D9488; --explore-soft:#E3F4F1; --up:#15803D; --down:#B91C1C;
    --serif: ui-serif, "Iowan Old Style", Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  header{position:sticky;top:0;z-index:5;background:rgba(246,247,249,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .bar{max-width:880px;margin:0 auto;padding:16px 20px 12px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  h1{font-family:var(--serif);font-weight:600;font-size:25px;margin:2px 0;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
  .controls input[type=search]{flex:1 1 180px;min-width:150px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);font:inherit;color:inherit}
  .controls select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--surface);font:inherit;color:inherit}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:var(--surface);border:0;padding:8px 11px;cursor:pointer;border-left:1px solid var(--line);font:inherit}
  .seg button:first-child{border-left:0}
  .seg button[aria-pressed=true]{background:var(--accent);color:#fff}
  label.thr{font-size:13px;color:var(--muted);display:inline-flex;gap:7px;align-items:center}
  label.thr output{font-family:var(--mono);color:var(--ink);min-width:1.4em;text-align:right}
  .gear{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 10px;cursor:pointer;font:inherit}
  .panel{max-width:880px;margin:0 auto;padding:0 20px;overflow:hidden;max-height:0;transition:max-height .2s}
  .panel.open{max-height:420px;padding-bottom:12px}
  .panel .box{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px;font-size:13px}
  .panel input{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:7px;font:inherit;margin:4px 0 10px}
  .panel button{background:var(--accent);color:#fff;border:0;border-radius:7px;padding:8px 14px;cursor:pointer;font:inherit}
  .panel .hint{color:var(--muted);font-size:12px;margin-bottom:8px}
  .refresh-btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:0;border-radius:9px;padding:9px 16px;cursor:pointer;font:inherit;font-size:14px;font-weight:500}
  .refresh-btn:disabled{opacity:.5;cursor:not-allowed}
  .refresh-btn .spin{display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  .refresh-btn.loading .spin{display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  main{max-width:880px;margin:0 auto;padding:14px 20px 64px}
  .count{font-size:13px;color:var(--muted);margin:2px 0 14px;font-family:var(--mono)}
  .card{position:relative;display:grid;grid-template-columns:60px 1fr;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 18px 16px 0;margin-bottom:12px;overflow:hidden}
  .ledger{display:flex;flex-direction:column;align-items:center;padding-top:2px;position:relative}
  .ledger::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--edge,var(--line))}
  .score{font-family:var(--mono);font-size:21px;font-weight:600;line-height:1;color:var(--edge,var(--muted))}
  .score small{display:block;font-size:9px;letter-spacing:.1em;color:var(--muted);margin-top:4px;font-weight:400}
  .body{min-width:0}
  .title{font-family:var(--serif);font-size:19px;font-weight:600;line-height:1.3;margin:0 0 6px;letter-spacing:-.01em}
  .tag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--explore);background:var(--explore-soft);padding:2px 7px;border-radius:5px;margin-left:8px}
  .meta{font-size:12.5px;color:var(--muted);margin-bottom:8px}
  .prob{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:1px 7px;border-radius:5px}
  .meta .dot{margin:0 6px;opacity:.5}
  .reason{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:10px}
  .summary{margin:0 0 10px}
  .field{font-size:14px;margin:6px 0}
  .field b{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-right:6px}
  .conn{background:var(--accent-soft);border-radius:8px;padding:9px 12px;font-size:14px}
  .chips{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 9px}
  .actions{margin-top:11px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .act{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:5px 10px;cursor:pointer;font:inherit;font-size:13px}
  .act.on-fav{border-color:#D97706;background:#FEF3C7}
  .act.on-up{border-color:var(--up);background:#DCFCE7}
  .act.on-down{border-color:var(--down);background:#FEE2E2}
  .links{margin-left:auto;font-family:var(--mono);font-size:12px;display:flex;gap:14px;align-items:center}
  .links .id{color:var(--muted)}
  .togg{background:none;border:0;color:var(--accent);font:inherit;font-size:12px;cursor:pointer;font-family:var(--mono);margin-top:8px}
  .abstract{margin-top:10px;font-size:13.5px;color:#3a3b47;border-top:1px dashed var(--line);padding-top:10px;display:none}
  .abstract.open{display:block}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .sync{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:8px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  @media (max-width:560px){.card{grid-template-columns:44px 1fr;gap:10px;padding-right:14px}.title{font-size:17px}h1{font-size:21px}.links{margin-left:0;width:100%}}
  @media (prefers-reduced-motion:reduce){*{transition:none}}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="eyebrow">arXiv · 리서치 다이제스트</div>
    <h1>관련 논문</h1>
    <div class="sub">갱신 2026-06-29 20:11 · 총 34편 <span class="sync" id="sync"></span></div>
    <div class="controls">
      <button class="refresh-btn" id="refreshBtn">
        <span class="spin"></span>▶ 지금 업데이트
      </button>
      <input type="search" id="q" placeholder="제목·요약·초록 검색" aria-label="검색">
      <select id="sort" aria-label="정렬">
        <option value="fav">즐겨찾기 우선</option>
        <option value="rel">관련도순</option>
        <option value="date">최신순</option>
      </select>
      <select id="prob" aria-label="문제 필터"><option value="">전체 문제</option></select>
      <label class="thr">관련도 ≥ <input type="range" id="thr" min="0" max="10" value="0"><output id="thrv">0</output></label>
      <span class="seg" role="group">
        <button id="fAll" aria-pressed="true">전체</button>
        <button id="fFav" aria-pressed="false">⭐만</button>
        <button id="fExp" aria-pressed="false">탐색만</button>
      </span>
      <span class="seg" role="group"><button id="hideDown" aria-pressed="false">👎 숨기기</button></span>
      <button class="gear" id="gear" title="동기화 설정">⚙</button>
    </div>
  </div>
  <div class="panel" id="panel"><div style="max-width:880px;margin:0 auto"><div class="box">
    <b>GitHub 연동 설정</b>
    <div class="hint">
      토큰 권한: <b>Contents</b>(읽기·쓰기) + <b>Actions</b>(읽기·쓰기) — 두 권한이 있어야
      즐겨찾기·평가 동기화와 수동 업데이트 버튼이 모두 작동합니다.<br>
      fine-grained Personal Access Token 권장. 토큰은 이 기기 브라우저에만 저장됩니다.
    </div>
    <input id="ghRepo" placeholder="owner/repo (예: choihs/research-agent) — 비우면 URL 에서 자동 감지">
    <input id="ghToken" type="password" placeholder="github_pat_... (이 기기에만 저장)">
    <button id="ghSave">저장</button> <span class="sync" id="ghStatus"></span>
  </div></div></div>
</header>
<main>
  <div class="count" id="count"></div>
  <div id="list"></div>

<script>
const DATA = [{"id": "2606.19573v1", "title": "Embracing exchange sequences and oriented matroid polyhedron diameter", "authors": ["Kolja Knauer", "Luis Pedro Montejano"], "abstract": "We reduce the embracing exchange distance of bases of oriented matroids to the metric of oriented matroid polyhedra. This allows us to disprove recent conjectures of Caoduro, Khodamoradi, Paat, and Shepherd and of Bérczi and Nádor. On the other hand, we show that any two embracing bases of an oriented matroid of rank $r$ can be transformed into each other in at most $2r^{\\log_2(r)+3}$ steps and in at most $r$ steps in a Lawrence oriented matroid, thus confirming the conjecture in this case.", "categories": ["math.CO", "cs.DM"], "primary_category": "math.CO", "published": "2026-06-17T20:18:48+00:00", "updated": "2026-06-17T20:18:48+00:00", "abs_url": "http://arxiv.org/abs/2606.19573v1", "pdf_url": "https://arxiv.org/pdf/2606.19573v1", "journal_ref": "", "doi": "", "comment": "10 pages, 1 figure", "relevance": 5, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Lawrence oriented matroid와 oriented matroid의 기저 변환 문제를 다루며, McMullen 문제와 관련된 Lawrence oriented matroid 구조를 직접 언급하고 있어 부분적 관련성이 있다.", "summary": "이 논문은 oriented matroid의 기저들의 embracing exchange distance를 oriented matroid polyhedra의 metric으로 환원하여, Caoduro 등과 Bérczi-Nádor의 최근 추측들을 반례로 논박한다. 한편, rank $r$의 oriented matroid에서 임의의 두 embracing base는 최대 $2r^{\\log_2(r)+3}$ 단계로 변환 가능함을 보이고, Lawrence oriented matroid의 경우 최대 $r$ 단계로 변환 가능함을 증명하여 해당 경우의 추측을 확인한다.", "technique": "Embracing exchange distance를 oriented matroid polyhedra의 직경(diameter) 문제로 환원하는 것이 핵심 기법이다.", "connections": "Lawrence oriented matroid에서의 $r$ 단계 변환 결과는 McMullen 문제와 관련된 Lawrence oriented matroid 구조에 직접 적용 가능하다.", "keyword_hits": [], "source": "seed"}, {"id": "2606.24339v1", "title": "Toward a classification of tropical complete intersection number one", "authors": ["Linxuan Li"], "abstract": "By bridging two classification results -- the Esterov--Gusev classification of tuples of lattice polytopes of mixed volume one, and Fink's characterization of Bergman fans -- we formulate a classification conjecture describing when the stable intersection of a tropical fan F with the tropicalization Trop(X) of a subvariety of T^n is a reduced point. Our main results establish this conjecture in three fundamental cases -- unmixed sequences, hypersurface complete-intersection cycles, and tropical 2-cycles -- and develop several tools intended for the general case.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T09:25:12+00:00", "updated": "2026-06-23T09:25:12+00:00", "abs_url": "http://arxiv.org/abs/2606.24339v1", "pdf_url": "https://arxiv.org/pdf/2606.24339v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 2, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "열대기하학(tropical geometry)을 도구로 활용한다는 점에서 McMullen 문제의 접근 도구 중 하나인 tropical geometry와 표면적으로 연관되나, 본 논문의 핵심 주제는 열대 완전 교차(tropical complete intersection)의 분류로 McMullen 문제 또는 Larman 추측과 직접적 관련이 없다.", "summary": "본 논문은 격자 다면체(lattice polytope) 튜플의 mixed volume 1에 대한 Esterov–Gusev 분류와 Bergman fan에 대한 Fink의 특성화를 연결하여, 열대 팬(tropical fan) $F$와 대수적 부분다양체의 열대화 $\\mathrm{Trop}(X)$의 안정 교차(stable intersection)가 축약점(reduced point)이 되는 조건을 기술하는 분류 추측을 제시한다. 주요 결과로 unmixed sequence, 초곡면 완전 교차 사이클(hypersurface complete-intersection cycle), 열대 2-사이클(tropical 2-cycle)의 세 가지 기본 경우에서 이 추측을 증명한다.", "technique": "Esterov–Gusev의 mixed volume 1 분류와 Fink의 Bergman fan 특성화를 연결하여 열대 완전 교차 수(tropical complete intersection number)가 1인 경우를 분류하는 방법론을 개발한다.", "connections": "", "keyword_hits": ["tope", "tropical"], "source": "filter"}, {"id": "2606.28147v1", "title": "Linear-size $\\ell_1$ sparsifiers", "authors": ["Victor Reis", "Thomas Rothvoss"], "abstract": "We prove that for any matrix $A \\in \\mathbb{R}^{m \\times n}$ and any $\\varepsilon \\in (0, 1/2]$ there is a diagonal matrix $D \\in \\mathbb{R}_{\\geq 0}^{m \\times m}$ with at most $O(\\frac{n}{\\varepsilon^2} \\log(\\frac{1}{\\varepsilon}))$ nonzero entries so that \\[(1-\\varepsilon) \\|Ax\\|_1 \\leq \\|DAx\\|_1 \\leq (1+\\varepsilon)\\|Ax\\|_1 \\quad \\forall x \\in \\mathbb{R}^n.\\]In particular, for any zonotope $Z \\subseteq \\mathbb{R}^{n}$ there exists a zonotope $Z' \\subseteq \\mathbb{R}^{n}$ generated by at most $O(\\frac{n}{\\varepsilon^2} \\log(\\frac{1}{\\varepsilon}))$ segments so that $(1-\\varepsilon) Z \\subseteq Z' \\subseteq (1+\\varepsilon) Z$. Previously, the best known bound was $O(\\frac{n}{\\varepsilon^2} \\log n)$ due to Talagrand (1990).", "categories": ["math.MG", "cs.DM"], "primary_category": "math.MG", "published": "2026-06-26T14:43:15+00:00", "updated": "2026-06-26T14:43:15+00:00", "abs_url": "http://arxiv.org/abs/2606.28147v1", "pdf_url": "https://arxiv.org/pdf/2606.28147v1", "journal_ref": "", "doi": "", "comment": "20 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 $\\ell_1$ 스파시파이어(sparsifier)와 조노토프(zonotope) 근사에 관한 것으로, McMullen 문제(볼록 위치·일반 위치 점 배치, oriented matroid)와 직접적인 관련이 없다.", "summary": "임의의 행렬 $A \\in \\mathbb{R}^{m \\times n}$에 대해 최대 $O\\!\\left(\\frac{n}{\\varepsilon^2}\\log\\frac{1}{\\varepsilon}\\right)$개의 비영(nonzero) 대각 원소를 갖는 대각 행렬 $D$가 존재하여 모든 $x$에 대해 $(1-\\varepsilon)\\|Ax\\|_1 \\leq \\|DAx\\|_1 \\leq (1+\\varepsilon)\\|Ax\\|_1$를 만족함을 증명한다. 이는 조노토프(zonotope) 언어로 번역하면, $n$차원 조노토프 $Z$를 $O\\!\\left(\\frac{n}{\\varepsilon^2}\\log\\frac{1}{\\varepsilon}\\right)$개의 선분으로 생성되는 $(1\\pm\\varepsilon)$-근사 조노토프 $Z'$로 대체할 수 있음을 의미한다. 이전 최선 결과는 Talagrand(1990)의 $O\\!\\left(\\frac{n}{\\varepsilon^2}\\log n\\right)$이었으며, 본 논문은 $\\log n$ 인수를 $\\log\\frac{1}{\\varepsilon}$으로 개선한다.", "technique": "초록만으로는 구체적 증명 기법이 명시되지 않아 불확실.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.27503v1", "title": "Tropical Fermat--Weber Problems over Non-Finite Data and their Inverse Formulations", "authors": ["John Sabol", "Ruriko Yoshida"], "abstract": "The term tropical pseudonorm refers to a family of (not necessarily symmetric) gauge functions that arise in tropical or idempotent geometry. An important characteristic of these gauges is their invariance under translation by a constant vector, allowing them to descent naturally to tropical projective spaces. In this work, we explore the tropical one-infinity pseudonorm, a polyhedral hybrid gauge that allows for tunable asymmetry, in the context of a Fermat--Weber location problem. We extend previous formulations in considering non-finite data, and we investigate several variants of the inverse problem, providing linear programming formulations for their solution.", "categories": ["math.CO", "math.OC"], "primary_category": "math.CO", "published": "2026-06-25T19:37:48+00:00", "updated": "2026-06-25T19:37:48+00:00", "abs_url": "http://arxiv.org/abs/2606.27503v1", "pdf_url": "https://arxiv.org/pdf/2606.27503v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 tropical geometry를 사용하지만 Fermat–Weber 위치 문제와 역문제에 관한 것으로, McMullen 문제나 oriented matroid의 acyclic reorientation과는 직접적인 관련이 없다.", "summary": "이 논문은 tropical(idempotent) 기하학에서 등장하는 tropical one-infinity pseudonorm을 이용하여 Fermat–Weber 위치 문제를 비유한(non-finite) 데이터로 확장한다. 또한 해당 문제의 여러 역문제(inverse problem) 변형을 고려하고, 이를 선형 프로그래밍(linear programming)으로 정식화하여 풀이 방법을 제시한다.", "technique": "Tropical one-infinity pseudonorm을 gauge function으로 활용하고, 역문제 변형들에 대해 선형 프로그래밍 정식화를 사용한다.", "connections": "", "keyword_hits": ["tropical"], "source": "filter"}, {"id": "2606.24426v1", "title": "Odd cycles in symmetric Cayley graphs on prime cyclic groups", "authors": ["Wei Li", "Kai Yang"], "abstract": "Let $p$ be an odd prime and let $S\\subseteq \\Z_p$ be symmetric with $0\\notin S$. Let $\\Cay(\\Z_p,S)$ be the undirected Cayley graph on $\\Z_p$ in which $x$ and $y$ are adjacent if and only if $x-y\\in S$. For $1\\le \\ell\\le (p-1)/2$, define \\[ \\ex_{\\Cay}(C_{2\\ell+1},\\Z_p)=\\max\\{|S|: S=-S,\\ 0\\notin S,\\ \\Cay(\\Z_p,S)\\text{ contains no }C_{2\\ell+1}\\}. \\] Confirming a conjecture of Cashman and Kelley, we prove that if $p=2\\ell+1$, then $\\ex_{\\Cay}(C_{2\\ell+1},\\Z_p)=0$, while if $p>2\\ell+1$, then \\[ \\ex_{\\Cay}(C_{2\\ell+1},\\Z_p)=2\\floor{\\frac{p+2\\ell+1}{2(2\\ell+1)}}. \\] The proof combines a sharp additive zero-sum odd-girth argument with weak odd pancyclicity to transfer the result from odd-girth exclusion to fixed odd-cycle exclusion. We also give a canonical extremal family, an exact extremality criterion in terms of odd zero-sum avoidance, and an example showing that extremizers need not be dilates of the canonical construction.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T11:04:15+00:00", "updated": "2026-06-23T11:04:15+00:00", "abs_url": "http://arxiv.org/abs/2606.24426v1", "pdf_url": "https://arxiv.org/pdf/2606.24426v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "대칭 Cayley 그래프의 홀수 사이클 제외 문제로, McMullen's problem(볼록 위치의 점 배치와 oriented matroid)과는 직접적 관련이 없음.", "summary": "본 논문은 소수 $p$에 대해 $\\mathbb{Z}_p$ 위의 대칭 Cayley 그래프에서 홀수 사이클 $C_{2\\ell+1}$을 포함하지 않는 최대 대칭 생성원소 집합의 크기를 결정한다. Cashman-Kelley 추측을 확인하여 $p=2\\ell+1$일 때는 0, $p>2\\ell+1$일 때는 $2\\lfloor\\frac{p+2\\ell+1}{2(2\\ell+1)}\\rfloor$임을 증명한다.", "technique": "덧셈적 영영합(additive zero-sum) 홀수-girth 논증과 약한 홀수 pancyclicity를 결합하여 홀수-girth 제외 결과를 고정 홀수-사이클 제외로 전이.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24878v1", "title": "An Improved Lower Bound for the Erdős-Lovász Cover Number Problem", "authors": ["Varun Sivashankar"], "abstract": "Let $g(r)$ be the minimum number of edges in an $r$-uniform intersecting hypergraph with cover number $r$. Erdős and Lovász proved the lower bound $g(r)\\ge 8r/3-3$. We first give a completely elementary proof that $g(r)\\ge 3r-4$. We then build on the same approach and apply Kahn's small-codegree hypergraph edge-colouring theorem to improve this to $g(r)\\ge (61/20-o(1))r$. To the best of our knowledge, this is the first improvement over the Erdős-Lovász lower bound in about fifty years.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T17:55:10+00:00", "updated": "2026-06-23T17:55:10+00:00", "abs_url": "http://arxiv.org/abs/2606.24878v1", "pdf_url": "https://arxiv.org/pdf/2606.24878v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Erdős-Lovász cover number 문제는 hypergraph covering과 extremal combinatorics의 고전 문제이며, McMullen's problem(convex position, general position 배치)과는 직접적 주제 연관성이 없음.", "summary": "본 논문은 $r$-uniform intersecting hypergraph에서 cover number가 $r$일 때 최소 간선 수 $g(r)$에 대한 Erdős-Lovász 하한을 약 50년 만에 처음 개선한다. 초등적 증명으로 $g(r) \\ge 3r-4$를 얻고, Kahn의 small-codegree hypergraph edge-colouring 정리를 적용하여 $g(r) \\ge (61/20-o(1))r$로 개선한다.", "technique": "Kahn의 small-codegree hypergraph edge-colouring theorem을 extremal lower bound 개선에 적용.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24400v1", "title": "Improved asymptotic upper bound on the $n$-queens completion threshold", "authors": ["Hugo Møller Nielsen"], "abstract": "The $n$-queens completion threshold $qc(n)$ is the largest integer $k < n$ such that any placement of $k$ mutually non-attacking queens on an $n \\times n$ chessboard can be completed to an $n$-queens configuration by adding $n - k$ queens. For all sufficiently large $n$, we improve the previously best-known upper bound on $qc(n)$ from $qc(n) \\leq 0.241n$ to $qc(n) \\leq 0.216n$, by constructing a non-completable partial configuration of fewer than $0.216n$ queens.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T10:36:34+00:00", "updated": "2026-06-23T10:36:34+00:00", "abs_url": "http://arxiv.org/abs/2606.24400v1", "pdf_url": "https://arxiv.org/pdf/2606.24400v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "n-queens 문제는 조합론의 고전 문제이지만 McMullen's problem(볼록 위치의 점 배치, oriented matroid, 다면체 기하)과는 직접적 연관성이 없음.", "summary": "n×n 체스판의 n-queens 완성 임계값 qc(n)에 대한 점근 상한을 0.241n에서 0.216n으로 개선. 0.216n보다 작은 queens의 비완성 부분 배치를 구성하여 이를 달성.", "technique": "완성 불가능한 부분 배치의 구체적 구성(construction of non-completable partial configuration)", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.25055v1", "title": "Pseudoshattering Pairs", "authors": ["Noga Alon", "Varun Sivashankar"], "abstract": "For two vectors $x,y\\in [b]^k$, consider the bipartite graph with two copies of $[b]$ in which $i$ on the left is joined to $j$ on the right if $(x_t,y_t)=(i,j)$ for some coordinate $t$. We study the largest size of a family $C\\subseteq [b]^k$ such that, for every two distinct $x,y\\in C$, this bipartite graph contains a cycle.   We give a natural construction for such families and conjecture that it is optimal whenever $k$ is large relative to $b$. We prove an LYM-type upper bound that is asymptotically tight with respect to this construction, and is exact when $k$ is large and divisible by $b$. We then refine the argument using a circular ordering, obtaining the sharp full-support bound when $k\\equiv -1\\pmod b$. In the case $b=3$, we prove the exact general result when $k\\equiv -1\\pmod 3$ and $k$ is sufficiently large. The problem is motivated by the Daniely--Shalev-Shwartz dimension and the pseudocube formulation of a higher-alphabet Sauer-Shelah-Perles lemma.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T18:11:17+00:00", "updated": "2026-06-23T18:11:17+00:00", "abs_url": "http://arxiv.org/abs/2606.25055v1", "pdf_url": "https://arxiv.org/pdf/2606.25055v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 조합론의 VC 차원 및 Sauer-Shelah-Perles 보조정리 확장에 관한 것으로, McMullen's problem(볼록위치 점 배치, oriented matroid, realizability)과는 직접적 연관성이 없습니다.", "summary": "논문은 두 벡터 $x,y \\in [b]^k$에 대해 정의된 이분 그래프가 사이클을 포함하는 족 $C \\subseteq [b]^k$의 최대 크기를 연구합니다. LYM형 상한을 증명하고 $k \\equiv -1 \\pmod{b}$일 때 sharp full-support 경계를 얻으며, $b=3$일 때 특정 조건 하의 정확한 결과를 제시합니다.", "technique": "LYM형 상한(LYM-type upper bound)과 원형 순서(circular ordering)를 이용한 정제 논증", "connections": "Sauer-Shelah-Perles 보조정리의 고알파벳 확장 및 Daniely-Shalev-Shwartz VC 차원과 관련", "keyword_hits": [], "source": "explore"}, {"id": "2606.24573v1", "title": "The unique self-dual binary code of length 26 with minimum weight 6", "authors": ["Gerald Höhn"], "abstract": "The binary Type~I self-dual [26,13,6] code is classical. We give what appears to be the first direct non-computational proof of its uniqueness. We first determine the weight enumerators of the code and its shadow. Degree-one harmonic MacWilliams identities supply the required 1-designs. Elementary intersection counts then show that the two minimal half-shadows each contain 13 words; these words label the 26 coordinates as 13 points and 13 lines, and the two shadow classes become the point-stars and line-stars. From this structure we give two uniqueness proofs: one reconstructs the projective plane of order 3 and the plane code, including the full automorphism group PGL(3,3):2; the other deletes an intrinsic flag, obtains the odd Golay code together with a deep hole coset, and reconstructs the length 26 code and the size of the automorphism group from this coset datum. Thus the natural length-24 object behind the code is the odd Golay code together with its unique orbit of deep hole cosets.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T13:38:29+00:00", "updated": "2026-06-23T13:38:29+00:00", "abs_url": "http://arxiv.org/abs/2606.24573v1", "pdf_url": "https://arxiv.org/pdf/2606.24573v1", "journal_ref": "", "doi": "", "comment": "12 pages, LaTex", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이진 부호의 유일성 증명은 조합론이지만 McMullen's problem (볼록 위치의 점 배치, oriented matroid, 실현성)과는 직접 관련이 없음.", "summary": "본 논문은 길이 26, 최소 무게 6인 자기쌍대 이진 부호 [26,13,6]의 유일성에 대한 첫 직접 비계산 증명을 제시한다. MacWilliams 항등식, weight enumerator 분석, 반-그림자(half-shadow) 구조를 이용하여 사영평면 PG(2,3)과의 연결을 통해 유일성을 재구성한다.", "technique": "Harmonic MacWilliams identities, weight enumerator 분석, intersection counts를 통한 shadow 구조 결정, 및 odd Golay code와의 관계를 통한 재구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24840v1", "title": "The inverse reduction map in the quantum Littlewood-Richardson bijection", "authors": ["Olga Azenhas"], "abstract": "In arXiv:2603.16698v5 we have explicitly computed the inverse of the reduction map in the quantum Littlewood-Richardson bijection for certain patterns of symplectic columns. It turns out that some of those patterns are cell pieces to compute the inverse of the reduction map on any symplectic column. For large symplectic columns, the tools provided here can be combined with the composition of the inverses of the several maps in which the reduction map decomposes, given by Watanabe, namely, among them, combinatorial $R$-matrices and reduction maps of shorter symplectic columns.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T17:19:20+00:00", "updated": "2026-06-23T17:19:20+00:00", "abs_url": "http://arxiv.org/abs/2606.24840v1", "pdf_url": "https://arxiv.org/pdf/2606.24840v1", "journal_ref": "", "doi": "", "comment": "17 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "양자 Littlewood-Richardson 대합과 symplectic column의 reduction map은 McMullen's problem의 convex position, oriented matroid, 조합적 구조와 직접적 관련이 없음.", "summary": "본 논문은 양자 Littlewood-Richardson 대합(quantum Littlewood-Richardson bijection)에서 reduction map의 역함수를 symplectic column의 특정 패턴에 대해 명시적으로 계산한다. 이러한 패턴들은 일반 symplectic column의 reduction map 역함수 계산을 위한 cell piece로 작용하며, Watanabe의 combinatorial $R$-matrices와 조합되어 큰 symplectic column에 적용될 수 있다.", "technique": "Symplectic column의 세포 구조(cell pieces) 분해와 combinatorial $R$-matrices를 이용한 reduction map의 역함수 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27175v1", "title": "Signed Total Roman Domination and Domatic Numbers: Degree Three and Complete Multipartite Graphs", "authors": ["Arie M. C. A. Koster", "Lutz Volkmann", "Moritz Wehrmann"], "abstract": "Signed total Roman domination is a variant of the classic Roman domination-problem in graphs. A signed total Roman dominating function (STRD function) on a graph $G=(V,E)$ is a function $f: V \\to \\{-1,1,2\\}$ such that (i) $\\sum_{u \\in N(v)} f(u) \\geq 1$ for all $v \\in V$, where $N(v)$ denotes the neighborhood of $v$, and (ii) every vertex $v$ with $f(v) = -1$ is adjacent to a vertex $u$ with $f(u) = 2$. The weight of $f$ is $\\sum_{v \\in V} f(v)$. The signed total Roman domination number of $G$ is the minimum weight among all its STRD functions. A signed total Roman dominating family (STRD family) on $G$ is a family $\\{f_1, \\ldots, f_d\\}$ of pairwise distinct STRD functions such that $\\sum_{i=1}^{d} f_i(v) \\leq 1$ for all $v \\in V$. The signed total Roman domatic number of $G$ is the maximum size among all its STRD families.   In this paper, we relate the signed total Roman domination number of a cubic graph to its open packing number, 2-tuple total domination number, and signed total domination number, allowing us to derive sharp bounds on the first invariant and to establish new $\\mathcal{NP}$-completeness results for all four invariants. We demonstrate that having a degree-3 vertex determines a graph's signed total Roman domatic number. Combined with known results this implies that the associated decision problem is easy for graphs with maximum degree at most three and $\\mathcal{NP}$-complete otherwise. To contrast these general hardness results, we determine signed total Roman domination and domatic numbers in complete multipartite graphs. Despite their simple structure, this is a non-trivial task.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T15:41:54+00:00", "updated": "2026-06-25T15:41:54+00:00", "abs_url": "http://arxiv.org/abs/2606.27175v1", "pdf_url": "https://arxiv.org/pdf/2606.27175v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Signed total Roman domination은 그래프 지배(domination) 문제이며, McMullen's problem은 볼록 위치의 점 배치와 oriented matroid의 성질에 관한 기하학적 문제로, 두 분야 간 실질적 연관이 없음.", "summary": "이 논문은 부호 전체 로마 지배(signed total Roman domination)라는 그래프 지배 문제의 변형을 연구한다. 정의된 STRD 함수의 최소 무게를 계산하고, STRD family의 최대 크기(domatic number)를 구한다. 3차 정규 그래프와 완전 다분 그래프에서 이 불변량들의 명시적 값과 경계를 도출한다.", "technique": "각 불변량을 open packing number, 2-tuple total domination number 등 다른 그래프 불변량과 연결하여 분석; 완전 다분 그래프에서의 경우 분석(case analysis).", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24822v1", "title": "Graded Betti numbers of generalized split--join graphs and applications", "authors": ["Bilal Ahmad Rather"], "abstract": "We determine the full graded Betti tables of graph families that subsume several classes studied recently in the literature, namely the generalized multiple complete split-like graphs and the generalized clique-star graphs with arbitrary clique block sizes. The method combines Hochster's formula with a precise decomposition of the associated independence complexes into disjoint unions of simplices and iterated joins of discrete complexes. This reduces every graded Betti number to an explicit coefficient extraction formula and yields closed expressions for the linear strand, higher strands, Hilbert series, regularity, projective dimension, and extremal Betti numbers. In particular, we prove a sharp criterion for $2$-linear resolution and identify the regularity corner in terms of the number of nontrivial clique blocks. As applications, we recover and extend earlier results on equal-block split-like graphs, obtain complete formulas for pineapple graphs, and derive consequences for power graphs of cyclic groups, elementary abelian groups, and prime-power dihedral groups.", "categories": ["math.CO", "cs.DM", "math.AC"], "primary_category": "math.CO", "published": "2026-06-23T17:06:20+00:00", "updated": "2026-06-23T17:06:20+00:00", "abs_url": "http://arxiv.org/abs/2606.24822v1", "pdf_url": "https://arxiv.org/pdf/2606.24822v1", "journal_ref": "", "doi": "", "comment": "27 pages, 4 Figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 그래프의 graded Betti 수와 commutative algebra 불변량을 연구하며, McMullen's problem의 핵심인 convex position 점 배치, oriented matroid, 조합 기하학적 구조와는 직접적인 연관이 없습니다.", "summary": "본 논문은 generalized split-join 그래프 족의 완전한 graded Betti 표를 결정합니다. Hochster 공식과 independence complex의 단순체와 iterated join으로의 정확한 분해를 결합하여, 선형 strand, Hilbert series, regularity, projective dimension 등에 대한 명시적 공식을 유도합니다.", "technique": "Hochster 공식과 independence complex의 단순체 분해를 이용한 graded Betti 수 계산.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24685v1", "title": "Reconfiguration of Nowhere-zero Flows", "authors": ["Daniel W. Cranston", "Jiaao Li", "Bo Su", "Zhouningxin Wang", "Ningyan Xu"], "abstract": "Fix an abelian group $A$, a graph $G$, and nowhere-zero $A$-flows $f'$ and $f''$ on $G$. Now $f'$ and $f''$ are \\emph{$A$-flow-adjacent} if there exists a cycle $C$ in $G$ such that $f'(e)-f''(e)=0$ for all edges $e\\notin E(C)$. And $f'$ and $f''$ are \\emph{$A$-flow-equivalent} if there exists a sequence $f_0,\\ldots,f_s$ of $A$-flows such that $f_0=f'$, $f_s=f''$, and $f_i$ and $f_{i-1}$ are $A$-flow-adjacent for all $i\\in[s]$. Given a group $A$, we seek conditions on a graph $G$ such that all $A$-flows on $G$ are pairwise $A$-flow-equivalent; in this case, we say that $G$ is \\emph{$A$-flow-connected}. Analogously, we define $k$-flow-connectedness for nowhere-zero (integer) $k$-flows. The notions of $A$-flow-connectedness and $k$-flow-connectedness were first investigated by Esperet et al., who showed, among other results, that every $2$-edge-connected graph is $A$-flow-connected whenever $A=\\mathbb{Z}_2^8$ or $|A| \\ge 1.15\\times 10^{694}$.   In this paper, we first characterize the graphs that are $\\mathbb{Z}_3$-flow-connected and that are $3$-flow-connected. We show that every 2-edge-connected graph is $A$-flow-connected if and only if this is true for every 2-edge-connected cubic graphs. We show that all cubic bipartite graphs are $\\mathbb{Z}_4$-flow-connected, and construct other cubic graphs that are and are not $\\mathbb{Z}_4$-flow-connected. We conjecture that every Eulerian graph is $k$-flow-connected and $A$-flow-connected whenever $k$ or $|A|$ is even; and provide evidence for this conjecture. Finally, we consider $4$-edge-connected graphs $G$. Here, we show that $G$ is $A$-flow-connected whenever $|A|\\ge 5.3\\times 10^6$.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T15:13:41+00:00", "updated": "2026-06-23T15:13:41+00:00", "abs_url": "http://arxiv.org/abs/2606.24685v1", "pdf_url": "https://arxiv.org/pdf/2606.24685v1", "journal_ref": "", "doi": "", "comment": "34 pages, 6 figures", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "nowhere-zero flow의 재구성(reconfiguration) 문제는 그래프 조합론의 한 분야이지만, McMullen's problem(고차원 볼록 위치의 점 배치, oriented matroid, chirotope)과는 직접적 이론적 관련성이 없음.", "summary": "본 논문은 그래프 $G$에서 두 nowhere-zero $A$-흐름(flow)이 순환 재배치(cycle-by-cycle reconfiguration)를 통해 연결될 수 있는 조건을 연구한다. $\\mathbb{Z}_3$-흐름과 3-흐름에 대한 특성화, 3-정규 이분 그래프의 $\\mathbb{Z}_4$-흐름-연결성, 4-간선-연결 그래프에 대한 상한을 제시한다.", "technique": "재구성 경로(reconfiguration paths)를 통한 흐름 동치류 분석; 3-정규 그래프에 대한 축약적 특성화(reduction to cubic graphs).", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24776v1", "title": "A disproof of the uniform witness conjecture", "authors": ["Zixiang Xu"], "abstract": "The study of $(d+1)$-uniform set systems with VC-dimension at most $d$ links the Erdős--Ko--Rado theorem with VC-dimension. But already in 1997, Ahlswede and Khachatrian showed that this is not the right extension of the Erdős--Ko--Rado theorem. In 2025, Chao, Xu, Yip and Zhang proposed the uniform witness conjecture as a possible right extension: for $0\\le s\\le d$, if every set of a $(d+1)$-uniform family has a missing trace of the same fixed size $s$, then the family should have size at most $\\binom{n-1}{d}$. They proved the conjecture when $s=d$, and when $s=1$ and $n$ is large. Very recently, Chao, Xu and Zakharov proved the conjecture when $s\\le \\frac{d}{2}$ and $n$ is large.   We fill in the missing half of the picture, although the picture is not the one suggested by the conjecture. More precisely, for $d\\ge 4$ and $\\left\\lceil \\frac{d+2}{2}\\right\\rceil\\le s\\le d-1$, we construct such a family $\\mathcal{F}\\subseteq\\binom{[n]}{d+1}$ with $|\\mathcal{F}|=\\binom{n-1}{d}+\\binom{n-2(d+1-s)-2}{2s-d-2}$ for every $n\\ge2(d+1)$, thereby disproving the uniform witness conjecture.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T16:35:12+00:00", "updated": "2026-06-23T16:35:12+00:00", "abs_url": "http://arxiv.org/abs/2606.24776v1", "pdf_url": "https://arxiv.org/pdf/2606.24776v1", "journal_ref": "", "doi": "", "comment": "5 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "VC-dimension과 uniform set systems를 다루지만 McMullen's problem(convex position의 combinatorial geometry)과는 직접적 관련 없음.", "summary": "본 논문은 2025년 제안된 uniform witness conjecture를 반박한다. 이 추측은 $(d+1)$-uniform family가 고정 크기 $s$의 missing trace를 모두 가질 때 크기가 $\\binom{n-1}{d}$를 넘지 않는다고 주장했으나, 저자는 $d\\ge 4$와 $\\lceil \\frac{d+2}{2}\\rceil\\le s\\le d-1$ 범위에서 명시적 반례를 구성하여 추측을 거짓임을 보인다.", "technique": "명시적 구성(explicit construction)을 통한 counterexample 제시, 특히 $|\\mathcal{F}|=\\binom{n-1}{d}+\\binom{n-2(d+1-s)-2}{2s-d-2}$ 형태의 가족 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.26950v1", "title": "Proof of Cigler's conjecture on $q$-Hoggatt numbers", "authors": ["Shane Chern", "Wenle Shi"], "abstract": "We prove the nonnegativity and palindromicity of a family of polynomials arising from $q$-Hoggatt numbers. The nonnegativity is derived from Stanley's $(P,ω)$-partition theory through a standard Young tableau formula, while the palindromicity is proved by an involution on rectangular standard Young tableaux. Our result confirms a conjecture of Cigler.", "categories": ["math.CO", "math.NT"], "primary_category": "math.CO", "published": "2026-06-25T12:23:57+00:00", "updated": "2026-06-25T12:23:57+00:00", "abs_url": "http://arxiv.org/abs/2606.26950v1", "pdf_url": "https://arxiv.org/pdf/2606.26950v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "q-Hoggatt 수와 관련된 다항식의 조합론적 성질 증명이지만, McMullen 문제의 convex position, oriented matroid, tope graph 등과는 직접적 연관이 없음.", "summary": "q-Hoggatt 수에서 비롯된 다항식 족의 비음성(nonnegativity)과 회문성(palindromicity)을 증명하여 Cigler의 추측을 확인했다. Stanley의 (P,ω)-분할 이론과 표준 Young 타블로를 이용한 공식, 그리고 직사각형 표준 Young 타블로 위의 involution을 활용하였다.", "technique": "Stanley의 (P,ω)-분할 이론과 표준 Young 타블로 공식을 통한 비음성 증명 및 직사각형 표준 Young 타블로의 involution을 이용한 대칭성 증명.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24440v1", "title": "Perfect State Transfer on Quotient Graphs in Shunt Decomposition-Based Quantum Walks", "authors": ["Banita Katuwal", "Srinath M S", "Y Lakshmi Naidu", "Supriyo Dutta"], "abstract": "This paper investigates perfect state transfer (PST) in discrete-time quantum walks constructed via the shunt decomposition method. The walks are defined on a graph $G$ and its associated quotient graph $G/π$, induced by an equitable partition $π$. Through the shunt decomposition of $G$, we derive an explicit relation between the shift operator of the parent graph $G$ and that of its quotient graph $G/π$. We construct a reflection operator based on the characteristic matrix, which establishes a connection between the transition operator of the parent graph and that of its lower-dimensional quotient graph. We then prove that PST occurs on $G$ if and only if it occurs on $G/π$. Furthermore, we express the unitary evolution operator of the quotient graph in terms of Chebyshev polynomials of the first kind, from which we derive explicit criteria for PST. As an application, we establish PST on the cycle graph $C_{n}$ at time $k = n/2$, and lift the result to the parent graph $C_{2n}$ via the equitable partition $π$. We further show that if an equitable partition $π$ of $G$ induces a quotient isomorphic to $K_n^{\\circlearrowleft}$, the complete digraph on $n$ vertices with a loop at every vertex, then PST occurs at step $k = n$, and the walk is periodic at $k = 2n$. This framework is applied to two families of graphs, which are the complete bipartite digraph $K_{n,n}^{\\rightleftharpoons}$ and the circulant graph $\\operatorname{Circ}(2n, S)$, where $S$ consists of all odd residues modulo $2n$ and $n = 2^s$ for some $s \\geq 1$, establishing PST in their respective line digraphs. Collectively, these results also answer the question posed by Godsil and Zhan concerning which shunt decompositions or embeddings of a graph admit PST.", "categories": ["math.CO", "quant-ph"], "primary_category": "math.CO", "published": "2026-06-23T11:18:49+00:00", "updated": "2026-06-23T11:18:49+00:00", "abs_url": "http://arxiv.org/abs/2606.24440v1", "pdf_url": "https://arxiv.org/pdf/2606.24440v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "양자 보행과 완벽 상태 전송은 이산기하학·조합론의 고전적 구조 문제와 직접 관련이 없음.", "summary": "본 논문은 shunt decomposition을 통해 구성된 이산 시간 양자 보행에서 완벽 상태 전송(PST)을 연구한다. 모 그래프 G와 동등분할로 유도된 몫 그래프 G/π 간의 PST 발생 필요충분조건을 증명하고, Chebyshev 다항식을 이용한 명시적 PST 판정법을 제시한다. 순환 그래프, 완전 이분 그래프 등에서 PST 구현을 보인다.", "technique": "Shunt decomposition, 특성행렬 기반 반사 연산자, Chebyshev 다항식을 통한 unitary 진화 연산자 표현.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27497v1", "title": "Enumerating matrices with prescribed entries in an adjoint orbit", "authors": ["Samrith Ram"], "abstract": "We study intersections of conjugacy classes of square matrices over a finite field with affine coordinate subspaces, or equivalently matrices in a fixed adjoint orbit with prescribed entries. Our main result treats the case of prescribed columns: for a partially defined linear map we give a Hall scalar product formula for the number of extensions to an endomorphism with prescribed similarity invariants. This formula is expressed in terms of skew modified Hall--Littlewood functions and $q$-Whittaker functions. As applications, we count monic matrix polynomials over $\\mathbb{F}_q$ with prescribed Smith normal form and with prescribed determinant, and recover the Gerstenhaber--Reiner formula for the number of square matrices with a fixed characteristic polynomial. We also note that known point-count formulas for Hessenberg varieties imply related formulas for Hessenberg supports involving chromatic quasisymmetric functions, motivating polynomiality questions for more general supports and prescribed affine slices.", "categories": ["math.CO", "math.AG", "math.RT"], "primary_category": "math.CO", "published": "2026-06-25T19:24:10+00:00", "updated": "2026-06-25T19:24:10+00:00", "abs_url": "http://arxiv.org/abs/2606.27497v1", "pdf_url": "https://arxiv.org/pdf/2606.27497v1", "journal_ref": "", "doi": "", "comment": "29 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "유한체 위의 행렬 궤도와 affine 부분공간의 교집합을 다루지만 McMullen's problem의 convex position, oriented matroid, 또는 점 배치 기하학과는 직접 관련성이 없음.", "summary": "유한체 위의 정사각 행렬의 켤레 궤도(adjoint orbit)와 affine 좌표 부분공간의 교집합을 연구한다. 주요 결과는 고정된 열(prescribed columns)을 가진 부분 정의된 선형사상의 확장 개수를 skew modified Hall-Littlewood 함수와 q-Whittaker 함수로 표현하는 Hall 스칼라곱 공식이다.", "technique": "Skew modified Hall-Littlewood functions, q-Whittaker functions, similarity invariants, Hessenberg varieties.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.26761v1", "title": "Maximum Forest Number of General Bipartite Graphs: Structural and Complexity Results", "authors": ["Daniel Iľkovič"], "abstract": "Recent results established the maximum forest number $f(B)$ for balanced bipartite graphs under Ore-type degree sum conditions. In this paper, we extend these results by determining the exact value of the maximum forest number as a closed-form formula for general bipartite graphs under Ore-type conditions, answering an open question posed by Yu. We prove that the maximum forest number is bounded by a discrete optimization over at most six critical structural coordinate points dictated by hyperbolic density constraints. Furthermore, we establish that deciding whether a specific balanced bipartite graph on $2n$ vertices has a forest number of at least $n+2$ is NP-complete. This implies that while the maximum possible forest number can be exactly bounded, computing the exact forest number for a given graph remains computationally intractable, and a simple structural characterization via finite forbidden induced subgraphs cannot exist unless P = NP.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T08:47:12+00:00", "updated": "2026-06-25T08:47:12+00:00", "abs_url": "http://arxiv.org/abs/2606.26761v1", "pdf_url": "https://arxiv.org/pdf/2606.26761v1", "journal_ref": "", "doi": "", "comment": "8 pages", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이분 그래프의 forest number 문제는 McMullen's problem의 convex position, general position, oriented matroid 등과 직접적 관련성이 없음.", "summary": "본 논문은 Ore-type 차수 합 조건 하에서 일반 이분 그래프의 최대 forest number $f(B)$를 폐형식(closed-form formula)으로 결정하고, 이를 쌍곡선 밀도 제약이 정하는 최대 6개의 임계 구조점에 대한 이산 최적화로 한정함. 균형잡힌 이분 그래프에서 forest number이 $n+2$ 이상인지 판정하는 문제가 NP-완전임을 증명하여 그래프 불변량의 계산 불가능성과 유한 금지된 유도 부분그래프를 통한 특성화 불가능성을 보임.", "technique": "쌍곡선 밀도 제약(hyperbolic density constraints)을 이용한 이산 최적화, NP-완전성 증명", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27507v1", "title": "A combinatorial proof for the positivity of the normalized Jacobi triple product tails", "authors": ["Xiangyu Ding", "Lisa Hui Sun"], "abstract": "For $k\\geq 1$, we prove that \\[ [q^n z^s]J_k(z,q)\\geq 0, \\qquad (n\\geq 0,\\ s\\in\\mathbb Z) \\] for the normalized Jacobi triple product tails \\[ J_k(z,q) = \\frac{ \\sum_{j=k}^{\\infty}(-1)^{j-k} q^{\\binom{j+1}{2}}(z^{-j}+\\cdots+z^j)} {(zq,q/z;q)_\\infty}. \\] This result not only implies Merca's stronger nonnegativity conjecture on truncated Jacobi triple product series in full generality, but also yields infinite families of linear inequalities for two-colored partitions and partitions with parts in the residue classes $\\pm S \\pmod{R}$. We present a combinatorial proof wherein a sign-reversing involution reduces the normalized Jacobi triple product tails to the invariant subsets according to the generalized minimal-excludant of partitions. Furthermore, by combing an invertible lift operator on Frobenius arms with Konan's size- and length-preserving bijection, an injection is constructed between the consecutive invariant subsets, which implies the coefficientwise positivity of the normalized Jacobi triple product tails.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T19:39:19+00:00", "updated": "2026-06-25T19:39:19+00:00", "abs_url": "http://arxiv.org/abs/2606.27507v1", "pdf_url": "https://arxiv.org/pdf/2606.27507v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Jacobi triple product의 계수 양성(positivity) 문제는 조합론적 구조를 다루지만, McMullen's problem(볼록 점 배치, oriented matroid, tope graph)과는 직접 관련이 없음.", "summary": "정규화된 Jacobi 삼중곱 꼬리(normalized Jacobi triple product tails) $J_k(z,q)$의 계수 양성을 조합론적으로 증명함. Sign-reversing involution과 generalized minimal-excludant를 이용하여 Merca의 추측을 완전히 증명하고, 색칠된 분할(two-colored partitions)에 대한 무한 선형 부등식족을 도출함.", "technique": "Sign-reversing involution을 이용한 Jacobi triple product의 축약, Frobenius arms 위의 invertible lift operator와 크기·길이 보존 bijection의 합성을 통한 주입(injection) 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.26509v1", "title": "Structural Properties and Applications of the Augmented Sombor Index", "authors": ["Chunlei Xu", "Kinkar Chandra Das", "Jayanta Bera"], "abstract": "Topological indices are key quantitative descriptors in mathematical chemistry, unchanged under symmetry operations and retaining graph connectivity; they capture molecular structural features to provide insights into molecular stability and chemical properties, becoming indispensable in cheminformatics and theoretical chemistry. Among degree-based indices, the \\textbf{Sombor index} is widely concerned for capturing structural information, and motivated by enhanced structural discrimination, the \\textbf{augmented Sombor index} ($ASO$) is defined for a connected graph $Ω$ with $|V(Ω)|\\geq 3$ as $$ASO(Ω) = \\sum_{v_iv_j\\in E(Ω)} \\sqrt{\\frac{d_i^2 + d_j^2}{d_i + d_j - 2}},$$ where $d_i$ and $d_j$ are the degrees of vertices $v_i$ and $v_j$, respectively. Within the scope of this study, we first establish several sharp bounds for the augmented Sombor index and characterize the extremal graphs attaining these bounds. In particular, we determine the minimum value of the $ASO$ index for unicyclic graphs with a prescribed girth and characterize all graphs achieving this minimum. We also identify the second maximum $ASO$ value among trees and characterize the corresponding extremal tree structures. Furthermore, the minimum and maximum values of the $ASO$ index for bipartite graphs and chemical graphs are obtained, together with a complete characterization of the associated extremal graphs. In addition, we characterize the chemical trees that maximize the $ASO$ index. The chemical applicability of the $ASO$ index is investigated through quantitative structure-property relationship (QSPR) analysis, supported by a comparative assessment of several variants of the Sombor index. Finally, we present concluding remarks and outline potential directions for future research on the augmented Sombor index of graphs.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-25T01:30:03+00:00", "updated": "2026-06-25T01:30:03+00:00", "abs_url": "http://arxiv.org/abs/2606.26509v1", "pdf_url": "https://arxiv.org/pdf/2606.26509v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "논문은 그래프의 위상 지표(topological indices) 최적화 문제를 다루지만, McMullen's problem의 핵심인 convex position 점 배치, oriented matroid, 실현가능성(realizability) 등과는 무관.", "summary": "본 논문은 화학그래프와 조합구조에 대한 augmented Sombor index(ASO)를 정의하고, 다양한 그래프 클래스(유니사이클 그래프, 트리, 이분 그래프, 화학그래프)에서의 최솟값과 최댓값을 특성화한다. QSPR 분석을 통해 화학적 응용 가능성을 검증한다.", "technique": "차수(degree) 기반 위상지표의 극값 특성화(extremal graph characterization).", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27352v1", "title": "Congruent copies of finite patterns in planar point sets", "authors": ["Shubhrajit Bhattacharya", "Ritesh Goenka"], "abstract": "Given a finite nonempty planar point set $S$, what is the maximum number of congruent copies of $S$ contained in a set of $n$ points in the Euclidean plane? Building on OpenAI's recent breakthrough on the unit distance problem, we construct planar sets consisting of $n$ points that contain $Ω_S(n^{1+δ_S})$ congruent copies of $S$, for some positive constant $δ_S$ depending only on $S$. This answers a question of Brass and Pach in a strong form, and makes progress on questions posed by Erdős and Purdy, and Ábrego and Fernández-Merchant. Our proof uses the number field construction from Sawin's quantitative refinement of OpenAI's result and consequently yields an explicit choice for $δ_S$ for each fixed $S$.", "categories": ["math.CO", "math.MG"], "primary_category": "math.CO", "published": "2026-06-25T17:56:01+00:00", "updated": "2026-06-25T17:56:01+00:00", "abs_url": "http://arxiv.org/abs/2606.27352v1", "pdf_url": "https://arxiv.org/pdf/2606.27352v1", "journal_ref": "", "doi": "", "comment": "Comments welcome!", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "유한 점 집합의 합동 복사본 개수 세기는 점 배치 문제이지만, McMullen 문제의 convex position, general position, oriented matroid 구조와는 직접적 관련이 없음.", "summary": "유클리드 평면의 n개 점으로 이루어진 집합에서 주어진 유한 점집합 S의 합동 복사본의 최대 개수를 구하는 문제를 다룬다. 저자들은 단위거리 문제에 대한 최근 결과를 활용하여 Ω_S(n^{1+δ_S}) 개의 합동 복사본을 포함하는 점집합을 구성하며, 이는 Brass-Pach의 문제에 답하고 Erdős-Purdy의 질문에 진전을 이룬다.", "technique": "Sawin의 정량적 정제(quantitative refinement)를 통한 수체(number field) 구성 및 단위거리 문제의 결과 활용.", "connections": "추측: 조합 기하의 거리 및 합동 구조 문제이지만, 초록상 oriented matroid, realizability, tope graph 등 이산기하 구조론과의 명시적 연결은 없음.", "keyword_hits": [], "source": "explore"}, {"id": "2606.24882v1", "title": "A Resolution of Erdős Problems 593 and 1177: Obligatory Triple Systems and Exact Spectra", "authors": ["Eric Li"], "abstract": "We resolve Erdős Problems #593 and #1177. Problem #593 asks which finite triple systems occur in every uncountably chromatic triple system; the answer is exactly the class generated from private-vertex expansions of finite bipartite graphs by finite disjoint unions and one-point amalgamations. Equivalently, after isolated vertices are removed, a finite triple system is obligatory precisely when it is linear, every hyperedge-node of its Levi graph has an incident bridge, and every Berge cycle is even.   The proof uses an exact bridge-trace theorem for complete-rank one-apex sequence lifts. We also prove that, for every uncountable cardinal kappa, there is a linear triple system of chromatic number exactly kappa, with at most 2^{2^mu} vertices when kappa=mu^+. These two ingredients give a class-valued exact avoidance-spectrum dichotomy for every finite forbidden triple system. As a consequence, Erdős Problem #1177 has truth values yes, no, and yes.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T17:57:39+00:00", "updated": "2026-06-23T17:57:39+00:00", "abs_url": "http://arxiv.org/abs/2606.24882v1", "pdf_url": "https://arxiv.org/pdf/2606.24882v1", "journal_ref": "", "doi": "", "comment": "23 pages, 1 figure", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "조합론의 하이퍼그래프·색칠수 문제이나 McMullen's problem(볼록위치, 배향매트로이드, 다면체 구조)과는 직접 관련 없음.", "summary": "Erdős 문제 #593과 #1177을 해결하며, 비계수 삼중계(triple system)에서 필수적으로 나타나는 유한 삼중계를 특성화한다. 이는 이분 그래프의 특정 확장으로부터 생성되는 체계(선형성, Levi 그래프의 다리 조건, 짝수 Berge 순환 조건)로 정확히 규명된다.", "technique": "complete-rank one-apex sequence lifts에 대한 정확한 bridge-trace 정리와 무한 기수에 대한 정확한 색칠수 구성.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.25505v1", "title": "The Angular Seed Power Map: A Constructive Approach to Recursive Scaling Spirals", "authors": ["Arjen Toni Dijksman"], "abstract": "We present the ''Power Spiral Map'', a continuous angular evolution of the linear coordinate grid established in our previous work. While that previous Power Map utilized a seed value translating along a horizontal axis, this work builds upon a seed angle ($θ$) projected onto a unit diameter circle. This operation controls two coupled geometric behaviors: an internal area-preserving partition of unity within a reference square (cos 2 $θ$ + sin 2 $θ$ = 1) and an external recursive scaling mechanism (sec $θ$ and cos $θ$) that dictates the expansion or contraction of successive generations of squares unfolding as a spiral in the 2D plane. We demonstrate that continuous variation of this angular parameter generates discrete geometric alignments that yield polynomial identities, with examples of the Golden Ratio ($Φ$) and the Plastic Ratio ($ψ$) defined through purely planar intersections.", "categories": ["math.MG", "math-ph"], "primary_category": "math.MG", "published": "2026-06-24T07:39:42+00:00", "updated": "2026-06-24T07:39:42+00:00", "abs_url": "http://arxiv.org/abs/2606.25505v1", "pdf_url": "https://arxiv.org/pdf/2606.25505v1", "journal_ref": "", "doi": "", "comment": "This is a new submission (v1) intended for cross-listing/transfer to arXiv under the mathematics/geometry category", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "원형 기반 나선 구조와 기하학적 분할을 다루지만 McMullen의 문제(convex position 점 배치, oriented matroid, realizability)와는 직접 관련 없음.", "summary": "각도 매개변수 θ를 기반으로 단위원 위의 seed angle을 투영하여 Power Spiral Map을 구성함. 이를 통해 참조 정사각형 내 면적 보존 분할(partition of unity)과 외부 재귀적 스케일링 메커니즘(sec θ, cos θ)을 제어하여 2D 평면에 나선을 생성함. 연속적인 각도 변화가 이산 기하학적 정렬을 산출하며 황금비와 플라스틱 비를 포함한 다항식 항등식을 도출함.", "technique": "각도 매개변수화된 나선 구성과 면적 보존 분할을 통한 재귀적 스케일링 메커니즘.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.28041v1", "title": "The Erdos n^2/25 max-cut conjecture for small multiples of five, via a per-root-MaxCut envelope and blow-up integrality", "authors": ["Alper Ferudun"], "abstract": "Erdős conjectured that every triangle-free graph on $N$ vertices can be made bipartite by deleting at most $N^2/25$ edges; the bound would be sharp, attained by the balanced blow-up $C_5[N/5]$. Writing $β(G)$ for the minimum number of edges whose deletion makes $G$ bipartite and $a(N) = \\max\\{β(G):G$ triangle-free on $N$ vertices$\\}$, the conjecture is $a(N)\\le N^2/25$, and for $N=5n$ it reads $a(5n)\\le n^2$. Balogh, Clemen and Lidícký proved it for large $N$ in the two density tails (edge density at most $0.2486$ or at least $0.3197$) and proved the global bound $a(N)\\le N^2/23.5$; the medium-density band remains open. We prove \\[ a(5n) = n^2 \\qquad \\text{for every } 1 \\le n \\le 40, \\quad \\text{i.e. } N \\in \\{5,10,\\dots,200\\}. \\] The proof is computer-assisted and combines three ingredients. (i) A \\emph{per-root-MaxCut envelope}: for the $107$ triangle-free $7$-root types, the mean over types of the best per-type cut is an upper bound $d_{\\rm mono}(W)\\le U_7(W)$ that is \\emph{tight} at the $C_5$-blow-up. (ii) An order-$10$ flag-algebra certificate -- the per-root-MaxCut rows at $7$ and $8$ roots together with rooted-Horn cuts and a manifestly-PSD moment block -- bounds the envelope on the medium band, $U_7(W)\\le \\tfrac{2}{25}+δ$ with an explicit rational $δ\\approx 4.8558\\times10^{-5}$, for every triangle-free graphon $W$ of edge density in $[0.2486,0.3197]$. (iii) The blow-up identity $β(G[t])=t^2β(G)$ plus integrality of $β$ turns this into $β(G)\\le n^2+\\tfrac{25}{2}n^2δ$ for any $5n$-vertex band-density $G$, and $\\tfrac{25}{2}n^2δ<1$ for $n\\le 40$; the two density tails are handled by the Balogh-Clemen-Lidícký bounds, transferred to finite $N$ by the same blow-up. The envelope bound $d_{\\rm mono} \\le U_7$ is a genuine graphon upper bound (each per-root rule is one global $2$-colouring), the certificate is verified in exact rational arithmetic, the moment positivity is Razborov's flag-algebra theorem exhibited as an exact Gram factorization, and the bound is cross-checked against brute-force max-cut on all triangle-free graphs of order at most $12$. The same envelope at orders $9$ and $10$ provably does not reach the constant needed for larger $n$; we explain why, and locate the all-$n$ conjecture at a single self-tight obstruction.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-26T12:44:10+00:00", "updated": "2026-06-26T12:44:10+00:00", "abs_url": "http://arxiv.org/abs/2606.28041v1", "pdf_url": "https://arxiv.org/pdf/2606.28041v1", "journal_ref": "", "doi": "", "comment": "9 pages. Computer-assisted. Ancillary files: order-10 per-root-MaxCut + rooted-Horn flag-algebra certificate with an independent exact-arithmetic verifier, a self-contained brute-force max-cut ground-truth checker, and the manifestly-PSD moment Gram certificate", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "Erdős max-cut conjecture는 그래프 이론의 극값 문제이며, McMullen's problem(convex polytope의 combinatorial structure)과는 주제와 기법이 근본적으로 다릅니다.", "summary": "본 논문은 삼각형 없는 그래프에서 이분 그래프로 만들기 위해 삭제해야 할 최대 간선 수에 관한 Erdős 추측을 다룹니다. Flag algebra와 blow-up 항등식을 결합한 컴퓨터 보조 증명으로 $N \\in \\{5,10,\\ldots,200\\}$에 대해 $a(5n)=n^2$을 증명합니다.", "technique": "Per-root-MaxCut envelope(107개 삼각형 없는 7-근 타입에 대한 평균 상한)과 10차 flag-algebra certificate를 조합하여 graphon의 중간 밀도 대역에서 경계를 확립하고, blow-up 항등식 $\\beta(G[t])=t^2\\beta(G)$의 정확성을 이용합니다.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24349v1", "title": "Sharp bounds for minimal dependencies of linear-form powers", "authors": ["Heng Li", "Xizhi Liu"], "abstract": "Motivated by the dimension-bound part of a problem of Bukh, we study Veronese circuits: how large can the span of $t$ linear forms be if their $m$-th powers are minimally linearly dependent? We prove the sharp finite dimension bound \\[   \\dim L\\leq \\frac{t+m-2}{m}. \\] Here $\\ell_1,\\ldots,\\ell_t$ are nonzero homogeneous linear forms over a field of characteristic zero, the powers $\\ell_1^m,\\ldots,\\ell_t^m$ form a circuit, and $L=\\Span\\{\\ell_1,\\ldots,\\ell_t\\}$. Rational-normal-curve configurations attain equality for infinitely many pairs $(t,\\dim L)$; in particular, the affine bound itself is sharp and the optimal leading constant in Bukh's question is $1/m$.   The proof uses a coding-theoretic translation: the coefficient row space of the powers is the $m$-th Schur power of the coefficient code, and the minimality hypothesis makes this Schur power a full-support hyperplane to which the Schur-product Kneser theorem of Mirandola and Zémor applies. The same method yields flat-concentration and interpolation criteria, a Cayley--Bacharach lower bound, Segre--Veronese and positive-characteristic variants, and Hilbert-function constraints for equality and near-equality in Veronese circuits.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T09:40:15+00:00", "updated": "2026-06-23T09:40:15+00:00", "abs_url": "http://arxiv.org/abs/2606.24349v1", "pdf_url": "https://arxiv.org/pdf/2606.24349v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "선형형식의 거듭제곱에 대한 최소 선형종속성을 다루지만, McMullen's problem의 convex position 점 배치, oriented matroid, 또는 다면체 구조와는 직접 관련이 없음.", "summary": "특성 0 체 위에서 $t$개 선형형식의 $m$제곱이 최소선형종속(circuit)을 이룰 때, 그 span의 차원에 대한 sharp bound $\\dim L \\leq \\frac{t+m-2}{m}$을 증명함. Rational-normal-curve 구성이 무한히 많은 경우에 등호를 달성하며, Schur power와 coding theory를 활용한 증명 방법을 제시함.", "technique": "코딩이론적 번역(Schur power)과 Schur-product Kneser theorem의 적용.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24325v1", "title": "Exact Enumeration of Phylogenetic Networks: The Tree-Child, Reticulation-Visible and Orchard Hierarchy", "authors": ["Josep Batle"], "abstract": "We develop a unified framework for the exact enumeration and asymptotic analysis of the three most studied classes of phylogenetic networks: tree-child (TC), reticulation-visible (RV) and orchard networks, whose cardinalities satisfy the strict ordering $|\\mathrm{TC}_{\\ell,k}|<|\\mathrm{RV}_{\\ell,k}|<|\\mathrm{Orch}_{\\ell,k}|$ for reticulation number $k\\geq2$ (with $\\mathrm{TC}\\subsetneq\\mathrm{RV}$ and $\\mathrm{TC}\\subsetneq\\mathrm{Orch}$, while $\\mathrm{RV}$ and $\\mathrm{Orch}$ are incomparable as sets). Using the Chang--Fuchs structural theorem, we derive a two-level master functional equation for the RV bivariate generating function and obtain exact closed-form identities for the differences $Δ_k(\\ell):=|RV_{\\ell,k}|-|TC_{\\ell,k}|$ for $k=2,3$, with the asymptotic universality $Δ_k(\\ell)/|TC_{\\ell,k}|\\sim k!/\\ell$. For orchard networks, we prove a \\emph{universal hypergeometric law} that resolves the exact enumeration problem for all $\\ell$: the column generating function $F_\\ell(v)$ is rational with denominator $D_\\ell(v)=\\prod_{j=2}^\\ell X_j(v)$, where \\[   X_\\ell(v) = \\sum_{k=0}^{\\lfloor\\ell/2\\rfloor}(-1)^k\\,   \\frac{\\ell!}{(\\ell-2k)!\\,k!}\\,v^k \\] is the matching polynomial of the complete graph $K_\\ell$ and a rescaled Jacobi polynomial. This immediately resolves the intractable $\\ell=9$ case: $D_9$ has degree 20, dominant growth rate $\\approx40.73$, and all spectral roots are positive real. A complete enumeration table is provided extending the published data of Cardona, Ribas and Pons.", "categories": ["math.CO", "q-bio.PE"], "primary_category": "math.CO", "published": "2026-06-23T09:02:23+00:00", "updated": "2026-06-23T09:02:23+00:00", "abs_url": "http://arxiv.org/abs/2606.24325v1", "pdf_url": "https://arxiv.org/pdf/2606.24325v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "계산적 조합론과 생성함수 사용하나, McMullen's problem(볼록다각형의 면 수)과는 수학적 주제가 무관.", "summary": "트리-차일드(TC), 망상-가시(RV), 과수원(Orchard) 계통망의 세 클래스에 대한 통일된 열거 프레임워크를 개발. Chang-Fuchs 구조 정리를 이용해 RV의 생성함수 함수방정식을 도출하고, 과수원망에 대해 보편 초기하 법칙을 증명하여 모든 $\\ell$에 대한 정확한 열거 문제를 해결.", "technique": "생성함수 방법, Chang-Fuchs 구조 정리, 완전그래프 $K_\\ell$의 매칭 다항식(matching polynomial)과 재스케일된 야코비 다항식(Jacobi polynomial) 활용.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.24243v1", "title": "Minimal excludant integer and bilateral truncated Jacobi triple product identity", "authors": ["Y. H. Chen", "W. D. Deng", "Thomas Y. He", "H. X. Huang"], "abstract": "In 2012, Andrews and Merca proved a truncated theorem on Euler's pentagonal number theorem. Since then, a number of results on truncated theta series have been proved, including truncated Jacobi triple product identity. In this paper, we provide partition-theoretic interpretations for the bilateral truncated Jacobi triple product identity in terms of the minimal excludant integer.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-23T07:30:15+00:00", "updated": "2026-06-23T07:30:15+00:00", "abs_url": "http://arxiv.org/abs/2606.24243v1", "pdf_url": "https://arxiv.org/pdf/2606.24243v1", "journal_ref": "", "doi": "", "comment": "", "relevance": 1, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "논문의 핵심은 분할론(partition theory)과 truncated theta series에 관한 것으로, McMullen's problem이 다루는 convex position, oriented matroid, realizability 등과 직접적 연관이 없음.", "summary": "본 논문은 2012년 Andrews와 Merca의 Euler 오각수 정리에 관한 truncated theorem을 바탕으로, bilateral truncated Jacobi triple product identity에 대한 분할론적 해석을 제공한다. minimal excludant integer를 이용하여 이 항등식의 조합론적 의미를 밝힌다.", "technique": "minimal excludant integer를 활용한 partition-theoretic interpretation과 truncated theta series 항등식의 조합론적 증명.", "connections": "", "keyword_hits": [], "source": "explore"}, {"id": "2606.27987v1", "title": "Maniplexes as a Foundation for Cross-Linked Databases of Symmetric Objects", "authors": ["Katja Berčič", "Gabe Cunningham", "Andrés David Santamaría-Galvis", "Janoš Vidali"], "abstract": "Graphs, maps on surfaces, and abstract polytopes are related combinatorial structures that tend to be studied by different communities using their own tools and databases. Maniplexes provide a unifying framework that captures all of them. A single database built around maniplexes would help researchers recognize shared structures and translate results across fields. Here we present a compact, interoperable format for storing maniplexes as edge-labeled graphs, designed with such a database in mind. As a first step, we connect two existing datasets of regular 4-maniplexes to the House of Graphs and to Potočnik's tetravalent graph censuses, using canonical forms of their flag graphs, 1-skeleton graphs, and 1-coskeleton graphs.", "categories": ["math.CO"], "primary_category": "math.CO", "published": "2026-06-26T11:34:16+00:00", "updated": "2026-06-26T11:34:16+00:00", "abs_url": "http://arxiv.org/abs/2606.27987v1", "pdf_url": "https://arxiv.org/pdf/2606.27987v1", "journal_ref": "", "doi": "", "comment": "Submitted (pre-peer-review) version. Accepted at CICM 2026; the Version of Record will appear in Springer LNAI. We'll add the DOI once the proceedings are published", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 maniplexes를 이용한 대칭 조합 구조의 데이터베이스 통합에 관한 것으로, McMullen 문제나 oriented matroid와 전혀 관련이 없다.", "summary": "이 논문은 그래프, 곡면 위의 지도(maps), 추상 다면체(abstract polytopes)를 통합하는 프레임워크로서 maniplexes를 활용하여 상호운용 가능한 데이터베이스 형식을 제안한다. 간선-레이블 그래프(edge-labeled graph) 형태로 maniplexes를 저장하는 컴팩트한 포맷을 설계하였으며, 기존 regular 4-maniplexes 데이터셋을 House of Graphs 및 Potočnik의 4가 그래프 목록과 연결하는 작업을 수행하였다.", "technique": "flag graph, 1-skeleton graph, 1-coskeleton graph의 정준형(canonical form)을 이용한 데이터셋 간 교차 연결.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.27357v1", "title": "Typical distances in high-genus triangulations", "authors": ["Tanguy Lions"], "abstract": "We study the distance between two uniformly chosen points on a uniform random triangulation whose genus g is proportional to the number of faces 2n. We show that the distance rescaled by log(n) converges in probability to a deterministic constant, which answers a conjecture of Budzinski, Chapuy and Louf. The proof relies on the precise study of the volume growth of the ball of radius r for r of order log(n). The main ingredients are the recent local convergence results for uniform triangulations with boundaries and the isoperimetric inequalities obtained by Budzinski and Louf.", "categories": ["math.PR", "math.CO"], "primary_category": "math.PR", "published": "2026-06-25T17:57:59+00:00", "updated": "2026-06-25T17:57:59+00:00", "abs_url": "http://arxiv.org/abs/2606.27357v1", "pdf_url": "https://arxiv.org/pdf/2606.27357v1", "journal_ref": "", "doi": "", "comment": "42 pages, 15 figures", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 고속(high-genus) 삼각분할에서의 전형적 거리에 관한 확률론·조합론 연구로, McMullen 문제나 Larman 추측과 직접적인 관련이 없다.", "summary": "이 논문은 면의 수 $2n$에 비례하는 genus $g$를 가진 균일 랜덤 삼각분할 위의 두 균일 랜덤 점 사이의 거리를 연구한다. $\\log(n)$으로 스케일한 거리가 확률 수렴하여 결정론적 상수에 수렴함을 증명하며, 이는 Budzinski, Chapuy, Louf의 추측에 답한다. 증명의 핵심은 반지름 $r = O(\\log n)$인 볼의 부피 성장에 대한 정밀 분석이다.", "technique": "경계가 있는 균일 삼각분할의 국소 수렴(local convergence) 결과와 Budzinski–Louf의 등주 부등식(isoperimetric inequalities)을 결합하여 볼 부피 성장을 정밀하게 추정한다.", "connections": "", "keyword_hits": ["triangulation"], "source": "filter"}, {"id": "2606.27004v1", "title": "Hidden critical and Morse equivalence behind duality: Theory and Applications", "authors": ["Dong Zhang"], "abstract": "The aim of this paper is to establish critical duality theory for ratios of nonnegative homogeneous convex functions (shorten for RC functions) and differences of convex functions (abbreviated as DC functions) on Banach spaces. Specifically, we establish a series of duality results on critical point theory and Morse theory for RC functions, including the homotopy type of sublevel sets, the Morse critical points and their Rothe critical groups, Lagrange critical points and their multiplicities, Lusternik-Schnirelman min-max critical values, Poincare polynomials, as well as the structure of handlebody decompositions, all of which are proved to be preserved under polarity dual. Moreover, we obtain the first critical duality theory of DC functions which does not depend on the DC decomposition. This answers a question left open from the work of Toland on DC functions and the work of Le-Pham on DC programming.   We apply these results to provide a reformulation of the graph Cheeger constant using zonotopes; we introduce the contact data which serves as a geometric characterization of Lagrange criticality; and we show that the eigenproblems for 1-Laplacian and $\\infty$-Laplacian on hypergraphs are equivalent to the contact problems of zonotopes, which indeed establishes a new characterization of zonotopes. We also prove a duality equivalence for certain nonlinear eigenvalue problems and bifurcation problems. Our study here reveals an intricate interaction of critical point theory with other fields such as convex analysis, combinatorial geometry, and nonlinear eigenproblems on graphs.", "categories": ["math.FA", "math.CO", "math.MG", "math.SP"], "primary_category": "math.FA", "published": "2026-06-25T13:20:14+00:00", "updated": "2026-06-25T13:20:14+00:00", "abs_url": "http://arxiv.org/abs/2606.27004v1", "pdf_url": "https://arxiv.org/pdf/2606.27004v1", "journal_ref": "", "doi": "", "comment": "Any comments are very welcome", "relevance": 0, "problem_id": "mcmullen", "problem_name": "McMullen's problem (d=5)", "relevance_reason": "이 논문은 Banach 공간에서의 RC/DC 함수에 대한 임계점 이론과 Morse 이론의 쌍대성을 다루며, McMullen 문제(d=5에서의 일반 위치 점 배치, oriented matroid, chirotope 등)와 직접적 연관이 없다.", "summary": "이 논문은 비음 동차 볼록 함수의 비(RC 함수)와 볼록 함수의 차(DC 함수)에 대한 임계 쌍대 이론(critical duality theory)을 Banach 공간에서 수립한다. Morse 이론의 각종 불변량(호모토피 형, Rothe 임계군, Lusternik-Schnirelman 최솟값 등)이 극성 쌍대(polarity dual) 하에서 보존됨을 증명하며, DC 분해에 독립적인 최초의 DC 함수 임계 쌍대 이론을 제시한다. 응용으로서 그래프 Cheeger 상수의 조노토프(zonotope)를 이용한 재정식화, 하이퍼그래프의 1-Laplacian 및 $\\infty$-Laplacian 고유 문제와 조노토프의 접촉 문제 간의 동치를 보인다.", "technique": "비음 동차 볼록 함수(RC)와 DC 함수에 대해 극성 쌍대(polarity duality) 및 볼록 해석학을 활용한 임계점·Morse 이론의 쌍대 불변성 확립.", "connections": "", "keyword_hits": ["tope"], "source": "filter"}, {"id": "2606.25644v1", "title": "Winding number and circular coloring", "authors": ["Reza Naserasr", "Cyril Pujol", "Lujia Wang"], "abstract": "In 1996, Youngs proved a surprising theorem that quadrangulations of the projective plane could never have chromatic number exactly 3. This sparked a lot of interest, and the result has been further developed in many directions over the past decades. For example, the result is strengthened by considering the circular chromatic number, which is a real-valued lower bound on the chromatic number. The circular chromatic number of a quadrangulation cannot be in the interval (2,4). This parameter allows a generalization to larger even faces, for which a similar gap exists.   In this work, we place these results into a framework based on the notion of winding number using extensions of colorings to continuous mappings. This yields unified and simplified proofs of gaps in the circular chromatic number for graphs with a distinguished set of directed even cycles. This generalizes the setting of graphs embedded on surfaces where every face is even.   We further establish an analogous gap phenomenon when all faces are of a given odd length, previously known only in the case of triangulations. For example, we conclude that if G is a graph embedded on the projective plane such that all faces are 5-cycles, then either its circular chromatic number is 5/2 or at least 3, the former being the case only if G is Eulerian and every noncontractible facial walk is of odd length...", "categor
