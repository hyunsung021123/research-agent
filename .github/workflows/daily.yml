name: daily-research-digest

# 클라우드에서 자동 실행 — PC 가 꺼져 있어도 돈다.
on:
  schedule:
    - cron: "0 0 * * *"      # 매일 00:00 UTC = 09:00 KST (시간 바꾸려면 이 값 수정)
  workflow_dispatch: {}       # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write             # 결과(코퍼스·대시보드)를 저장소에 커밋하기 위함

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run.py
      - name: Commit results
        run: |
          git config user.name "research-agent"
          git config user.email "actions@users.noreply.github.com"
          git add data docs digests
          git commit -m "daily digest $(date -u +%F)" || echo "변경 없음"
          git push
